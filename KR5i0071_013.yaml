body:
  text: 本仙鑑所載永樂皇帝訪三丰書皇帝敬奉書真仙三丰張先生足下朕久仰真仙渴思親承儀範嘗遣使奉香致書遍謁名山虔請真仙道德崇高超乎萬有體合自然神妙莫測朕才質疏庸德行菲薄而至誠願見之心夙夜不忘敬再遣使謹致香奉書虔請拱候龍車鳳駕惠然而來以副朕拳拳仰慕之懷敬奉書三丰託孫碧雲轉奏書詞聖師親口訣明方萬古遺傳與世間人能有幾人知衣破用布補樹衰以土培人損將何補陰陽造化機取將坎中寶金花露一枝慶雲開天際祥光塞死基歸已昏昏默如醉亦如癡大丹如黍米脫殼證無為優遊天地廓萬象掌中珠人能服此藥夀與天地齊如若不延夀吾言皆是非金丹重一斤閉目靜存神只在家中取何勞向外尋煉成離女汞吞盡坎男精金丹並火候口口是元音
  hash: sha256:5c026649a89038b4276a61b4c292a8f52a1b8e68aab6847cab24534032f1751a
