front:
  text: 張三丰先生全集三丰張真人源流真人遼東懿州人姓張名君實字元元號三丰子又號昆陽或云姓張名玉字君寶號元元子宋末時人生有異質龜形鶴骨大耳圓目身長七尺餘修髯如㦸頂作一髻常戴偃月冠一笠一衲寒暑御之不飾邊幅人皆目為張邋遢所啖升斗輒盡或避穀數月自若延祐間年六十七入嵩南遇呂純陽鄭火龍得金丹之旨修煉成道或云入終南得火龍真人之傳修煉成道秦淮漁戶沈萬山又名萬三好善樂施限於家貧不能如願真人傳以點石成金之術遂其願萬三自號三山道士其丹室有聯云八百火牛耕夜月三千美女笑春風世稱為聚寶盆城西南三山街是其故居真人於元末居寶雞金臺觀至正丙午九月二十日自言辭世留頌而逝士民楊軌山置棺殮訖臨窆復生時年一百三十歲矣從此入蜀至太和山結茅於玉虛菴菴前古木五株嘗棲其下猛獸不傷鷙鳥不搏衆皆驚異有人問仙術絶不答問經書則論說不倦嘗語武當鄉人曰此山當大顯後永樂間皇帝勑修武當真人隱於工人之中勤勞行功人皆不識惟碧雲孫真人深知時碧雲為武當山住持與真人來往多受真人益真人名達天庭皇帝遣使屢召不赴惟以詩詞托碧雲奏之後以道授道人丘元靖不知所終
