front:
  text: 張三丰先生全集
  hash: sha256:af8c18feaa9b1c257f97dab7bae59fe397ba55dc3f74eefe44607b0a5b46cd19
body:
  text: 凡例十二則一此書訪輯知多遺漏然其詩古文詞鑑論經訓皆宗三教之旨以垂百世之言亦涵三宮所云呂祖全書輯未全而義則全也故曰全集一出處顯化凡子虛烏有院本浮談之類皆所不取茲特取史志記傳道門實録者以為觀鑑一先生法像見於石刻者甚欲盡傳之難以描寫今茲特取立坐行眠臨成四幅從簡賅也一正訛顯蹟彙記諸篇前後有互見者其詳略卻自不同閲者首尾參觀則先生之實事益見一此書得於他處所刻黃冠所抄者類多訛誤惟汪本特為近善茲刻凡係汪仙所藏必題圓通道人藏本志自來也一雲水前集皆係先生住世時所作編年紀月如見平生其有散見於各省志傳者皆集中之作也故不注某詩見某志一雲水後集三集一係度汪仙時所作一係住空靑時所作故仍以編年序之紀神遊也聞他處有先生乩沙恐其人鬼雜出難以盡信間有可信者則録於彙記之內正集不敢濫收一此書前刻大板各部頂批失落者甚多並且篇頁錯亂內有雲水詩集難以淸正近有張之洞者督學四川捐資翻刻袖板校正無訛亦且便於行篋凡此刋補遺盡皆編次其中一此書內有靈寶畢法丹經乃修仙之捷徑凡讀此經者盡心修身金丹大道有何難哉一玄要篇詩古道情別刻混為一卷茲照汪仙藏本分詩古為上卷道情為下卷其不與雲水詩相參者雲水係先生事蹟玄要乃先生道言也一明史文翰類所載道書目其中有先生金丹直指一卷又金丹祕訣一卷即今大道論玄機直講與玄要篇也又名節要又名捷要俱見神仙通鑑茲照汪仙所藏先生自訂者名之不復更易一此書雕成之後專望博雅君子爰仿古人編輯搜軼補附卷末再有所得依此續之
