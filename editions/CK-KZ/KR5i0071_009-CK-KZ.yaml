front:
  text: 張三丰先生全集重刋道藏輯要張三丰先生全集雲水前集序雲水前集者我三丰先生在元明間所作者也永樂時胡廣等收入大典之内世間少得其本嘉靖中詔求方書仍從大典中糸畨出梓行頒示國師等等錫齡於康熙五十九年得此本於楊州書肆寶而藏之卽花谷藏書也後有起者將此板刋出必能傳其人讀其詩知先生之淸風高節爲不可及也
