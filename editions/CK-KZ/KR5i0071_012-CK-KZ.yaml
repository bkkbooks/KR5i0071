front:
  text: 張三丰先生全集序天台悟眞發明内外二藥返還大事當時淺識無知或疑爲爐火採戰之書葉文叔不明返還又復以淸淨浮言附驥行世翁葆光見而笑曰此不知金丹者也遂爲註以匡正之陸子埜陳上陽道加發揮悟眞三註出而葉注遂湮遼陽張三丰先生天仙也在武當時曾作無根樹道情二十四首與紫陽悟眞後先伯仲世亦認有爲採戰爐火者涵虛喟然曰道之不行由於道之不明也每欲著解彰之恨無同心丹友棲雲劉悟元以宏通大辯之才作書數十種傳世其中有無根樹註解涵虛取而觀之詞源浩大理境圓通由是欣然大喜喜其先得我心之所同然也其中有未盡洩者涵爲虛乃補之内外藥物返還火候先後爐鼎發洩無遺自是而無根二解宛然悟眞三註也解成問序於予予不敏爲記其用心如此
  hash: sha256:ff397e51b432a454da582d289fc26714bee83fd8645f6428bc091901e015b1c6
