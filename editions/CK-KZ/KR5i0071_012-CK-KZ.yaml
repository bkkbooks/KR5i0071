body:
  text: 丁未立秋日靑霞洞主人同師弟何西復拜識重刋道藏輯要張三丰先生全集自題無根樹詞二首鷓鴣天道法流傳有正邪入邪背正遍天涯飛騰罕見穿雲鳳陷溺多成落井蛙不難與辨亂紛譁都將赤土作丹砂要知端的通玄路細玩無根樹下花賣花聲無根樹下說眞常六道含靈共一光會得威音前後事本無來去貌堂堂明洪武十七年𡻕在甲子中和節大元遺老張三丰自記於武當天柱峯之草廬
  hash: sha256:022b43672f0fdd0ff48c1ebbea94430396ee1c9c3d9816e9b51b42a537623fb5
