body:
  text: 漢嘉長乙山人李西月重編張道淵子深氏敬書閬中朱道生晚成子敬刋姪瑛春城朱瓚素園同校字男璜磻溪斗母元尊九皇眞經祝香讚天中斗心中斗敬斗先敬心敬心還敬斗心符七返七數合九還九寶鼎焚香皈依斗母三沐三薰稽首頓首志心皈命禮太初神后天竺聖人主宰魁罡往來印度躬居高上之境極建大中之天統攝萬靈游行三界丹成九鼎道濟羣生大悲大願大聖大慈炁一梵王先天神后摩利攴天斗母無上元君志心皈命禮至眞傳道太淸選仙居武當而啟教爲文始之正傳如癡如醉混仙跡於麗春教孝教忠闡玄風於華夏度萬三於滇海壻女同升續龍虎之神通道法兼備十方寶筏三教宗師大悲大願大慈大仁至玄至妙至竒至神東華首相三淸外臣雷霆神吏靈寶天師太和一炁始祖道通文遠眞君通微顯化天尊志心皈命禮玉淸内相金闕選仙化身爲三教之師掌法判五雷之令黃梁夢覺忘世上之功名寶劍光輝斬人間之妖怪四生六道有感必孚三界十方無求不應黃鶴樓中留勝蹟紫芝洞内煉靈砂存聖像於雲崖顯仙踨於玉宇闡法門之香火作玄嗣之梯航大聖大慈大仁大孝開山啟教玄應祖師天雷上相靈寶眞人純陽演正警化孚佑帝君興行妙道天尊普度光圓自在文尼眞佛開經玄藴咒一炁胎無極先天先地根洞虛含造化㳟肅候神明月吐白毫相雲歸赤色門天潢隨轉運帝輦不留停德合三元理功傳九子靈巍巍眞父母郁郁古經文至道包玄妙眞人體至誠䖍心能感格萬古署長生先天神后斗姆元尊大道九皇眞經爾時先天道后斗姆元尊居炁一梵天斗樞宫内與周御國王斗父天尊俱俯觀下方有一眞人姓張名通道號崑陽乃係九皇第五天禽臨凡修道於北元南明之際寄跡㠟峩福泉山䖍誠禮斗候詔飛昇斗姆慈心感動璇璣運處劃然一聲現出光明妙相乘七豕之車一時辰内卽降眞人禮斗壇中結彩雲懸寶座而爲說此九皇眞經眞人稽首頓首伏拜座前是時斗姆告眞人曰起吾語汝吾卽摩利攴天萬泰陽也天皇之前吾巳出世地皇之先吾住西洲天竺國運大神通往來印度繼見北洲鬱單越周御國王辰祭從心慈好善因往助之覓淨土築垣闕持書戊已之宫實養金胎之室一團神氣三次超脫爲生聖嗣九頭長曰天英是爲人皇後陞玉眞仙靈二曰天任三曰天柱四曰天心五曰天禽六曰天輔七曰天冲八曰天芮九曰天蓬瓊林玉蕊亭亭森森是爲九子是號九皇人皇與羣季分治九州稱居方氏仁風灝蕩普惠羣生九皇昇舉子母同居元始稱吾爲先天道后以著養育九皇之德鴻鈞在手掌握斗樞九皇上映九星九星環遶一垣吾憑炁一妙更化七元君九辰或下世七元代運行斗姆曰若世有修德行道之人敬問九皇所司七元所代者但與說北斗列星其所宰皆可知也斗爲天車運於中央臨制八表爕理陰陽建四時和五行定諸紀移節度均繫於斗一爲天樞主陽德二爲天璇主陰刑三爲天璣主福善四爲天權主禍惡五爲玉衡主生殺六爲開陽主百榖七爲摇光主六師八居開陽之左名曰輔星九居摇光之右名曰弼星皆所以佐斗成功者也於是說大聖北斗九皇星君列號曰大聖北斗九皇第一陽德貪狼星君大聖北斗九皇第二陰刑巨門星君大聖北斗九皇第三福善祿存星君大聖北斗九皇第四殄惡文曲星君大聖北斗九皇第五生殺廉眞星君大聖北斗九皇第六樹榖武曲星君大聖北斗九皇第七統師破軍星君大聖北斗九皇第八左輔洞明星君大聖北斗九皇第九右弼隱光星君如是星君名號燦著天文掌延生注死之籍司福善禍淫之權天子諸侯公卿士庶一切生命均屬斗宫若有善男子善女人身遭老病種種苦趣但能悔罪消愆誠心禮斗誦此大道經訓燃點九皇神燈照䕶命宫自然轉禍爲福化䘲爲祥所有效騐不可具述斗姆曰北斗之廻旋端望七元之返復其體坤中乾其性柔中剛道闡妙中妙氣禀陽中陽秦末之年顯化西漢現身說法面服高皇若有祈福善人欲暏七元金仙大聖之儀者必先掃除塵念淸淨心源㳟身頫首冥目靜觀天樂浮空之際自現金容自露金身有若麻姑神像有若上元夫人女子英雄之氣慈悲普救眾生但得七元君陟降於中庭諸邪皆鷁退百福自駢臻於是說北斗七元解厄應騐咒曰大聖北斗七元君能解一身厄大聖北斗七元君能解二䜿厄大聖北斗七元君能解三尸厄大聖北斗七元君能解四殺厄大聖北斗七元君能解五賊厄大聖北斗七元君能解六淫厄大聖北斗七元君能解七傷厄大聖北斗七元君能解八難厄大聖北斗七元君能解九橫厄大聖北斗七元君能解十魔厄聖哉七元君福及信善人有疾皆能解無常不敢侵神於醫治病應似谷傳聲欲睹光明像焚香候月生斗姆曰七元返復又望九皇廻還敬七元者能使人𨚫死延生敬九皇者更令人成仙作佛若有善男女先禮七元高眞復禮九皇大聖其居家住宅必有甘露下降醴泉發生掬而飲之返老還童金光罩體再於九皇位前一週供𠐒九載行持功成行滿𨂍鶴昇空禮斗善報有如是者於是說北斗九皇應騐咒曰大聖北斗九皇君能解一切厄大聖北斗九皇君能解二曜厄大聖北斗九皇君能解三災厄大聖北斗九皇君能解四緣厄大聖北斗九皇君能解五藴厄大聖北斗九皇君能解六塵厄大聖北斗九皇君能解七殺厄大聖北斗九皇君能解八風厄大聖北斗九皇君能解九幽厄大聖北斗九皇君能解十纒厄神哉九皇君恩光遍九垠無障無災體不生不滅身往來勤度世天地普遊春道法無邊際祥雲䕶上眞斗姆重告眞人曰七元九皇皆吾先天炁一相接而生一炁之動靜陰陽晦朔晝夜昏曉皆倡率焉一氣之造化五行八卦河洛易數皆渾括焉年月日時天干地支東西南北山川海嶽卵胎濕化無非一炁之所在大無不包細無不入信之者生背之者死從之者昌違之者亡三教大眾均宜知此汝本九皇第五天禽下界不恃前因只憑現在現在能修前因可續七九功成將臻聖境故吾說此經典名曰先天炁一九皇眞經吾說汝傳最爲親切此經在處萬靈守衛千聖稱揚三元梗槪一氣相連熟讀此經克離死生熟讀此經克悉玄因寶而傳之非人勿示斗姆說經將畢天仙列宿來迎還於斗宫是時眞人受得妙法上對斗姆言某今誓願流行以傳善士若有男女受持讀誦我當與斗中仙官所在擁䕶於是再拜斗姆而說讚曰家有九皇經本命降眞靈家有九皇經父母保長生家有九皇經七祖皆超昇家有九皇經九玄亦登眞家有九皇經諸厭化爲塵家有九皇經萬邪自歸正家有九皇經眾惡永消淸家有九皇經十族自生榮家有九皇經長保亨利貞斗姆曰善哉善哉汝可宣揚正教功德無邊接引後生同修道果眞人稽首禮謝信受奉行先天神后斗姆元尊大道九皇眞經先天純陽氏孚佑帝君曰某昔與涵三大眾敷說瞻星禮斗章以爲世傳斗科僅有禮拜之儀而少祕密之訣今觀斗姆元尊與崑陽眞君所說九皇經典渾三元之大道明一炁之靈通足與太上五斗後先同揆也上士修之必能超凡入聖中士悟之亦可見性明心普願三千大千百世萬世中人皈依崇奉功德無量某今爲禮斗之士宣列科條凡習九皇眞經者先要淸除斗室屏息塵緣面北稽首端拱而立恍如斗姆天容降臨在上又如千眞萬聖環侍其間然後䖍誠禮斗身欲其端心欲其正神欲其定意欲其慧氣欲其和聲欲其平升降有節進退有文起止有儀興伏有度先拜睿號次誦眞經誦經禮畢復持斗咒二章某雖不敏竊嘗考諸道藏佛藏而知斗姆梵音有數十餘條不能使人遍持兹將藏經所載𥳑切靈應者與諸善士一宣揚之斗姆心咒曰曩謨囉怛曩多囉夜野怛你也他阿迦摩枲摩迦摩枲阿度摩枲攴鉢囉摩枲摩訶攴鉢囉摩枲阿怛䭾曩摩枲摩里攴野摩枲曩謨粹都帝囉乞口乂囉乞口乂牟合娑縳薩怛縳難左娑縳怛囉娑縳娑喻鉢捺囉吠毘藥娑縳賀南無三漫多没䭾喃唵嗎哩嗟𠴏娑訶梵音便讀南無來旦挐多來夜野旦你也拖阿迦摩徙摩迦摩徙阿度摩徙卜不來摩徙摩訶卜不來摩徙阿旦陀挐摩徙摩利卜野摩徙挐摩𡻕都帝來吉槎來吉槎牟沙韈薩旦韈爛左沙韈旦來沙韈娑子不納來費皮藥娑韈賀南無三漫多母駝南安麻利卽芒娑訶又宣揚北斗心咒曰唵呴口底哪吸吸哪囉嘍哪唶呾哪𠯽唶哪口㧞口頭哪口㧞㖿哪唵吽吽吽口俱胝帝賒蘇吒阿若密吒嗚嘟吒口俱嗜吒啵𡃤啼吒㖿微若吒俱囉啼吒嗜摩吒薩娑訶梵音便讀唵勾底那及及那羅婁那昔答那止昔那㧞頭那㧞耶那唵吽吽吽念汞俱胝帝賒蘇渣阿惹密渣烏都吒俱耆渣波頼帝渣耶微惹渣俱羅帝渣耆摩渣薩婆訶純陽帝君宣述斗咒巳畢眞人百拜稽首而說統讚曰福泉峯頂秋月三更長空一碧淨無塵天姆慈心感格降山亭說法臺前仙花燦燦馨倏忽到而今孚佑帝君述咒補眞經大悲大願天姆亦歡欣先天神后摩利攴菩薩斗姆無上元尊九稱願以此功德普及於一切我今得受持光華傳萬刼張三丰先生全集漢嘉長乙山人李西月重編張道淵子深氏敬書閬中朱道生晚成子敬刋姪瑛春城朱瓚素園仝校字男璜磻溪前三教上聖靈妙眞經三部眞經筆仿黃庭其言本勸人頂敬神聖而𨚫於金丹之道亦具其中字面字義皆可奉行愚本不敢贊一辭因奉師手授並命其卽授爲註愚乃退而註之題解曰前指太極之先三教謂立命了命復命之傳上聖喻言上品金丹靈比先天元神極隱微而難測妙含兌中少女納震男之陽光眞經卽眞鉛也昔上陽眞人註太上度人妙經作題頌曰太上端居太極先本於父母未生前度人度我眞經度若問眞經癸是鉛愚於此題亦云孚佑帝君開經讚先天祖炁默默深深琴彈法韻笛奏仙音香花蒲甫兩室似瑶林内院沉沉無上三尊聖駕臨先天祖炁大藥也默默深深未判時也琴喻致和也笛喻調息並喻空中也香花句比鉛花出鼎末二句實指一塵不染至誠感動也一偈已見全經之旨爾時洞玄張仙眞虬龍捧筆演眞經經言三教古聖人道高萬世享明禋東周尼山素王生冬月望日臨昌平周正建子冬月屬戌於今則屬九月十五日也西方悉達牟尼身四月八日臨衛城商正建丑四月屬辰於今則屬三月初八日也十方三界太上君二月十五降威靈商正建丑二月屬寅於今則屬正月十五日也幾千百載轉鴻鈞元炁足兮鍾聖英天上地上此三尊浩浩刼刼皆知名爾時者爾卽已我之對時卽陽生之時先天大道皆自爾時發露故說眞經多用此語作起祖師演洞明經晉秩洞玄洞無所不通玄能窮其妙今又演此靈妙眞經包括金丹大藥虬屬陰龍屬陽陰陽會於筆下大道出於眞經也經言古聖人出世成道之後受享萬代明禋勉後學頂禮聖人勉後學誠求金丹也然此上聖三尊誕期不同卽可想先天藥産活子時亦不可拘聖人要數千百載轉鴻鈞元炁充足而後鍾育其靈此正如金丹之道必越五千四十八日然後金氣足而水潮生也天地之上惟此三聖最尊一身之中惟金鉛最貴浩浩刼刼皆聞其名得丹之後經浩刼而不壞也吾今敷說三聖經水有淵源樹有根願人體此三聖恩𡻕逢聖誕抒䖍誠不須籩豆如朝廷不須懺會鳴魚鯨只須齋肅正冠巾洒掃精廬絶纖塵空空虛室然銀燈香篆盤旋一縷淸水菓茗花潔且馨卑躬頂禮候雲軿願保乾元亨利貞願斷貪癡愛慾嗔願習道德五千文願行三教游長春一念眞參念不紛鴻庥下賜不因循三聖統該萬部神予福予夀誰阻臨祖師以敬聖人之意敷說眞經則尊眞經者卽當如尊聖人先天一炁自虛無中出似莫測其根源而豈知陽産癸中實是水有源木有本但願人體念其本源之恩若逢眞炁一臨必抒䖍誠迎迓如値聖人誕期焉參同契曰至誠專密謹候曰辰是也君子以此道爲貴則籩豆之事付與司存懺會之徒任彼僧道我惟齋吾心肅吾神入室臨爐正冠岸巾而待以黃房爲精廬以玄關爲虛室纖塵盡掃萬慮皆空金銀光現儼若明燈銀燈喻鉛鼎也一縷淸香卽是一陽初氣水菓茗花正佛家藥物之喻也爾時水源至淸玉蕊初發豈不潔且馨乎參同曰眞人至妙若有若無爾時要卑躬頂禮曲聽旋視則眞人之雲軿方至候眞人如候聖人也乾元亨利貞比五行之攢簇貪癡愛慾嗔須一絲之不掛道德五千言說此眞常道也參酌乎三教之訓乃許大用當前得之俄頃永保長春故曰一念眞參鴻庥下賜也不因循者片晌結成陽丹也三姓會合於中宫萬神皆爲之聽令故曰統該萬部也福我夀我全在先天一身之識神誰敢阻哉若把眞經當眞金勝似人間凡鉛銀至誠專密懷竒珍汝家定許不空貧潤身潤屋富庚辛安居自在樂無垠匪惟減夀而延齡亦將立命以全形暗中黑籍除幽冥視履嘉祥瑞靄興眼前巳展大門庭身後還育賢玉昆積功累行洽比鄰風行鄉黨化爲仁百年蟬蛻返瑶京朱霞擁䕶登天門眞經卽指眞金祖師至此明說也眞金爲長生命寶豈是凡鉛凡銀所可同語但當至誠專密寶若竒珍則眞金返舍黃白滿堂夫豈復嘆家貧乎潤屋潤身安居自在皆言凝合丹頭眞炁在抱也陽丹到手不但如煉巳築基只堪減病延年直可立命全形長生久視也斯時也仙班題姓黑籍除名所謂罪垢凡塵一筆消也視履之間安然澹然大展門庭丹廬署仙人之府再以陽丹母氣擒伏陰丹子氣煉成金液九還復加以換鼎分胎則金昆玉仲箇箇會騎鶴也由是而隱顯人寰積功累行旣度了我復度他人天符一到白日飛昇則朱霞擁䕶登天門矣上根道器須體經義實行乃可臻此勿謂終身口誦卽可成仙也莫逢聖誕不闗心忿恚交加逞惡聲房中眤色並宣淫天神察奪難留停平時敬聖極忳忱到此尤宜戒懼深此刻全無頂禮情卽此可以推居恒人逢聖誕最要闗心時値陽生須當用意若猶忿恚逞惡貪戀淫色未有不走眞氣者非特自損其身天神糾察亦將奪其夀年待時煉巳固屬忳忱入室臨爐更深戒懼求鉛無鄭重之情則居恒煉巳亦可推其不純也此節反覆誥誡詞旨極明吾願人人奉祗承洗心滌慮孤衷純視雖不見聽不聞儼然三聖乘紅雲宣尼威儀旭日暾釋迦法象秋月輪函闗紫氣來𦆯紛使人瞻畏時兢兢高山景仰彌慇懃士庶終非凡俗倫敬聖者須致欽承求鉛者宜守靜篤洗心滌慮純其衷以觀其復焉純與雜相反求丹純誠乃克有濟大抵氣定神凝則純欲動情勝則雜按候求鉛則純非時妄作則雜又况先天之氣默默深深無聲無影不見不聞夫惟㳟巳視聽乃如有見有聞也觀聖人之乘雲若眞人之出鼎師所謂一顆紅光是至眞也如旭日者陽光新現初三之夕也如秋月者金水充足十五之夜也如紫氣者眞氣騰騰玄關火發也丹家言初三又言十五者初三象金水之氣新十五象金水之氣足氣不足則水不生初三十五須在一時看須作一串想不可以數算計也若以數算計安得謂之活子時乎初三之中卽兼十五初三則二分藥嫩十五則陽氣純全黃庭云三五合契九九節是也此時進火則有紫氣入關之象否則稍遲刻數卽落後天而陽丹難就也故當要瞻望兢兢勿失爻動之候高山景仰所謂形山對面迎眞人也丹家知此雖士庶亦超凡倫入聖之機就在此一戰成功人可不重其事哉師傳口訣盡洩於此爲同志告中天花雨遍乾坤說法臺前氣象新山河大地生光明蓮社花開白雪春上帝嘉憐演眞經遣神侍衛來丙丁是日是夜月出庚淸輝朗映虛危星碧落隱隱聞簫笙捧爐信士望空迎尊經爲主身爲賓從此修持解邪祲中天比虛無之境花雨譬金水之生虛無妙合乾坤鼎爐在其中天星地潮正如遍滿乾坤也說法臺煉丹所也臺前之氣象何如泥丸云山河大地發猛火張果云開爐巳覺放光明此臺前之氣象也蓮社花開白雪春鉛花現如雪花白也上帝喻心君心愛眞金卽運神火以煉之悟眞謂更假丁公煆煉也是日是夕正逢月出庚方雖明演經之時正表求金之時也淸光吐露照映虛危之穴碧落簫笙恰似汞迎鉛入夫婦交歡景象捧爐信士卽指修丹之人我投彼家彼反主而我反賓賓主浮沉彼我顚倒極是求丹妙法從此修持得丹入鼎則陰消陽盛可解邪祲矣天地不和誦眞經風雷雨霽及時行節氣不和誦眞經春秋冬夏能調匀邦國不泰誦眞經東南西北慶咸亨民物不安誦眞經山陬水澤盡歡欣九幽九獄聞眞經可超滯魄度亡魂名山名院藏眞經可接羽士引高僧誦謂修持也天地比一身一身之運動無常則雨暴風飄坎離奔逸雷轟露冷男女驚狂欲使風雷雨露之順布則必善修眞經也氣節言四時四時之政令不審則春卯秋酉沐浴乖違冬暑夏霜陰陽反變欲使春夏秋冬之合符亦必善修眞經也邦國比丹基眞經安全則東南西北皆共慶民物亦比丹基眞經泰定則山陬水澤皆相懽他如幽獄魂魄皆屬陰邪得眞經而陰退也山院羽僧體存陽半得眞經而陽全矣眞經妙諦包層層眞經首重聖誕辰片晌信受亦生榮矧能永保登上乘千祥未可具敷陳瑶函參透卽蓬瀛巍巍宣說靈妙經洞玄主宰天師孫妙諦層層承上叚而總朿之民物邦國氣節天地其於築基煉巳採藥和丹之層次密包其中然此篇眞經只重金丹大事故開首卽講聖誕以比先天之生金丹以眞陰眞陽二八同類之物擒在一時煉成一粒陽丹其造化在片晌人能片晌信受卽能片晌生輝况又保而不失舉陽丹以合陰丹煉爲金液九還豈非更登上乘乎九還成就千祥雲集人能參透瑶函則與蓬山不遠也宣說此經闡揚靈妙若非洞參玄微之主宰其孰能之主宰爲誰張天師聖孫三丰祖師也惟眞師能談眞道夫豈易言者哉中三教大聖靈應眞經中喻自外入内金來歸性之功也三教喻養性見性復性之道與前三教合取一義大聖比大還靈卽一粒靈丹應比内外相應眞經者金液也孚佑帝君開經讚醍醐灌頂味釅香醲法臺掃淨花雨彌空白雲開嶂出晴空滿院和風𨓮望三尊聖德容當頭一偈巳見此經皆言金液大還之旨兹不必註洞玄至人張仙翁經傳靈應下蒼穹道有三聖位居中先倡後隨聲教隆一尊鄒嶧兖州東一尊潮音落迦峯一尊關令啟玄風道行華夏及胡戎中三聖人降天宫恩波浩浩澤溶溶集義爲氣精神充至剛至大誰陶鎔尋聲赴感慈悲洪救苦救難蘇塵䝉文始先生如游龍領袖羣眞參化功三聖靈光間氣鍾亦因學養足三冬大人尙志飭儒躬居仁由義出羣雍普陀念道抱孤衷十魔九難證圓通石樓山上雲霞封苦志精修神丹紅宅齊昇直上冲至今明月照蘿松靈應眞經祖師下蒼穹傳與人間何殊甘露下降也三聖雖殊總一復性之道總一守中之理故皆位乎中焉先倡後隨者前三聖倡之中三聖隨之有如金丹倡於前金液隨於後也參同云卒得金華轉而相因化爲白液凝而至堅又曰金華先倡解化爲水金華者先天一氣而巳功夫到此聲教愈隆當其先三聖之出處各有不同然皆是乾金之體鍾靈毓秀下降天宫恩佑世人此亦如金丹入鼎與乾交合之後渡鵲橋上崑山旋化爲一盞醍醐灌頂門而下鵲橋歸黃房而結靈丹也浩浩溶溶實形美液之狀此丹也乃是集義而生義屬金至大至剛天地不能陶鑄又復尋聲而至至比還救苦救難甘露遍洒塵迷他日破頂而出矯若游龍可參造化之功也靈光如此無非自修持養育得來亞聖之尙志慈航之煉道石樓之修丹皆同此也吾願人間盡恪㳟仰瞻功德如高崧若聞三聖誕期逢茗香馥郁水花濃默誦眞經蕩滌胷如沾聖惠暏眞容儼然入廟調笙鏞儼然入寺諧鼓鍾池上龜浮聽敲筒雲間鳳舞和絲桐法駕青鸞白鶴從有感卽應慶重重金液之生祖師願人敬重之此箇誕期是比金液生時茗香馥郁水花濃比其香如酥甘如蜜也盪滌胷襟始沾金液之惠結成靈質如睹金光之容此等道味非凡人所得嘗也陳上陽眞人云刀圭入口運巳眞火以養之運火之際忽覺夾脊眞氣上冲泥丸𤃉𤃉然有聲似有物觸上腦中須臾如雀卵顆顆自腭下重樓如氷酥香甜甘美無比覺有此狀乃騐得金液還丹徐徐咽歸丹田自此而後常常不絶閉目内觀臟腑厯厯如照燭漸次有金光罩體也至於笙鏞以調之鐘鼓以樂之正金公與靑娥相見時也敲竹喚龜龜聽我喚鼓琴招鳳鳳受彼招此卽悟眞篇之旨也青鸞喻龍之强氣白鶴喻虎之强氣龍吞虎㗖内外藥凝有感卽應聲氣相通也此言金液内藥必合金丹外藥而後成功慶幸耳儒生頂敬開明聰緇流頂敬豁癡聾羽人頂敬振昏瞢音䝉莫將三聖分三公三教殊途妙自同養性存神萬里融見性定神萬法空玄門退步多英雄煉性調神合其宗學眞道之人無分三教只要敬重靈藥結爲靈丹則養性存神見性定神煉性調神三教皆合一宗也眞經諷出韻琤瑽瓔珞琅玕相玲瓏漲墨消除寶燄熊世間當用赤紗籠可以傳之戒商工可以表之勉士農可以訓世而課童可以戸誦而龕供可以廸吉而勉凶可謂玉應而金舂眞經細玩垂簾櫳方知三聖身始終時雨化物生䓤蘢甘露洒天垂芙蓉九篇文勢擁河灉言言寶筏度人𦨴眞經比金液觸泥丸而有聲故曰韻琤瑽結成大丹則與佛家瓔珞外丹琅玕玲瓏相映也漲墨除而寶燄熊喻如鉛乾汞添也靈丹入鼎百脈歸根環匝關防運符包裹卽如赤紗籠也眾生識此皆可入道參同云覆謬眾文傳世迷惑遂使宦者不仕農夫失耘商人棄貨志士家貧吾甚傷之祖師與魏伯陽同慈悲也故爲重言可以以曉之人能細玩眞經則三聖之始終可知金丹之始終亦可知也孟子之時雨大士之甘露文始之詞源皆如此金液大丹眞乃度世寶𦨴學儒學佛學仙踪不知三聖皆凡庸覆載林林與總總音怱願人頂禮毋疎慵三聖之書如菽菘千門萬戸備飱饔三聖之道如穹窿八方四極齊帡幪對經思聖宜肅雝靈臺勿始念憧憧靜養天懷若稚种主人明月白朣朧時時刻刻戒輕鬆温温存存加研功經堂四面煖雲烘一粒心花含紫茸入聖超凡由我儂人不知三聖之功必皆墜落凡庸人不知金液之道必不能成神仙願人對經思聖願人照經煉丹也煉丹之法先要淨掃靈臺勿使念擾合丹之後又要靜養嬰兒心如明月時時刻刻温温存存此十月功夫也經堂喻丹田煖雲烘照悟眞云内有天然眞火爐中赫赫長紅者也結成一粒心花則入聖超凡由我做矣莫忘君父違孝忠莫學冥頑逞禪鋒莫效旁門落倥侗下墮泥犁入鬼叢三聖在天日曈曨顯良佑善開陰濛眞經傳出氣如虹文光赫赫斗牛衝高提長劍倚崆峒天仙靈聖號三丰莫忘四句戒人立大本求大道也三聖在天明如皎日默爲良民善士掃去災邪此亦如九還到手正陽立而諸陰散矣經氣如虹光赫赫而射斗牛正如嬰兒出胎破頂衝霄的氣象今日之長劍高提倚崆峒而說法者卽從大道得來位登無上三丰仙師也後三教大聖靈通眞經後指丹成之後此三教義取同歸大聖卽大道靈通則變化無方眞經者眞聖也一陽何祖開經偈修經圓滿普度良縁香凝寶篆地湧金蓮大儒大佛大羅仙跨鳳登天又見三尊聖象嚴眞經修圓滿是指大道巳成也惟當普度良縁位證至無上耳此篇立意卽如此偈洞玄眞人張玄玄懷抱眞經與世宣於今又說三聖篇三篇九聖九陽全梓潼文帝七曲巓達摩初祖一莖蓮孚佑獨撑大願船派開南北道無邊三聖靈通普八埏修身苦行曾經年孝友仁慈功德完廣行三教心拳拳過江面壁志向堅道包三教神閑閑終南十試屹如山大哉三教公能肩人見無爲樂自然誰知有作在其先祖師抱眞常之道重與世宣又作第三篇以全九陽之數喻九還之成就也三位聖人皆證大道然皆自苦行修來悟眞曰始於有作無人見及至無爲眾始知正此意也無爲喻面壁之事若云神通顯化則是聖人之慈悲却又有爲於世也三聖慈悲滿塵寰化蹟無方難縷談十七世爲卿相班陰隲文中常有言萬古宏恩堪詠歎音談福星朗照徹微垣東西土說大乘禪少林寺上豈無緣六朝示内子正紛然非師誰與挽狂瀾佩劍遨游遍海天英雄男女授眞詮竒名約姓題山川九州婦孺皆聞焉此叚言三聖之分胎出神靈通顯化蓋望後之成眞者亦如三聖慈悲訓俗化人黜邪扶正朝遊北岳暮宿蒼梧普度良緣也今我宣揚志士前功果須如三聖圓成聖成佛與成仙善心善量宜廣寛若無德行培本元動有羣魔作障纒道成混跡隱煙寰仙階他曰乃高遷此叚勉後人上希三聖敦崇功果廣修德行而後能成大道也三聖之心如醴泉沛澤長流濟後賢向使淸河忘人間何必現身爲宰官向使多那隱湼槃何來五葉下西乾向使回翁永隔凡誰度何王與劉韓三聖之心最纒綿後塵誰歩許誰聯此叚卽三聖之功德而反言之若使三聖道成全無顯露安有若大慈悲若大法派哉誰歩後塵雖似祖師自喻亦以勉勵後學今我敷辭不憚煩望人精進窮瑶函文祖眞經闡妙鸞註參大洞包靈丹達祖眞經見詩緘珍藏腹内養泥丸達摩祖有詩句云腹内運眞經泥丸別主賓吕祖眞經極大觀詩詞歌論韻珊珊萬人皆度萬人歡巍巍寶駕駐雲端此叚言三聖著述皆以上品丹道爲主文昌帝君本以儒而參明大洞得成神聖者也聖賢何嘗不學仙道耶達摩祖師亦以佛教似煉金丹得成神僧者也是眞佛釋何嘗不求仙道耶而吕祖則不待言也萬人皆度三聖婆心不已見三教之同源哉我願羣生頂禮䖍每逢吉誕焚㫋檀花水果燈潔且鮮塵埃淨掃豁松關默誦眞經見聖顔一輪海日上三竿萬里朱霞照大千恍如聾啞捧華鑾宛如飛鍚半空旋又見紅雲起碧藍笑迎黃鶴舞𦒘𦒘天神天將摇雷鞭三聖凌風入紫煙此叚卽三聖之法象靈通喻出神之妙用吉誕比脫胎之時松關比上丹田塵埃脫盡方是還虛見聖顔喻見巳身法象也日昇霞照喻神光也三聖之法駕卽比今日之法駕也神將雷鞭所謂天丁迎衛霹𩆝一聲天外天也莫道乩沙難求攀至今訓草如邱蠻莫言隻履遺市至今蓬髮尚逥還莫謂棲眞止涵三至今常降嶽雲壇此叚言三聖之靈通不但當日道成顯化人間卽今教訓人頌語種好寰其神德猶未已也頌曰性量圓滿法周沙界萬緣雖息一眞自在見種種相及萬萬代引導羣迷眞修不壞於戲三聖澤咸沾願人澟澟對莊嚴爲演眞經作疏箋不須問卦與祈籤只須積德養淸亷自有神庥疊次覃文昌筆錄皆誣傳胡僧棒偈那須參靈寶畢法休研鑽眞經妙諦挾鍼砭瑶臺說法掀美髯此叚言沾三聖之澤者必體三聖之眞道祖師眞經卽當修行之士一通洪願疏文但願積德養亷修成大道不須打卦求籤也道成之後神庥疊賜有如天符累詔他如妄學筆錄求文帝開悟聰明妄談棒偈謂佛法原來如是修持靈寶只圖却病延年者皆非三聖之眞傳也祖師作三篇大經標明大道正可爲世人鍼砭古仙云爲甚此心開大道只因原向道中來祖師慈悲之心不又與三聖相同哉師髯最美當年遨遊雲貴人皆呼爲美髯張公登臺說法如見掀髯微笑也重刋道藏輯要張三丰先生全集漢嘉長乙山人李西月重編張道淵子深氏敬書閬中朱道生晚成子敬刋姪瑛春城朱瓚素園同校字男璜磻溪洞玄度人寶懺諸天無上眞經開經偈太和一氣轉鴻濛演教人寰霽日紅包羅萬象森羣峯慈愛文章錦繡胸鼓鑄元黃氣潛吹槖籥風經爲天口話高穹爾時金闕至尊玉皇上帝端拱彌綸之境高臨燄摩之天紅雲捧座身現三十二色寶光照臨下界睿念惓惓因降玉音垂訓左右諸弼而白眾言方今海宇羣生沐承平之化多鄕善之人但有獨善必湏兼善若無兼善卽非善善汝等願力宏深更湏乘時闡教黙贊熙朝仁風遠播化雨長施慈悲度越羣倫仙秩還超聖境是時玉虛師相眞武玄帝稽首上言臣自黃帝時養眞太和克成上道叨侍紫霄迄今四千餘載始生一人天師之後號曰全一廣立功行有大神通闢邪演正敷訓元明南極會上曾封爲繼武眞人謂其光顯太和道踪臣後玉淸至尊封爲廣慈普度上淸至尊封爲飛龍濟世太淸至尊封爲文遠眞君西南諸省屢受鴻庥臣念此眞足當鉅任但恐職微難宏普教至尊加寵必不負恩現詣昊天敬申高聽至尊聞奏喜暢天顔勅宣陛見毋致逡巡眞君乃從容入覲稽首座前玄光覆頂聖眷欣欣帝曰卓哉爾全一眞君深明大道師相稱揚巳知爾德果能推心浩遠暢發玄經佇命仙苑史臣代製寶誥鍚爾光榮茲將爾全一眞君晉秩洞玄帝君玉虛右相參法天師監察無方便宜行事上下八極任爾游行有功無過再申寵鍚玉音下垂眞君拜命帝受拜巳乃退黃金之殿居赤玉之宫昊天師相卽命玄天侍從導引洞玄帝君流覽北極宴叙三朝與諸眞列宿洗程餞送乃復遨遊三淸懇垂寶訓元始天王曰天地未判鴻鴻濛濛五居十内玄統黃中胚胎萬物涵養三才靜而生動混沌初開又說最上法言曰太和之氣種於乾父震爲長男生自坤母出日入月闢門闔戸掌握陰陽爲道根祖人若遇之夀延萬古要言不煩靈寶天王曰順道成人逆道成丹造丹之法以讓以謙立中生正兀兀騰騰下閉地戸上開天門人若見此道炁長存急急如律令侍衛我法身火符驅萬邪一㸃注黃庭道德天王曰至道之精不在繁言外緣屏去神注丹田人心忘要言不煩忘天息綿綿往來内院順彼自然