我玄風揚吾正道爾諸仙眾盍同稱舉於是列聖羣眞合掌賡歌和聲而退復次玄天大帝謁玉虛之座進金闕之廷㳟上瑶函懇垂寶誥誥曰玉虛上相金闕高眞德暢人神經開井鬼廣三千之功行醒億萬之沉迷昔從元嶽而成眞今繼玄天而闡化扶正教無黨無偏闢旁門有聲有色誅殺乾坤之方士挽回道德之宗風指先天而對月招後進以昇雲妙道無方玄微莫測至靈至聖至大至尊體合自然神凝般若三教眞宰一氣權衡參法天師洞玄帝君猶龍六祖隱仙寓化虛微普度天尊洞玄帝君拜受誥已諸天神聖亦返天宫只見祥雲冉冉華日輝輝帝君乃返本壇敷說此經而爲世人言曰願以此功德推及於萬世與一切眾生皆成無上道志心朝禮諸天度人無量經三稱而退洞玄經者度世之航也經中所述皆諸天垂訓法語我三丰先生遵經演之洞明玄藴洞達玄微於是受封洞玄帝君於是說此洞玄眞經有緣遇此寶之重之弟子西月敬誌重刋道藏輯要張三丰先生全集漢嘉長乙山人李西月重編張道淵子深氏書閬中朱道生晚成子敬刋姪瑛春城朱瓚素園同校字男璜磻溪菩提圓妙經偈曰談經闡妙出塵埃雲皷三聲坐法臺日上峯頭旋過去還應紅到別山來菩提言我昔在太和庵中敦修玄教内抱眞如隱顯度人現種種相作種種方便勤立功行以待天符塵垢滿衣常樂我靜日坐菩提樹下與弟子圓慶及諸比邱徒俱圓慶爾觀此菩提妙種無香有香香無不聞無光有光光無不照香光遍滿總屬無心乃念我佛上乘本性充足慈悲普䕶自然寂照亦非有心是曰菩提菩提嘉名實始於此昔往西天神遊參禮世尊啟請釋旨默契禪宗世尊大喜勅讚宣揚而與大眾言曰神光熙照性海澄淸在塵出塵隱世度世現醫身而扶危困倡大眾而闡道傳經果證大羅金仙道比達摩尊者大仁大願大慈大悲玄玄祖師救難天尊邋遢靜光佛菩薩摩訶薩翌往南海落迦瞻仰尊者潮音浩浩佛法無邊啟請佛意得並釋宗因爲誦菩提妙經讚揚慈悲觀音覺王卽醮甘露而爲祕咒助我功德西南兩參香光同盛法周沙界性體圓充釋佛大乘咸如我道今付梵鼓朗誦菩提於意云何而名爲釋世尊云吾好釋故以釋開教取釋去萬緣之意於意云何而又爲佛慈航云吾好佛故體佛設教取覺悟眾生之意如是我聞釋主離世如是我聞佛主醒世釋中有佛無香光自有香光如菩提然佛中有釋有香光本無香光亦如菩提然釋典佛經無非超脫塵垢警悟沉迷是故世尊淸淨復得慈航淸淨世尊總其淸淨慈航普其淸淨非有所執其淸淨非有所壞其淸淨非有所吝其淸淨乃至無淸淨非淸淨非淸淨亦淸淨是大淸淨是滿淸淨人能唄誦菩提必得淸淨心必得般若心但得般若便忘般若不忘般若卽非般若旣非般若不名般若非非般若乃是般若得般若者是謂之釋是可成釋是有釋釋是釋非有釋釋是釋自有釋釋是謂之佛是可成佛是有佛佛是佛非有佛佛是佛自有佛佛世尊如是也慈航如是也卽沙門比邱亦如是也不如是能成釋不不也不如是能成佛不不也何以故卽釋是釋非釋卽非釋卽佛是佛非佛卽非佛何以故釋外無釋取釋爲釋佛外無佛取佛爲佛何以故釋釋釋意並無釋意乃巳釋意佛佛佛念並無佛念乃實佛念不釋而釋者上乘不佛而佛者大乘佛釋之經藏卽釋佛而成藏是名正法眼藏菩薩述已爾時靑鸞白鳳交加和鳴圓慶曁諸比邱徒眾皆大歡喜歎爲希有頂禮持行卽述慈航咒曰菩提諦菩提揭諦揭菩提諦諦揭菩提諦菩提薩埵諦菩提薩摩訶菩提一經蓋得於西湖慈淨寺如湛上人者上人爲烎虛大師法孫烎虛者江南高僧也㓜精禪旨業宗大乘晚主慈淨寺雅重此經入寂後如湛珍藏者二十餘年道光初來游峩眉同人與如湛遇甚洽因以此經相示並云玄教之中有此菩提而人不識也其時劉楊諸君採輯全書適得此本因㳟錄而敬存之邋遢靜光佛代傳普陀大慈明心神咒觀自在菩薩摩訶薩從定觀中俯視苦海蔑内車諸不善道乃以阿閦鞞掃除諸不善道普願三千大千世界中人若俱胝若僧胝若昆盧遮羅悉令囘心向善善心那羅延無分三千大千中人是何賓頭盧是何頗羅墮皆得登波羅密多皆得登阿耨多羅三藐三菩提卽說陀羅尼眞言曰唵念念念念念念阿鞞䟦致如如耶摩訶菩提菩提薩埵乾陀訶提菩提薩摩訶和南觀世音親授大慈咒願以此功德提醒無量眾曩謨大慈尊觀自在菩薩摩訶薩三稱鐘偈隱仙派寺觀所用十方塵靜一二三叩鐘聲宣普度之靈文演淸虛之妙品伏願君王仁聖萬國承平更祈父母康甯千家和順自古忠貞節烈箇箇揚名從今痛苦顚連人人獲慶九幽六道四生回元返本古墓荒郊冷殯度魄超魂廣乎刀兵水火瘴疫夭亡之輩各免悲鳴並祝乎鰥寡孤獨羈旅流離之人咸歸順境合陰陽而全性命能消罪垢凡塵憑德行以立乾坤可對天高地迥爲儒爲佛能週一十二萬遐齡希聖希眞不落三千六百邪徑掃除悲傷恐懼愛慾貪嗔降伏意馬心猿虎情龍性福祿來成天上神仙接引山門淸淨人間炁道長存志心朝禮先天一炁三淸道祖天尊志心朝禮昊天金闕高上玉皇天尊志心朝禮九天應元雷聲普化天尊志心朝禮太乙救苦尋聲赴感天尊志心朝禮厯代傳道無上眾聖祖師志心朝禮厯刼掌道無上眾聖仙師志心朝禮諸天諸地嶽凟神祗志心朝禮北斗南斗列宿星君志心朝禮盡虛空界一切靈感眾神志心朝禮無量解厄經志心朝禮無量度人經重刋道藏輯要張三丰先生全集漢嘉長乙山人李西月重編張道淵子深氏敬書閬中朱道生晚成子敬刋姪瑛春城朱瓚素園仝校字男璜磻溪水石閒談閒談張子曰世人謂讀書十年養氣十年他把讀書養氣分爲兩節事件便不是聖賢學問夫讀書所以研理養氣所以煉性性理功夫就在讀書養氣並行不悖之中宣聖云學而時習之此便是研煉性理純一不已處張子曰陶淵明北窗高卧自謂羲皇上人此便是他淸風峻節守志前朝氣象特其出語高超而人不覺耳張子曰道人願士子早完功名之願盡乎人事卽時撒手人能功成勇退便爲得時所患者溺入功名場中戀戀不休則愚人也張子曰涵養中有大學問和平處有眞性情諸子須要容人之所不能容忍人之所不能忍則心修愈靜性大愈純張子曰功名無大小總要及時進退何以能知其時凡於功名中平心一想曰吾之功名不過止於是也卽止之便可得其時也抑或有不盡頭處然甯不及母求太過淮陰侯不如子房公元微之不如白香山皆其求盡之心蔽之也向使子房香山亦有求進之心則子房固不難再列台輔香山亦可轉陞宰相然安知其終不與淮陰微之同一鮮終而已哉故知進退者乃能稱爲哲人張子喟然歎曰茫茫𡻕序逐景漂流吾見人寰中求名求利之輩轉瞬而拾靑紫數𡻕而擁豐資者千百人中不數人卽有其人高爵大權難壓閻羅尊者黃金白玉難買無常不臨又或有居富而夀居貴而安者終歸白楊墓下秋風瀟瀟涼氣慘人其子孫不肖又看轉眼荒涼有何益也況乎大富大貴驟富驟貴多畏人妄加橫逆謾罵指摘倘或不行善事被人詛咒有隨口而淍零有隨口而窮困者人人快意箇箇歡心其實天報昭彰非人口之轉移也人能看得破撇得開自然不羡人富不羡人貴求吾安命之理守我修眞之道人競囂囂我獨默默人皆煩惱我獨淸涼又安問人之達與不達窮與不窮爲旁觀之不平也哉張子曰人夀一事上人有定下人有定中人無定中人少善少惡天欲延之不可天欲迫之又不可於是任他自生自死於其中保則生不保則死故修身尙焉修身而兼以積功累行以企於長生久視者尙焉若下等人多過多惡卽修身亦不得長生如其身上之精氣而削之剝之死之罰之而已矣上等則不然以上等而修長生長生可證也卽不願修長生然其正氣撑空亦得聯班神道否則轉投人世亦必生入仁善之家天理若此有何難曉哉張子曰自古忠貞節烈殺身成仁之時便有七返還丹景象當其一心不動一志不分浩然之氣立其中而生其正任他刀鋸鼎鑊都視爲么魔試我毫不動搖我只收留義氣聚而不散凝而至堅火候至此則英雄之光氣亘萬年而不滅也仙家入室臨爐就要有此手段張子曰人當親在須要及時盡孝爲隹否則親容一去因時追感傷情有不可言者今日當秋山林中有守制者聽吾道來又是秋商露滿林碧雲天外望親心黃蘆白草霜中老淚灑泉臺幾尺深試誦此詩能弗慘然張子曰人於孝道務宜各盡天良不能一樣卻是一樣同歸於孝字中乃可欲免門閭之望就宜歸家奉養欲求顯揚之義就宜矢志皇路欲要保身爲孝就宜寡欲淸心徒託空談無益也二三子顯揚未能歸家時少到不如寡欲淸心體曾孟兩賢之訓爲善也若不淸心寡欲只是妄想名而名不成妄想利而利不就妄想一切而一切不可得形神憔悴父母之顏狀未衰人子已有老憊之態是欲言孝而孝亦不久反令父母惟其疾之憂多遠遊之慮不幸而人子一死反添父母傷悲反使父母埋葬由此思之孝在何處不將爲畢世之罪人也乎吾道以淸心寡欲爲本實屬保身之方再加以色和顏順身敬意誠則於孝有得矣張子曰儒生作茂才後多落處館一派須知就館穀以奉養亦儒家之方便門也然孔孟貽後人以詩書原不敎人漁利至後世而有此修金之事則卽此物以奉親正所謂小用小效者耳然不可貪心無厭爲子孫作安閑之計以詩書爲利藪乃不爲聖賢之罪人也張子曰人欲盡忠孝立大節必先要淸心養氣若無眞心眞氣必不能盡忠孝立大節也葢忠孝者本乎眞心大節者原乎眞氣欲得眞心眞氣又當以靜爲主乃能存得起眞心養得起眞氣張子曰人要尋内快活勿尋外快活孔子之樂在其中内快活也若徒願乎其外是欲求外快活而反生其煩惱也張子曰儒生家多得洩精症者雖緣心火不純亦因徹夜談笑永夜讀書引丹田之氣盡縱於口角之間致使精失其伴遂有此洩精症耳善保身者談笑宜少讀書宜和有一後生得慵軟之病張子曰汝宜趁此冬晴運小石砌小塢攜山鋤刪枯草未餒則止日日如此悠遊運動若園丁然則通身氣血活而不滯也張子曰豪傑之士做好人行好事只求其心之所安並不存借善邀福之念明明上帝亦只有福善禍淫之道以待常人而不舉以待豪傑也夫爲善而得福豪傑之所宜有而非豪傑之所盡有顧其轟轟烈烈善作善爲以留於天壤而千載不敝其神食馨香於冥漠者亦何莫非天之所以報豪傑也吾觀古來忠臣孝子義士仁人夭折患難之間而慨然也而恍然也張子曰讀書立品儒者急務而保身之道足包立品於其中保身者必去驕奢淫佚掃蕩邪行故保身可包立品也夫保身之道自曾子傳之至孟子而光大其説養心寡欲持志守氣此保身之圭臬也而修眞之道卽以此爲正法門但人心䝉蔽聞保身而以爲常談聞修眞而以爲奇異欲求知修眞悟道者已難之矣張子曰一日無孔孟之學天下無好人一日無莊老之學英雄無退步王居士雲以茹素爲除葷張子曰葷與素不同也道家戒五葷方書謂䓤韮薤蒜蕓薹此五者辛臭散氣故字从艸軍猶言艸中之兵並主尅伐者也養氣者忌之釋家重茹素以其戒殺放生故凡畜類之肉皆屏而不食世人以朔望等日茹素而平時仍嗜肥甘素猶不素也吾爲茹素除葷者計曰善口不如善心體君子遠庖之訓可也養氣卽能養腹遵至人臭味之戒可也張子謂忍辱受辱二道士曰凡人外營亦必内營内修醇厚外福亦加忙中偷得一分閒卽得一分調養靜裏讀得一日書卽得一日好處若只向外邊奔馳則刋落本原愈見其薄矣張子謂卓菴曰保身以安心養腎爲主心能安則離火不外熒腎能養則坎水不外漰火不外熒必無神搖之病而心愈安水不外漰必無精洩之患而腎愈澄腎澄則命火不上冲心安則神火能下照精神交凝結爲胎息可以卻病可以延年三月三日山中諸子浴乎錦水之湄風乎靑林之下聽子歸啼忽有木葉墜地摺曡如函啟視之則有如魚子蘭者封裹其内問之土人曰杜宇珠也問有何用曰弗知也適張子戴笠逍遙而來與二三子言曰汝欲知杜宇珠之故乎蜀王入山之後蜀人思之故王命子歸賜蜀民以珠子歸者蜀王之鳥使原名謝豹王曰子歸吾國慰我人民故謝豹又名謝報杜宇命之報謝云其珠或赤或黃或靑或紫五色無定可辟人家鬼祟遇鬼祟者暗舉此珠投之卽散但不可令人知覺默念蜀王蜀王珠光珠光投鬼鬼去殺鬼鬼亡我持靈珠作作生芒無陰不盡陰盡迴陽吾奉九天元師命急急如律令勅又云以珠之多少卜年之豐歉甚靈張子曰人當靜養身體素位而行隨遇而安則心性和平神氣冲淡張子謂受辱曰汝敎小子須嚴約束否則性氣一壞長大來汝又恨他是自愛之而自棄之也張子偕雲石卓菴輩冬寒時節走亂山中遇見鬼語啾啾問之土神則皆人之祖靈父魄陰森肅殺墳墓蕭條棺槨頽壞衣冠骸體俱受寒侵憐之者能無骨悚心酸此古人所以有省墓送寒衣之事也張子謂山中人曰夏日宜早起用功日出後覓微凉處收心靜坐切勿向日中大熱時去睡睡而不昏猶可睡而昏者精液化汗而出可惜可惜張子曰吾昨遊兩界山見有老嫗坐崖而笑笑巳又哭心異爲妖𤜶旣而落崖而斃趨前視之已爲雷擊葢千年狸妖也吾不知其何爲詢之火車靈官云曾食人故擊之耳夫兩界山當靑天白日之地尙有此物况深僻荒崖哉張子喟然曰世人朝夕奔波總云不得巳其實有何不得已惟心中有不得巳故嘗言不得巳耳且今不得已而將來必已老矣死矣此之謂已何不得已之有哉諸子有明哲知幾者從此巳之張子謂調理勞瘵者曰夫人治病要心靜要心平要心緩不可希圖速效服藥不加病卽是速效然後一日微好二日微好三日漸好雖屬遲緩比那逐日添病轉眼卽亡者又不啻有天淵之隔張子遊嶽雲之上止吟風之館而與諸生言曰今日山淸人靜心遠地偏洵是難得風景諸子各賦新詩再命涵虛子一彈再鼓以助吟興不亦樂乎人卽不能鼓琴亦須善學聽琴以消其一切涴涴音勿濁濁之私欲糊糊塗塗之妄想靜聽琴音如遊太古聲籟俱沉曠然遐思超然絕俗冷然善悠然深如我亦在鼓琴之間忘乎塵事與虞周相遇與孔孟相見伯牙子期又其後焉乃爲上等幽人否則俗人耳淺人耳何足共居吾極愛此金秋之氣至淸至肅安得攜一壺酒一張琴一枝笛登陟乎高峯之頂笑玩大地山河煙濛濛雲淡淡看日曖曖之村墟波𣺌𣺌之長川彼時笛聲起乎林梢琴聲發乎石上酒氣通乎紅泉碧嶂之間山禽自鳴空翠灑落眞快事也不知諸子亦有此興趣否張子謂老年道士曰汝輩到今日年紀須要死心踏地做功夫俗事以莫管他三字爲主則萬念冰消凡人身中皆有竅竅中皆有生氣若無生氣安能保護形軀只是有氣發生而人不知靜察耳今爲汝説八句閑話以當暮鼓晨鐘人要懂點竅知點幾留點神下點氣你便想得穿看得破做得事成得人此是無心之談卽是汝等當用心學問定爲心靜爲神雖有竅而心不定於其中何從知幾乎張子謂山居道流曰回翁招人向道其中有無限婆心在人固恐難成此千古學問之同病然而冲天有志道亦不阻英雄也人怕軟弱不振若打起精神祖師亦必默助張子謂山中隱者曰人在山中稱隱須要知山林之樂夫山林之樂又不在乎山林也在有以樂乎山林者而後山林助其樂與山林相安於空空靜靜幽幽雅雅淡淡恬恬之中此之謂能樂山林之樂者也張子曰人要立刻能閑乃爲高手若云且慢待我摒擋數日然後來緩緩尋究此便是庸夫口角愚人心腸張子謂圓陽子曰子能割恩愛撒紅塵今日可定汝終身矣以後平平蕩蕩永無危險人生至此樂哉好天氣好山水好亭臺好朋友好風景從今日起從今日受從今日領悟可也張子曰仙家地理須合丹道同悟卽如圓陽子怡雲山莊住宅一區坐落在兩山之間不呑不吐若開若闔用倚粘之法結平安之宅眞乃黃庭下關元上之大中極也此等天機何人知道張子曰山靜恰宜談至道心淸惟愛爇名香此當前妙景也吾偶拈此二語圓陽爲我續之張子謂道流曰人要在家出家在塵出塵在事不留事在物不戀物方是道家種子不必拘於無事亦不泥於想事也張子戴凉葉斗篷逍遙雲外一日聞踏歌之聲自煙中來諸生聽之葢傷大道之難傳黃冠之徒混日月也其歌云光陰快快學道遲遲流水空山獨步尋思只怕眼前光景霎時間喉中氣斷夢夢無知生前夢夢無知醒來後尙有那走肉行尸怕只怕無常到了骨冷堪悲那會兒劫劫輪迴全然不曉得雨打花枝張子以韓仙漁鼓按節傳情唱塵海蒼凉之曲曰飛龍子在天遊開口不離忠孝往來盡是瀛洲欲傳道把人求嘆因緣處處不偶嘆人生幾個回頭風前燭水上舟容易熄往下流勢利家園誰個久兒孫交好盡成仇轉眼便落無常手荒煙蔓草埋髑髏樵人伐木往來走牧童磨壞碑石頭問野人此是誰家墓道幾句不知不知鬼淚啾啾噫嘻乎騎鶴仙人歸去休張子出淸微天界入淡遠山中弟子數人烹泉款洽先生曰吾今以混元仙曲戲贈圓陽眾生爲我歌之添作林泉佳話也是時李山樵敲喚龜之竹楊居士椎招鳳之琴劉野人按行雲之板遂爲先生唱曰圓陽道士眞游戲訪道抛官如敝屣八年失耦夢孤栖夜凉鐵枕寒鴛被看容顏白了髭鬚論年華猶餘生意我勸你早覓黃婆娶個嬌妻男下女顚倒坎離雄做雌調和神氣天台仙子的温柔壻張果老兒的美麗妻美麗妻温柔壻洞房中不知天地性情交感命共眉齊渾渾淪淪那時纔見你眞心恍恍惚惚那時纔見你眞意這道情是你的初步仙梯笑呵呵傳與你三丰道人走筆題曲終見亭前月白樓外天靑環坐石壇相視而笑詩談張子曰書曰詩言志註曰在心爲志發言爲詩是知志也者乃人心中之靈性詩也者特靈性之流露也神仙七返九還煉此虛靈妙性以成萬古不死之谷神見於日月光氣之外則有象隱於日月光氣之中則無形神之所至發爲詩歌詩不同靈性有各異也吾嘗與諸仙往來曠野出沒煙霞每見羣眞妙句輙心記而筆存之以入於水石閒談之類呂翁詩提筆甚高發聲最朗遊行之句美不勝收今錄數首以見先生靈性不與人同也七夕遊嶽雲仙院云始罷緱山宴重來古寺遊疎風梧葉院細雨荳花秋遠嶂雲初歛長天霧乍收新凉今若此玉笛倚高樓過武昌城樓云武昌城郭故依然楚國人家近水邊檻外大江淘日夜閣中長劍倚雲天詞人坐嘯南樓月漁父歌迴西塞煙吹笛老翁閒更甚朗吟一曲響千年同韓淸夫遊匡廬六絕句云雲外廬山九曡靑開窗對嶂讀黃庭箇中有景何人識抛卷翻身入翠屏雨後新篁綠浸人徑趨深處避紅塵韓笙呂笛雙雙度一樣仙音兩化身淘然何處不陶然在地逍遙似在天瀑布倒流三百丈一時淸氣滿崖邊信口歌成信手題剔殘苔蘚翠高低忽聞梵鼓來煙際林木䓤蘢過虎溪一字詩成一字飛天邊黃鶴載余歸壇前有客難留我心似閒雲入翠微喚起眠龍出海門須臾天際雨翻盆長空一劍又飛去請看東南樹影昏俱淸朗可愛性靈與回翁相近者莫如韓淸夫先生有閒吟一首云靜抱沒弦琴細吹無孔笛一彈天地淸一吹天地濶一吹復一彈盡是神仙曲和呂祖云虎在門前鶴在廬瑤笙宛轉笛相如我來不是雲山客湘水之流曲折書語皆雄濶藍采和自號長嘯先生有答人問仙居絕句云踏踏歌殘便上昇嶽山長嘯古先生問余近日居何處天上神仙住玉京嘗見韓藍曹何關中踏歌聯句云乾坤偌大似瓊壺拍板閒吟一丈夫風雨長安春已暮落花滿地步于于眞得把袂逍遙一唱三嘆之樂崑崙麻姑自號碧城仙子其詩以丰韻勝人有題嶽雲壇三絕句云跨鳳驂鸞下碧城笑看雲外月光淸崑崙萬里天風送搖曳瓊環玉佩聲足履靑雲過海山瑤笙在手意閑閑雲中現出金霞帔一路淸吟到此間嶽雲壇上訪回翁子弟兩三毃道筒風聲蕩漾雲聲細樓閣明燈照夜紅又有步虛三首云我本崑崙女散仙曾看海水變桑田神通八極閒遊戲環佩聲搖碧落邊髻頭高插美金華拜別西池阿母家嬝嬝天風吹袖帶步虛全仗紫雲車醖釀長生酒不難只憑手内有靈丹阿儂本是天仙子醉共嫦娥宿廣寒碧城仙姑常師藐姑神人一日師徒步虛降錦江亭上神人題詞云看江潮勢蒼莽搖得山雲淡蕩隔河燈影有無中一幅新詞來筆上意徘徊開軒望這亭兒甚淸爽姑和之云水茫茫山莽莽山水軒前浩蕩雨餘蛙鼓閙堂堂一路潮聲月初上月中來雲邊望晚風凉意淸爽淸逸仙人在唐稱詩中大家性靈飄逸嘗降於世其修褉節降雙淸閣云讀書邁千古攜劍干諸侯瑣瑣不中意大醉隱糟邱黃唐原不遠秦漢如急流忽忽眼前事渾然無所愁靑山行吟老頗愛謝宣樓題詩十萬首付與天地留我自有眞宰浩乎歸瀛洲今日談修禊茫茫付一甌海仙執簡召隨風過十州東行三神仙羣眞同遨遊一飮五千斗撑腸文字流無何有之鄉長嘯去海頭洞天歌云海山尋靈藥靈藥不自海山求乾坤運槖籥槖籥不是乾坤韝金丹原是吾家物神仙都要英雄作夜來飮酒王母前云道蟠桃今已熟太白長嘯安期歌一時羣仙莫我何吾將跨虬遊六合虛空寥寥無雪跡大風自北來吹起寒雲曡曡開安得酒如雨從空飮之無盡取安得酒如泉坐地飮之眼朝天狂吟拍手聳方肩問我何人李靑蓮東坡先生仙才與太白並峙乘風嘯月靈性長存有江南送秋詩云片片秋雲遠茫茫秋水多靑山紅樹外征雁𣺌關河薊北寒逾峭江南氣已和小陽春甫到迎送兩相過題韓淸夫小像云御殿承香吏分胎吏部家閒心忘富貴總角趣煙霞鉢種長生果園栽不老花八仙同夀考萬劫抱丹砂首叩藍關馬胸藏赤火鴉千秋賢叔姪儒道兩無涯自題笠屐圖云山人故態本狂奴醉寫田間笠屐圖好句有時堪作畫閒心無日不提壺樓頭賞月邀禪客谷口衝煙訪釣徒自去自來隨自得一聲長嘯入林樞過東峯云不到東峯久江山仍似前芭蕉落滿地雪意好參禪遊湖口占細細疎煙瑟瑟波水心亭外畫船多瑤笙十里誰家舫聽得紅兒唱櫂歌風斜雨細葛衫輕三兩銀刀出水明我愛芰荷香不斷竹西深處有人行詠磨刀雨云荆州洒遍雨如膏竟爲英雄礪寶刀最是武昌城下水千秋鳴咽捲雷濤詠白菜云淸於雪水白於霜老圃天寒一味香卻笑山僧長茹素和脂煮出不能嘗自贈云平生不作愁眉事今日東坡作散仙解向江山留勝蹟長將姓字挂雲煙遊淸道心山房六言云氣慧神淸道在山空人靜琴幽一榻茶煙裊裊三分酒意悠悠又些些語詞云淸陰繞繞落花窗外鳥聲小鳥聲小修竹一枝斜處好翠羽嚶嚶啼徹曉剛眠一覺淸麗綿芉之筆不減當年靈性非眞仙不能也邵堯夫儒仙也嘗見其顯化士材作觀易吟云庖犧大聖人畫卦傳萬古陰陽變化機乾坤爲易祖吾隱安樂窩天地乃同伍窺破聖賢心恬淡自得所渾渾灝灝置之擊壤篇中仍然無異白玉蟾仙家才子也名山碑版留詠甚多每遇高人逸士必贈以詩其題居易堂云林下風瀟瀟窗前竹密密難得素心人共話新秋夕把酒醉茅堂焚香讀周易瓊山到此來賓主興無極又贈圓陽山人云歸山隱跡話長生日逐閒雲自在行處處回光來返照朝朝對境要忘情掃除塵土勞人夢署起乾坤散客名莫道幽居研煉苦遊心冥漠自空淸張紫瓊饒州人也元初得道詩多秀勁之作自贈六言云心如雪夜鐘聲貎似霜天梅格白雲深處閑行那識仙家曠逸詠胎息云非助非忘妙吸呼修行要解這功夫調停二炁生胎息再向中間設鼎爐邱長春淸秋過嶽雲樓云浩浩天風吹滿樓峯中雲氣湧林邱雨聲響處簷鈴雜方丈蕭然一院秋饒有俊逸之致張紫陽自夀詩云海籌萬古計芳辰得道年來八百春分箇孩兒騎鶴去虛空粉碎見全身非上眞不能也希夷老祖元氣渾淪有答人問姓五絕云一氣淘今古陰陽造化奇問余名與姓睡漢老希夷吾師火龍先生不甚喜作詩以其淡於名譽也今記其偶吟一絕云道號偶同鄭火龍姓名隱在太虛中自從度得三丰後歸到蓬萊弱水東飛霞仙子余十舍女也服神丹飛空嘗降雲南紫霄觀留題一絕款落飛霞而去詩云久住瑤池碧玉樓忽騎彩鶴下靈邱世人欲問飛霞姓曾抱金丹侍沐侯陸潛虛淮海人也嘉靖中遇呂祖得道平生著述甚富有老子元覽二卷陰符經測疏一卷參同契測疏一卷金丹就正篇一卷紫陽四百字測疏一卷方壺外史八卷南華副墨八卷近日同門中有白白子者註道德經名東來正義潛虛題之云一註能將道奧開重看紫氣自東來彈琴度笛眞名士説法談經大辨才我坐方壺翫滄海君登圓嶠壓蓬萊今共坐江亭上口誦南華自笑呆蓋因白白子亦作圓嶠外史道竅談悟眞參同雜解諸書故也乩談或問乩沙之術小伎也而好者紛紛談者赫赫其術果何自耶其皆可信耶否耶張子曰昔回翁欲與涵三諸子發明此妙而終未竟其説也吾今特明之乩者稽也稽以考信也説文曰卜以問疑也故偏旁从占正旁从乚音隱乚古隱字也爾雅釋言隱占也註曰隱度也疏曰占者視兆以驗吉凶必先隱度也吾謂占語成而猶待隱度則與不占者同何必占然亦有義焉在其中矣天仙神仙不喜與人言禍福只勸人修身俟命故言訓詞則無隱言丹道則無隱他若救人開方亦無隱以外一切如問吉凶成敗則無不隱其隱之意者仍是推托他不與之言也否則明指其禍福將應獲福者以爲可喜而自狂或轉福而成禍矣又應受禍者以爲可畏而自迫反懼禍而邀福矣夫福也豈可邀哉惟作善可降祥耳其隱語也猶言不待語而易明也抑其隱之義猶不止此仙家自道成之後步日月無影透金石無聲凡人不能見故於乩沙中草寫龍蛇千言萬態以示其不滅然乩假術也自古眞人皆斥爲方士之行今又何爲降其筆蓋因近日成風公卿士庶每多信好其術神仙以度人覺世爲切故卽借其乩以默相天下人以此卽假成眞耳但學乩沙者有二等一勝一敗上等以德行勝誠感勝因緣勝卽不善乩仙家猶欲往度之况其知乩乎卽其乩而引誘之不用符章自然高眞降室也下等以險惡敗虛誑敗貪欲敗彼卽善乩仙家不近之况其冐瀆乎隨其乩而簸弄之妄用符咒反敎引鬼入室也吾輩自跳出五行以來雖天地猶不能約朿陰陽猶不能陶鑄卽欲請之亦必禮之於符咒乎何用呵呵此術士之所以欺愚人仙家之所以惡術士也今吾卽乩言乩卽以是爲乩訓焉或又問請乩之道固當以德行誠感因緣而不以符咒也然南宮仙道又有以符咒役使神道者何故曰南宮一派雖則動用符咒然此乃高眞傳授與世人救厄除害者此等祕錄非人間梨棗所有卽能得之亦必推心利物乃爲功行宏深苟或私心妄用天帝亦加以霹𩆝而殞其命奪其術矣故雖南宮符咒也要心恭心誠乃有靈效若彼乩厮符咒則未可同日語也况加以不恭不誠乎諸子於此可以自明矣張子曰上天原無福善禍惡之心則降祥降殃人自召之上天若有福善行禍之心則降祥降殃人自知之素行善而獲福此必然之理也卽有禍焉亦暫矣素行惡而得禍此必然之事也卽有福焉亦暫矣何必舍己外問哉乃吾見蚩蚩者氓祈於神則求籤問卦禱於仙則扶鸞請乩若以神與仙爲必知禍福者迨其後驗則信之不驗則疑之其疑與信者仍一愚人之故態也夫神仙固知禍福然亦何必以人心之所已知者而重言複語之哉其求神與仙而驗者有故善人問福而福至惡人畏禍而禍臨若有與之相合者然非籤與卦鸞與乩之靈也其求神與仙而不驗者亦有故善人問禍無禍可加惡人問福無福可賜若有與之相左者然亦非籤與卦鸞與乩之不靈也天下之龜筮算數皆如是耳人何不可自知哉吾生平不喜人求籤問卦扶鸞請乩止願人箇箇修德時時内省而已矣張子曰神仙有度人之願假乩筆而講道談元者有之神仙有愛人之量假乩筆而勸善懲惡者有之神仙有救人之心假乩筆而開方調治者有之若云判斷禍福則有人之善惡在吾前章宣示已明不復再論獨異者寰宇之中聞有設乩求地理請乩論天心之輩者此皆方士遺風上界正神察其奸詐未有能逃天罰者古今題贈明永樂成祖文皇帝予張三丰書皇帝敬奉書眞仙張三丰先生足下朕久仰眞仙渴思親承儀範嘗遣使奉香致書遍詣名山䖍請眞仙道德崇高超乎萬有體合自然神妙莫測朕才質疎庸道行菲薄而至誠願見之心夙夜不忘敬再遣使謹致香奉書䖍請拱候雷車鳳駕惠然而來以副朕拳拳仰慕之懷敬致書外予詩有寄語眞仙張有道爲言竚竢長相思之句見徵異錄未載全首蜀獻王椿王高皇帝第十一子洪武十一年封二十三年之國成都永樂末薨有獻園集贈張三丰先生憶昔蓬萊閬苑春歡聲未盡海揚塵恢宏事業無多子零落親朋有幾人失馬塞翁知是福牧牛仙子慕全眞吾師深得留侯術善養丹田保谷神送張三丰遨遊昔觀太極圖陰陽有反覆元氣止於坤天心又來復我皇振戎衣羣眞佐命出畫桶周顚仙吹笙冷協律張氏尤多才各負英靈骨臨山有鐵冠平陽產金箔先生與之三高風更卓卓眾人皆有爲老翁竟無欲唐虞今在茲巢由獨快樂何我治心方得公延命藥海天萬里遊因緣容後續湘獻王柏王高皇帝第十二子洪武十一年封之國荆州王善道家言嘗自號紫虛子建文初薨太和山尋張三丰故居張玄玄靈神仙朝飮九渡之淸泉暮宿南巖之紫煙好山浩劫知幾度不與景物同推遷我來不見徒悽然孤廬高出古松巓第有老猿接臂相攀緣張玄玄靈神仙遙仰神颷遊極表茅龍喬鶴上靑天甯獻王權王乃高皇帝第十六子洪武二十四年封二十七年之國大甯永樂二年移居南昌博學好古旁通釋老志慕冲舉自號𦡱仙葢亦淮南八公之流也太和隱士歌懷丰仙太和隱士張三丰詔徵不至眞潛龍老而得道玄之宗長生久視若喬松自古神仙吾靡從惟君能繼扶搖蹤不見高人世外容令渠心性若塵封匡廬之山雲濛濛煙霞終日盪心胸先生其來敎我儂願隨鐵杖入瑤峯噫嘻乎所思不見弱水蓬山路萬重蜀定王友垓王乃獻王椿孫悼莊世子好學循理工詩賦善草書著有定園集十卷題玄天觀憶丰仙福地喜重來登臨亦快哉蓬壺連海島雲洞隔塵埃羽客乘鸞去仙人駕鳳回談玄閑坐久欲去且徘徊蜀惠王申鑒王乃獻王椿曾孫著有惠園集題三丰仙像贊若有人兮出世匪常曩自中土移居朔方奇骨森立美髯㦸張距重陽兮未遠步虛靖之遺芳飄飄乎神仙之氣皎皎乎冰雪之腸爰尋師而問道𡻕月亦云其遑遑旣受訣於㪚聖復續派於瓜王全一眞之妙理契未判之純陽南遊閩楚東略扶桑厯諸天之同府參化人而翱翔曰儒曰釋曰老曰莊皆潛通其奧旨乃懷玉而中藏長縧短褐至於吾邦吾不知其甲子之幾何但見其毛髮之蒼蒼蓋久從赤松之徒而類夫圮上之子房胡濙濙字源潔武進人建文二年厯官禮部尙書諡忠安祥符寺訪張三丰先生不遇交情久已念離羣獨向山中禮白雲龍送雨來留客住鹿啣花至與僧分疎星出竹昏時見流水鳴渠靜夜聞卻憶故人從此隱題詩誰似鮑參軍沈元秀元秀一名秀字萬三號三山明初南中人事跡詳見本集中又按淵鑑類函富部沈公亦名富字仲濚行三故吳人呼萬三爲江南第一家有二子茂旺太祖定鼎金陵召廷見令𡻕獻白金千錠黃金百斤甲馬錢穀多取資於茂茂後得罪發遼陽從戎又穴地得金牛馬亦累千云煉丹懷三丰師祖師傳我術無窮鑄鼎燒丹寶燄紅八百火牛耕夜月三千美女笑春風黃芽燦燦初盈釡白雪紛紛更滿空頂上神符未許食還須九轉畢玄功又深謝吾師愛萬三西南相約待何年黃金重濁聊施濟白玉輕淸乃妙玄百尺竿頭須進步千秋題目是修仙地元祕法難窮盡還覓神丹候祖傳潮陽寺題壁秦淮落落老漁翁以艇爲家任轉篷一自眞師傳道後跨鸞飛入海天中查愼行福泉山張三丰禮斗亭尙存淸池照影樹扶疎亭前有浴使池長生桂晝靜廊空想步虛閱世入來棋㪚後出山雲淡雨晴初窮塵滾滾孤亭在浩劫茫茫百戰餘華表鶴歸應有淚舊時城郭半邱墟汪錫齡字夢九號圓通事見本集中西湖舟中感飛龍師降示引神之訣卽事書懷命兒子思敏記之火中鐵柱英雄骨雪裏梅花道士心插漢冰山知欲壓謂某總督也滿湖煙水趁閑吟將同北郭看霞舉懶向東方咏陸沉都賴先生明指敎留侯病死亦愔愔陳政字七之秦淮大商自號淮河隱者讀明史方伎傳有作十年不見成皇帝如此淸高少見之明史誤歸方伎傳誰知太華有希夷錢陳羣字集齋浙江嘉興縣人康熙六十年進士官刑部侍郎加尙書致仕歸田諡文端有香樹齋詩集恭和御製燕九日王新莊觀燈元韻田家春酒十分濃恰爲迎鑾氣更融報社鼓連祈社鼓落燈風接試燈風仙攜邋遢來空碧張邋遢與處機同時訪道後皆仙去人立鞦韆唱比紅里社毛萇詩派在至今鴻爪許誰同臣視學畿輔曾於雪夜與諸生講道論詩於此趙翼字雲松號甌北一號鷗白陽湖人乾隆二十六年殿試第三人及第官至貴西道張三丰禮斗亭在平越高眞觀後高眞古觀鬱䓤蘢猶説仙翁斗檢封遺蹟已無華表鶴借名曾訪鼎湖龍胡濙訪三丰兼訪建文也山深時或飄丹粟人老惟思伴赤松我已退閒期學道前途尙許一相逢李調元號雨村綿州人乾隆癸未科殿試第二人入詞林視學廣東官至通運河道祥符寺讀明胡濙訪張三丰詩碑因和其韻并序寺殿之東有明嘉靖九年王汝賓刻禮部尙書胡濚成化四年訪張三丰詩碑考明紀永樂五年丁亥命戸科給事中胡濚攜道士巡遊天下訪仙人張三丰去十年始還或曰兼訪建文君也碑作成化四年及禮部尙書皆誤胡公詩思實超羣望氣誰知爲紫雲不向吳都瞻日色應從蜀地識星分天師去後神呵護道士來時鬼哭聞永樂何人誤成化寫碑空笑張吾軍陳廣文攜酒再遊草堂節錄何處可攜尊惟有草堂寺淸晨赴宿諾諸子連翩至細徑墮幽篁屈曲得佳致遺像在中堂瞻謁贔𠫍二一爲何氏勒刋本家藏祕一碑鐫差小乃出丁制置更有數豐碣落筆龍蛇避泛草唐人詩別眩符篆字三丰與山峯未可究同異坐今白髮僧登登日搗硾杜老不云乎文章千古事注云碑款以三丰爲山峯愚按此碑必在未改三丰之前所書者張問安字季門遂甯人考廉應考敎習就校官著亥白詩草遊草堂後復行靑羊宫厯二仙菴歸飮庚堂齋中書事郊遊向草堂路轉靑羊宮老子顧我忽微笑天人之貎眞猶龍神羊嶄然見頭角輦自都下由先公祈禱能使腰腳健人來箇箇摩靑銅院後參天十萬竹一龕萬緣藏其中以下減去數句尤健寺隣復愛好庭宇二仙祠桂陰尤濃繞徑尙嫌着屐遠連臂竟作踰垣從金魚尺半戲淺沼花犬三五驚幽叢當門大壁嵌橫石蛟龍鬱勃光熊熊如箝在口指畫肚誰歟書者張三丰歸來相對説奇遇酒肴羅列雙燈紅張君瑞字輯五號鳳洲由拔貢中本省經魁官成都華陽敎諭夔州府敎授致仕還嘉州自號淩雲叟別號半一居士慕全一也所著有挹爽軒集三丰墨蹟書孟浩然春眠不覺曉五截句於高標殿壁上落花啼鳥喜平生仙蹟咸𧩊筆手淸風雨不摧山頂墨龍蛇欲抱閣邊楹當年天子空相索此地高標舊有聲殿上碧紗誰護得樓臺紫氣繞通明董承熙字葆光號槲園埶土江人嘉慶二十二年進士翰林院庶吉士浙江靑田縣知縣嘉定府敎授花朝遊高標山高樓屹屹壓城闉無數山光照眼新一自仙人留墨妙鳥啼花落幾經春李迦秀迦原名嘉一字西來號遯叟別號翩𦒘散人嘉慶戊寅恩科解元己卯連捷進士官中書改保甯府敎授致仕還嘉州寶雞金臺觀懷古拂去征塵上翠巓金臺觀裏謁金仙前朝兩詔猶存石隔岸三峯遠插天丰口丹爐烹日月一條藤杖卓雲煙未知駕鶴遊何處信是逍遙不計年又七載中書宦未成歸途猶幸拜先生殘春欲醒黃粱夢古洞如遊白玉京天子尙難親道貎微官何苦老征塵下山薄暮頻回首恍見飛龍上太淸張其相號松亭樂山縣人庠生三丰樓懷古曾讀明史方伎傳丰公仙蹟多奇幻不飾邊幅任天然一衲一蓑無改換遊蹤偶爾寓金臺自言當逝脱塵埃蓋棺有聲啟復活逍遙得得來西蜀前不見洪武後不見永樂緣何獨謁蜀獻王秀才奇遇增輝光洪武呼獻王爲蜀秀才二仙菴壁留墨妙龍蛇倒綰精神肖淸風吹入漢嘉來高標擲筆更奇哉游戲人間或隱現神龍首尾那全見況復日行千里餘誰能追逐候起居胡給事朱内侍枉齎璽書與香幣荒徼遍尋總不遇詎知仙蹤到處留士夫欽仰樂潛修平易近人人常接不向宣室問前席至今遺像肅樓中大耳圓目下頤豐鬚髯如㦸神如鏡任人祈禱聲相應一辦心香供祖前何時親指道中元王筠字竹蓀樂山縣人福泉山張三丰自寫眞容石刻仙風道骨畫中呈麈尾飄然氣象淸茗椀香爐長侍側三花聚頂見先生首戴仙花故云董江字醒凡號洗凡居士埶土江人醒凡旣妙絃歌又工書畫嘗臨三丰先生眞容則以瑤琴三曡玉笛一枝遙想絕世超凡之致張三丰觀潮處在遵義府烏江上大海翻身不計年路人猶自説神仙江山到此無塵垢邱壑棲遲有夙緣隔岸煙鐘初度嶺當門雪浪欲掀天遙知靜坐觀潮日勝讀南華秋水篇楊鍾濤字春平號復渟樂山縣人上舍生胡給事訪張三丰元鶴飄然下乾坤間氣鍾幣書承帝命雲水訪仙蹤踏破空明界飛吟縹緲峯一肩擔日月兩眼認喬松笠屐拚千里煙霞厯萬重觀應金碧住宮合玉淸逢十載風塵涉三山石洞封歸來遺響在派衍果猶龍李朝華號秦峯樂山縣人外舍生胡給事訪張三丰鳳詔來丹陛鸞車入紫煙此行勞給事何處訪眞仙氏系推龍虎光輝隱市廛高蹤如啟敬幻跡勝周顚雨雪星軺冷山河𡻕月遷徧尋秦蜀路踏破水雲天劍佩歸三殿風霜閲十年建文同物色鶴駕更飄然李朝拔號萃巖樂山縣人胡給事訪張三丰縹緲虛無際行行訪鶴蹤使臣拚千載皇帝仰三丰短褐長縧式圓睛大耳容煙霞高隱士天地老仙宗禮具書香幣言尋水石松有人傳跨虎何處覓飛龍踏破雲千里空經路萬重歸朝談幻跡遺想入瑤峯劉光澤字季三號洄峯居士犍爲縣人天谷洞懷古鴻濛一竅接長生張老來時石鶴鳴絕地通天仙客路在危崖上穿雲裂石洞簫聲𥥆冥内有瓊扉影淸淨中無世俗情欲煉還丹須此地何人得似杜東瀛唐杜光庭煉丹於此張昇鴻字子遠號鶴亭樂山縣人題丰仙太和山打睡圖寫出華胥調神仙睡味濃太和元氣合高卧白雲封有伴皆眠鶴無聲卽蟄龍任人呼邋遢積雪滿寒松李元植字蘋荃樂山縣人内舍生著長乙山房稿鶴鳴山思仙歌神仙個個會騎鶴此鶴獨爲張氏得虛靖初來飛天上見仙傳又古詩云一一鶴聲飛上天三丰再過響崖壑不遇高眞不肯鳴一鳴便有香風生至今五百有餘𡻕松間眠鶴靜無聲或是主人尙雌伏蟄藏胎息卧雲谷待他長嘯入山來便照前番應聲出平泉隱者煉丹砂抱琴攜酒踏煙霞泠澗潺湲喧日夜深崖𥥆窱藏仙家正是幽人棲息處四圍靑壁噓雲霧八卦亭前緩緩行迎仙閣上層層步想見先生禮白雲一瓢一衲遠塵氛三徵不至傲洪武十載難求逾建文變化無方誰識面昨宵夢裏曾相見羽衣道士翩然來喚醒仙壇渴睡漢張三丰八卦亭在鶴鳴山隱仙長放水雲㘭八卦亭中萬象包直取先天排氣候獨尋僻地玩羲爻百圍大木曾親種一孔元關許共敲欲領陰陽參造化客來好與鶴同巢楊廷峻字不拔號鐵根樂山縣人外舍生讀雲水集天風吹海水立走雲萬里連空碧飛龍老子愛飛吟遺響於今透金石方冠破衲行天涯異水奇山是我家古洞幽深眠白鹿洪鈞陶鑄出丹砂萬戸侯封何足數滿山松石爲誰伍丈夫雅志慕淸高豈甘名利老塵土先生曾乘宦海舟椿萱謝世賦宜休向平壯𡻕抛家去婚嫁何能遲勝遊百尺竿頭忙進步逢師指破通天路認得生前舊主人花街柳巷不迷誤一段因緣自碧翁江南有客慕玄功八百火牛耕夜月三千美女笑春風用沈萬三句白下英雄欣相助煅煉金花得外護回首終南遇火龍阿堵囊空淚頻訢水面風來得意時金陵無事步遲遲一朝採得庚方月渾似鯤鵬躍天池丹成拂袖湖山去任他龍蟠與虎踞持椰飮遍酒家樓養我乾坤浩然氣壺裏逍遙春復秋不求聞達於諸侯密勅遍尋荒徼外高節淸風同巢由山北山南歌踏踏披蓑戴笠卧雲石化鸞化鶴化漁樵何處不逢仙邋遢性量圓融滿大千慈雲復廕劍南天欲補心中未了事沈仙纔度又汪仙劍南觀察蓬萊客前身素具英靈骨峨眉禱雨忽逢師德輔飄然歸環谷揚州蟬脱返淸虛手澤心傳留丹廬嫏嬛祕密鬼神護方士何曾夢此書六百年來氣承接有若珠聯與壁合光爭日月耀乾坤風動林泉引豪傑道德崇高妙莫名沆瀣淋漓浣太淸世外人歌雲水集應當頫首拜先生李岱霖字雲石號桂圃洪雅人上舍生元嶽太和山九室岩三丰先生高隱處元嶽峯高卓萬尋至人曾卧白雲深千章古木封丹嶂一帶寒煙護碧岑洞口風淸閒弄笛松間月白照彈琴只今三十六岩裏猶想先生金玉音劉元焯隱鏡編年夢九汪氏曰先生之爲眞仙也聞之者多也爲其隱士也知之者少矣公餘心靜適金使君式訓過訪焚香話先生奇蹤使君曰公胡不書隱爲鏡發明先生大節乎錫齡曰諾爰倣綱目體紀之名曰隱鏡編年崇徵實也自是而先生隱跡與先生年譜均在茲矣後有萬年同志者續之綱洪武十七年甲子夏詔求故元退老一百三十七𡻕老人武當山隱士張三丰不見目三丰懿州人元定宗二年生至元間以博陵令致仕訪道於終南太白之間得希夷正傳其學以忠孝慈恭爲體河洛易象爲用至正二十七年丁未三丰已百二十𡻕矣戊申閏七月元數已終明太祖承天受命三丰遂遯跡深山十七年大封功臣華夷賓服詔求德高夀尊之士聞元張三丰隱武當山一百餘𡻕至是詔之不見發明書故元退老特表其貞也書一百三十七𡻕老人特尊其夀也書武當山隱士則高節淸風爲可百世之師也綱十八年春以沈萬三邱元靖再求武當山隱士張三丰不見目萬三南京人元靖武當人均係三丰弟子太祖詔二人求之以弟子必能勸駕也仍不可致金氏曰書法以沈萬三邱元靖求三丰一以字直揭出太祖牽制林泉之心孰知高節自貞者雖弟子不能强師也再求不見詔愈迫而跡愈隱矣綱二十四年夏又以張宇初求武當山隱士張三丰終不見目宇初龍虎山人天師後裔襲劍印號眞人蓋三丰同宗也至是以宇初求之終不見金氏曰以張宇初求三丰是以族人覓族人亦前番故智也三求之而三不見夫豈捷徑終南借名沽譽者所可同哉綱永樂五年丁亥命胡濙訪求隱士張三丰十年不見目戸科給事中胡濙舊與三丰相識成祖慕三丰高風至是命胡濙求之遍巡天下兼察建文帝所在去十年始還金氏曰史稱訪張三爲丰覓建文所在其實非也夫隱士名動前朝成祖在藩邸久聞其事安知不慕其德高夀尊急思延之於闕下如宋太宗之得見陳希夷以爲快者茲曰兼訪建文所在庶乎曲達成祖之心也綱十年三月命孫元虛字碧雲於武當山預候隱士張三丰不至目前胡濙等去訪三丰已及五年成祖欲見之心刻刻不忘意其必至武當故命元虛齎書幣於武當爲預候之金氏曰觀命孫元虛於武當預候則成祖願見之誠盤旋於隱士之身者至矣豈爲眞建文哉綱十四年正月帝命安車迎請武當山隱士張三丰不至目前年孫元虛奉命在武當山建宮拜候至去年冬三丰始歸武當元虛大悦令人馳報於帝今年春帝命安車迎請忽又他適帝頗悒然綱十四年五月武當山一百六十八𡻕老隱士張三丰入朝目帝以願見之心切切難得乃命胡廣至武當山泣禱三丰聞之卽藏其身於洞中引出陽神化爲隱士戴竹冠披鹿裘飛入金殿稽首階前時帝正御朝望而異之詢爲知三丰卽欽問長生之道三丰曰寡欲澄心澹神汰慮此陛下長生之道也帝曰先生數不見朕今何輕身至此三丰曰臣本野夫於時無用故能修辟穀出泥丸今見陛下乃臣陽神耳昔太祖高皇帝不能溺周顚於江上制冷謙於麾前皆法身非色身也臣今一見特酬苦索之心言訖隱去帝爲封飛龍先生及胡濙胡廣諸臣還朝聞三丰已來謁帝去矣金氏曰一百六十八𡻕老隱士大書特書有憑有據山林中千古一人而已又曰今見陛下乃臣陽神由是知白日飛騰出陽神者能之也先生眞猶龍乎綱天順三年春隱仙張三丰來朝目帝素敬道德之士三丰鑒其誠乃現全神晉謁紫面凝硃修髯如㦸髻垂腦後若玄武然腹大肩厚腰縧首笠而來稽首言曰臣三丰願陛下修已安人黜邪崇正忽隱去帝親製誥文裦之爲封通微顯化大眞人金氏曰隱士稱爲隱仙所以表高人之不死也一謁一封均有明文可證古人豈欺我哉自是而神仙之名永頌不誣也綱成化二十二年春詔特封前太和山隱士張三丰爲韜光尙志眞仙周顚爲宣猷輔化眞仙目時僧道兩徒濫竊封誥貪縱不法帝厭之因科道官進奏遂削僧道兩徒國師眞人之號特封三丰爲韜光尙志眞仙周爲顚宣猷輔化眞仙發明書前太和山隱士表其高風峻節不同方士之卑污也封眞仙黜僞道也綱嘉靖四十二年秋封張三丰爲淸虛元妙眞君目帝晚年頗好元祕聞三丰顯化南京遍索其書得玄要篇閱之嘆曰我朝眞仙也遂封爲淸虛元妙眞君並勅於三丰舊栖處建淸虛觀祀之發明淸則不染於物虛則太空同體二字甚佳綱天啟三年秋張三丰神現宮廷晉封飛龍顯化宏仁濟世眞君目帝因時事多故宮廷中設箕求仙忽見紅光覆座光中現三丰眞容帝叩曰眞仙敎我眞仙護我降語甚密移時隱去帝感之照前飛龍先生顯化眞人晉封爲飛龍顯化宏仁濟世眞君夢九氏曰先生淸皎之光照耀明朝也至矣時地先世漢時留侯張子房世居沛國豐邑九世孫道陵天師寓江西信州龍虎山遂以道傳其家焉裔孫裕賢宋時人也南渡末自遷遼東生子昌昌生三丰見子房世家及三丰本傳元初人正本傳元定宗丁未四月初九日子時誕生此爲説正金時人誤明史或曰金時人按元史太宗成吉思可汗九年甲戌五月舉兵南伐金攻懿州節度使高同山死之遼州遂入元管據此考先生生時遼州久爲元有實非金時人明矣元末人誤無名氏傳云出自元末此不待辨而知其誤矣明初人誤亦見別傳遼陽懿州人正列傳皆同元史元初以遼陽爲東京世祖至元中改立遼陽等處行省統路七一曰遼陽路初領一府曰婆娑府後廢止領州二一曰遼陽州一曰蓋懿州明史懿州距京師一千七百里遼陽州明改定遼衞復爲改遼陽州縣又爲改遼東都指揮司天目人誤四川通志一作天目人或因其曾寓天目耳雲水前集有天目山歌冀州人誤義州人誤易州人誤俱見俗本三州皆北地也冀義易與懿音相近故誤聖父母墓在遼陽積翠山見雲水前集先生答劉仲晦詩云長白𠏉龍數千里我從小𠏉藏之矣九陽子遼東紀行云長白在故會甯府南六十里橫亘千里高二百里其嶺有潭周八十里深不可測人呼爲天池南流爲鴨綠江北爲流混同江南北之間有大𠏉龍蜿蜒其内又有一枝小𠏉龍至遼陽積翠山張三丰先生之祖墓在焉次城大山宮小山門有仙橋獲我意洵不誣也名號先生嘗自言云吾之名號多與古今人同知之卽改於心乃安以故𣺌𣺌無定也一名通與本支遠祖高公之子同一名金與別支遠祖漢大司馬同均見留侯世家一名思亷與元玉笥生字同一名玄素與唐大宗時言官同一名玄化與葛玄弟子同因就兩名中各取上一字爲玄玄子又與太上聖號同乃爲更山峯又與樸楊子同復爲易三峯又與採戰者同殊可笑矣但此三峯之字傳呼已久不欲再行改更因憶乾爻之連而有坤爻之斷不足以還純乾也乃從坤土之中植一根浩然之氣補其斷而全其一焉自今以往當更名全一字三丰名號於是乎大定他若貎容疎野不修邊幅世人之呼我爲張邋辶𡿺者乃千古獨得之奇有一無二之作也呵呵洞天記名通見陸子淵玉堂漫筆名金見夔府志以前二名先生自謂與遠祖同按留侯世家不疑爲嗣侯生二子曰典曰高典生默默生大司馬金金生陽陵侯千秋千秋生子嵩嵩生壯讚彭睦述其後多以功烈著高生通通生無妄無妄生里仁里仁生浩浩生剛剛生翳翳客於吳之天目山妻林氏生道陵復歸沛郡後寓信州龍虎山名思亷見夔州府舊志此名先生自謂與玉笥生字同按元史山陰詩人玉笥生張憲字思亷負才氣走京師創言天下事不用遂入富春山混緇黃以自放張士誠據吳辟爲都事吳亡變姓名遁杭州楊亷夫所謂鐵門能詩者也外又有章思亷者遂昌人也居夀光爲宮道士誦太上度人經有悟遂不語亦或不食踰四十年仙去名玄素見玄要篇自序名玄化見玄要篇還丹歌内此二名先生自謂與金明醫潔古老人同與葛元弟子同按金易州明醫張潔古亦名玄素舉進士不第以醫學傳也字玄玄此字先生自謂與太上聖號同按唐書老子稱玄元皇帝又白樂天詩云玄玄道德五千言字山峯字三峯此二字先生自謂與樸陽子同與採戰者同本集正訛内辨之已明茲不復贅字君實列傳皆作名惟子淵漫筆及本傳作字爲正字鉉一字全一字三丰號崑陽均見本集傳中洞天記先生云自今以往更名全一字三丰名號於是乎大定長乙按先生名號屢更屢同後來作傳者實當以此言爲正遺蹟福泉山在府城南數里通志仙人張三丰修眞處前爲高眞觀後爲禮斗亭亭前有浴仙池夏不溢冬不涸可以療病平越府志對奕石在府城南福泉山後世傳張三丰與隆平侯張信對奕處同上禮斗亭在府城南高眞觀内世傳明初仙人張三丰常禮斗於此同上打坐歌碑文在福泉山高眞觀内仙人張三丰所作言道家之用同上平越府南門度石梁過南街道旁有高眞爲觀張三丰仙師道場從北向西南行曰卓筆山稍西上高坡曰倒馬坡坡半見隔山石壁如屏懸崖千仞壁上有仙師影首戴華陽冠側身杖策而行分明可見其旁刻神留宇宙四大字云是仙師留記爲海内靈蹟三丰祠在平越府城内有禮斗亭亭前石池名浴仙深四五尺許冬夏不涸池旁有桂樹已久枯有道人來浴池中以破衲挂樹上樹復活天啟元年夏駐鎭新添司理李若楠請鸞降筆書一詞曰禮斗亭禮斗亭張仙借此作修眞日月懸頭上風雲過眼塵茉莉元君攴天聖人當年曾格我精誠今朝列仙班顯化通靈敢忘了託跡玄津偶聞父母索吾名聊借俚爲言鏡今有石碑存祠中遵義府烏江有張三丰觀潮處靑山隔岸白水當門至今石像猶在貴州通志寶雞縣東二里有泉散流山麓曰婆羅泉泉出山巓金碧觀仙人張三丰所居也土窟猶存雲棧紀程三丰仙翁每喜書唐詩作龍蛇體得者多刻石以爲世寶池州舊志云靑牛宮石刻一律字體異常人稱仙筆其詩云仙境閒尋採藥翁草堂留話此宵同試看山下雲深處信有人間路不通泉引藕花來洞口月將松影過溪東求名心在閑難遣明日馬蹄塵土中此書唐人詩也嘉靖間都御史劉大謨跋云是刻如雷電鬼神變幻莫測卻又不失六書矩度信非異人不能九龍主人宜加呵護爲若颺車羽輪輦去豈不可惜哉洞天記丰仙書仙境閑尋詩款落玉皇道丈太和子書按張仙曾隱元嶽太和山故自爲號太和子俗稱陳希夷筆蹟非也卽草橋謂此書乃好奇未仕者爲所首曰仙境閑尋末曰求名心在仙尙有此言耶而不知太和子者蓋喜唐人名作借以騁仙筆耳今四川成都府二仙菴亦有此碑蓋塌本移刋者也又嘗見峩眉石刻有春風倚棹闔閭城帝子遠辭丹鳳闕二本字字作龍蛇倒綰之勢筆法爲更奇妙款落張仙手題然亦錄唐人句也若以詩論又必曰靑袍今已誤儒生非神仙語也同上祥符寺壁上有張三丰墨書翔符禪院四字以祥作翔極蟠挐飛舞之妙童山詩所謂旁有四字大如斗擘窠云自三丰手者也綿州雜志巴川縣卽今銅梁南十五里巴岳山有張三丰所留扇硯竹杖各一至今寺僧以爲寶焉四川通志三丰仙翁有手書六言墨絹在成都卓氏家其詩云浩氣衝乎宇宙巍巍湛湛無他白玉毛頭獅子原來只在我家字挾天風海濤之勢蓋明末筆蹟也桐君尺牘高標山大殿外左壁書孟浩然詩春眠不覺曉處處聞啼鳥夜來風雨聲花落知多少二十字筆勢伸縮飛舞盡致殿壁多敝改惟此壁不堊墨色如新人爲以三丰仙筆云樂山縣志嘉州城東九頂山瞻雲峯有三丰仙翁手書説法壹豆口毛三字刻於崖上其爲上淸暉閣卽仙翁與汪觀察講道處也同上淩雲寺在棲鸞集鳳兩峯之間中有古碑刻丰仙坐石觀書像上題勅封飛龍濟世眞人通微顯化天尊三丰張先生聖像二十一字皆隸書淩雲志劍南道舊署在今嘉定府試院中昔汪公觀察劍南張三丰先生顯化其署因卽高標之麓建亭祀之士民稱三丰樓者是也樓前有靜室數椽迴廓曲檻風榭花壇卽汪公息心處也每夕由署内啟後轅拾級登山從安樂園舊址披雲拂樹而上至樓前必露香䖍告以表淸淨仁慈之衷仙翁俯鑒其誠卽現法身相示並與談經論史作字吟詩所傳祕密不可殫述阮友桐聞見草書嘉州東南數里有孤嶼枕於江上與烏尤馬鞍相近舊志名靑衣别島張三丰先生顯蹟其間士民創亭臺祀之中有詩仙院純陽宮軒然臺聽潮軒竹抱齋印月涵日二小池先生皆有留詠亦勝事也洞天記大邑縣鶴鳴山中迎仙閣下有張三丰手植柏樹大可五十圍今巳老矣只存枯椿椿内復生子柏亦近十圍之大四川舊志鶴鳴山迎仙閣外有胡濙訪張三丰詩爲碑苔蘚所蝕只剩磊落精神如藴玉之句前後糢糊然巳可寶重矣款落給事口濚三字猶在卭州舊志鶴鳴山中有八卦亭相傳爲張三丰先生觀易處其圖以太極居其中伏羲卦位包其外蓋言陰陽消長之義以明丹火之進退耳洞天記惠帝之崩於火也或言遯去諸舊臣多從者帝疑之五年遣濙頒御製諸書並訪仙人張邋遢徧尋天下州郡鄕邑隱察建文帝安在至十四年乃還明史胡濙傳太祖命眞人張宇初訪求三丰今有眞人表載在武當碑誌成祖命給事胡濙天下物色有手書並詩載雙槐𡻕抄七修小注明胡忠端尙書成祖朝屢奉命訪張三丰眞人故吾鄕口號有胡老尙書趕張邋遢之語毘陵見聞錄舊志載鬼谷子嚴君平白玉蟾張三丰俱在峩眉曾見神仙眞誥云鬼爲谷太玹師治靑城山嚴君平尙在峩眉未著何秩三丰在明初與夔府開元寺僧廣海善臨別留詩一首草鞋一雙沉香三片而去味此則三丰遊蜀必來峩眉無疑也白集遍查無峩眉雙字惟今峩眉縣南三十里有玉蟾灣緣崖躡蹬上有玉蟾洞可容千人洞壁石色如雲母彷彿見肩背絲縧相爲傳玉蟾尸解處蔣虎臣峩眉志餘平越郡城内有張邋遢修道故蹟在高眞後洪武間雲遊至此結爲茅亭閉戸靜坐與指揮張某善嘗與飮博指城南月山寺地曰葬此可封侯張從之後果以戰功封隆平今亭前一池冬夏不涸旁有一桂亦其手植府南五里卽武勝關隔溪絕壁有三丰遺照戴華陽巾側身攜杖而行儼然圖畫旁有明撫軍郭靑螺書神留宇宙四大字下有夜滴金橋雖晴夜亦雨洒數點又有晚霞落照不計晴兩俱有斜暉見江陰陳鼎紀遊黃公望字子久年九十餘碧瞳丹頰一日於武陵虎跑寺方同四客立石上忽四山雲霧湧溢片時遂不見子久以爲仙去予向疑躭畫者飾之今糸畨道藏玉文金笈經公望編錄者非一其師則金蓬頭其友則莫月鼎冷起敬張三丰乃知此老原從十洲來繪事特其狡獪之一耳見紫桃軒雜綴按公望畫擅一時張祖冷謙亦皆以畫家北泒馳名於世其墨跡必多在名士家故人遺跡云時地補閩人誤滇黔紀逰云三丰閩人洪武間以軍籍戍平越郡蓬頭赤腳丐於市人呼爲邋遢翁以祖師爲閩人或因曾寓閩中耳至謂以軍籍戍平越郡殊不可解豈沈萬三徙邊之日祖師亦有貴陽之戍耶然洪武間太祖訪祖師則又何也寶雞人誤明都穆逰王屋山記道士陳性常舊住武當之自然菴今年七十有八而神氣淸茂似有道者移居兹山巳二十年其學乃仙人張三丰之正傳爲予言三丰名元元遼陽人自號三丰遜叟世人鮮知其名正統間猶在不知所之予曰人傳爲陝右之寶雞人何也性常曰寶雞常寓非彼産也道壇記壇以道名崇本也神仙從道出身則以道叩者必以道降焉夫設壇請仙士大夫多奇此事但其中有可信者有不可信者鸞手正則可信邪則難信誠則可信僞則難信淸雅則可信濁俗則難信况仙才仙筆吐辭必異夫人出語必立其大若詩文鄙陋義理粗疎牛鬼蛇神惑民誣世此豈仙人之言哉嗚呼噫嘻我知之矣先生曰若輩所之爲屏置不論可也吾與二三子談妙理守淸高興到筆隨則河洛卦爻道德忠孝先儒格論老莊尹列參同悟眞之旨用以充其學而放其言焉豈不快哉又云人以吉凶從違求仙解脫驗則信不驗則否二三子亦無效此愚情也吉凶由天定知之何益不知何損理在則氣在氣在則數在主宰者理也流行者氣也生尅者數也只求理之所安雖氣數亦不違也居士等憬然悟曰大哉言乎先生之教我儕者至矣爰書道壇記數則以表其眞庶幾好道者得見先生也先生約諸子載酒凌雲設壇於東坡樓上講道德數章各各聽受乃命擕琴者捧琴案上爇名香展古畫相率而下時同人啜茗前軒山僧四五笑對江山忽聞樓上琴聲隱隱如洞天春曉蕩蕩若瀟湘水雲而樓中故無人也諸生是日咸聞先生之琴焉初冬寒峭曉雪微晴先生降於山中爲諸子講道消寒並云吾今雪裏行吟有能從我游者否俄聞小沙彌言門前有一披蓑道士其行如飛涵虛生追之不及記以詩云先生在世少人知我識先生步又遲雪滿溪橋無履印雲歸海嶽有情思仙風過去應千里鶴駕重來更幾時比似追韓尤不易歸途踏月想丰姿先生偕諸子入靑城山覔結茅養靜之區流連難去一日於飛仙石上書曰吾今現身與諸子一觀行至上淸宮後忽見一童子作畏人之狀避入大石中諸生不以爲然復倚危壁行細徑盤空下至天師洞並無所見仍還上淸某生曰今日之童子必先生也遁身石中是教人退藏於密也先生留諸子在靑城山中勾留數日觀大面之奇空靑插漢訂同心之雅虛白生庭一日爲諸子言曰歸去乎哉姚將軍將下雪封山矣遂促裝過卭州行至太平場十五里回望名山早已彤雲布嶺雪意漫空矣先生與槃山子曰士不能奮身廊廟便當潛身邱壑仰事俯畜怡然一堂好道躬耕亦顏閔之學也若走城市繁囂往來酬酢勞人草草何如桑者閑閑槃山聞之卽移家於槃谷之中守身養體家計平安始信先生談理效如桴鼓甲午夏猓夷出大堡焚掠村墟有丁氏女者與其弟被擄賊憐之爲解其縛將欲誘奪焉女大罵不屈伺隙投江而逝先賊之來也父馮河母溺死女抱母尸出弟被擄三年遁歸冷磧汛泣訢其事總府徐公名致遠屬士大夫揚之山中諸子以此乞先生題先生卽書云丁長英烈女子大堡賊來擄村里女執不辱投江死死抱母尸出江水題畢云此女他日必與節烈者同享千秋亦越五年嘉州有李魏氏者夫亡守節母姑繼逝翁貧不自振氏還歸魏家依父紡績兼養其翁將俟節全孝盡出家從女冠游父老病恐旦夕死反令女無所依也因託媒妁之言再醮於宋姓氏聞之泫然泣下强謂其父曰我明日當往李郎之墓一祭別焉魏然之揭朝乘肩輿出西郭行至中途紿輿夫曰我將往山後探親今有釵在汝持歸我家卽可換取輿資矣氏覘其行遠卽奔觀音灘躍入江中以全其節時樂邑明府毛公諱輝鳳聞之卽禱諸江神爲護完體逾日得其尸於道士觀面貎如生遂同李氏子合葬焉更爲請旌建祠以丁烈女祔食其内雲壇諸子始信先生題贈丁女時其言爲不虛也序傳外記三丰先生傳缺名三丰者幽北遼陽異州人也姓張名君實字玄玄號三丰封曰通微顯化眞人出自元末時眞人之父諱昌又名子安三丰乃第五子也幼時因染目疾百藥罔效於是舍送碧樂宮師事張雲菴爲徒從學全眞正教初師之生也迥多異質龜形鶴骨大耳圓目鬚髯如㦸頂作一髻或戴偃月冠手執竹杖一笠一衲寒暑禦之不飾邊幅人呼爲張邋遢日行千里靜則瞑目旬日不食一朝或噉升斗輙盡或避穀數日自若誠潛靜坐一毫塵事不著矢志慕大道而不果遂遍游湖海流寓寶雞金臺觀棲焉忽一旦辭塵留頌而逝有隣人楊軌山與之置棺殮訖臨窆柩内吼聲如雷眾懼發視之顏色如生尋甦復冐艱辛涉躐名山大澤偶於雍之終南遇火龍先生傳以口訣授以祕妙示以出遊和其光同其塵覔侶於越求鉛於沈内外丹始成旣而厯諸勝地於楚之武當山煉養結庵於玉虛宮前古木林邱下九轉金丹成其大道猛獸不驚鷙鳥不攫人恒異之嘗與鄕人言此山異日當大顯居二十三年拂袖游方而去曾入蜀中凡名山仙跡猶存善書龍蛇草字至今蜀人寶之逮永樂十年帝勅正一孫碧雲於武當山建宮拜候天順中贈爲通微顯化眞人自此出沒無常度人無量莫知所終手著節要篇鷓鴣天等詞行世言道家之用兼成眞之法内外丹經詞甚微妙古來魏伯陽之參同崔公之入藥鏡呂祖之敲爻皆入聖超凡之極則但文義精微奧隱雖破萬卷不能彷彿惟紫陽之悟眞更詳明眾祖師之遺經然亦未可驟燭也獨三丰所著節要篇明白確當口訣顯然俾後學者得以一見了悟其所以闡歸復之正路作玄嗣之梯航明性命之雙修類陰陽之配取濟度羣迷普惠眾生永傳太上之道而不墜玄之又玄眾妙之門復燦然於今日而力闢旁門外道黜邪崇正使堅志勤修無致失足岐途得期速效是乃眞人之慈悲功德不可思議矣吳鎭響雲洞天刻玄要篇序此書傳自張三丰祖師抉道之奧搜道之髓實萬世之元祕學道之正鵠也世有此以爲採戰之術者誣亦甚矣然不可咎爲生謗也劉宋時有張山峯傳御女採戰之術聞者不察遂訛山峯爲三丰而以採戰相訾謸究亦粗心好議論不細玩其書之旨趣書中金丹論不云乎人有此以爲御女採戰是猶披麻救火飛蛾撲燈覆按之自不妄以相議矣靈機靈謐厯年辛苦窮究簡摩雖不謂敢爲窺其奧窔而其中根源節次頗喜得其二三所謂克涉藩籬而不敢自暇自逸必欲慇懃謙下多方延訪者外丹之秘耳此書久無刻本恐傳寫者多亥豕之訛又久而腐朽漶漫也爰付剞劂以永其傳俾有志者不昧所趨庶幾紫陽祖師萬人一字萬人一字之願若合符節或克遂其萬一也祖師在天之靈應默有以牖我也學道弟子張靈機鄧靈謐盥手題嶽雲壇序張紫瓊崑陽先生慈悲普度者也遇儒言儒遇釋言釋遇道言道而其於道也遇大器講天仙遇中器講地仙遇小器講人仙而其於人也遇上等講道行遇中等講因果遇下等講報應有教不分類因才以施功直欲遍海内眾生而各成就之大哉其回祖之後獨立宏願者哉
