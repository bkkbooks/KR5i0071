front:
  text: 張三丰先生全集張三丰祖師無根樹詞注解
  hash: sha256:786563d59faa3a90a060495bff4485d09c6bf29dd37083f4baf6dca6a48b6759
  markers:
  - {type: page-break, offset: 7, content: '', id: CK-KZ_KR5i0071_14p001a}
body:
  text: 雲棲山劉悟元注長乙山李涵虛增解劉注無根樹者詞之名也凡樹有根方能生發樹若無根必不久長人生在世生老病死忽在忽亡百年歲月石火電光亦如樹之無根也仙翁二十四詞以無根樹為名叫醒世人使其看破浮生夢幻早修性命耳李解無根樹以人身氣言人身百脈皆生於氣氣生於虛無之境故曰無根丹家於虛無境內養出根荄先天後天皆自無中生有是無根乃有根之原也煉後天者須要入無求有然後以有投無煉先天者又要以有入無然後自無返有修煉根因如是而巳但人身之氣有少壯老之不同修煉之氣有前中後之各異二十四章合一年氣候皆勸人無根樹下隨時看花此道淸之盡美盡善者也一劉云嘆世李云勸人養幽花無根樹花正幽貪戀榮華誰肯休浮生事苦海舟蕩去飄來不自由無岸無邊難泊繫常在魚龍險處遊肯回首是岸頭莫待風波壞了舟悟元云不知此是何調涵虛云唱道情者名挽烏雲劉注花者樹之精神發煥人之身如樹也人之真靈如樹之花也凡樹有根故能生發而開花惟人身無根生死不常全憑一點真靈之氣運動真靈旺則身存而生真靈敗則身亡而死人之存亡生死聽其真靈之旺敗耳是真靈者雖為人樹之花而實為人樹之根玉陽以此真靈謂黃芽伯陽以此真靈謂金花純陽以此真靈謂靈根紫陽以此真靈謂真金堯夫以此真靈謂天根仙翁以此真靈謂金精諸家丹經又以此真靈謂先天一氣其名多端總形容此一物也此物生於先天藏於後天位天地統陰陽運五行育萬物其大無外其小無內放之則彌六合卷之則退藏於密以體而論在儒則謂太極在道則謂金丹在釋則謂圓覺以用而論在儒則謂明德謂天地之心在道則謂靈寶謂黍米玄珠在釋則謂正法眼藏涅槃妙心人之真靈本來圓陀陀光灼灼淨倮倮赤灑灑不生不滅不色不空處聖不增處凡不減因交後天庶民去之君子存之便有聖凡之分庶民去之者去此真靈而逐於假靈也君子存之者存此真靈而不逐於假靈也因其庶民逐於假靈於是真靈幽暗不明順其所欲貪戀榮華爭名奪利不肯休歇認假為真百憂感其心萬事勞其形如苦海之舟飄來蕩去常在魚龍凶險之處亂遊若能猛省回頭頓超彼岸莫待風波壞舟喪卻性命一失人身萬劫難出矣李解山人在無根樹下幽居有年矣每欲闡發幽玄以招同類時步山園中見花木淸幽自饒丰致乃此悟幽字為二十四章無根樹生發之源幽深也虛無之境也天下虛無之境皆道人花木壇場故吾山老師題竹抱齋句云三徑幽花香自在四園修竹影交加妙哉言乎與此同也花不深幽香不自在紅塵間事日夕難安竹影交加者虛心與靜氣相依使人氣養其心心養其氣氣盛理充心安神全可以葆吾真可以含吾靈悟元以真靈二字為人之樹花樹根其言亦當真靈者真知靈知也靈知屬性為陰真屬知情為陽性情不壞則真靈全無備奈為七情六欲銷之耗之則內損其性外損其情而真靈沒矣真靈沒則有樹無花有樹無根悟元之大意如此吾更有説者花生於樹樹生於根根生於無真靈之體實從虛無裏胚胎故曰花正幽無裏胚胎者即人先天之智慧又為人之虛靈無影無形具衆理而應萬事聖賢用之而有餘仙佛養之而各足但不可與情欲相干情欲相干日取無中有之以為應用將日取其有必日喪其無日喪其無必日喪其根喪其根則喪其樹喪其樹則喪其花俗云人老顚東樹老心空智慧竭矣虛靈散矣有何真靈乎凡此皆貪戀榮華不肯休息日做浮生之事全不想百年倏忽人死事丟身坐苦海之舟又不想一旦無常性沈舟覆無邊無岸泊繫維難一蕩一遊魚龍險處奔奔波波勞勞碌碌徒傷吾之智慧錮蔽我之虛靈有何益哉仙師於此悲憫殊深乃掉慈航度之曰世人之所以深入苦海陷溺難出者皆因不肯回首不識岸頭耳若肯回首即是岸頭岸頭者覺路也能登覺路則智慧復來虛靈長在已往之非不可諫將來之是猶可追神氣雖衰返還有術切莫待風波洶湧打壞了舟庶幾乎舟存人存可為彼岸之需出坎之助也又劉云勉力學人李云勸人栽接無根樹花正微樹老重新接嫩枝梅寄柳桑接梨傳與修真作樣兒自古神仙栽接法人老原來有藥醫訪明師問方兒下手速修猶太遲悟元注本微作危與衰微之意亦相似劉注人多疑年老力衰精神有限如樹花敗危無有生發還不得元復不得本而遂自暴自棄待死而已試觀世間老樹接以嫩枝重新發榮如梅樹寄柳樹桑樹接梨樹此皆無情之物尚能復生况何人為萬物之靈得天地之正氣老而無有藥醫乎藥醫之道是何道即老而栽接之道欲知此道急訪明師求問真方果得真方下手速修猶太遲也李解微衰微也人老則元氣衰微不可不急急栽補觀之梅寄柳桑接梨則有式樣矣寄者比丹法寄居兌戶寄體西鄰之意接比丹法以性接命以我接彼之意故梅寄柳桑接梨正是今人修真樣子古仙栽接方兒栽接者醫老之方也接樹有良方而言梅柳桑梨者同類也夫以老枝劈開而以嫩枝插入夾之捆之好土合之牝牡相銜此接樹法也醫老之方亦必以類入類妙土打合而後返老還元是法也明師知之在人訪求耳速修猶遲者恐其時不待人無常忽至性未明而命未立走入渺茫鬼域矣何仙姑云閬苑中蟠桃上生垂柳枝扶桑上結交梨子此東王公與西王母指示仙方也三丰之言非無據又劉言煉己之功李言明花柳之妙無根樹花正靑花酒神仙古到今煙花寨酒肉林不斷葷腥不犯淫犯淫喪失長生寶酒肉穿腸道在心打開門説與君無花無酒道不成悟元注本靑作淸然靑乃初生新嫩之時與靑而無染者正相近也劉注金丹之道以至淸毫滓無質為歸著然欲其至淸須要在至濁中度出能於至濁中絶無點染方是真淸故曰無根樹花正淸花酒神仙古到今也何以見其花酒能成神仙哉煙花寨酒肉林皆易足迷人之處能於煙花寨中見色不色不為煙花所惑於酒肉林中隨緣度日不為酒肉所纍則是不犯淫欲不斷葷腥而食色之性俱化道心常存人心常滅真靈無傷無損大道可冀其曰不斷葷腥者非貪葷腥乃酒肉穿腸而心不計較也不犯淫而心無煙花矣酒肉穿腸而心無酒肉矣心無煙花自有長生仙花心無酒肉自有延命仙酒有仙花有仙酒即到淸真之仙鄉彼世之避煙花而忌酒肉者豈知凡花凡酒中能出神仙豈知無花無酒道不能成乎敲爻歌云酒是良朋花是伴花街柳巷覓真人真人只在花街玩可謂花正淸之妙用矣李解凡人食色之性最重三丰仙師即借花酒以指點夫貪花酒者多矣抑知有花酒神仙乎身中元氣靑靑秀嫩人能食之御之飲之簪之自然神淸氣爽此之謂花酒神仙自古及今皆有然非世上之煙花寨酒肉林也煙花酒肉昏人神志酒肉氣葷腥煙花動淫欲斯二者皆害也而淫欲甚於葷腥善煉已者逢食便食不另需索故不斷葷腥而葷腥巳忘見色非色不戀嬌娥斯不犯淫欲而淫欲乃絶非然者精亡液漏為害不少故黃庭經云葉落樹枯失靑靑專閉御景乃長寧以是知犯淫欲者必喪失長生之寶酒肉穿腸道猶在心花酒何嘗迷人哉人自迷於花酒耳不覓凡花凡酒必見仙花仙酒仙花仙酒成道之助即無根樹上靑嫩之花也味厚色佳最能滋補仙師打開元門説與君聽若無此等花酒道難成也又劉云劈旁門李云嘆孤修無根樹花正孤借問陰陽得類無雌雞卵難抱雛背了陰陽造化爐女無子夫為怨女男子無妻是曠夫嘆迷徒太模糊靜坐孤修氣轉枯劉注修真之道須要陰陽得類方能成全一個真靈之寶若有陰無陽有陽無陰是謂孤花無類真靈不成亦如雌雞之卵焉難抱雛者蓋以背了陰陽交感造化之爐也又如女子無夫男兒無妻怎能生育彼世之盲漢不窮陰陽之理不推造化之源糊塗幹事或觀空或定息或思神或守竅或搬運皆是靜坐孤修陰而不陽不特無益於性命而且有傷於性命愈修而氣愈枯矣李解孤指內修言內修養性不能立命以其孤而無耦不生命寶猶之雌雞無雄雞匹配雖能生卵卻不能抱出雛雞今人修以性為養氣者而不知其氣正孤陰也欲要不枯須以真陽配真陰乃為同類之物借問修道人得了同類否今夫真陽者義也真陰者道也配義與道則不孤矣但此中有三疊層次始以真陰生真陽次乃以真陽配真陰次又從陰陽交感中産出真靈浩氣豈若雌雞之卵難抱雛哉不能抱雛者因其背了陰陽之義造化之爐也陰陽者夫婦也聖人之道造端乎夫婦化生乎萬物人間男女夫妻亦如是也女若無夫則孤陰不生而為怨女男若無妻則孤陽不養而為曠夫此理之曉然易知者乃世上迷徒過於模糊以為靜坐孤修可以明心可以見性可以一超直入全不講陰陽匹配吾恐日日坐日日修頑空殿上行寂滅海中戲久之而其氣轉枯索矣又劉言匹配陰陽李言顚倒陰陽無根樹花正偏離了陰陽道不全金隔木汞隔鉛陽寡陰孤各一邊世上陰陽男配女生子生孫代代傳順為凡逆為仙只在中間顚倒顚易曰一陰一陽之謂道悟真云陰陽得類歸交感二八相當自合親若陰陽各偏或陽感而陰不應或陰求而陽不招或陽過而陰不及或陽盛而陰不足皆是真靈之花有偏不中不正道不成全也人之真情如金真知如鉛二物屬剛靈性如木靈知如汞二物屬柔真情真知剛而易沈靈性靈知柔而易浮若以性求情情來歸性以真制靈靈歸於真剛柔相應陰陽合和化為一氣生機長存而不息矣如情不歸性靈不歸真是謂金隔木汞隔鉛陽寡陰孤各一邊焉能返本還元結成真靈之丹哉試觀世上男女相配生子生孫代代相傳而相續可知修真之道陰陽相合生仙生聖亦能代代相傳而不息但不過有順逆之分仙凡之別順則為凡逆則為仙所爭者在中間顚倒耳這箇中字其理最深其事最密非中外之中非一身上下之中乃陰陽交感之中無形無象號為天地根陰陽竅生殺舍元牝門人生在此人在死此為聖為賢在此作人作獸亦在此修道者能於此處立定腳跟逆而運之顚倒之災間變為刑福化為德所謂一時辰內管丹成也噫中間人不易知顚倒人亦難曉採戰家以男女交合之處為中間以男採女血為顚倒搬運家又以庭黃穴為中間以氣血後升前降為顚倒凡此皆所以作俑而已豈知神仙中間顚倒之義乎好者學早為細辨可也李解偏指陰陽相隔不能成全作丹也夫陰陽合中則刀圭凝而道術全備金木鉛汞即陰陽也木精汞性皆屬陰金氣鉛情皆屬陽精氣相須性情交感金戀木仁木愛金義汞去迎鉛鉛來投汞方無間隔之病得生大藥真身若是陰孤陽寡各在一邊則陰陽不配偏而不全安能化生至實流傳萬代乎匹配之法仙凡相似只是凡人用順仙家用逆耳悟元謂中間顚倒人不能知吾謂這逆字人亦不知中間顚倒先要知逆字妙用人能知逆則金木汞鉛皆在其中陰陽乾坤盡行顚倒而且有等等事件皆回旋於逆字之內得藥還丹片晌可期也又劉言藥生之時李言坤申之理無根樹花正新産在坤方坤是人摘花戴採花心花藥層層豔麗春時人不達花中理一訣天機值萬金借花名作花身句句敲爻説得真劉注新者本來之物埋沒已久忽而又有之謂花至於新光輝復生如月現於西南坤方純陰之下一點微陽吐露比人之虛室生白真靈發現復見本來面目矣這個本來面目即我本來不死之真人有此人則為人無此人則非人乃我之秉受於天得而以為人者是也但此真人不輕現露非可常見當虛極靜篤萬緣俱寂之時恍惚有象虛極靜篤即坤純陰之象故曰産在坤方坤是人這個久人已為塵垢掩埋絶無蹤迹一但現象便是新花時不可錯急須下手摘之採之以為我有摘花戴者摘此真人之花也採花心者採此真人之心也漸摘漸採由少而多積厚流光真靈不昧則花蕊層層萬理昭彰隨心走去頭頭是道其艷麗如春日陽氣遍地處處花開矣但此花人人俱有人人俱見人人不達每多當面錯過若有達之者超凡入聖剎那間耳故曰一訣天機值萬金仙翁慈悲借花之名作花之身即有形無句句敲爻分説先天之旨蓋欲人人成道個個作仙奈何時人不達此花中之理而猶有以御女閨丹妄猜妄作者雖仙翁亦無如之何也可不嘆諸李解悟元講人字是本來面目是曾見過此人者故不覺語長心重達已達人慈悲切矣但坤是人的是字尚未醒露原夫花以比人人即借花為喻花正新者如人到歸根處致虛守靜觀彼一陽來復不覺春色又新矣這花在坤方發現即坤見花即花見人花生處即人生處故曰坤是人也丹法種鉛於金鄉播汞於火地金火位乎西南西南得朋金火合處正在坤方之上此人乃金身火體一片純陽吾人真氣是也一曰真情惚兮恍兮其中有象熱如火艷如花花氣薰人濃似酒得之所以如醉也此時也吾即摘而戴之時不可過也吾更採取其心直須吞盡也由花及蕊透入層層真個是豔麗春宮時人知其外而不知其中必不達花中妙理花中妙理純是天機天機流露一訣能值萬金此中四五六七句皆吕祖敲爻歌語丰翁云呂祖以人身借花之名以花身作人之身我句句用敲爻語極説得真切有味也又劉言乘時採取李言臨爐定靜無根樹花正繁美貌嬌容賽粉團防猿馬劣更頑挂起娘生鐵面顔提出靑龍真寶劍摘盡牆頭朵朵鮮趁風帆滿載還怎肯空行過寶山牆頭作瓊花瓊花作牆頭吾皆見過此注作牆頭講有味故從之劉注先天真靈發煥一本萬殊隨時玩象無物不在花甚繁也當其正繁英華畢露精神外用易於爭奇好勝賣弄風流故曰美貌嬌容賽粉團於斯時也須要防危慮險牢拴猿馬挂起娘生鐵面提著靑龍寶劍對景忘情摘盡牆頭方露之花不使些子逐於色相耗散真氣也娘生面顔者即無識無知之鐵面靑龍寶劍者即不染不著之真性娘生鐵面即是靑龍寶劍兩者同出而異名以體言為娘生鐵面以用言為靑龍寶劍鐵面者定體也寶劍者慧器也定以用慧慧以成定定慧相需體用不離先天真靈即色即空常應常靜無滲無漏是謂摘盡牆頭朵朵鮮也牆頭朵鮮是方出牆而未離牆頭真氣未散之時於此而摘取之絶無滓質純是天真漸生漸採漸摘漸收必摘至於無所摘而後已噫大藥難遇大法難逢幸而遇逢時不可錯乘此風帆急須摘取鮮花滿載而還怎肯空過寶山自貽後悔也李解繁即盛滿時也美貌嬌容比先天一氣即仙翁五更道情所謂羣陰盡豔陽期一枝春色金花麗是也賽粉團者藥生之時即花魔賽美之時古仙云先天發現藥魔易起若非煉已純熟見美不動誰能得金花於半刻哉故曰防猿馬劣更頑即一枝花道情所謂嬌夭體態十指纖纖引不動我意馬心猿者也挂起娘生鐵面顔拿出定力正教他也無些兒轉動也提出靑龍真寶劍摘盡牆頭朵朵鮮與退羣魔怒提起鋒鋩慧劍敢採他出牆花兒朵朵新鮮同一義也悟元以鐵面為定寶劍為慧真是知音但定慧二者非從煉已得來則定非真定慧非真慧不可取用於臨事也一枝花云時時防意馬刻刻鎖心猿晝夜不眠煉已功無間宜須煉到那俺是個淸淨海一塵不染方是真定俺是個夜明珠空裏長懸方是真定牆頭者花已出牆而猶在牆這叫做出牆花兒火最淸候最真非得師傳人不解非係過來人不知若曉得花枝出牆時即行採來便是仙家手段摘盡者一口吸盡吞入我家非言漸摘漸收也漸摘漸收乃溫養抽添之事尚在後頭一著趁風帆滿載還四候合丹急起河車運回矣怎肯空行過寶山寶山乃先天生處丹法煉時為藥採時為藥養時則為火然有藥則有火但非溫養之火耳此章注採藥解為正又劉言進退陰陽李言溫養還丹無根樹花正飛卸了重開有定期鉛花現癸盡時依舊西園花滿枝對月才經收拾去又向朝陽補衲衣這玄機世罕知須共神仙仔細推悟元注本又向作旋趁字異而意同也惟才經作殘經作人心私欲解收拾所以退陰賊也未免誤中誤劉注人之精神衰敗真靈耗散如花之飛揚謝落矣然花謝落猶有重開之期人衰敗亦有返還之返道還之道為何道即陰中復陽已謝重開之道鉛花者道心真知之光輝癸水者人心客氣之私欲鉛花發現道心不昧癸水消盡人心常靜道心不昧人心常靜依舊真靈無虧無損本來圓成之物復見於此是花已謝而重開滿枝矣因其癸水要盡故對月殘經收拾去因其鉛花要現故旋趁朝陽補衲衣人心之私欲如外來之客氣如月之殘經道心之真知乃本來之正氣如日之陽光對月而殘經收拾掃去人心之私欲所以退陰也朝陽而旋補衲衣漸添道心之真知所以進陽也退陰退至於陰氣絶無方是殘經收拾了進陽進至於陽氣純全方是衲衣補完成陰盡陽純還元返本本來面目全現謝了重開豈虛語哉這個謝了重開之天機世人罕知若欲知之須共神仙推究原始要終方能知也李解悟元所注其理甚佳然非此章本義按此就還丹溫養言飛上下也乃朝進陽火暮退陰符之意卸了者還丹得葉落歸根正指復命也復命之後又取外爐金水抽鉛添汞溫養靈胎悟真謂外爐增減要施功參同謂候視加謹愼審察調寒溫周旋十二節節盡更須親丰翁謂遇子午專行火候逢卯酉沐浴金丹是也故曰重開有定期重開之物即下文西園花枝也鉛花現癸盡時者還丹大藥鉛生癸後鉛生則採之金逢望遠則不堪嘗惟於五千四十八日癸水初潮之後斟酌用功擒住首經至寶乃為上上癸生為十四癸盡為十五一片陽光正此時也以人身言無非大靜中之大動耳採而吞之遂成還丹但大丹到手外鉛復生丹家必取為溫養之用故曰依舊西園花滿枝云云對月才經收拾去抽鉛也又向朝陽補衲衣添汞也收拾之法須明月之晦朔故以對月為言補衣之法須用日之朝暮故以朝陽為喻此玄家微意也這等玄微世間罕有知者如欲知之須共得道神仙仔細推求庶幾不謬耳又劉言偃月爐李言天上寶無根樹花正開偃月爐中摘下來延年夀減病災好結良朋備法財從茲可成天上寶一任羣迷笑我呆勸賢才休賣乖不遇明師莫強猜劉注先天真靈之寶無形無象無方無所從何而採以結還丹然雖無形無象無方無所亦有花開之時當開之後恍惚中有象杳冥內有精其精甚真其中有信法象如偃月俗工家不知古人取象之意或指為兩腎中間或指為眉間明堂或指為肉團頑心更有作俑魔頭指為婦人産門大錯大錯夫所為偃月者偃仰之月也天上之月每月初三西南坤地黑體之下現出蛾眉之光其光偃仰故名偃月在卦為純陰之下微陽漸生為復在人為靜極又動虛室生白天地之心萌動此心內含一點先天祖氣從黑暗之處微露端倪有象偃月之光因這其一點祖氣為天地之根為五行之本能以造仙佛能以作聖賢能以固性命又號為偃月爐這個天地之心與天地合其德與日月合其明與四時合其序與鬼神合其吉凶難逢難遇幸而偶逢時不可錯急須下手摘來謹封牢藏勿令滲漏可以延年夀可以減病災但此延年夀減病災之事非有大功大行者不能行非有大志大力者不能作必須外結良緣以修德內備法財以用誠乃能感動皇極而得天寶法財者非凡間之財乃法中之財即專心致志真履實踐一念不回之善財上陽真人云天或有違當以法財精誠求之蓋欲求天寶須盡人事人事不盡是無法財無法財而妄想天寶難矣欲求天寶者可不先備法財乎天寶非別物即真靈煉成之金丹亦即天地之心復全之還丹曰真靈曰天地之心者以未修煉言也曰天寶曰金丹者以修煉成熟言也天寶既得萬有皆空根塵俱化入於不識不知無人無我之境一任羣迷笑我呆矣這個呆事須要明師口傳心授非可強猜而知仙翁云勸賢才休賣乖不遇明師莫強猜其提醒後人者多矣李解開言玉蕊初生也偃月爐在人身中無定所亦無定時因其陽氣初動靜中有光故以晦極生明之新月比之此月在天有庚方有初三皆有時地可指若在人身則現處即庚方現時即初三不可預定也偃月何形劉圖是也偃兼仰言九分黑一分白黑中見白陽氣初生故現白光於上而為偃月今人所言者有如此形是仰月非偃月也何以云摘下來乎其言摘下者以其氣在空中也丹家見此一線白光亦不可輕起河車惟宜以淡泊之神沖和之意從氣生處採之故曰偃月爐中摘下來神氣相合之際俄而陽光大現有如十五圓形是為中秋月是為氣足潮生方行驅之黃道送之黃庭由是則年夀可延病災可減矣良朋法財者同心好道之士肯出善財為人護法助人成道者也悟元修真辨及此章注解仍以發財為身中之物此蓋矯貪之論也平心言之法財有二一內法財真金也一外法財假寶也借假修真確不可少但不宜格外貪取耳至於天寶煉成裝憨賣癡抱璞懷玉羣迷笑我為呆子俱可一概任之矣然煉天寶者豈易言哉非遇明師不知也又劉言還丹成熟李言還丹入山無根樹花正圓結果收成滋味全如朱橘似彈丸護守隄防莫放間學些草木收頭法復命歸根返本原選靈地結道菴會合先天了大還劉注真靈之寶去者復來舊者仍新無傷無損依然本來原物是花之圓也圓之云者言其結果收成滋味全也夫金丹成就五行攢簇四象和合仁義禮智信混成一理精神魂魄意歸於一氣更得符火烹煎成熟化為純陽之物活活潑潑其赤如朱橘其圓如彈丸當斯時也守護隄防十二時中不得放間韜光養晦學些草木收頭之法復命歸根返於本源以待靜極又動會合先天以了大還丹之事此言還丹成就再追大丹之功也蓋還丹只完的當年本有原物乃超凡之事呂祖所謂三鉛只得一鉛就金果仙芽未現形者是也大丹是從還丹又做向上事業乃入聖之事呂祖所謂再安爐重立鼎跨虎乘龍離凡景者是也若只修還丹不再造大丹只了得初乘之道不過是一個完全人耳焉能入於聖人之域哉所謂選靈地結道菴者非外之靈地道菴乃內之靈地道菴修道至於歸根復命還丹事畢溫之養之神氣充足則丹靈矣是謂靈丹從此靈地再安爐重立鼎是謂結道菴曰選靈地者等候一陽生也一陽生乃先天中靜極而動之陽非若還丹乃後天中所生先天之陽也雖皆先天但有先後之別耳欲了大還丹非會合先天中之陽不能成功故曰會合先天了大還大丹成就方入聖基若大丹未成只是半塗事業非修道之全功釋典云百尺竿頭不動人雖然得入未為真百尺竿頭重進步十方世界是全身即此了大還之謂乎李解圓指還丹有性情團圓之意也其法功在致虛守靜觀彼庚方月生喻如陽氣初動即運己汞迎之外觸內激而有象內觸外感而有靈如磁吸鐵收入丹田還外丹也此法至簡至易故古仙云不出半個時辰立得成就夫丹有二品而分之則有三乘三乘丹法皆採鉛花皆稱還丹但有大小先後之不同耳一曰初乘名為結丹又名玉液還丹後天中返先天去癸取壬而以玉液培之圓成內丹此盡性之學人仙也一曰上乘則號還丹又曰七返以後天所返之先天種出先天立為丹母此立命之學地仙也曰一大乘名為九轉大還丹其藥以十五夜月圓為喻先天中先天火到即行化為白液吞歸腹內凝而至堅是為金液還丹至靈至妙成聖成真此性命歸了之學天仙也花正圓者即以上乘丹基言之也算結了一果收了一成然其鍊鉛之法二物相吞五行皆備此之謂滋味全也是丹也雖非大乘之丹然亦赤灑灑有如朱橘圓陀陀宛似彈丸功夫至此必須默默照顧綿綿若存否則懷抱不親易於走失故當護守隄防莫放間焉學些草木收頭法易所謂以此洗心退藏於密也復命歸根返本原契所謂白裏真居方圓徑寸也選靈地結道菴悟元謂靈地道菴在人身中然亦有內外二用內邊靈地道菴必求靈臺淸淨神氣沖和而以道人之心太平菴結於其中外邊靈地道菴必求靈山福地囂塵不擾而以道人之白雲茆菴結乎其內如是則心迹雙淸真力瀰滿鉛中産陽會之合之道成九轉大還則聖功了當矣又劉言真一之氣李言交媾之所無根樹花正亨説到無根卻有根三才竅二五精天地交時萬物生日月交時寒暑順男女交時孕始成甚分明説與君猶恐相逢認不真劉注先天真靈之寶具衆理應萬事寂然不動感而遂通天下之故無處有礙無往不利是花之亨也花既亨是樹雖無根而花卻有根其根為何根乃生天生地生人三才之竅陰陽五行妙合二五之精因其是三才之竅二五之精先天而生乎陰陽後天而藏於陰陽一氣分而為陰陽陰陽合而成一氣故天地陰陽上下相交合為一氣而萬物生日月陰陽來往相交合為一氣而寒暑順男女陰陽彼此相交而孕始成觀於天地日月男女一陰一陽相交方有造化可知性命之道非陰陽相交合一不能完成是一氣者即性命之根生死之竅有此一竅則陰陽相交而生無此一氣則陰陽相背而死人之生死只在此一氣存亡之間耳但人不知此一氣是何物件存於何處或疑此氣為呼吸之氣或搬運上升下降於黃庭或聚氣於丹田或聚氣於眉間或聚氣於天谷或聚氣於腦後種種不絶千奇百怪終落空亡殊不知先天真一之氣視之不見聽之不聞搏之不得聖人以實而形虛以有而形無實而有者真陰真陽虛而無者二八兩弦之氣兩者相形一氣居中凝結成丹此乃虛空中事業何得以有形有象之物猜之又何得以有方有所之竅作之哉仙翁以其人皆不識此一氣故以三才竅二五精示之又以天地日月男女相交示之分明將一氣與人指出偶恐人遇此一氣當面認不真耳悟元斗膽避不罪譴今再為仙翁傳神寫意分明説與大衆要知先天真一之氣不是別物即是一點真靈之氣因其此氣剛健中正故謂真一因其此氣易知簡能故謂真靈一真靈真絶無滓質故謂先天之物真一也真靈也同出異名非有兩物不知有人認得真否李解亨通達也一氣通達即從下文交字中出來夫花生於樹樹生於根根生於無是無根卻有根也無根之根即生天生地生人之根此根乃虛無一竅故稱為三才竅此竅為交精之所故曰三才竅二五精二五者天五為一五地十又一五二五即二土也二土合而刀圭成焉泥丸云玄關一竅無人識此是刀圭甚奇絶蓋二五交精之地即産藥之淵源也大修行人於此虛無一竅知其為交媾之所必能使先天一氣自虛無中來交之為用大矣哉以故天地交則萬物生日月交則寒暑順男女交則孕始成此皆交媾之證也此其理甚是分明人人易曉卻人人不曉仙師廣大慈悲説與君聽只要在二八相逢之處將兩氣合成一團斯大藥可生也但恐龍虎相逢吐出兩弦之氣煉丹人認不真耳又劉言金精開旺李言認取金精無根樹花正佳對景忘情玩月華金精旺耀眼花莫在園中錯揀瓜五金八石皆為假萬草千方總是差金蝦蟇玉老鴉認得真時是作家悟元注本對景忘情作月月開時劉注先天靈寶剛健中正純粹精也其花最佳當正佳之時如月華開放金精旺盛而人宜玩之不可當面錯過也月月開者應時而開非時不開按月定期動靜有常絲毫不爽也金精者金之精明在月則謂月華在人則謂真精真精者真靈之精無時有昧故以月華金精喻之真靈人不易知觀於月與金之真而可知真靈人不易見觀於月之華金之精而即見凡物之精華久而有壞惟月華月月開放金精萬年不減月華金精如是人之真精亦如是但真精有時不精者因後天陰氣蔽之而其本體未嘗泯滅也金精旺即是真精旺真精正旺明照世界氣充宇宙白雪飛空黃芽滿地金光耀眼左之右之無不是花矣但此真精無形無象非色非空不可以有心求不可以無心守只可神會不可口言雖是明明朗朗現現成成人人常見人人不識最難認真修道者須要極深研幾真知灼見可方下手不得認假為真似是而非卻在園中錯揀瓜也彼世間盲修瞎煉之輩或疑金精為有形有象之物而遂煉五金八石服萬草千方與我非類焉能結丹接命豈不大差乎蝦蟇為水中之物屬陰蝦蟇而云金為陰中之陽黑中之白我之真知是也老鴉為上飛之物屬陽老鴉而云玉為陽中之陰雄中之雌我之靈知是也真知靈知方是我同類之物方是我性命之寶取此二物合而成丹真而至靈靈而至真真靈不散渾然天理不色不空不生不滅所謂月華者即此所謂金精者即此月華開金精旺豈有不長生者哉但人多認不得真知靈知是何物件若有認得真者便是修道老作家未有不成道者噫金丹之道差之毫釐失之千里認得真者有幾人哉李解佳者美也美金花之稱也丹家以真鉛為美金花參同云鉛體外黑內懷金花茲於黑鉛之中取出白金以朱汞配之産出先天一氣此正是美金花也返之於己便成還丹但還丹必先煉己煉己純則還丹易對景忘情者煉己純熟之後一切美景毫不動情只貪玩這點真氣這點真氣名為月華何又名為月華蓋以月之圓可以測氣之候也悟真云八月十五玩蟾輝正是金精壯盛時此與玩月華同一法眼夫月自初三而生陸仙比之氣嫩月至十五而滿陸仙比之氣足氣足則金精壯盛金精者月華中發現之物同出異名旺則黃芽滿鼎白雪瀰空慧眼觀之照耀如花丹士以通天劍取來及時進火製成還丹惟此花而已矣切莫丟了真花反在園中揀那假瓜以致嘆其錯誤也非特揀瓜為錯即五金八石亦皆假而不真萬草千方總屬差而不是欲求不假不差者惟此金精而已矣這金精從何處生來你看那金蝦蟇玉老鴉即是生來之處蝦蟇為水中陰物名之曰金則坎中真陽也老鴉為天上陽物名之曰玉則離中真陰也真陰與真陽交感生出兩弦之氣又以兩弦之氣生出真一之氣月華也金精也皆此物也但要人認得真耳如其認得真時即是明通火候辨鉛的老作家又劉言採取藥物李言攀折黃花無根樹花正多遍地開時隔愛河難攀折怎奈何步步行行龍虎窩採得黃花歸洞去紫府題名永不磨笑呵呵白雲阿準備天梯上大羅悟元本愛作礙差劉注宇宙之間俱是道氣充塞凡真靈光照之處即是有花之處其花甚多遍地開矣無如遍地花開而人當面不識如河之阻礙雖欲攀折最難攀折亦莫奈何也其難攀折者以其舉世之人皆為名利所牽為恩愛所絆棄真認假以苦為樂步步走的龍虎凶險之地與性命之道相違故難攀折耳若是勇猛丈夫決烈男子直下脫缷世緣求師口訣借假修真於衆花中揀採至中至正之黃花歸於洞中溫養成丹延年益夀則紫府題名永不磨滅矣黃花即色正中央戊已鄉之黃花花正中正純是生機並無雜氣生機歸洞四時長春如居於白雲窩中逍遙自在別有天地非人間豈不呵呵大笑自知快樂乎到此地位還丹已得再安爐重立鼎做向上之事準備天梯而作大羅天仙矣李解先天本來之物賢不加增愚不加減人人皆有箇箇皆生花正多也特為愛河所阻致使本來湮沒縱然遍地花開其如愛河之相隔何哉愛河者後天欲界之人心能阻先天之道心道心既阻則欲攀折仙花難矣為今之計怎奈之何仙師為學者告曰除非步步尋求行行探訪走了一重山又度一重水直入龍虎之窩庶可見其本來也這龍從火裏出這虎向水中生能從後天中吐出先天之氣龍藏於陰虎藏於陽陰陽交媾生出龍虎龍虎交媾生出金花這金花在西南坤方坤土色黃其花亦是黃花人能採得黃花拿回洞去結成金丹則紫府題名永不磨矣笑呵呵深造自得也白雲阿居安資深也如欲竿頭重進至於天仙非再安爐鼎高架天梯不能做大羅天仙欲做天仙者由此而準備天梯可也又劉言陰中生陽李言鼎中産藥無根樹花正香鉛鼎溫溫現寶光金橋上望曲江月裏分明見太陽吞服烏肝並兔髓換盡塵埃舊肚腸名利場恩愛鄉再不回頭空自忙劉注先天真靈衆美畢集萬善同歸其氣最香當其正香之時即鉛鼎溫溫現寶光之時鉛鼎者真知也以其真知能以去舊取新能以修仙成真故謂鉛鼎寶者即真靈之寶真靈非真知不現蓋真知具有道心道心內含先天真一之氣是謂真靈鉛鼎溫溫是剛柔相當不偏不倚而鼎立矣鼎立則道心發現道心發現則真靈之光漸生是謂現寶光金橋者金也曲江者水也上金橋而望曲江水中有金之象水中有金陰中生陽即是月裏見太陽亦是鉛鼎溫溫現寶光也鉛鼎光現陰陽合德神氣相御乘時故入造化窩中令其住而不令其去是謂吞服烏肝並兔髓烏肝色靑日精也象靈知之靈性兔髓色白月華也象真知之真情吞服烏肝並兔髓則性不離情情不離性真而至靈靈而至真性情如一真靈不昧圓陀陀光灼灼淨倮倮赤灑灑一切後天積聚瀉去道心常存人心永滅換盡塵埃舊肚腸矣肚腸換過萬事皆空名利恩愛何戀之乎李解香乃不聞不臭之香至淸至潔之香即先天初現不染於後天時也鉛鼎者外鼎也造鉛之法必立外鼎於西南名曰坤鄉又曰坤母母體本虛必資乾父日精方能産鉛日精者龍汞也即下文烏肝龍為長子子代父體投入母懷則氣精交感先天真鉛之鼎於此而立鍾祖云太陽移在月明中此即立鼎之法也下文云月裏分明見太陽即此溫溫之時也鉛鼎溫溫則寶光現矣寶光者寶命之光此光發現正為先天之氣白象從眉眼上映出呂祖曰溫溫鉛鼎光透簾帷又曰審眉端有朕兆同此景也金橋者鵲下橋也在西南路上為金氣照耀之所曲江者氣繞鵲橋光印西南也昔人注呂祖曲江上月華瑩淨之句指曲江為小腸十二曲誤入魔道矣又有指為口鼻之間者其入魔道尤甚惟陳泥丸先生云西南路上月華明大藥還從此處生記得古人詩一句曲江之上鵲橋橫深為得旨何也西南屬坤坤為腹寶光現處月華正明月華明處金氣正出故於金橋之上望見曲江江上有月正照金橋也月華朗耀陰中陽生故曰月裏分明見太陽太陽者日也日中陽烏日之精也吞服烏肝者餌東方之日精並服兔髓者食西方之月華精華合服大藥乃生日月並吞金丹具體故曰吞服烏肝並兔髓換盡塵埃舊肚腸矣又何有恩愛名利擾我淸心再為之回頭思想終日空忙也哉又劉言臨爐下功李言溫養功夫無根樹花正鮮符火相煎汞與鉛臨爐際景現前採取全憑度法船匠手高強牢把舵一任洪波海底翻過三關透泥丸早把通身九竅穿劉注真愛之寶塵垢退盡至淸至淨花豈不鮮乎然其所以鮮者全賴符火相煎鉛汞之功夫真靈者真知靈知之體真知靈知乃真靈之用真靈分而為真知靈知真知靈知合而為真靈烹煎真知之鉛靈知之汞即烹煎真靈也烹煎者以真知而制靈知以靈知而順真知真知靈知凝結復成真靈之寶其花之鮮言語難形容矣但真靈易結火候最難紫陽翁云縱識朱砂與黑鉛不知火候也如間大都全藉修持力毫髮差殊不作丹特以金丹之道採藥有時煉藥有法若不知時不知法雖大藥在望不為我有故臨爐下功之際恍惚中有象杳冥內有精一點真靈之光從虛無中透出似有似無非色非空景象現前此大藥發生之時也此時即有三尸六賊五藴七情諸般之幻景亦現於前必須穩駕法船牢把舵楫對景忘情一任海底翻波起浪不動不搖如是用功漸採漸煉扶陽抑陰愈久愈力功夫到日自然精化為氣氣化為神神化為虛過此三關泥丸風生法相現露而周身九竅之陰氣亦皆化矣三關非工家尾閭夾脊之説乃煉精煉氣煉神之三關煉精化為氣初關煉氣化神為中關煉神化虛為上關過此三關神合太虛出入無礙是謂透泥丸蓋泥丸宮為藏神之所也周身九竅方著幻身上説過三關上泥丸法身成就而幻身百脈九竅陰氣化為陽氣亦皆竅竅光明即百萬四千毫毛亦化為護法神也學者不可以辭害意也李解此章以溫養言悟元謂過三關透泥丸穿九竅非工家尾閭夾脊之説乃經三煉之後神合其虛出入無礙能使幻身九竅竅竅光明其説可也但上頭數句若不就溫養時言則入室還丹溫養脫胎盡雜於一詞之中似非仙師逐段指點本意今但以溫養言之鮮者鮮明也溫養功深日新月盛之象符火者屯蒙值事朝進陽火暮退陰符也夫子時陽生進火宜子至於朝則寅時矣不於子而於寅者火生在寅陽氣發旺故於此時進火午時陰生也退符宜午至於暮則戌時矣不於午而於戌者火庫居戌陰氣主藏故於此時退符退符所以添汞也進火所以抽鉛也以鉛制汞以汞含鉛鉛日減而汞日增故曰符火相煎汞與鉛臨爐者以臨外爐言非入室臨爐時也入室煉鉛必用鼎器至於溫養則用爐而不用鼎也然爐有外爐亦有內爐紫陽云內有天然真火爐中赫赫長紅此即內爐也又曰外爐增減要勤功絶妙無過真種此即外爐也臨爐之際美景現前此不是寶光現前亦不是幻景當前乃內爐文火外爐武火也文武烹煎漸採漸取漸取漸𣷹溫養時有不可間斷功夫全要法船匠手不為風波所動擾我元功然後法船廣運往來不絶如達摩之載金過海直超彼岸矣故曰採取全憑度法船匠手高強牢把舵一任洪波海底翻云云末三句劉注已明茲不復解又劉言認取真鉛李言一味真鉛無根樹花正濃認取真鉛正祖宗精氣神一鼎烹女轉成男老變童欲向西方擒白虎先往東家伏靑龍類相同好用功外藥通時內藥通悟元注本濃作穠擒作牽方作園皆無異也劉注穠者穠盛廣多也花正穠盛其間即有美惡偏正相雜須得真正仙花方可採取而用真正仙花為何花即真鉛也真鉛即真知之真情乃真靈之發現以其真知外陽內陰外黑內白故謂真鉛又謂水中金又謂水鄉鉛又名月中華其名多端皆象此真知之一物也惟此真知內含先天真一之始氣乃陰陽之本五行之根仙佛之種聖賢之脈為修道者之正祖宗認得祖宗取歸我家敬之奉之須臾不離則精氣神三者自然聚於一鼎無庸勉強蓋以其父歸之其子焉往更加符火烹煉之功雖女可以轉男雖老可以變童女轉男者非形體轉男蓋女子純陰修煉成道化陰成陽亦同男子老變童者非面容變童蓋老者氣枯修煉成道返本還元亦如童子但女轉成男老變為童之道雖是認取真鉛真知還要先能煉己若煉己不熟真知不來雖來而亦不留故曰欲向西園牽白虎先往東家伏靑龍白虎屬西方金喻真情也靑龍屬東方木喻真性也真情真性本來一家何待牽伏因其交於後天真中雜假真情變為假情恩中帶殺如虎出穴奔西傷人不為我有而反依居他家矣真情既變為假情於真是性有昧亦化而為假性假者用事真者退位性情不和如龍東虎西兩不見面矣若欲復真必先去假若欲牽情必先調性調性之功乃煉己之功煉己者煉其氣質之性也氣質之性化則真性自現真性現則不動不搖而真情亦露真情露則假情不起可以牽回白虎與靑龍配合情性相戀矣白虎即真鉛祖宗同出異名以其真知剛強不屈故謂白虎以其真知柔中藏剛故謂真鉛牽白虎即是取真鉛牽之云者非有強制乃不牽之牽性定自然情歸特以同類者相從陰陽內外有感應之道也性主處內屬陰內藥也情主營外屬陽外藥也陰陽原是一氣性情固是同根內藥能通外藥未有不通內外相通性求情而情戀性性情和合真靈凝結還丹有象矣純陽翁云性住氣自回氣回丹自結紫陽翁云若要修成九轉先須煉已持心此皆言還丹先要煉己也噫真鉛易取煉已最難煉己之功大矣哉李解濃言情之濃也鉛乃人之真鉛真鉛發現則其情正濃只要認得真取得來則金丹立就蓋此真鉛者黃中正位之體大丹之祖宗也取來制汞三家相見結嬰兒推而廣之千千百百子子孫孫皆自此真鉛發脈故以真鉛為祖宗精氣神一鼎烹此即鉛歸汞伏三家相見之後也但造真鉛者其有先女轉成男老變為童之妙訣原夫離宫之火真精也坎宫之水真氣也坎離中間又有妙土為用真神也一曰真意氣精交感以神主之則水底金生火中汞降又以神執其平衡調其勝負猛烹極煉則火蒸水沸金亦隨水上騰此即精氣神一鼎烹之力也及其入於離宮離火為坎水所滅不飛不走氣得神而住精得神而凝鉛汞俱死同歸厚土三姓會合於中宫煉成一箇紫金丹此又精氣神一鼎烹之妙也當其先東家之子體寄於西西方之兌正為少女少女代坤母行事女鼎中現出震男是女轉成男矣此男號九三郎君其年甚少實是木公道父投身子胎而生者故木公轉號公子是老變為童矣這公子騎的白虎出遊西方甚是勇猛時有道人見而問之曰你這騎虎的童男可是木公所化的麼童男知道人心有正覺不敢隱瞞答曰是道人遂回頭笑曰水鄉鉛只一味崔公之言真也今欲呼回童男須要擒他白虎白虎乃童男隨身元氣化的坐騎你欲往西方擒他白虎必先往東家伏了靑龍蓋白虎者金精也靑龍者木性也以木交金則木中火發火轉逼金而回以金併木則金中水騰水轉滅火而住此四者相異而實相同異類而實相類既然同類故好用我玄功使其會在一處由是內迎外合外歸內伏外藥既通內藥內藥亦通外藥也此篇只言真鉛不言真汞蓋有鉛即有汞不言汞而汞在其中矣故曰外藥通時內藥通鉛也氣也男也童也虎也皆外藥也精也女也老也龍也皆內藥也至於神則在內外精氣之間又劉言採取火候李言六門火候無根樹花正嬌天應星兮地應潮屠龍劍縛虎縧運轉天罡斡斗杓煅煉一爐真日月掃盡三千六百條步雲霄任逍遙罪垢凡塵一筆消劉注真靈藏於後天為積習客氣掩蔽花最難發間或有時而發一點光輝從虛無中透出如珠如露嫩弱秀麗其象最嬌似開未開渾淪元氣在天應星之明而不大在地應土之潮而未濕星明地濕皆陽氣初動之象陽氣初動即真靈花嫩時也當其正嬌易於識神借靈生妄性亂情移急須猛烹速煉杜漸防微扶陽抑陰以護命寶屠龍劍所以防氣性縛虎縧所以制妄情氣性不發則真靈現妄情不起則真情生真性現真情生是運轉魁罡斡旋斗杓轉殺為生變刑成德可以煅煉一爐真日月矣日者陽中有陰之象喻真性所含之靈知靈知為雄中之雌真陰也月者陰中有陽之象喻真所情含之真知真知為黑中之白真陽也煅煉真陰真陽兩位大藥歸於一氣凝結成丹吞而服之延命卻期此乃最上一層之妙道非三千六百旁門著空執相事業也蓋以大道成就步雲霄任逍遙萬般罪垢凡塵皆一筆勾消彼三千六百旁門皆在臭皮囊上做作適以惹罪垢凡塵焉能消罪垢凡塵哉李解嬌以秀嫩言一陽初萌之時也天比上地比下陽生之時眉有上點點星光昔人謂為天應星腹中有浩浩潮氣昔人謂為地應潮藥生朕兆原有如此良不誣也悟元以天之星輝地之潮濕比陽氣初生不大不潤亦是一解更有以入藥鏡為言者天應星指上鵲橋地應潮指下鵲橋均有妙理然吾竊聞之應星應潮以應月應時言即星悟月即潮悟時此正是大還丹要緊火候余摘參同數語以為印證參同云金計十有五水數亦如之臨爐定銖兩五分水有餘二者以為真金重如本初其三遂不入火二與之俱此即應星應潮之正義也金必十五兩重者金準月數取金精壯盛之意五千四十八日天真之氣始全十五兩金能生十五分水上半月十五日是也水數與金數相應即潮數與星數相應若金水不足則真水不生此謂天不應星地不應潮何以定銖兩乎若要應星應潮就以上半月之十五日為定自朔至望以一日半為一分兩箇一日半三日出庚矣這才是二分真水天也應星地也應潮若至初五則是三分三分不入用若至初八則是五分五分更有餘均非應星應潮也必以二分之水配以二分之火乃是真應星真應潮二者坎水之真信金初生水剛到二分時候水源至淸有氣無質即白虎首經也虎正吐氣龍以即二分真火迎之煉為丹本至於生二分水之金又必要等至十五金精始旺水潮乃生所謂二七之期真鉛始降此是應星應潮也或者問火何以必須二分曰一時功夫分三符六候止用一符二候之火斯龍虎平勻相吞相啖到這時候必要執劍降龍拏縧伏虎運罡斡斗歸於中宫日月交精烹之煉之則正道得矣我吾山老師還有一講更精密醒露並詳述於此乾天為陽星即天之火精陽中陰也坤地為陰潮即之地水氣陰中陽也精為火父氣為水母乾父與坤母交則離火與坎水生焉故曰天應星地應潮應之云者彼此相與感應之機也參同云方諸非星月焉能得水漿可知天光照地應之以星者地氣承天即應之以潮也仙家以天之星喻人心中之火火即人之性也性屬龍設有不降則星飛火散故當執屠龍之劍以降之劍比大慧也以地之潮喻人身中之水水即人之情也情即虎設有不伏則潮浸水流故當持縛虎之縧以伏之縧比大智也大巧若拙大智若愚智慧冥冥即生妙心轉天罡斡斗杓者非妙心不能為力天罡北斗也天罡主生在乎斗杓斗杓指處即有生氣人身妙心能天運罡之杓則能轉殺為生矣斗杓回旋金丹入內金丹入內妙心還我妙心者不生不滅之真身與天地合其德與日月合其明即人身真日月也欲求妙心必從後天中返先天先把外日月交光於外明火候知符刻乃能得之及其歸也又要以內日月交光於內晝夜長明調和養育則煅煉一爐真日月矣是為金丹大道之妙諦七返九還之重玄掃盡三千六百旁門可以步雲霄任逍遙罪垢凡塵一筆消矣若不明此大道斷無解脫日子罪垢凡塵日日加增可不悟哉又劉言逆用氣機李言善用盜機無根樹花正高海浪滔天月弄潮銀河路透九霄槎影橫空泊斗梢摸著織女支機石踏遍牛郎駕鵲橋入仙曹膽氣豪盜得瑤池王母桃悟元注本泊作幹盜作竊劉注先天大道包羅天地運行日月超乎萬有花開甚高其高如月在天上光射海底海浪滔天水不能溺月之光而月反能弄水之潮亦猶人在苦海境遇之中境遇不能傷其真而反借境遇以煉真又如銀河路遠直透九霄人不易渡然有仙槎橫空斡旋斗梢即能渡之昔張騫乘仙槎渡銀河而見牛女二星相會此可徵也以理而論世間亦有仙槎亦能渡銀河世間仙槎為何物金丹大道是也金丹大道在虛空中作世業能以轉乾坤逆陰陽奪造化超凡入聖是亦仙槎也然仙槎之妙在乎斗梢之運用斗梢者北斗第七星瑤光是也又名天罡天罡所指處吉所坐處凶蓋以指處有生氣存焉扭回斗梢剎那之間陰陽相合生機萌芽絶不費力故曰摸著織女支機石踏遍牛郎駕鵲橋織女屬陰牛郎屬陽鵲橋為牛女相會之處摸著機石踏遍鵲橋以陰招陽陽來會陰陰陽相會金丹有象此種道理盡在波浪裏做出虛空中施為所以能入仙曹膽氣豪竊得瑤池王母桃也瑤池在西王母為老陰即坤母也桃者丹也即震之一陽也王母桃即坤中孕震之象丹在西而竊取歸東則為我家所有而丹還矣但此還丹之妙其妙在乎陰陽相會陰陽相會之妙尤在乎大海波中逆運氣機不動不搖耳能於大海波中不動不搖真是有膽氣丈夫九霄有何不可上銀河有何不可渡王母蟠桃有何不可竊乎彼世之習靜忘形僅在寂滅中作事者焉知有此李解高指虛空而言海浪滔天者即紫陽翁所謂風浪粗産玄珠之時也風起浪湧聲震虛空故曰滔天而一箇玄珠正如團團秋月現於海上故曰月弄潮也逆挽銀河上透九霄倣佛張騫乘槎影橫空際氣機於此直達矣然河槎前行必先有個指引方不使水經濫行不由河道此斗梢之上所以為泊繫之所也這泊字下得最妙人間泊船乃止宿之意仙客河槎則以斗梢為靠端行直指勢不容泊其言泊斗梢者正其不可泊不得泊就於斗梢泊之隨斗運轉行中有止殺裏逢生猶之英雄豪傑直儻做事風利不泊乃是大結局大興會之時不泊勝於泊泊猶之不泊斯其為泊斗梢也織女牛郎天上陰陽二星年年七夕相會織女屬陰機石比汞牛郎屬陽鵲橋乃牛女相逢之處即金汞會合之方上言斗梢此言女牛是斗為女牛之媒也牛郎欲會織女非斗不能圓成斗轉則牛郎渡河金與汞合矣呂祖云進火功夫牛斗危泥丸云妙在尾箕斗女牛同此意也摸著機石則以汞迎鉛踏遍鵲橋則鉛汞一路從此天緣有分志氣能伸可以遇仙曹而膽氣豪矣此何故哉以其盜得瑤池王母桃耳悟元以瑤池在西王母為坤母桃即坤中孕震之象丹在西而竊取歸東以成還丹其注明矣但竊字不及盜字現成東方盜桃一也坎卦為盜二也東方盜桃恰往西方取金坎卦為盜恰向水底求鉛盜之為義妙也哉十九又劉言陰陽搏結李言化生玄珠無根樹花正雙龍虎登壇戰一場鉛投汞配陰陽法象玄珠無價償此是家園真種子返老還童夀命長上天堂極樂方免得輪回見𨶒王劉注金丹乃陰陽二氣相激而成象是花須成雙而後有用也陰陽者一龍一虎也一一鉛汞也龍為真性汞為靈知又為元神俱屬陰虎為真情鉛為真知又為元精俱屬陽龍虎戰者性情摶聚也鉛投汞者精神凝結也性情摶聚精神凝結陰陽相配一氣混合真靈圓明法身有象圓陀陀光灼灼如一粒玄珠為無價之寶矣此寶非外來之物乃我家園之真種子本來原有因交後天迷失無蹤今得陰陽調和無而復有去而復來種於家園本立道生生生不息返老還童延夀無窮上於天堂極樂之方可免輪回之苦矣李解雙者兩弦之氣也兩弦之氣合則龍虎登壇相吞相啖戰即吞啖之意一場大戰龍虎平勻虎戰龍則以鉛投汞龍戰虎則以陰配陽陽鉛與陰汞交斯無價寶生矣悟真云虎躍龍騰風浪粗中央正位産玄珠玄珠乃先天一氣仙佛本原吾家真種而非外物因為後天所掩久不現象今在龍虎壇中陰汞陽鉛結為真夫婦遂從後天坎離之內返出先天故曰法象玄珠無價償從此家園真種子得之者返老還童延生益夀上天堂登極樂免得輪回見𨶒王也此言龍虎陰陽相戰相配之法須於花正嬌一章注內覓其火候可也又劉言一時還丹李言還丹溫養無根樹花正奇月裏栽培片晌時拏雲手步雲梯採取先天第一枝飲酒戴花神氣爽笑煞仙翁醉似泥託心知謹護持惟恐爐中火候飛劉注先天真靈無而能有缺而能圓花甚奇也然正所以奇者先天為後天掩蔽杳然無蹤若欲栽培片晌之間即能回春回春之妙要採取先天第一枝之花第一枝是生物之祖氣乃生天生地生人之靈根不落於形象不落於空亡含而為真空發而為妙有至中至正至精至粹恍惚杳冥如露如電不可以有心求不可以無心守有心求之則著於相無心守之則著於空是在乎性定情忘回光返照虛極靜篤不採而採不取而取自然先天真一氣之自虛無中來凝而為黍米之珠內外光明如戴仙花神氣爽暢如飲仙酒戴花飲酒樂在其中不識不知順帝之則如入於醉鄉矣當斯時也還丹已結復見娘生面目無用外爐加減急須內爐溫養神明默運謹守護持一意不散時防火候差池也心知者非外心知之人乃內自知之心火候緩急心自知之心知而不昧心自然火候不差金丹成熟也李解奇者令人不測也不惟人不能測即陰陽亦不能測若是能測則陰陽不會雜入杳冥何以栽培先天乎月裏栽培者三日出庚藥材新嫩就在這庚方月內栽培金花必以二分火配二分水混沌片時而後有先天第一枝鼎內生出此片晌功夫也片晌之間先天第一枝果然發現妙心主事即時逆轉天罡回翔雲漢此即拏雲之手步雲之梯採取先天第一枝也飲酒者飲此第一仙酒先天化白液矣戴花者戴此第一仙花先天回陽春矣花即是酒酒即是花飲之戴之酒是良朋花是伴令人神氣沖和渾渾如醉故曰飲酒戴花神氣爽笑煞仙翁醉似泥心知者同心也即自已妙心也謹護持者以妙心看火候也但護持有數件爐火有兩端火候未足則屯蒙抽添以護之須用外爐加減火候已足則晝夜含光以護之不用外爐加減十月數全九年已過則真人出頂門矣否則外爐不該去而急去則火候未足而丹不大外爐該去而不去則火候太過而丹必傷內爐不該去而急去則火候未純而丹不靈內爐該去而不去則火候如愚而丹不出凡此皆爐中火候有差池也是所望於心知精謹護持乃不致有差池耳飛即差池之意與前花正飛章同看又劉言調和陰陽李言得藥還丹無根樹花正黃産在中央戊己鄉東家女西舍郎配合夫妻入洞房黃婆勸飲醍醐酒每日醺蒸醉一場這仙方返魂漿起死回生是藥王悟元注本産在作色正劉注黃者中央戊己之正色戊為陽土主動已為陰土主靜戊己居中相合為真信又謂真意花色正黃則真靈入於中央正位矣然真靈中正非性情如一不能東家女木性也西舍郎金情也一性一情配作夫妻入於洞房宥密之處更得黃婆於中勸飲醍醐調停火候則不和者而必和既和而長和醍醐酒非世間之糟汁亦非身內精津血液有形之物乃陰陽交絪感緼中和之氣合為而真一之精通而為真一之水滋味香甜古人謂玉液謂瓊漿謂甘露又謂醍醐總以形容此一點中和之氣耳勸飲者不沖和而必調至於中和修道至於陰陽沖和常應常靜遠觀其物物無其物近觀其身身無其身內觀其心心無其心不識不知順帝之則日日飲醍醐而入於醉鄉矣這箇醉中趣味是神仙之方是返魂之漿能以起死能以回生乃大藥王也中央戊己黃婆皆真信之異名以陰陽和合言則謂中央以運行陰陽言則謂戊已以調和陰陽言則謂黃婆以動作言則謂真信以靜定言則謂真意故一物而有數名總而言之一真信而已識得此信即於此信上下實落工夫始而以性求情既而以情歸性又既而性情和合又既而性情渾化結成一箇真靈至寶始之終之無非此一信成功信之為用大矣哉歸到實處真靈中正即是性情相合性情相合便有箇真信在內真信現時性情自不相離真靈自然中正三者相需而仍相因也李解黃正色也佛家之正覺儒道之正氣也其在釋典則曰黃花其在仙經則曰黃芽但黃芽有二種一箇是初三新藥一箇是十五大藥悟真云黃芽生處坎離交此即初三新藥也黃芽生處即當交媾坎離以種第二箇黃芽悟真曰種得黃芽漸長成此即第二箇黃芽十五日之大藥也黃芽長成實因坎離交媾夫坎離之交媾者交媾於中央戊已鄉也中央乃精氣成團之處戊己鄉乃動靜調合之所調合成團片晌間從中産出黃芽故曰産在中央戊已鄉這黃芽名字極多以本章言之即西舍郎也西舍郎金氣也東家女汞精也採回金氣制伏汞精此金汞返還之道即配合夫妻入洞房也既入洞房又要有黃婆守之黃婆即上章所言心知也夫妻兩個恐防不諧則精神意氣難入中和之境而丹不成故要有黃婆伏侍勸飲醍醐醍醐者外資溫養之精內服中和之氣也黃婆乃是知心人爐中火候自然不差朝暮之間頻頻勸飲每日酉薰蒸醉一場真快樂也此酒不是凡間酒乃仙方所製之酒名曰返魂漿可以起死可以回生小藥外藥皆不能及是為藥之王也此章乃二候求鉛之後四候還丹功夫求鉛乃外事初三月出庚施功名之曰以水配火以龍就虎以陰會陽以離交坎以性合情以汞投鉛以女嫁男以後天生先天總之是以精合氣乃外藥也其功夫在外只用一符二候立為丹基還丹乃內事十五月圓時施功名之曰以水滅火水乃天癸之水以虎嫁龍虎乃西方之虎以陽伏陰陽乃含真之陽以坎填離坎乃先天之坎以情歸性情乃金情之情以鉛制汞鉛乃真一之鉛以男配女男乃純乾之男以先天制後天總之是以真氣合真精乃內藥也其功夫在內須用二符四候結為金丹凡此皆古人所未分晰者吾於此詳陳之庶閲丹經之際了然於二藥之分也又劉言凝結聖胎李言擒伏火藥無根樹花正明月魄天心逼日魂金烏髓玉兔精二物擒來一處烹陽火陰符分子午沐浴加臨卯酉門守黃庭養谷神男子懷胎笑殺人劉注先天真靈本體光輝通天徹地照破一切花正明也其所以明者乃陰陽二氣和合而成之人之一己純陰如月之黑暗無光必借他家不死之方而後陽生如月借日光而後得明月魄逼日魂陰陽相交能以在天心朗耀即真知靈知相合真靈不昧之象烏金髓者日魂也在人為雄中之雌即靈知之真陰兔玉精者月魄也在人為黑中之白即真知之真陽前云烏肝兔髓此云烏髓兔精大有分別不可同看蓋烏肝兔髓乃還丹藥物是真知靈知陰陽未會而方會故云烏之肝兔之髓烏髓兔精乃大丹藥物是真知能靈靈知能真陰陽已會而相合故云烏之髓兔之精未會而方會勉強之功假中復真也已會而相合自然之用真中更真也取此兩味真藥摶於一處烹出陽中之陽即行子午卯酉火候完全金液大丹但所謂子午卯酉者非天邊之子午卯酉乃身中之子午卯酉真知現即是子法當用剛進火而鼓真知出玄靈知來即是午法當用柔退符而取靈知入牝真知進於中正即是卯法當沐浴此中正而不過進靈知退於中正即是酉法當沐浴此中正而不過退此符火沐浴之道萬古不易之法若以天邊子午卯酉按時用功則失之遠矣符火不差沐浴合時陰陽相應不偏不倚元牝立而谷神即生於其中矣黃庭者中央正位即陰相陽合之中一竅又號為元牝之門元陽牝陰陰陽合有此竅陰陽偏無此竅有此竅即有谷有谷即有神無此竅即無谷無谷即無神谷即黃庭黃者中色庭者虛也因其中虛故以黃庭名虛則靈靈則神是謂谷神試觀山中兩山壁列中間一谷人呼之則谷應聲此應之聲即谷神也俗名崖娃娃人之陰陽會合其中有神亦猶是也然不到陰陽相合地位無此中無此谷安有神居若果到陰陽相合時便有箇中便有箇谷而神自生所謂先天之氣自虛無中來者即此所謂真空而含妙有者即此所謂要得谷神長不死須憑玄牝立根基即者此果陰陽合而為一氣則谷神鎮居黃庭是謂男子懷胎曰守黃庭者守中也曰養谷神者抱一也守中抱一十月功畢身外有身即與天地並長久此等真實法相係虛空中事業不從色相中做出彼一切在臭皮囊上弄搬運功夫妄想成聖胎者豈知谷神之所以為谷神乎李解明乃大藥發生虛室生白放大光明大醒大悟大覺時也這大藥乃鉛中之陽丹中之金先天中先天如月魄之在天心與日魂相逼而成團團輝光非若初三一線遠在天邊近在蛾眉也逼字下得要緊乃相親相近一處相煎之意日月合璧日魂盡注於月魄萬里光明天心雪亮二物擒來一處烹不是擒了金烏又擒玉兔乃是擒金烏以搦玉兔單擒一物歸來即所以擒二物也當其擒來之際也有子午卯酉四候投關之火由是而金烏飛入廣寒宮復以金烏之髓調和玉兔之精而既使玉兔之精盡化為金烏之髓這才是月魄逼日魂善於一處烹者斯時也陽魂圓滿陰魄無形二物變為一物一物中有二物陰盡陽全光明大放故稱為鉛中之陽丹中之金先中天先天到此地位乃為金液大藥亦按子午卯酉行四候服食之功此方九是轉大還丹也何時為子陽生為子故當進陽火何處為午陰降為午故當退陰符沐浴者調停自然不急不緩此等功夫當加於陽火臨卯陰符臨酉之門則陽不過剛陰不過柔剛柔得中出入合度也昔陶存存先生闡明參同契行火祕訣而録其師火候歌於注中余深佩服今亦附書於此以為印證歌云憶我仙翁道法總是吾家那著原無子午抽𣷹豈有兔雞刑德問吾子在何時答曰藥生時節問吾午在何時不過藥朝金闕卯時的在何時紅孩火雲洞列若無救苦觀音大藥必然迸裂此即沐浴時辰過此黃河舟楫再問何為酉門即是任同督合此時若沒黃裳藥如物何元吉過此即為戌庫請向庫中消息此是一貫心傳至道不煩他覓夫藥臨卯門必用觀音之靜者觀音之靜管攝嚴密不使紅孩逞勢則甘露發生至於酉門則以黃裳裹之不使元珠傾瀉則白液乃凝此沐浴之妙用也黃庭者中央也谷神者虛靈也守中央而養虛靈則法身呈象一箇男子宛如女子懷胎笑煞人亦愛煞人也又劉言真空法相李言圓通自在無根樹花正紅摘盡紅花一樹空空即色色即空識破真空在色中了了真空色相滅法相長存不落空號圓通稱大雄九祖超升上九重悟元注本金花作紅花較好故從之滅作法字錯劉注金丹大道以無聲無臭超出萬象為歸著何嘗花有紅色乎若稍有色後天氣質猶未化盡大道不成古仙云一毫陰氣不盡不仙蓋有一毫陰氣不盡即有一毫陽氣不全真靈猶有損壞之時算不得九還七返金液大丹之道修道者須要摘盡紅花消滅無始劫以來客氣塵根歸於萬有皆空還於父母未生以前無聲無臭面目而後已然空之云者非同土木無心寂滅之謂有借假全真以真化假之道故曰空即色色即空識破真空在色中蓋一味無心則著於空若稍有心則著於色曰空即色者是不空也曰色即空者是不色也不空不色即空即色是真空存於色中矣曰了了真空無色相法相常存不落空者真空一了百當原無色相既無色相即有法相既有法相必不落空因其是真空所以有法相因其有法相所以無色相無色相有法相所以空之真而真於空也修道至於真空而有法相法相而存真空一靈妙有法界圓通成金剛不壞之軀水火不能侵刀兵不能加虎兕不能傷稱為大英雄不但身列仙班即九祖亦皆超升天堂同為神矣昔釋迦牟尼佛修丈六金身法相居於大雄寶殿者即此道也李解紅乃大藥法象仙師道情歌與無根樹皆要緊之作即彼可以見此也道情歌云萬般景象皆非類一顆紅光是至真紅光發現其花正紅紅花到手真藥已得除此紅花無藥可採溫養事畢爐鼎全丢一切花花樹樹皆不講也故曰摘盡紅花一樹空花既空矣我道得矣我道既得空不空矣空既不空空即是色色非有色色即是空識透真空不空真空即在色中此色非色相之色乃法相之色了當真空則色相全滅色相全滅則法相長存法相長存即是真空不空圓通者功行圓滿萬法皆空真空之體用備矣既號圓通必稱大雄既稱大雄必做神仙宗伯安得不九祖超升同上九重哉又劉言返歸虛無李言證位三淸無根樹花正無無相無形難畫圖無名姓卻聽呼擒入中間造化爐運起周天三昧火煅煉真空返太無謁仙都受天符才是男兒大丈夫悟元本中間二字作三田然悟元仍作中間妙竅解劉注先天真靈之寶體本虛空一氣混成有何花乎既無其花無形無象難畫難圖矣難畫難圖畫且不可圖且不可尚有何名何姓然雖無名無姓卻又至虛至靈寂然不動感而遂通如呼谷傳聲真空中藏妙有也有此感而遂通之妙即於此通處下手擒入於三田造化爐中用三昧真火煅煉成真自真空而可返於太虛道返太虛則空無所空一真而已別無他物也三田非工家氣海絳宮泥丸之説乃精氣神三丹聚會之丹田謂元牝之門又名元關竅又名中黃庭又名造化爐又名太乙壇又名戊已門總而言之曰虛無竅先天真靈之寶統精氣神之三物真靈既復三物皆復自造自化絪緼沖和結為一塊始而自無以造有既而自有以化無煅煉真空即是化無之妙自有化無形神俱妙與太虛同體功行圓滿謁仙都而受天符為十極大羅真人大丈夫之能事畢矣讚曰吐老莊之祕密續鍾呂之心傳揭示先天妙理劈開曲徑虛懸鼎爐邪正分判藥物真假顯然空色混為一氣剛柔匹配兩弦咦丹法始終皆泄盡火符進退皆寫全二十四詞長生訣知者便成不死仙李解無字承上章空字之意進一層言以作二十四首結局煉丹至於空已盡善矣然有真空之念則即有法相之念空猶不及無也老君曰觀空亦空空無所空所空既無無無亦無湛然常寂這才是大超脫大解悟大淸淨大圓覺何也湛然之妙有而若空空而且無不可以形相求不可以畫圖寫因其無形無相所以難畫難圖只恁其湛然而已前此採取先天尚有金姓名精者黃姓名芽者白姓名元者今此湛然之真卻無名姓雖無名姓卻聽招呼空谷傳聲聲聲相應問焉以言受命如嚮天下之至精也寂然不動感而遂通天下之至神也此何故哉以其湛然之真藏在無中耳聖賢仙佛之理深達造化無中藏有到此地位詭怪神奇如冷啓敬張景華周顚仙之流是也我三丰先生以道為體又必以無擒無入於中間虛無之境大造大化爐中運起周天三昧真火煅之煉之務使虛空法身返於太無太無者聖真之境玉淸混洞太無天上淸赤混太無天是也煉成仙道只受太淸官秩能返太無則先朝道德次朝玉宸次朝元始證果三淸也返之云者天下愚夫愚婦皆是三淸中人只因宿念有差一劫低一劫仍做愚夫愚婦不能復返聖真之境倘其回心向善訪道尋師由築基煉已七返九還煉至於空復至於無由無而返於太無仍然是三淸客也但煅煉真空必用周天三昧之火周天者非河車之謂乃在天而動空際盤旋深造密化道法自然也三昧者非陽火之謂乃天一地二合而為三我於天地之中立鼎安爐神冥氣漠此以仙煉仙之火天元神丹也功成行滿上朝三天謁仙都受天符或封真君或封帝君或封天尊或命作五嶽名山洞天福地師相選仙等職這才是真正男兒極大丈夫神乎至矣讚曰灑彌天之花雨布滿地之黃金手敲魚鼓簡板口歌上洞仙音四洲齊度萬古道情呵呵悟元處處語真靈先把吾家主意存山人照本宣真訣度世宏開不二門張三丰祖師無根樹詞注解道情共二十四首全卷終
