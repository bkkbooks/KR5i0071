front:
  text: 張三丰先生全集重刋道藏輯要張三丰先生全集卷之一
  hash: sha256:88283b8ca203b15641196bab26a86674f592afcad7dfd527ec5b5560d88724e5
  markers:
  - {type: page-break, offset: 7, content: '', id: CK-KZ_KR5i0071_05p001a}
body:
  text: 漢嘉長乙山人李西月重編張道淵子深氏敬書閬中朱道生晚成子敬刋姪瑛春城朱瓚素園同校字男璜蟠溪明天順皇帝敕封誥命奉天承運皇帝制曰朕惟仙風道骨得天地之真元祕典靈文集陰陽之正氣顧長生久視之術成超凡入聖之功曠世一逢奇蹤罕見爾真人張三丰芳姿穎異雅志孤高得仙籙之祕訣餌金鼎之靈膏去來倏忽實得造化之機隱顯微芒吻合乾坤之妙茲特贈爾為通微顯化真人錫之誥命以示裦崇尚期指教式惠來英寶誥一元朝名士天師後昆鶴骨珊珊龍髯拂拂非百里之小才得一官而勇退出遼東而訪道入終南而遇師笠穿衲敝寒暑不侵果熟丹成縱橫自在託歌詞而談道響徹雲霄藉塵垢而隱真人稱邋遢玉樞宣詔金殿飛身玄妙無方隱顯莫測大忠大孝大慈大悲南極會上羣仙領袖玄玄演正武當繼武真君寶誥二始靑一氣教闡十方積功勳於大明度衆生於㕓市遇火龍而細參至道入武當而調養谷神混俗和光經緯五載入山面壁考驗九年大廷朝駕顯飛升名山古洞留仙迹方方開化處處設壇演金科流傳萬世證金丹度盡後學大悲大願大慈大仁至靈至聖至公至明羣真一元始祖廣慈普度真君通微顯化天尊寶誥三中山舊令上淸律仙廣三千之功行證十二之圓通擅神靈變化之奇精符篆龍蛇之體道高德重煉人元而兼統地元和光同塵濳玩世而即行度世尋有德之人人人得度種無根之樹樹樹皆空講先天之妙旨為後進之梯航大悲大願大聖大慈武當繼教掌法仙師靈寶真人天雷主宰玄玄演道飛龍濟世真人通微顯化天尊寶誥四至真傳道太淸選仙居武當而啓教為文始之正傳如癡如醉混仙迹於麗春教孝教忠闡玄風於華夏度萬三於滇海壻女同升續龍虎之神通道法兼備十方寶筏三教宗師大悲大願大慈大至仁玄至妙至奇至神東華首相三淸外臣雷霆神吏靈寶天師太和一氣始祖道通文遠真君通微顯化天尊寶誥五玉虛上相金闕高真德暢人神經開井鬼廣三千之功行醒億萬之沈迷昔從元嶽而成真今繼玄天而闡化扶正教無黨無偏闢旁門有聲有色誅殺乾坤之方士挽回道德之宗風指先天而對月招後進以升雲道妙無方玄微莫測至靈至聖至大至尊體合自然神凝般若三教真宰一氣權衡參法天師洞玄帝君猶龍六祖隱仙寓化虛微普度天尊參禮如來宣賜佛號並讚神光熙照性海澄淸在塵出塵隱世度世現醫身而扶危拔困偈伏衆而闡道傳經果證大羅金仙道比達磨尊者大仁大願大慈大悲三丰真師救難天尊邋遢靜光佛菩薩摩訶薩重刋道藏輯要張三丰先生全集漢嘉長乙山人李西月重編張道淵子深氏敬書閬中朱道生晚成子敬刋姪瑛春城朱瓚素園同校字男璜蟠溪列傳張三丰遼東懿州人名全一一名君實三丰其號也以其不飾邊幅又號張邋遢頎而偉龜形鶴背大耳圓目鬚髯如戟寒暑惟一衲一蓑所啖升斗輒盡或數日一食或數月不食書過目不忘遊處無恆或云能一日千里善嬉諧旁若無人嘗遊武當諸巖壑語人曰此山異日必大興時五龍南巖紫霄俱燬於兵三丰與徒去荆榛闢瓦礫創草廬居之已而舍去太祖故聞其名洪武二十四年遣使覓之不得後居寶雞之金臺觀一日自言當死留頌而逝縣人具棺殮之及葬聞棺內有聲啓視則復活乃遊四川見蜀獻王復入武當厯襄漢蹤迹益奇幻永樂中成祖遣給事中胡濙偕內侍朱祥齎璽書香幣往訪遍厯荒徼積數年不遇乃命工部侍郎郭璡隆平侯張信等督丁夫三十餘萬人大營武當宮觀費以百萬計既成賜名太和太嶽山設官鑄印以守竟符三丰言或言三丰金時人元初與劉秉忠同師後學道於鹿邑之上淸宮然皆不可考天順三年英宗賜誥贈為通微顯化真人終莫測其存否也列傳見微異録祇園居士張邋遢名君實字鉉一别字玄玄遼東懿州人張仲安第五子也丰姿魁偉龜形鶴骨大耳圓目鬚髯如戟頂作一髻自號保和容忍三丰子手執刀尺寒暑惟衣一衲或處窮寂或遊市口浩浩自如旁若無人有問之者終日不答一語及與論三教經書則吐辭滚滚皆本道德忠孝每遇事輒先知或三五日兩三月始一食然登山如飛或隆冬臥雪中齁鼾如雷時人咸異之因呼為張邋遢元末居寶雞金臺觀嘗一日辭世而逝從者為棺殮臨窆發視之復生乃入蜀抵秦遊襄鄧往來長安厯隴岷甘肅洪武初入武當登天柱峰遍厯名勝使弟子邱元靖住五龍盧秋雲住南巖劉古泉楊善登住紫霄乃自結草廬於展旗峰北曰遇真宮草菴於土城曰會仙館令弟子周真得守之洪武庚午拂袖長往不知所之明年太祖遣三山道士請造朝了不可見或曰住靑州雲門洞永樂初遣給事中胡濙指揮楊永吉等物色之不得十年二月成祖為書詔道士元虛子往武當於玄玄舊遊處建道場焚書冀有聞焉不獲仍御製詩賜之有若遇真仙張有道為言𥩟俟長相思之句天順末或隱或現上聞之封通微顯化真人後往來鶴鳴山半年不知所終列傳見七修類稿明郎瑛張仙名君實字全一遼東懿州人別號玄玄又號保和容忍三丰子時人又稱張邋遢天順三年曾來謁帝豫見其像鬚鬢竪上一髻背垂面紫大腹而攜笠者上為錫誥之文封為通微顯化大真人列傳淮海雜記明陸西星三丰老仙龍虎裔孫也其祖裕賢公學能兼占象移家於金之懿州與子昌隱於民間及懿為元人所拔始稍稍以名字聞然昌公固優遊世外者也夫人林氏先以二乳生四子曰遨曰遊曰逍曰遙皆早歿既更與二子曰通曰達通即老仙也降誕之夕林夢斗母元君手招大鶴止屋長嘯三聲而驚寤遂就褥焉幼有異質長負才藝坴幸遊燕京故交劉秉忠見而奇之曰真仙才也默挈之久乃得一宰於中山苦寒之地以丁憂歸遂不復出嘗言富貴如風燈草露光陰似雨電浮漚乃決志求道訪師終南得聞火龍妙諦漸乃徉狂垢污人不能識生平詩文每起稿於樹皮苔肉茶湯七箸間積數十年猶能記誦然未嘗録以示人也故元朝文藝坴幸中無有知者子道意孫鳴鸞鳴鶴鸞入明初遷淮揚六世孫花谷道人即鸞嫡孫與余為方外友其家有林園之勝老仙嘗至其家叩以當年軼事則書雲遊詩若干篇寶誥數章丹訣一函命藏之花谷每為余言不勝使人遐想也三丰先生本傳汪錫齡敬述三丰先生姓張名通字君實先世為江西龍虎山人故嘗自稱為天師後裔祖父裕賢公學精星算南宋末知天下王氣將從北起遂攜本支眷屬徙遼陽懿州有子名居仁亦名昌字子安一字仲安號白山即先生父也壯負奇器元太宗收召人才分三科取士子安赴試策論科入選然性素恬淡無仕宦情終其身於林下定宗丁未夏先生母林太夫人夢元鶴自海天飛來而誕先生時四月初九日子時也丰神奇異龜形鶴骨大耳圓睛五歲目染異疾積久漸昏其時有張雲菴者方外異人也住持碧落宮自號白雲禪老見先生奇之曰此子仙風道骨自非凡器但目遭魔障須拜貧道為弟子了脫塵翳慧珠再朗即送還太夫人許之遂投雲菴為徒靜居半載而目漸明教習道經過目便曉有暇兼讀儒釋兩家之書隨手披閲會通其大意即止忽忽七載太夫人念之雲菴亦不留遂拜辭歸家專究儒業中統元年舉茂才異等二年稱文學才識列名上聞以備擢用然非先生素志也因顯揚之故欲效毛廬江捧檄意耳至元甲子秋遊燕京時方定鼎於燕詔令舊列文學才識者待用栖遲燕市聞望日隆始與平章政事廉公希憲識公異其才奏補中山博陵令遂之官政暇訪葛洪山相傳為稚川修煉處因念一官蕭散頗同勾漏豫豈不能似稚川越明年而丁艱矣又數月而報憂矣先生遂絶仕進意奉諱歸遼陽終日哀毁覓山之高潔者營厝甫畢制居數載日誦洞經倏有邱道人者叩門相訪劇談玄理滿座風淸灑然有方外之想道人既去因束裝出遊田産悉付族人囑代掃墓挈二行童相隨北燕趙東齊魯南韓魏往來名山古剎吟咏間觀且行且住如是者幾三十年均無所遇乃西之秦隴挹太華之氣納太白之奇走裦斜度陳倉見寶雞山澤幽邃而淸乃就居焉中有三尖山三峯挺秀蒼潤可喜因自號為三丰居士延佑元年年六十七始入終南得遇火龍真人傳以大道更名玄素一名玄化合號玄玄子別號昆陽山居四載功效寂然聞近斯道者必須法財兩用平生遊訪兼頗好善囊篋殆空不覺淚下火龍怪之進告以故乃傳丹砂點化之訣命出山修煉立辭恩師和光混俗者數年泰定甲子春南至武當調神九載而道始成於是湘雲巴雨之間隱顯遨遊又十餘歲乃於至正初由楚還遼陽省墓訖復之燕市公卿故交死亡已盡矣遂之西山遇前邱道人談心話道促膝參同方知為長春先生符陽子也別後復至秦蜀由荆楚之吳越僑寓金陵遇沈萬三傳以丹道事在至正十九年臨別先生預知萬三有徙邊之禍囑曰東南王氣正盛當晤子於西南也仍還秦居寶雞金臺觀九月二十日陽神出遊土人楊軌山以先生辭世買棺收殮臨窆之際柩有聲如雷啓視復生蓋其陽神出遊朴厚者見之以為宛其死矣後乃攜軌山遁去又二年滄桑頓改海水重淸元紀忽終明運又啓先生乃結菴於太和故為瘋漢人目為邋遢道人道士邱元靖安靜可喜祕收為徙他日入成都説蜀王椿入道不聽退還襄鄧間更莫測其蹤迹矣洪武十七年甲子太祖以華夷賓服詔求先生不赴十八年又強沈萬三敦請亦不赴蓋帝王自有道不可以金丹金液分人主勵精圖治之思古來方士釀禍皆因遊仙入朝為厲之階登聖真者決不為唐之葉法善宋之林靈素也前車可鑒矣二十五年乃遁入雲南適太祖徙萬三於海上緣此踐約來會同煉天元服食大藥明年成始之貴州平越福泉山朝真禮斗候詔飛升建文元年完璞子訪先生於武當適從平越歸來相得甚歡永樂四年侍讀學士胡廣奏言先生深有道法廣具神通五年丁亥即命胡濙等遍遊天下訪之十年壬辰又命孫碧雲於武當建宮拜候並致書相請直逮十四年並不聞有蹤迹帝乃怒謂胡廣曰卿言張三丰藴抱玄機胡弗敢來見朕也斥廣尋覓之廣大懼星夜抵武當焚香泣禱是年五月朔為南極萬夀老君命諸仙及期大會時先生亦在詔中遂與玄天官屬御氣同行適見胡廣情切乃按雲車許以陛見入朝後即赴上淸之命飄然而去明年胡濙等還朝終未得見先生也吾師乎吾師乎其隱中之仙乎其仙中之神乎其神仙而天仙者乎繼荷玉詔高會羣真位列兌宮身成乾體故能神通變化濟世度人四圍上下虛空處處皆鸞驂所至將所謂深藏宏願廣大法門者呂祖之後惟先生一身而已錫齡風塵俗吏幾忘去聲本原觀察劍南又鮮仁政濫叨厚祿辜負皇恩兩年來𣌀天少見水潦頻增齡乃跣足剪甲恭禱眉山之靈拈香七日晴光普照畫景遙開奇峯異水間幸遇先生鑒齡微忱招齡入道並示丹經祕訣一章及捷要篇二卷照法修煉始識玄功因此悔入宦途遊情山水邇乃自出淸奉結廬淩雲未知何年何日蟬脫塵網採瑶花奉桃實敬獻先生也齡侍先生甚久得悉先生原本又甚詳爰洗濁懷恭為紀傳以付吾門嗣起者三丰先生傳圓嶠外史先生遼陽懿州人也名號屢更遊行無定人多不測其蹤劉秉忠同師於前廉希憲薦剡於後至元間以宰官致仕洪武初年太祖屢詔不出蓋其托仙遠遁以全仕元之節者也故嘗自稱曰大元遺老又嘗自贊曰大元逸民君子深慨其神仙名重遂至掩其孤忠耳平生訪道厯盡艱辛終南遇師之後覓侶求鉛者足遍天涯乃於武當山修成大道所可異者先生未降世而武當一席早為安排昔希夷先生遊太華遇異人孫君訪曰武當九室巖深靜可居君後有徒孫更能發迹此山君光大張蓋已知名山有主人大道有法嗣也豈不異乎嘗聞苦竹真君傳記於鍾離雲房謂他日有兩口者為汝弟子而其後竟遇呂祖夫豈至人降靈必先有年月日時里居姓氏預定於大羅天上耶不然何言之驗也圓通真人為先生弟子亦不能請究其故本傳一篇記敘精詳仙鑑明紀考政皆合然後知先生之藉貫生成修真得道有如是其全備者道派大道淵源始於老子一傳尹文始五傳而至三丰先生雖然老子之所傳亦甚多矣其間傑出者尹文始王少陽支分派別各有傳人今特就文始言之文始傳麻衣麻衣傳希夷希夷傳火龍火龍傳三丰或以為隱仙派者文始隱關令隱太白麻衣隱石堂隱黃山希夷隱太華火龍隱終南先生隱武當此隱派之説也夫神仙無不能隱而此派更為高隱孔子曰老子其猶龍乎言其深隱莫測也故又稱猶龍派云按老子之道文始派最高少陽派最大少陽傳正陽正陽傳純陽純陽首傳王重陽重陽傳邱長春開北派純陽又傳劉海蟾海蟾傳張紫陽開南派再按文始一派至麻衣而傳希夷少陽一派劉海蟾亦以丹法傳希夷兩派於斯一滙是三丰先生謂為文始派也可謂為少陽派也亦可特其淸風高節終與麻衣希夷火龍相近云前厯祖傳太上老君其詳不可得聞纍世化身未有誕生之迹嘗與文始言吾姓字渺渺從劫至劫不可具述非虛語也逮商陽甲時分神化氣始寄胎於玄妙玉女八十一年至武丁庚辰歲二月十五日卯時降生在苦縣之賴鄉曲人里李樹下指李為姓名耳字伯陽生時白首人號為老子又長耳復稱老聃周初觀風西岐自號支邑先生西伯欲拜為大夫不受命為守藏史遂借隱焉其後或隱柱下或隱河上或號為古先生或自為古皇或為伯陽父或為廣成子或結廬於河濱或開化於西域秦時稱古隱君子而不知太上老祖實隱中聖人也文始先生姓宓名喜字公文天水人一云成紀人成王丁巳歲四月初八日吉時降生不求聞達嘗為函關令故稱關尹喜一日遇融風三至精占風紫氣東來精望氣夜觀天理星西行過昴精天文知有聖人將至老君到關望其神采大驚精相法拜為弟子得聞大道著書九篇名關尹子後曰文始經西度流沙復還中夏或稱尹輒或稱尹道士隱居終南之陰人稱為終南隱聖麻衣先生姓李名和道號初陽內鄉人隱石堂山生而神奇紺髮美姿稍長厭世濁腐入終南靜養遇尹文始傳以道要並相法命往南陽湍水旁靈堂山修煉洞居十九年冬夏恆著麻衣故號為麻衣子靈山有水四時常溫名暘谷時往沐浴一夕有少年十二人來拜曰吾屬龍也上帝以師道成命吾等輔行大化自是有求雨者皆驗鄉民謁懇甚繁別隱歙之黃山即黟山人稱為黃山隱者希夷先生姓陳名摶字圖南號扶搖子亳州真源人唐長興中嘗舉進士不第遂淡世情以山水為樂居武當二十餘年復隱華山雲臺觀得蟄龍法每臥嘗百餘日不起遇海蟾授道要逢麻衣子擁爐對坐以鐵筯畫灰成字默授玄機並以尹文始先生相法傳之高隱不出宋太祖時賜號白雲先生又賜號希夷先生史稱曰華山隱士火龍先生希夷高弟子也隱其身並隱其姓名其里居不可考即以天地為里居也其事迹不多著即以濳德為事迹也神仙鑑亦只記其號狀其為物外風儀此蓋如赤松黃石世只知為古仙耳隱居終南故稱終南隱仙或曰賈得升先生也俟博識者考之三丰先生姓張名通字君實遼東懿州人詳見全集後列仙傳以下十一則藏崖居士考紀三山先生姓沈名萬三一名萬山自號三山道士金陵人秦淮大漁戶心慈好施遇三丰先生得授丹法繼煉天元大藥服之拔宅而去或隱天目或隱武當皆無定所與三丰先生隱顯度世敕封宏願真人元天厯戊辰元年秋九月十八日未時誕生邱元靖者武當道士也洪武初三丰先生遊武當元靖與先生遇拜為弟子遂傳以道妙命住五龍結菴修煉以了大事乙丑春太祖詔求三丰不得乃詔元靖至與語悅之拜監察御史賜之室不受復擢太常卿亦不受帝稱其淸高云太和四仙者盧秋雲周真得劉古泉楊善登皆楚人也洪武初三丰先生入武當結廬於展旗峯上四人請為弟子遂傳以淸淨守中之祕於是命秋雲住南巖真得住會仙館古泉善登住紫霄峯同時靜煉後皆證果冰壺先生姓明名玉內江人善符咒多奇驗永樂中三丰先生遊蜀常寓其家玉欲以符咒傳先生先生笑曰我將以道奉子子乃以法授我耶乃作道法會同疏一通豫之玉大驚請為弟子居歲餘胡濙訪先生遂攜玉同去不知所之王宗道者淮安人也嘗從三丰先生學道永樂三年成祖訪求三丰令覓宗道與胡濙同往召見時賜金冠鶴氅奉書香遍遊天下十年不遇及還賜封圓德真人後入廬山採藥飄然不返李夫子者名性之楚人也正德間入太和山遇三丰先生傳以丹法遂得道平時好端坐澄靜齊莊人號為李夫子喜辟穀日啜麥麵湯人又號為麩子李荆藩永定王聞而慕之遣校禮聘以至寓蘄武當宮衣破衲不食王屢迎入宮祈長生訣皆不對但云儒者修身齊家即道訣也賜金帛甚厚皆不顧已而辭歸王仍遣校送之令索書報命至漢口舟中忽不見校速舟夫過江至中流忽見李臥水而渡校上岸李亦到岸忽又不見校急奔至山見季坐懸巖險處拍手而歌尋大呼校曰為吾謝王李某不復來也校欲索報書倏又不見後復遣校至山則云季尸解矣校於歸途又見李持鉢其行如飛無何王以千宗正條幾覆國始悟李語非漫然也夢九先生姓汪名錫齡𡽪州歙縣人曾官劍南觀察而宦情益淡隱心愈深遇三丰先生於峩眉得其道妙繼授滇南永北道即請終養未準旋授河南全省河道副使乃便道歸省丹成尸解號圓通道人校正玄要篇及著三丰本傳顯迹等章傳世康熙甲辰年十月十八日申時誕生至今嘉州凌雲丹霞峯之淸暉閣即先生公餘之暇濳神煉丹處也中有靈山堂扁載劍南父老數百人姓名為先生夀咸稱圓通祖師仁慈淸淨修已治人云白白先生者不言其姓氏所居在靑城大峩嘉州山水之間鼓琴讀書酷好老莊道光初遇張三丰先生於綏山傳以交媾玄牝金鼎大符之妙既更遇純陽祖師得聞藥物採取之微以是決意精修日與二三隱士坐論煙霞品評水石名心之冷殆如冰焉所著有河洛易象圖解道德經正義圓嶠內篇發明內外丹法層次為前古仙經所未有無事則混俗和光默抱玄微而巳列仙派演余十舍者沈萬山弟子也少好施與萬山以幼女妻之傳以丹砂點化豐饒與婦翁相頡頏其女余蕙剛為西平侯沐春繼室亦善黃白之術蓋家傳也事見本集中余氏父女傳陸德原者吳人也家故淸微慕神仙之學沈萬山先生見之知為道器遂傳以玄微妙旨並為黃白給之其家遂足與顧阿瑛李鳴鳳相往來詩壇酒社東南士大夫稱其富而好禮洪武初嘗助軍糧二萬斛既聞太祖有不及江南富足翁之句因慨然曰禍端至矣及時攜琴披衲改裝黃冠而遁阿瑛聞之亦削髮為僧鳴鳳棄家園攜妻子泛舟江湖其後江南大族籍沒者無算人始信其見幾云明陽先生者劉其姓光燭其名仁慈恭敬富而好禮以善為當為不求福報達者高之嘗從白白子遊得淸淨守中之旨遂結菴於大江之湄雲水盤不迹城市沒後數載忽降一詩云人去空山鶴影單回觀塵海霧漫漫仙家不昧虛靈體一路淸風到石壇自是雲朋霞友咸謂其不滅也所著有金丹詩若干篇尚存於其弟遁園處拳技派王漁洋先生云奉勇之技少林為外家武當張三丰為內家三丰之後有關中人王宗宗傳溫州陳州同州同明嘉靖間人故今兩家之傳盛於淅東順治中王來咸字征南其最著者靳人也雨窗無事讀聊齋李超始末因識於後又云征南之徒又有僧耳僧尾者皆僧也雜説正訛三峯採戰之説多為丹經所鄙然非祖師之玄要編也嘗閲神仙鑑劉宋時有張山峯者號朴陽子未入道時曾授人以房中御女方天帝惡之終於草島遊仙何一陽仙姑遊華山曾見其金丹祕訣悉備於身因無天詔難升玉闕深慨惜焉據此則知山峯二字聲音相近之訛也且祖師所作金丹論亦云行御女之術者是猶披麻救火飛蛾撲燈細按此言自不妄譏矣又三峯者乃旁門之名不但劉宋時張三峯也陰道中有三峯採戰俗人不知遂以玄要篇等諸旁門是以耳聞為目見未讀丹經者也三峯之術有宋張紫陽陳泥丸諸老仙翁皆巳斥之祖師乃元人不待辨也單言此術由來參同契所謂陰道厭九一者是也九一之謬即御女之方分上中下三峯採人精氣託號泥水金丹伯陽以前巳有此術矣故玄要篇云有為者非採戰提吸之術九一動搖之法即祖師亦闢三峯之謬復何言哉又嘗閲神仙鑑彭祖稱太淸景明三峯真君而御女之術實起於彭祖採補房中禾禺喪屢娶後為殷王拘繫欲殺之蓋天律譴之也中途脫逃乃入華山歸正云三丰祖師誕期據夢九所作本傳則係元定宗二年四月初九日也乃各處所傳又有作三月初八十月初十者何故大抵仙佛降世舉凡得道成真飛身朝駕其吉期不一而足有如普陀大士孚佑帝君每歲齋辰幾於逐月皆有然祝大士者畢竟以二月十九為正慶孚佑者終當以四月十四為真兹於祖師誕期亦以本傳為主餘皆附存集中使敬祖師者隨時致虔如大士孚佑之齋期亦美事也別傳謂祖師為元末明初人而不知為宋末元初人也嘗對萬三自敘云延祐初余年六十七逆而數之正在元定宗之初年宋理宗之淳佑年也元運北起祖師生遼東入元之版藉故稱為元人汪作原傳謂其降生於定宗丁未與祖師自敘相合真乃不謬也明胡忠安公濙訪三丰祖師係永樂中事世有誤作成化者李雨村詩話云祥符寺在綿竹小西門外有明嘉靖九年王汝賓刻禮部尚書胡濙成化四年訪張三丰詩碑云云按明紀永樂五年丁亥正胡濙至綿竹時也今刻於天王殿後板壁上有三丰所書翔符禪院四字筆勢飛動以祥作翔或者曾至此歟錢文端公陳羣所著香樹齋集燕九日王新莊觀燈詩有仙攜邋遢來空碧人立鞦韆望比紅之句注云張三丰與邱長春同時訪道後皆仙去愚按長春先生訪道於金朝出世甚早不與張祖同時也但汪仙作傳謂祖師制居時有邱道人相訪之事祖師成道後於元至正初遨遊西山復遇長春子促膝談心爾時邱真人闡化元朝正有同時顯道之事若曰同時訪道則未也俗本載祖師原名君寶及觀神仙鑑始知寶本作實魯魚相誤有如是者並按君實二字似字非名暨閲陸儼山玉堂漫筆乃知祖師名通號玄玄君實其字也天師之後曾寓鳳翔寶雞縣之金臺觀詹事府主簿南陽張朝用嘗識之見其行足不履地胡忠安公薦朝用為均州知州同訪不遇又有密敕云淮安王宗道曾與三丰學仙令覓同往三年召見賜宗道金冠鶴氅奉書香遍遊天下越十年竟不遇還又按祖師之父俗本以子安為諱亦似字非名及讀夢九所藏列傳乃知居仁其名子安其字白山其號也羽流抄本有三丰供狀一篇的係誣詞語亦鄙俚不可不辨其狀云供狀道童一百餘歲豈尚稱童張三丰年二十八歲遼陽人氏有父張子安所生第五子自幼眼疾捨送碧宮投師禮傅後復雲遊胡廣襄陽府天竺菴養性修真今蒙永樂上位請禮道教中間不能隱諱所供是實此蓋方士羽流造作為榮而不知反以相誣也我祖師永樂年間深隱不出明史尚有徵文豈反供狀朝廷自媒自炫奔走闕下哉即仙鑑載有金殿飛升事亦不過片時立談以示陽神之不死耳後睹夢九真本只載有胡廣奏狀平日疑團至此乃釋附胡廣奏狀云侍讀學士臣胡廣伏奏真仙張三丰遼東人氏深藏道法廣具神通高隱武當有希夷之風只可禮求不可命見恭維皇帝陛下屈駕廣成訪求真道臣因不敢隱諱具表奏聞世有西洋小記載金碧峯南京訪祖師一事記言祖師名守成勾容人曾作本縣書吏旋棄刀筆出家於西山道院朝天宮修行得成地仙碧峯令訪胡尚書朝見明主稱為天仙始得證位大羅此係小説家借名敷衍之法非實事也或問名稱守成家稱勾容者何故曰不如是不足以湊登場科白也祖師於元明間著作甚多其詩有雲水集其文體若干篇皆見夢九藏本又神仙鑑載胡廣録呈祖師道詩名捷要篇中有無根樹大道歌鍊鉛歌瓊花詩麗春院二闋靑陽宮留題金液還丹歌真仙了道歌等作近來傳本多所混雜即如吳鎮響雲洞天張靈機鄧靈謐所刻玄要篇舊本中有金丹詩三十六首以象三百六十度變作十六首餘皆散見雜出全無條理一切道情皆不入刋蓋未見此全集也俗鈔有比張鄧刻本全備者又多以呂祖詩混入其中茲編廣取博採兼以夢九真本一一印證務使復還舊觀祖師其許之乎長乙氏謹識重刋道藏輯要張三丰先生全集漢嘉長乙山人李西月重編張道淵子深氏敬書閬中朱道生晚成子敬刋姪瑛春城朱瓚素園同校字男璜磻溪顯迹類渡沈萬三沈萬三者秦淮大漁戶也心慈好施其初僅溫飽至正十九年忽遇一羽士神采淸高龜形鶴骨大耳圓目身長七尺餘修髯如戟時戴偃月冠手持刀尺一笠一衲寒暑皆然不飾邊幅日行千餘里所啖升斗輒盡或辟穀數月而貌轉豐萬三心異之常烹鮮暖酒邀飮蘆洲苟有所需極力供俸偶於月下對酌羽士謂曰子欲聞吾出處乎萬三啓請乃掀髯笑曰吾張三丰也遂將生世出世修真成真之由敘述一篇言訖呵呵大笑萬三聞言五體投地稱祖師者再並乞指教曰塵愚願以救濟富夀非敢望也祖師曰雖不敢妄泄真傳亦不欲緘默閉道豫已深知子之肺腸當為作之於是置辦藥材擇日啓煉七七啓視鉛汞各道祖師嗟咄不已萬三自謂機緣未至復盡所蓄並售船網以補數下工及半忽汞走如焚茅蓋皆燬萬三深嘆福薄祖師亦勸其勿為夫婦毫無怨意苦留再煉資財巳匱議鬻幼女祖師若為不知竊喜其志堅一任所為令備朱裏之汞招其夫婦至前出藥少許指甲挑微芒乘汞熱投下立凝如土復以死汞點銅鐵悉成黃白相接長生祖師遂略收丹頭臨行囑曰東南王氣大盛當晤子於西南也遂入巴中萬三以之起立家業安爐大煉不一載富甲天下凡遇貧乏患難廣為周給商賈貸其資以貿易者直遍海內世謂其得聚寶盆故財源特沛斯時世亂兵荒萬三懼有禍乃毁丹爐器皿自號三山道士至今南京城西南街即其遷處會同館即其故居後湖中地即其花園舊址也仙鑑評外丹成為內丹之助然真道難聞千舉萬敗人每以三丰為口實至受誑不悟當思已有萬山福量乃可遇之苟或不然願且置是寓金臺觀元至正丙午年寶雞金臺觀有道翁者貌若百餘歲忽於九月二十七日自言辭世留頌而逝士民楊軌山置棺殮訖臨窆柩有聲如雷發之復生躍起謂軌山曰吾張三丰也天師後裔幼好學道今吾大丹巳成神遊天海吾子善人也難得難得遂教以避世延年之術尋攜軌山同去圓通子曰世人盡如軌山則路無暴骨矣如此方便人仙真安得不度隱太和山洪武初祖師入太和山於玉虛宮畔結菴冷坐菴前古木五株陰連數𣢿雲氣滃然故嘗棲其下猛獸不口從巫鷙鳥不摶人咸異之衲衣垢弊皆號為邋遢張有問其仙術竟不一答問經書則津涎不絶口登山輕捷如飛隆冬臥雪中鼾齁如雷常語太和鄉人曰茲山異日當大顯道士邱元靖叩其出處始識為三丰祖師請為弟子遂傳以道妙神仙鑑評左道旁門最能惑人如箭射虛空還復墜地惟覓得真種子濳修密煉至丹成果熟寒暑不能侵陰陽不能賊縱橫自在來去隨心方為實際如三丰者所當景仰寄常遇春洪武二年已酉六月常遇春進攻大興州直拔開平追奔數百里大獲全勝遂淸薊北秋七月師次柳河州遇春得疾謂衆將曰豫生時有老翁至門付一函云煌煌尾宿矯矯虎臣和中遇主柳下歸神前日張真人三丰自五臺寄書又是此數字今至柳河州而病吾其逝矣尋卒於軍年三十四去年戊申帝初即位亦嘗欽問四十二代天師張沖虛曰北征如何天師曰朝廷有福大將歸真見蜀王椿太祖第十二子封蜀王名椿或作操似誤洪武中太祖封子椿為蜀王是時兩川久定人物恬熙倏有老翁者神完貌古行動如飛一日方冠博帶翩然見王説以入道王不聽然心異其老健欲慕栖之老翁笑吟曰何必終南論捷徑宦情於我似鴻毛王高其節一日謂王曰藩封雖好然須志退心虛乃保無禍吾張三丰也將與海島諸仙遊於寥廓矣王作詩以送之有吾師深得留侯術靜養丹田保谷神之句亦不相留祖師遂去或曰其後諸王如谷王穗遼王植多有不保其封而蜀王得以居安樂土者皆祖師教之云按祖師見蜀王椿之後遨遊川貴雲廣雲車無定顯迹最多未嘗枯坐一山或言初入成都見蜀王椿王不喜道退還襄鄧間居武當二十三年一旦遊方拂袖而去圓通子讀此一則題一絶云入幕仙翁一老皤相逢不識奈如何名言幾字將王報保得藩封受用多寓指揮家洪武中祖師遊蜀僑寓環衛薑指揮家行蹤詭異而人不識常戴一笠笠甚大雖小戶出入不礙繫鐵絲縧備極工緻朝夕居一磐石上嘗折枯梅枝插土即生花皆下垂故成都昔年猶遺照水梅云寓開元寺夔府城西開元寺唐了休禪師道場也明初祖師來遊與僧廣海善寓居於寺者七日臨別贈以詩並留草履一雙沈香三片而去後海以詩及二物獻文帝答賜玉環一枚千佛袈裟一領今猶置寺中稱世寶云見城都府志並見夔州府志三卻廷詔洪武十七年甲子帝以華夷賓服詔求真人張三丰莫知所往明年春復強其弟子沈萬三敦請了不可得又召邱元靖入朝祖師因呈一詩並囑邱曰奏語明天子謂吾將遨遊海外矣其詩云流水行雲不自收朝廷何必苦徵求從今更要藏名姓山北山南任我遊帝覽而縱之尋拜邱為監察御史賜美室均不受邱可謂不忘師教也神仙鑑有三詔之事而無寄詩一段圓通子曰嚴子陵其吾師之前身耶滇南踐約洪武中京城自洪武門至水西門坍壞下有水怪濳窟築之復頽帝向忌沈萬三年命相同而大富召謂曰爾家有盆能聚寶亦能聚土築門乎萬三不敢辨承命起築立基即傾者三乃以丹金數片暗投其內築之始成費蓋巨萬帝嘗欲犒軍召萬三貸之曰吾軍百萬但得一軍一兩足矣萬三如數輸之帝瞰其無困苦狀由是欲除之罪以他事議流嶺南萬三遂輕身攜妻奴去而委其家資未幾命再徙於雲南既至滇萬三無聊忽有弓長翁者傳云踐約來會萬三請見則三丰祖師也祖師笑曰猶記東南氣盛西南相見之語乎萬三爽然因與煉天元服食大藥明年始成萬三與全家餌之皆能沖舉圓通子曰撒手資財即成上仙其施濟已多矣遊鶴鳴山洪武末有道人遊卭之鶴鳴山山有二十四洞以應二十四氣道人入山時石鶴復鳴人咸驚異居半載入天谷洞不出洞門書三丰遊此四字時已一百餘歲矣蜀通志作三百餘歲似誤圓通子曰奇題詩警禍建文嗣位初戶部門前薄暝有老翁間步如土地形狀者風過處忽不見明晨覘雙扉上於右扉題一詩云燕子將營壘一作巢閣龍孫不在潭波平風又起海上問三三末三字寫於雙扉交關處人多不解戶部侍郎卓敬見之以為三字寫門中蓋借門縫作丰字中畫也心知為三丰仙翁並念燕子者是指燕王龍孫者是指建文其語殊凶其字旋落卓乃密疏請徙封燕王隸於南昌萬一有變尚可控制疏入竟不聽圓通子曰卓侍郎聰明可愛惜忠言逆耳致使燕封篡位吾師其亦不得已而題詩歟不然豈不知建文之不聽哉混迹京師永樂初有宦客遊京師丰姿淸矯拂拂修髯而衣服禮容似公車客狀居京頗久與戶科給事中胡濙相契常作詩酒之會喜擬文選體多不存稿客聞朝中僚屬事畢間談多言神仙事又聞侍讀胡廣欲舉張三丰仙術上聞客心厭之一日飲於客齋忽謂胡濙曰吾友善事明君我將遠引深山也濙驚叩其故不答數叩之乃掀髯笑曰吾即三丰子也言畢徑去不知所往其後胡濙訪三丰祖師因有卻憶故人從此隱題詩誰似鮑參軍之句云一晤因緣永樂四年冬詹事府主簿南陽張朝用常見一道人行止異奇足不履地手撚梅花口吟秋水趨前詢之乃三丰仙翁也明年帝命胡濙遊訪因薦朝用同行已不知其去向矣道示明玉永樂中有羽客遊內江寓明玉道人家詭云龐姓微示以異嘗履極險不墜涉水無少濡明玉善符咒多奇驗欲傳授羽客羽客笑曰我以道俸君君乃以法授我耶乃作道法會同疏一通與之明玉大驚跪請其名號乃知為三丰祖師也居歲餘胡濙物色之遂不留四川通志作遂同玉見胡與明紀不合茲特正之尋又來往峩眉山中明殿飛升明成祖自遇西僧哈立麻之後頗萌道心尚書胡廣因言張三丰實有道法録其捷要篇上呈帝覽之雖不測其涯涘知其有合玄機遣使訪之壬辰春又敕孫碧雲至武當拜候三月初六日並賜書越三載始至武當碧雲呈御書祖師覽訖笑答一函碧雲勸入朝不可留居室內出則同遊令人馳報於帝丙申春正帝命安車迎請忽又他適帝乃斥胡廣求之廣大懼即至武當懇禱祖師見其情切乃出許其詣闕先自飛身而去帝正在朝忽見一𧟋褸道人肩披鹿裘立於階前稽首冷笑帝問是三丰殷勤命坐即求談道祖師遂唱訪道求玄走盡天涯之曲曲終從容下階一時卿雲瑞靄彌滿殿廷良久始散祖師去矣君臣嘆異始信真仙及胡廣還朝上頗賜勞之按明紀永樂丁亥帝命胡濙等遍訪三丰去十載始還茲連丁亥順數至丙申正是十年乃於五月初先有陛見之事不知濙等還朝在五月前否若在五月後便往來相左矣神仙鑑評仙道有易髓換骨不必蛻化者有育就嬰孩引神出見者有太陰煉形尸解成真者皆足以證道而完璞之育就胎孫三丰之飛升金殿非重安九鼎再立乾坤何能至此由是而觀丹道豈易言哉玄光表異永樂丙申歲五月朔為南極老人萬夀之會老君命太微尹真人傳示羣真尹向西北行舉頭見一簇玄光從空飛至迎視乃三丰先生尹告以老君之旨三丰曰吾已荷玉帝宣命矣遂別去七針先生天順中有七針先生者嘗持七藥針治人瘡疾多奇效人遂以七針目之先生亦以此自名又能圖寫山水自此輛川公卿多重之先是張三丰以仙畫稱奇朝廷屢求不得近臣因以七針上聞詔進寫山水一幅最為稱旨但性嗜酒且好漫罵權幸濁吏某利其技精聘至家厚待之倩其作畫以圖干謁一日帝又以美絹賜寫時七針醉矣居小樓上濁吏以絹付七針七針置之牀頭夜聞嘔穢聲甚劇濁吏心急燭之七針躍起曰快甚快甚舉視皆麻雀躍躍欲飛尚未點睛濁吏不得已進呈帝覽帝稱異即命點睛對曰臣所寫不可點睛點則飛去帝弗信促之七針乃舉筆亂宀鼠訖帝玩而笑曰此物真欲飛也語終即有無數小雀沖雲而去至濁吏之鄉盡彈其田穀殆無遺粟連疆者固無恙也七針亦遁去事聞上再詔見不可得帝以問禮部尚書胡濙濙對曰七針殆三丰耶以三丰二字橫順分觀蓋如針之有七也帝驚異贈角黍翁又天順中劍州有老翁者忘其姓氏日市角黍為生視有公貝者過輒與一包不取資或叩其故老翁曰是皆走乏人也腹且飢吾日售角黍只求固吾本而少有利焉足矣以餘給人特小惠耳何足齒一日日將晡角黍不能售倐有道人前過乞賜一包翁與之食畢又乞翁又與之如是者幾數十次翁皆與之道人大笑曰翁真慷慨者吾無他術囊有紫珠一枚可攜回置甕內隔夕啓視中有奇妙焉語罷道人飄然而去翁帶至家竟如其教時米甕匱矣明晨開之甕米已滿翁笑曰道人所謂奇妙者固如是耶遂取作角黍賣三施七來日啓視米又滿作業如常人沾其惠者咸嘖嘖稱善久之翁殆異焉因倒甕覘之紫珠不見嗣後甕亦不復生米矣他日道人又來語翁曰吾某某也翁惠巳多願出世否翁不許祖師乃出一粒囑曰且食此當更綿夀翁啖下覺肺腑皆淸祖師去後老翁年百餘端坐而逝圓通子曰惜此翁不求仙道然其滿腔慈念亦應長享遐齡矣詩挫番僧成化中方士流行一時賜以誥敕號為真人者幾盈都下而西番僧劄巴堅參以祕密教獲寵賜號大智慧佛出入乘高輿雖顯貴過街皆避其前導一日劄巴歸賜院罕干大見襤褸道人於照壁上題詩云紛紛方士滿朝端又見番僧壓顯官這等奴才稱釋道老君含笑世尊歡款落坤斷補題劄巴見之大怒命士卒擒之風沙起處道人不見或曰坤卦斷而言補者此丰字也於是共知為真仙三丰焉厥後劄巴之勢稍挫圓通子曰劄巴沒臉一戲方士成化中羽流擾擾出入禁廷祖師甚惡之一日遇方士趙王二姓者知其存心鬼蜮將挾異術北行因化為教主形狀以詭之曰吾張天師也飛符召神我法甚效君等願學否趙王不信祖師乃向空指畫倐有天兵天將往來雲氣中二人始異之跪求符籙祖師偽為密囑狀賜之數符二人大笑而去其時李孜省以五雷法得幸二人投之因此進身帝詢其能二人以天師傳符對並請帝致齋三日演法一觀帝如其教臨期大設法壇支吾終日不驗帝怒其姦詐立命侍衛斃之圓通子曰真仙之惡方士猶君子之惡小人乎吾師七戲方士以正法簸弄邪法務使羣邪術敗寵幸日衰而後已如吾師者應封為蕩邪衛正護國天師也厥後成化末罷奪僧道封號雖係用科道言安知不因吾師之默破其術而乃疏之歟以下六則俱作如是觀二戲方士祖師又嘗與方士劉某者賭役鬼神方士符初燒祖師暗以法力掩之輪及師符即有神鬼無數甲馬猙𤢆往來空際方士驚奇跪求指教師慨然與之並教以斬鬼妙法方士大喜挾技遊京頗稱霛效特未用斬鬼法耳繼援梁芳等得入內廷一夕有宮監與宮婢相狎適帝命劉召鬼符使燒而二鬼至一男一女調笑於宮樓之下漸逼帝前不知敬避帝懼速命劉拔劍擊之則是宮婢雲娥與宮監某某也帝大怒以劉侮已即刻斃於壇內圓通子曰一符殺三邪非吾師逞毒手也以正衛國真是慈悲耳三戲方士方士郭成顯無賴徒也初學五雷法頗效行將入京三丰祖師因於途中截之相逢道左詭名賽天師先語郭曰子身藏五雷訣耶郭驚其先知料是神人不敢隱匿連聲唯唯賽天師曰吾尚有六雷法賜汝依法行持能召天仙化女御鳳遊凡近日李孜省權傾中外爾以此法投之則顯要可立致也郭大喜請受其傳叩頭辭去進干孜省先用五雷孜省以為同道深信納之郭笑曰豈惟是哉吾更有六雷在也傳吾者云此法能召天姝孜省雀躍促郭演之郭乃故持身分命廣法壇務窮精緻紅燈翠幃境界一新孜省之姬妾倚閣明妝皆觀郭術何如郭乃按法行符繞壇咒喝果有仙姝四五冉冉而來各跨赤虬止於壇上其中有二女尤為妖麗雙喉度曲宛轉鶯聲歌曰儂與兒夫據要津法衣解卻眤紅裙此威此福難長久朝倚欄干淚溼雲音節淸脆似嘲似諷如懼如哀孜省之黨初睹美人則生憐繼聞歌詞則大惑細思其意彌震恐忽然雷雨當空風沙競作滿壇燈火皆滅狐城鼠社水撲煙昏霎時雲斂纖月挂簷覺有呻吟聲在壇深黑處復然明燭照之只見姬妾數人各跨一呆漢赤體彎腰若僵迷狀睇視之則皆孜省門下所養術士法徒也強命家奴各扶過去再覓郭成顯尚立法壇滿口糊詞搖頭搯指若得意然孜省羞怒交作拔佩劍砍之拋其尸於後園池內禁家人勿言誰知此夕醜聲早流於外矣孜省益危憡不安圓通子曰六雷法竟有如許妙用不知吾師從何處得來漢唐方士流行之際惜無此書四戲方士彭華為吏部左侍郎繼結萬安孜省遂得入內閣預機務事勢熖日彰威福自擅屏逐忠良其門下亦多方士一日病熱涼藥鮮效乃命方士熊鍾代求明醫熊聞都門外有某某者岐黃頗精遂往延之路遇一道人背負藥囊手挑畫板上書四句云一張膏藥貼好瘡痍三封大丹牢籠方術夫所謂一張三封者是隱著其姓字也猝然相遇以為表其醫道故熊弗察耳外售解熱丸熊欲講之道人故昂身價謂吾丸匪特愈病並可輕身弗信道人以一丸自啖兩足憑虛離地數尺許熊即倒拜乞賣一丸道人故囑曰此丸與大貴人食之必能白日飛升其去世後則襲顯位易易也熊本無仙意但欲日飛升其去世後則襲顯位易易也熊本無仙意但欲如彭華輩身列要津足矣因將丸回述其靈異彭華於昏憒中吞之頭腦涔涔如中鴆毒狀尋復大吐吐後遂得風疾熊伺其誤遂遁彭華亦以病罷黜圓通子曰熱中之病涼劑難療夫惟吐其火而賜以風則心熱退矣若方士者熱中更甚於彭華不愛神仙只貪富貴何不待他飛升便自逃走五戲方士太行西山馬仙翁能以神箭射鬼人多求之無弗效者道士鄧常恩素聞其能及為太常卿陰賊險很暗害一人每入府中為厲乃命其徒陳歪兒往求馬術陳即往途遇一道人風骨昂昂手執長弓張也腰插七箭三丰也自云射鬼百發百中而不言其姓字陳疑焉同行至晚於破廟中栖宿林昏月黑叢篁古木中鬼聲啾啾然陳大懼道人曰爾可以觀吾射也即於窗隙內張弓射之其鬼哀號而去陳乃折服明晨乞其藝道人慨然與之遂回京師述其情事詭云馬仙已往今幸得此神箭皆大人之福也常恩喜甚夜來昏月濛濛府園中鬼聲又起即命陳一奏其技常恩轉過回廊於對面樓窗上覘之忽見鬼飛入樓陳遂挽強弓決妙矢羽聲響處大叫一聲應弦而倒燭之則常恩也幸中左臂不致隕命陳即逃圓通子曰殺人之罪已甚矣乃至欲誅其魄殘忍孰甚西山之行即得馬仙神箭安知不轉射常恩六戲方士閣臣萬安深中寬外其時萬貴妃寵冠後宮安稱子姪行內外之聲援益固並求方士房中術進之妃大喜居無何而妃卒方萬安之求此術也方士路逢淵高談採戰以術授安後自稱法師命安往西山受道路先於途中待之數日不至無聊中散步郊墟忽遇一道叟松顔鶴髮齒高面紅如赤松黃石輩問其姓不答叩其道不言叟笑吟曰路逢𡨚路逢𡨚今日何緣遇萬安飄然而去路大驚逡巡欲返爾時日色沉山林昏鴉噪四顧茫然頓迷去向又見一樵叟荷薪而過叩其姓曰張而不言名路求指迷老叟指靑燈處即是旅店一謝而別遂投宿焉破椽蕭蕭中夜聞隔屋嘆聲眤隙而窺則萬安也私心憐之又欲近之遂抽其破壁而過以圖一敘深情時安巳神倦枕手而眠忽聞壁響疑是劫賊乃舉坐橙一擊其人遂撲呼隨侍古見之則自稱法師之路逢淵也安究其情則知為問候而來伏地請罪路亦忍痛作禮問安曰相公不趨大道胡亦至此乎安言吾奉師命欲往西山夜夢仙叟對吾指示云萬安萬安訪道西山西山大路不逢緣吾故趨車小道而來不料與師相遇竟作此一假惡戲圓通子曰以方士為法師愚巳甚矣師不成師故應受坐橙一擊厥後萬安仍以房術進後宮被憲宗察出遂罷則徒弟亦失時矣七戲方士成化末梁芳李孜省鄧常恩趙玉芝先後謫戍繼皆遇赦而太監蔣琮力言芳等罪狀決不可赦故梁李廢死而鄧趙仍戍邊先謫戍時於途見旅壁遍處題云孜省梁芳罪惡大彰遇赦不宜赦令渠下獄亡常恩玉芝謫戍西夷逢赦不當赦長與中土離款落封三張云圓通子曰羣小被謫已無生氣然小人心癡必有回望三台冀復大用如萬安黜歸時者故吾師題此戲之以了局一黨也道觀題詩嘉靖末詔求天下方書時南京道觀崇淸寺壁上有四絶句款落隱仙張玄玄題常有神燈夜照其字後忽為雷電取去詩見雲水集中大鬧魏祠天啓中魏忠賢生祠幾遍天下而東華門外一所尤為壯麗日襤𧟋褸瘋道三人奮步遊觀突入祠內擊忠賢土偶像糞土泥沙污穢滿面復於壁上大書四句云淫祠靡靡王室如燬錦繡江山竟委於鬼委鬼魏字守祠吏一見大驚方欲扭執而三瘋不見矣吏恐忠賢聞之即時洗伐覺詩壁餘香土偶餘臭是夕忠賢一身皆痛楚云圓通子曰快事快事可補明史之遺使閲者奮袂起舞道逢呂祖順治初秦蜀未平時有一道士披裘往來隱顯莫測行且嘆息嘆已復笑笑已復歌歌曰乾坤明不明𧲣虎尚橫行拂袖歸三島蓬萊看水淸又有一道士佩劍執拂而來依聲和之和曰五更天欲明出棧看雲行與子同歸去天得一以淸飄然而至佩劍者先謂披裘者曰三丰先生今可以休息矣這道士稽首相答語語禪鋒了不可釋忽然放大毫光空中紅雲飛舞結成呂字二道士騰空而去此事載毆養真紀亂書中枯梅復生康熙間麟遊道上馬家店有枯梅一株樁頗奇古不知何年種也適值冬雪天寒有張道人身披破衲曉行至此呼店主具麵食煮未稠即送至席上道人曰咱不食生麵與枯梅食之待他快活擲其麵於樹稍攤錢而去店主異焉明晨覘之枯梅已著花也丫杈皆作丰字狀馬店因此大售時時以麵水灌之仍枯圓通子曰呂祖活樟邱祖活柏張祖活梅皆可謂恩及草木靑雲障暑祖師遊蜀山山多黃荆時值天暑諸父老芟鋤田野不勝酷熱師將黃荆枝結成圈子戴於頭上只見靑雲如笠浮浮空際隨之往來時有見者多效之殊大淸涼不生熱疾鄉老賦之曰首戴黃荆雖少靑雲覆頂身居緑野不妨赤日當頭至今遂成農圃故事云圓通子曰或折枝作帽或採葉作茗此物皆大佳西溪假寐同州有田翁者家稱富有生平頗好善及其歿也有一道人來弔自稱天外散人取唐詩天外三丰之句藏其號也囑其子葬其父於秦嶺山中土起乳包兩石相抄處且曰吾與人卜地只令無風水泥沙螻蟻足矣切勿妄聽盲師復行遷改田葬其父十年平平後為某師所惑談封説拜頓起他心欲改葬焉聞道人尚在西溪亭田往詢其可否及至亭間道人正酣睡石上田以手推移再三道人作矇朧語曰而翁正安臥何來移動為也田不悟復強推之道人鼻息齁齁竟不之答田遂還家仍從某師語往開其墓田公遺骨如黃金然殊大悔恨而某師強詞奪理卒移他區不十年而田産凋零再訪道人云已去年他往也尋又逢某師見其目瞽丐於市云圓通子曰田公之子可謂不孝之甚者補輯金箔交輝洪武初平陽真仙張金箔世造金箔紙故以金箔自名深藏道術遊戲人間嘗以金箔為藥與人治疾無不奇效忽又有張金點者身著淡藍袍滿袍皆貼金點遂以金點為號見者粲然金點曰人有疾而服吾一點其疾必瘳時有求試者效驗如神亦不索價是時南省多疫症金點一身日為衆人擁取直至點盡而止明日來市中其點如故咸拜為神師越月後疫症稍止金點曰吾今事盡將歸雲山矣遂脫其金點道袍於地人競奪取張化為金光沖天而去他日劉誠意聞之曰此必張三丰詭為金點與張金箔相輝映也夢裏傳方明有朱生者兖州人也性慈孝忽得眼疾對面不見物朝夕拜天遂夢一金色神人長髯如戟道貌飄然招朱至前曰子心誠恪吾有妙方賜汝一點必明但用好熖硝一兩銅器鎔化入飛過黃丹二分片腦二分銅匙急炒入鏆內收之每點少許其靈效有未可具述者朱醒而異之即照神傳調治越日復明朱感其神驗向空焚香竭誠禮拜他日到兖城路經張仙觀入內瞻仰忽見仙容與夢中神人儀裝無二不覺竦然並發願傳刋其方於世今其方尚載本草綱目中度汪夢九汪公錫齡字夢九徽州歙縣人明嘉靖進士按察忠愍公後裔家素豐餘能好禮義繼客揚州江都遂僑寓焉公生而神異少有夙慧壯有治才娶劉氏性極恬靜嘗夢女仙何一陽頗愛玄學與公俱二十餘年頌偈而逝公亦不復娶平生出處由別駕官至四川劍南觀察輯兵愛民人皆德之到任二載劍南多雨公乃自斷指甲徒步往禱於眉山拈香七日而天晴咸以為仁慈所感歸經娑羅坪忽遇至人張三丰先生來遊峩眉一見如舊先生覺之曰方今聖天子在上又有賢宰輔名公卿相與佐治君無忘蓬山來共處時也公乃大悟本來為沈萬三分神寄世並知三丰為恩師再求指度師乃授以金丹要旨公暇即靜坐於高幖凌雲兩山建修屋舍丹房並於就日峯自創一槨號藏脫居夜與仙師往來爾時民物恬熙轅門滿草矣所未決去者因尚有老親在耳繼升雲南永北即請終養恐長滯於軟紅也乃以次丁在不合定例遂阻尋又授河南通省河道副使因便道抵揚州過楚江復遇三丰先生傳以祕訣遽抱奇病歸時元配劉恭人去世多年命其子思敏扶柩入蜀葬之就日峯而公病益劇絶粒月餘面轉紅暢一日謂弟曰汝善事父吾將往矣薰沐正襟空中隱隱有彩雲下覆罕干大見一氣從頂門出乃終時雍正甲辰二月初七日丑時仙升舉尸入棺輕如蟬蛻方知成真得道人也其子奉遺命合劉恭人柩同扶入川瘞於就日峯上後有巴南樵夫見公於峩山從一奇偉道人飛行峭壁仍如當日容貌髭鬚飄飄然長乙子曰題係度汪夢九而此作乃如夢九先生小傳何也蓋先生觀察劍南流風善政至今猶稱頌之兼以仙根道器忠孝兩全故祖師亟來指度以衛吾道茲作搜軼事擷遺聞並照其夀藏碑跋著之仍以著祖師度世之勤而代寫夢九出處也附夢九先生自題藏蛻居記道人姓汪名錫齡字夢九號圓通江南徽州府歙縣水界山人僑寓揚州府江都縣厯官別駕州牧戶工二部任四川劍南觀察受修養祕法於張三丰先生之門愛凌雲山水淸幽自營葬地於就日峯內穴得雲中仙座之形扦巳山亥向為將來藏骨之所留題七律一詩録之於後自扦吉穴埋仙骨水繞山環倍有情就日淸泉垂德澤丹霞靜室守佳城道人久脫塵凡纍孝子無勞風木驚莫説老夫原未死何妨標挂見分明雍正元年嵗次癸卯四月初三日圓通道人建槨自記秦安溷迹秦安縣有張蓬頭自云中州人又稱天外人頂挽單髻冬夏著一破衲遊行市上狀類瘋癲好事者𢌿以酒食不問精粗多寡噉輒盡初未見其醉飽也時或數日或數十日不飲食亦無飢渴態晚宿寺觀平地上恆經旬不起羣以為死足蹴之乃欠伸張目曰寐未熟何溷而公為也縣人蔡生有別墅在城西石佛寺花木明秀廓檻回環欲奉之往蓬頭殊不辭生恆喜交遊以墅為外宅日與品竹彈絲者相為徵逐蓬頭了不為意日方落即僵臥如尸終夜不聞息聲偶叩其術曰聖經次節乃儒釋道三教入門初基由定而至得其途乃分踏實一切者孔門也空諸一切者牟尼也超乎一切者太上也君稱茂才當自領之耳生妻最悍妒詬罵翁姑生畏之如虎探知生與道者並諸交在別墅為戲怒甚即往斥逐生愳以告蓬頭曰無傷俟其來我自當之比至見蓬頭當門坐怒聲雷動肆口𠌖倯直前以左右手力批兩頰蓬頭怡然不動妻覺兩手痛不可忍急歸而十指腫若懸槌已發疔毒嗥呼半夜天曉死矣逮乾隆四十九年四月蓬頭忽勸蔡歸家蔡心迷遊戲難之強而後可至正月望逆𤞑馬心明攜其黨自伏羌竄歸石峯堡道經石佛寺蹂躪殆盡而蔡獨免後有陳野仙者亦來遊秦安野仙平涼人冠服作道裝而飲酒食肉起居作息如常人結廬龍門山危峯峭壁殆飛鳥所不能到不知何以上下也其蹤迹頗不遠人欲覓之峯下呼陳爺即至或叩以休咎不答但云由他由他又嘗與鄉人移石上崖又嘗與友人噀水滅火一切靈異未可俱述茲聞野仙來遊蔡即延至其家令與蓬頭相見而野仙若甚自慚者留三日野仙辭去蔡因問蓬頭野仙何如曰修仙有二其上乘自靜功入門首戒妄念次學胎息再演降龍伏虎之法此皆易事惟金丹難煉耳丹成便可飛升來往自如矣今野仙乃符籙一派靜則雲霞動則霹𩆝然必傳授正藴祕深真師來度亦成南宮列仙否則五百年後難免雷劫矣幸野仙存心仁厚每以其法救人困苦雖係別道吾將以大道傳之居無何蓬頭亦飄然去野仙貌肥黑禮儀甚恭蓬頭面奇古而神極淸去來倏忽如遊龍然虛舟子曰海亭言張真人每嘗往來城市徉狂散髮自稱蓬頭神也哉真人之住世也不示異不見為仙徒示異又恐似野仙夫惟掃除旁門獨標正道而以誅悍婦救蔡家略露其以道兼法之妙則真人之神通大矣可惜蔡生不悟乾隆純皇帝時大學士張文和公廷玉奉敕纂修明史其序仙傳有云明初周顚張三丰之屬蹤迹祕幻莫可測識而震動天子要非妄誔取寵者所可幾誠哉是言也
