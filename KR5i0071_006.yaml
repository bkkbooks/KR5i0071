body:
  text: 漢嘉長乙山人李西月重編張道淵子深敬書閬中朱道生晚成子敬刋姪瑛春城朱瓚素園同校男璜磻溪古文陳雷谷傳雷谷仙翁陳可復定海人也生而疏束朿爽丰骨不凡自少好仙術無功名意遇平江林道人銓傳以召雷法時值大旱禱祈莫應或有戲者曰陳道士能召雷雨命至官庭將俟其不驗而侮辱之可復即以法興雲須臾雷電大作雨下尺餘常至鄞之天慶觀中秋有方士賞月可復不與其會戲以墨水噀空頃即烏雲蔽月而雨黑雨坐客驚避衣盡緇矣衆知其所為延之入席雲收霧斂月復朗然其響應率皆類此至元間世祖詔見命主長春宫暇則杜門靜坐不與客見焉陳中行傳元江東明道書院山長教授溫州陳公名遇字中行金陵人也公外和內剛深知大義明太祖渡江御史秦元薦之帝致書徵至與語大悅俾典戎務咨以機密授供奉不受後又拜學士中書左丞宏文大學士太常卿禮部尚書皆辭又賜金帛等物亦不受高廟三幸其第引入內賜坐病則賜醫藥年七十二無疾而終帝再三震悼賜以棺帛當時在廷公卿皆以為無此寵遇方公之初見太祖也只勸其戒殺以為生民之望及詰以元政何如公惟流涕而已詔對之暇焚香危坐若山中老僧者太祖數遣人覘之公正念金剛經曰以如是降伏其心以如是降伏其心故始終不相疑焉然其不受人職亦可謂忠於元者也元史不載吾故表而志之完璞子列傳完璞子姓程名瑤字光杓新安人徵士搏霄之子也狀貌魁梧性情豪宕母倪氏夢神人以赤玉授之而生幼有神悟誦經史如已熟讀者然倪氏卒哀毀如成人自是日日勤學所謂孔孟心傳河洛宗旨皆貫通焉及長娶周氏氏名鍚字元姫長知書理閲綱目傳記能較其異同稱閨中博士姫於君為同庚而君生以冬至元姫生以夏至蓋一少陽一少陰也孝翁敬夫暇則聆光杓誦讀恆以義理相質搏霄棄世後守制如禮服闋北游宋濂一見即奇之曰風塵外物搏霄為不死矣尋辭去從吳楨學劍甫期月而即盡其能乃佩劍出游遇王仲都於句曲授以大道命擇地修煉遂還北嶽濳修十二載道成時年三十六也始歸家見元姫課子讀書遂獨寢中堂元姫濳窺見其趺坐於榻頂有金光照耀一室詰朝請曰夫子何不以道相授乎光杓曰方欲度盡天下豈吝於子但未謝師恩故未敢也遂往大翮山謁見王真君賜號完璞子拜謝而去㩦劍游晉陽轉之荆楚時有姚廣孝者出家妙智菴法名道衍雖從佛教郤喜談兵嘗游南陽新野訪卧龍遺蹟題詩於廟津津自喜忽有一人坐於其側大喝曰和尚何人敢誚武侯耶衍大驚見其道裝佩劍容貌清奇作禮曰無心之詠嘆道長何責之深也敢請從來道者云吾號完璞惟喜遨遊蒼林碧巘皆吾廬也仰天大笑而去衍後為燕王所倚助惡篡國故完璞一羞之也建文初燕入會葬訖還至淮陰次子高煦引兵來接忽然風霧大作沙石亂飛無路可出猛聞喝聲曰且饒汝天即淸明見一道者按劍而哂煦欲問詢風過不見矣歸令道衍占之曰此仙家游戲耳蓋完璞自羞道衍後即知燕王入朝故於中途顯遁甲以警之夏四月太祖小祥燕遣世子煦燧等入臨魏國公徐輝祖密奏請留之煦入輝祖廄盜良馬先逃時完璞訪余於武當遙見煦來因掣劍指之其馬驚嘶跑轉控勒不止欲下不能直至江口如從雲霧中墜下燕後圍濟南鐵鉉令軍民詐降遂敗燕於城下時道衍亦在軍中出營巡視一人至前曰余有破城之訣以祕函付之即去衍啓視云贊畫軍機曾不識詐降之計師到濟南多不濟問何如劉誠意全未衍覽之恥懼交集細憶其人宛似武侯廟前所遇者完璞復去游淮上值燕師進攻滄州高煦殿後俄而冰水氷雹大作齊奔北軍煦帶重傷而走周隱遙真人適來相遇怪而問之曰燕王應運之主何為挫之完璞曰先生誤矣燕王棣今之管蔡也時無周公使彼得行其志而先生以應運歸之若此則强藩叛國皆稱應運而綱常從此墜地矣小子念此殊不敢狥俗情故常兩羞廣孝三辱高煦蓋欲振飭大倫維持名教使千秋以後知燕王之師為山林仙客所不能容者定非應運之主也自古真人崛起則必除殘去暴上如湯武涎如高光乃克稱應運焉近今如太祖開國平賊寇繼大元亦可稱為應運然天以天下與明率當以祖宗傳貽者尊為天命燕王不據位安知建文之後遂無世子耶矧其立位以來操心仁孝上天原無攺易之心而燕王以强凌弱此不過如鄉人之豪奪其宗人之産於天命何與乎乃高煦暴物佐父稱兵道衍奸奴輔渠肆志淺識者猶不平况豪士哉吾聞先生為角里公賢孫抑思商山輔翼何不重少子而重嫡子使當日戚后之兒亦居惠帝之位先生其許之否隱遙語塞遂各分手而去完璞仍還山居元姫來拜曰婚嫁之事妾已代君完之盍即以道相授乎遂傳以返本還元之訣日夜修煉完璞子亦自溫養胎嬰九年胎孫復孕可以分身應物神游千里時元姫容顔日少悟徹前因乃與完璞子同登瑶島之上矣贊曰程完璞者忠義神仙也然其羞廣孝挫高煦說隱遙壯則壯矣毋乃龍性未馴乎既聞溫養𣸸孫入包山玞樓與徐君同修仙史則又儒雅之甚矣慧通子列傳慧通子姓徐名人瑞字輯五滇池侯徐景夫英之子也母宏氏初生一姊名大姑繼生慧通時洪武元年四月初八日也齠齡時死而復生忽開神慧先是滇池侯性情豪邁奮志從軍轉徙於外卒不能歸時慧通尚年稚也常師韓教授淹貫經史里人有神童之目而慧通天性淡遠素慕玄修日自館舍歸途遇赤鬚道士招前語曰稚子有心學道抑知道不遠人乎忠孝仁義道之基也遂傳以妙品逸入深林不見慧通歸家乃存心報本矢志忠誠既念老父從征音書久絶遂欲遍處尋求以母孤淸無人奉侍不敢遽行姊適婁江朱雲章專事游俠言欲為朝廷出力圖取功名慧通聞而嘆曰朱哥亦作此想也心竊憂之未嘗為母告也娶陶氏幼名鍾姑後改名復字於根心靈善悟能讀古經文姑少慧通一年而月日時則皆同也能事老姑人稱雙孝焉慧通以內助賢順乃聚徒教授館穀奉親嗣後生齒漸蕃謀生轉拙乃學為岐黃之業精痘科兼善治疫癘國之人賴以活者蓋不可勝數矣側聞朱雲章勤王戰死遂具舟往慰大姑因思父亦從軍未卜何如而尋親之念於是益切謂窮天極地必往求之也時年已三十五綹長髯口河眉劍目秀鼻隆喜服天藍袍淡黃裾飄飄然有神仙意㩦二童相隨舟至江西小兒患病者咸求醫治餽遺之物用度外悉施貧苦飄零楚蜀至瞿塘三峽又聞徐侯在滇南爰往探之至沐木术府問詢始知向鎮大理已去世二載也沉痛欲絶即日泣奔大理徵尋甫得於北門外之和平里步入中庭滿懷愴戚忽見兩少年趨出瞪視彼此驚疑蓋徐侯當日聞宏氏生子已亡故更納嚴唐二姫以繼宗祧而復生此二子也相視相詰方知為嫡庶弟昆遂請兩姨出拜焉命二弟引往墓所廬居七日哀毁如禮此時歸省念起欲請兩姨同二弟東歸以姻親在此不願重遷乃拜别就道而還初抵家宅即入中堂拜母猛見喪幃一具揭視之靈柩儼然失聲曰此何為也家之人咸來泣拜鍾姑曰自君之去矣老姑積於思慮卒然而昏慧通聞言哀痛無既乃行祭葬之禮復深廬墓之情一日遇前赤鬚人至曰吾西山隱仙也聞吾子孝德動天合當長生度世即召其夫婦至前傳以大丹之訣慧通與鍾姑乃拜隱仙為弟子仙既去遂各淨掃丹房勤心修煉不一載而金丹已成他日出游西山再遇仙師傳以神丹乃於林屋洞天起爐超煉白雲滿空紅霞遍地自是而闔宅皆升矣方慧通之初入西山也見危岩深處有石門焉屈身而入伏行既久凡皆是入室時之景象也髣佛若有光由是瓊鐘一叩萬象皆明洞然之中別有天地其間林泉曠廓雲水飛揚溪山猿鶴相嘯於雲煙之外而瓦屋樓臺亦與人間無異遍觀其間院堂曰堂堂亭曰亭亭軒曰軒軒閣曰閣閣慧通至此幾不知身在何處也突有二吏來迎云奉玄聖命專候仙才遂引慧通至石樓額曰玞樓華藏二吏止之於中返身扄門而去慧通靜坐沈思一使供餐琴書在几香茗當前及觀樓壁己有太上朿力箋命其細檢琅函篡修仙史功成後許其全家一見於焉握仙管拂雲縑日日勤研功夫淸謹舉凡古今仙跡大道流傳無不編次詳明炳如星日如是者不知幾朝暮矣始見一丈人啓鑰開關而進慧通拜之丈人曰吾即此洞主靈威子也子成希有多之功仙凡幸甚慧通謝之求賜間游丈人曰子今可以出觀寶眷己移前第矣請往見慧通乃嬰兒姹女兩團圓之意聖父靈母生真仙之意下玞樓靑童前導先從戊己門轉達東堂瞥見鍾姑易服官妝斂衽曰君可往見公姑乃更入內院見其母同一偉貌鬍叟並坐逍遙榻上慧通泣拜母前叩其來略母曰吾昨逝後見赤鬚道者督一金剛神日夜圍護言候汝子道成即得齊登仙界其並坐者即汝父也一時父母妻子咸聚首於林屋洞天之中嗟乎慧通之仙秩其榮及於全家者固若斯乎夫挾濟人之術以此傳妙合丹經仙筆也尋萬里之親可謂仁孝兼備矣乃去則父歿而不得見入則母死而不及送人子之苦莫甚於斯及至玞樓編史闔家度世然後知天之報施仁孝固不爽矣後封為徵時太史兼寰中極濟使鍾姑為易隱淨貞夫人贊曰徐慧通者仁孝神仙也館穀養母借醫尋父若博學多能以成其為人者然惜其遠尋亡父而不能轉見生母又何留此缺恨也人子至此故惟有出家訪道冀我族之同升也然使無仙才以成仙史之功亦幾幾乎其難哉沈線陽小傳沈線陽者萬山長女也聲宏體碩無女子相生三歲而失去莫知所之方萬山之徙雲南也吾往會於滇上同煉天元大藥至期年而始成日者線陽來見己隔三十餘年父女相逢兩不相識細詢之始知其為長女也自小離親幾成永訣然在髫稚亦不自知其別庭闈之際即遇薛真陽古稱中條玄女者是也名之為玉霞號之以線陽命掌神劍兼守玉匣諸祕法得授靈通大道吾與萬山正煉天元爰此來滇共服成藥皆真陽教之也萬山大喜即出成丹與全家服之皆冲舉焉線陽願大慈深慨然有普救生靈之志嘗言能忍者有裨於道好殺者必喪其元遂與父散游四方隨時化度云嗚呼可謂女仙中英雄矣余氏父女傳東南之地多仙才而可與點化之訣者惟沈家眷屬余十舍者萬山之壻也少好施與萬山以幼女妻之並傳以丹砂妙道豐饒與婦翁相頡頑萬山徙雲南故十舍亦受株纍非無因也至滇上時西平侯沐木术春深撫慰也側見余氏女風致端閒宛然仙格願請贅於十舍十舍允焉及入西平府薄其嫁資不豐頗不為禮余女曰公所利者財耳措之極易教備汞鎔之脫金環投入其內有聲如蟬鳴真汞已乾而環如故以汞揩銅鐵悉成金寶無算侯大悅西平侯之鎮雲南也前後七年大修屯政其得力於余夫人者多矣後乞名號於吾拜為小弟子因名蕙剛字健陽與其父母同服萬山翁大藥遂飛升於昆明池上蘆汀夜話長江月白霜露滿汀萬山先生子欲聞豫之出處乎豫當生時一鶴自海天飛來咸謂令威降世後知丁公仍在靈墟豫思彼人也我亦人也豫豈不得似丁公每嗟光陰之倐忽存沒富貴如風燈草塵以是日夕希大道棄功名撇勢利雲游湖海拜訪名師所授雖多皆旁門小法與真道乖違徒勞勤苦延佑初年已六十七心命惶惶幸天憐憫初入終南即遇火龍先生乃圖南老祖高弟物外風儀豫跽而問道䝉師鑒我精誠初指煉已功夫次言得藥口訣再示火候細微溫養脫胎了當空虛之旨一一備悉於是知欲進道者必須法財兩用豫素游訪兼頗好善傾囊倒篋殆盡安能以償夙願不覺憂行於色師怪問之豫揮淚捉膝以告重䝉授以丹砂點化之藥命出山修之立辭恩師和光混俗將覓真鉛八兩真汞半斤同入造化爐中煅煉轉制分接九還已周借此資財以了大事由是起蓋丹房一身端坐虛心養氣虛氣養神氣慧神淸廣覓藥材時飲蟠桃酒朝餐玉池液如醉如癡補氣補血但得汞有半斤可待他鉛八兩月數將圓金花自現十手捉虎擒龍採得先天一氣徐行火候抽添自合周天度數知復姤進火退符識卯酉防危慮險十月功完聖胎顯象九年面壁與道合真所謂跨鶴靑霄如大路任教滄海變桑田也吾之出處大概如此請與子鼓枻而歌以盡今宵之樂四皓考商山四皓皆避秦亂者一曰東園公姓唐名秉字宣明襄邑人高潔自守遁於邱園故以為號焉一曰夏黃公姓崔名廓或作廣字少通僻居夏里修道故自號為夏黃公一曰角里先生吳人也泰伯之後姓周名術字元道逍遙自適嘗寓河內更號灞上先生此皆陳留志所記者獨綺里季不傳焉既閲皇甫謐高士傳乃知綺里翁者姓朱名暉字文李種芝養命泉石棲真四皓之淸風乃如是哉八遁序三丰先生因朝廷屢詔而假遁以深藏乃浩然曰遁之為用妙矣哉天子不得臣諸侯不得友不謁君公不逢權貴不以長生之術分人主勵精圖治之心自求自用自得自娛望之若白雲之在天而舒卷無定也即之如明月之印水而動蕩難收也或隱㕓市或居山林或雜儔伍之中而人不識大明以來太祖詔之而不得成祖求之而不能是異人歟是高人歟是有得而成飛仙者歟生平所師慕者八人嘗寫為軸而拜之漢則嚴光法真晉則陶濳戴逵唐則盧鴻軒轅集宋則陳希夷林和靖遁之上九曰肥遁無不利其此八公之謂乎嚴子林𨚫光武曰唐堯著德巢父洗耳士固有志毋相迫也順帝徵法高卿不至郭正曰名可得聞身難得見逃名而名隨避名而名追可為百世之師矣安道辭召辟而逃身入吳淵明性恬淡而棄官歸野元宗聘盧浩然欲靡以爵不受終隱嵩山宣宗迎軒轅集於羅浮而問仙道軒轅曰王者屏欲崇德自然安享遐福何必更求長生宋太宗謂諸臣曰華山陳摶獨善其身不干勢利可謂方外士矣宋琪等問修真之道先生曰山野之人於時無用君等協心同德興化致治勤行修煉無出於此林逋結廬孤山終身不出賜號和靖此八公者史鑑嘉之綱目豫之非同捷徑終南移文山北者得遁之義哉今夫能為高隱即是高真方士羽流紛紛躁進自炫金丹謊惑人主究之暫時之迷難逃天鑒之速漢武帝好神仙而李少君入矣乃少翁術盡而首梟藥大方盡而腰斬唐憲宗好神仙而皇甫鎛得志矣乃未幾而宗李皆戮又未幾而柳泌伏誅彼林靈素魏漢津論黃誇白出入禁庭其於宋𡽪宗時亦奚有終身哉甚矣小人好進而中主多愚矣善夫李藩之言曰道盛德充人安國理何憂無堯舜之夀耶善夫張臯謂穆宗曰神慮淡則血氣和嗜欲甚則疾疹作藥以攻疾無疾不可餌也善夫王昭素謂宋太祖曰治世莫若愛民養心莫若寡欲善夫裴燐諫憲宗疏略曰方士難信也世有真仙彼必深濳崖壑惟畏人知凡伺候權門自炫奇伎者皆不軌狥利之人也三丰先生是真隱亦是真遁其立身願效嚴法戴盧陶濳林逋其規針願師軒轅希夷而兼師其高尚但願求我者轉而忘我詔我者轉而遺我則我與八遁後先爭高而為聖朝之大遁也自題朿力封通微顯化真人誥命後跋從古稱真人者必須外達真氣內涵真心入有真操出有真守實之而得夫真道棄世而不戀世避人而不見人不為勢利所羈勒不以黃白欺世主豈若方術之士謬邀錫命而不自怍乎由漢迄宋其間明元機者如吾尊崇之八遁淸風峻節或逃名或卻聘或功成勇退或世衰遁藏其懷真不露奚常以長生藥衒朝廷哉余幼耽元理晚得真詮狂放自如實厭流俗竊以真人真君錫自上帝者為寶人間敕封何足貴哉夫惟天順皇帝亦明亦决廟諱英宗賜我誥命乃受承之至若成化嘉靖之間畨僧劄巴妖僧繼曉封國師禪師方士則鄧常恩李孜省邵元節陶仲文唐秩劉文彬以及羽流數百均係阿比宵小設詭貪奸妄稱法師普號真人泛濫無涯笑罵史册當是時碔砆亂玉魚目混珠决不受此誥也厥後或誅或罷追奪前封殆無遺匿快哉樂哉豈非上帝鄭重朿力典不肯與人間濫豫匪徒而默削其浮名也哉大元遺老三丰道人書與明冰水氷壺道法會同疏伏以大道至大賴太上以傳機精微至精冀全真之演教法非道無以資其本原道非法無以顯其妙用道法兼備體用圓融切念洞春寓明玉家時詭云姓龎名洞春天水雲游江湖散悼彼日月已興大耋之嗟顧我行藏幸遘桑榆之景或棲遲於林壑或𥥆窕於崖溪周孔諸書聊發端於幼稚老聃道德略適意於龎眉霞友雲朋動念漫游方外至人異士垂憐局蹐世間指以元微得朽腐再生之槖籥蹈斯蹊徑見劫刃不隕之卷阿紅鉛黑鉛煆煉方成影響金液玉液坐卧略致疏通雖未臻了道之涯固已騁造元之轍倒拖藜杖入中陽之洞天詢此華封是內江之勝治昨䝉氷壺先生屈身問道投以琅函專志輸忱敷陳楮幣雖初覿高明之面已稔聞淸雅之音六甲風雷頓能藏於符篆三天將吏率已屬於指揮拯難扶危濟人利物公欲將此妙法貽我我能不以元機奉公一本有我幸遇鶴頸魚腮公亦逢犢鼻鼠耳膠漆相投當無離别之理道法同會總結非常之緣翻身桚透玉葫蘆選甚東西南北信手拈來金菡萏常存春夏秋冬仙諾既容光鑑是荷跋道法會同疏後吾游內江諸山聞有天關地軸者意其中必有祕典靈文為養性立命之圭旨及登其天關則三堆山耳又尋其地軸則石筍山耳因慨然曰世之有名無實者固如是乎既聞明先生頗稱好道逮與先生俱則又落落無奇反欲以符咒相授而不知有金丹豈知道也者自人身而有之非旁門之左道也先學靜次學悟次學煉次學養其終乃出入乾坤往來拯救勤立功行以待天符故道可以兼法而法不可以兼道即或用妙術濟人亦惟以心為法以神為符以氣為水斯無投之不靈若徒驅符遣咒擾擾不休若驗若否幻惑人心有識者必將以方士目之他日夜義來逼命繫無常此時用符不效用咒不靈雖素稱為道士道果安在哉故欲學道者只須就道尋道毋以法為道也存神過化斯無道之非法耳跋蓬萊仙奕圖蓬萊仙奕圖者龍陽子湖湘冷謙所作謙武陵人字啓敬龍陽其號也中統初與刑臺劉秉忠仲晦沙門海雲游無書不讀尤邃於易及邵氏經世書天文地理律厯以至衆伎皆通之至元中秉忠入拜太保參預中書省事乃釋業儒從游霅川與故宋司戶參軍趙孟俯子昂于四明史衛王彌遠府覩唐李思訓將軍畫頃然發之胸臆遂效之不月餘其山水人物窠石等無異將軍其筆法傳彩比將軍尤加纎細神品幻出由是以丹靑鳴當時𨽾淮陽遇異人授中黃大丹出示平叔悟真之旨穎然而悟如己作之至正間冷君己百數歲矣其緑髮童顔如方壯不惑之年時值紅巾作亂君避地金陵日以濟人和物為念方藥妙用如神天朝維新君有畫鶴之誣隱壁仙逝則君之墨本絶蹟矣此卷乃至元六年五月五日為余作也吾珍藏若連城之璧而未嘗輕以示人今將訪冷君於十洲三島恐後人不知冷君胸中邱壑三昧之妙不識為真仙異筆混之凡流故識此特奉遺元老太師淇國邱公覽此卷則神淸氣爽飄然意在蓬萊之地幸珍襲之且以為後會云時永樂壬辰孟春三日三丰遁老書卜有三峯印章見皇明異人録按仙奕圖跋即草橋七修類稿强辨為僞其辨云永樂二年轉送淇國淇國乃成祖心腹功臣三峯至而敢匿不言耶又云跋謂冷武陵人而不知本錢塘劉伯溫曾在杭遇啓敬并志亦云錢塘人又云跋謂觀李思訓畫遂得其法幻出神品以丹靑鳴於時何伯溫之詩皆不言之而止言善音律術數耶又云三丰既孑身遠游豈復帶畫永樂時送人耶又云跋曰冷在至正間巳數百歲若在洪武必百數十歲矣如此老尚為人臣耶就使為之如太公伏生人必言之何不見於書耶長乙曰即瑛之五辨皆非也觀此圖跋語淸矯不羣絶似丰仙手筆其送淇國也為留冷之畫本耳當其時必一見而即去難留雲鶴之蹤淇國即不必匿其來成祖亦必知其不可追也一神仙游處無常在錢塘則錢塘人在武陵則武陵人何定之有二劉伯溫雖遇泠仙並非晨夕過從久而不去者即有詩篇安能事事題贈况丹靑薄技當不必一見即誇也三畫非難㩦之物送人乃鄭重之思淇國門高或可寶此不失也四仙家百餘歲乃尋常事耳老為人臣猶之老官柱史復何疑哉與完璞書向䝉鶴駕見訪武當坐榻談心真不知門外有塵寰矣特以愚情無定救世為心雲水茫然如舟不繫足下亦以白嶽久離佩劍歸去昨遇尊師王仲都先生極獎足下才高悟敏為及門之冠並囑愚遇足下須以真詮贈君噫愚何敢為足下師哉但以大器挺生必有羣仙為之輔導以成蓬山第一流也足下英氣絶俗壯志辟人靑蛇在手九州往來特恐有損靜功耳白嶽崇深正好胎養倘能子生胎孫孫復生子則分身應用而立功於人間更不少矣尊聰廣大諒不嫌瀆此意區區難忘規諫足下以愚為老友焉足矣雲水道人張三丰稽首永樂大典記先儒有言讀書者多取不如精取自天子以至士庶其學問同也永樂初朝廷命上書胡廣侍講王洪等編成一書名曰大典計二萬二千八百七十七卷一萬一千九十五本目録六十卷其表文嘗見於蟬精雋中夫御覽元龜不過千卷求多者徒具望洋之嘆而已大典以萬計安能推布夫海內也哉悟真字解噫真何由悟哉世人皆欲悟真而悟之不真非悟也真之不悟非真也今即字義解明之悟者覺也求也真者實也正也夫人知之也豈知悟真二字書義亦深乎悟從吾心先當以修心為本太上云吾從無量劫來觀心得道是也真者何也六書云人受氣以生目最先神之所聚無非實也故從目從匕匕者化也又從兀音浩兀者氣之形也可知欲煉道者須先煉目煉目乃能聚氣煉目並可收心所謂機在目者是也識得此機便見真機識得此機便知息機識得此機便入妙機悟如是真如是也請以告天下之悟真者刀尺賦三丰先生常㩦刀尺以遨遊空乎兩大浩乎十州客有怪者不知其由先生乃為之賦曰是刀也能開混沌斯尺也用潔蓬萊故相隨而不失知造化之剪裁爾其百點明星雙義皎雪繩墨從之鋒芒土石列歹若分修短兮合宜剪水雲兮快絶期妙用之無方豈微能之足述至如裁妙理削塵囂量度數別昏朝火功寸寸風信刁刁胎養刻刻羽衣飄飄度龍門之萬仞如虎劍之兩條夢益州而不願與方丈而同超刀兮刀兮妙之又妙尺兮尺兮要所必要匪歐冶之能鎔匪公輸之能造與我偕行任他嘲笑將求織女之雲綃縫出仙翁之衣帽歌曰一刀一尺遍天涯四海無家郤有家破衲補成雲片片袖中籠住大丹砂玄要篇自序玄素歎人生光陰有限富貴無常若風燈草露存沒倏忽自古及今比比皆然深可驚省以是日夕希慕大道棄功名撇勢利雲游湖海遍訪名師所授雖多總皆旁門小法行於身心無所益也考諸丹經而又不合與道乖違徒勞勤苦性命惶惶不得一遇至人以了生平之願延佑間幸天憐我初入終南得遇火龍先生詢是圖南高弟緣鬢朱顔儼乎物外神仙春秋不知其幾許矣玄素異之禮拜師事跪問大道䝉師慈悲鑑我精誠初指煉已功夫次傳得藥口訣再示火候細微與夫溫養節度脫胎神化了當虛空之旨無不一一備悉真所謂口口相傳心心相授得聞斯道何幸如之又云造斯道者必須法財兩用而後可以有為乃玄素以勤於遊訪兼頗好善傾囊倒篋殆盡安能造斯道哉不覺每日憂形於色師遂怪而問之玄素又揮淚跪告重䝉憐憫授以丹砂點化之術及賜汞見立乾之藥玄素遂出山雙修性命乃拜辭恩師於是和光混俗覓真鉛八兩真汞半斤同入造化爐中煅煉日魂月魄攢簇五行和合四象水火配對金木調停真土凝結交姤溫養轉制分胎三次超脫九轉以周自見黃芽白雪明乾點化妙不可言到此何患無財以了大事特擇善地起蓋茅庵端坐靜室虛心養神安神養氣氣慧神淸方求鼎器暮飲蟠桃酒朝餐玉液波如醉如癡若嬰兒赤子補氣補血丹田溫暖返老還童自覺汞有半斤可待他鉛八兩是數者須候月之明圓其鉛花自然露見下手擒龍捉虎採彼先天一點真鉛吞入腹中能乾我汞徐徐火候烹煎自有斤兩法度既合周天之數又必爻策無差進火退符知復姤慮險防危識卯酉十月功完聖胎顯象九年面壁與道合真跨鶴靑天如大路任他滄海變桑田此大丈夫功成名遂之時也始信有此出世之法雖有拱壁以先駟馬爭如坐進此道皆因廣積陰功纍行方便得遇至人而成也玄素幸荷天庇得以有成雖不敢妄泄真傳亦不敢緘默閉道因是作為修煉內外金丹歌論詩詞編次成録以覺後學名曰玄要篇一曰節要篇其行道之工夫與得道之口訣及成道之旨趣誠無有切於此者矣倘有志之士得遇是書雖不得玄素之親傳又奚異玄素之面授也哉時永樂十一年癸巳歲孟秋月既望日元邋遢道人張玄素三丰自序湖南山中與胡給事夜話汪圓通云胡濙巡訪之九年行次湖南憩騶山中一夕三更人靜茶冷澄淸忽聽有叩門聲俄然扉影自啓見一道者貌似丰翁胡欲狂呌先生急掩其口拂几細談而去此事明一代無有知者昨先生降吾署中言及此事齡乃濡毫記之其言曰老先生巡行天下久矣鼎湖龍既不可見空谷駒又不可得能不虛此遨遊乎今感故人之誼權為雪夜之尋突如其來幸勿驚也夫月滿湖山風淸舍館南寺鐘殘西窗烟冷先生此時亦曾憶天池老衲是閣下前身否子休矣歸去朝端善為我隱見作不見知作不知庶不至車殆馬煩之後重為萬里勞人也北還復命計以明年一路民情敷陳聖聽其亦先生之功德也哉張三丰先生隱鑑書法四條一隱於文章道學嘉遁不出者書曰處士重純儒也一隱於泉石風流樂志不移者書曰逸士重幽貞也一隱於世治時變解官不仕者書曰達士重明哲也一隱於玄門淨土名利不貪者書曰居士重淸修也右隱鑑書法四條實得品題微妙此即一字褒也或謂此四者皆隱士也何必分曰其氣象之道學風流退藏之早遲常變自不同耳非如此分疏不能傳其神致外如高士徵士節士義士皆可於四者統之總評隱鑑筆法篇篇淸古言言簡淡可作隱士小傳讀正不必一一評論也重刋道藏輯要張三丰先生全集漢嘉長乙山人李西月重編張道淵子深氏書閬中朱道生晚成子敬刋姪瑛春城朱瓚素園同校字男璜磻溪隱鑑元無有先生先生大元逸民也行藏莫測或無或有故以為號焉生於元游於明神行於淸六百年來不隨物化厯世既久閲人且多見高尚其志者每樂舉以告人非作隱士傳也蓋與逍遙泉石之士斟酌夫進退幾宜而已先生有言隱之為道也有二隱於衰世者不可更仕興朝隱於興朝者不可藉隱弋名以為仕宦之捷徑夫如是則出處合宜淸高足録也山人野客即所言編輯成卷以為隱鑑一書劉夢吉處士劉夢吉先生因保定容城人也天資頴悟書過目不忘初為經學每閲注疏嘆曰聖人精微當不止此及得周邵程朱之傳乃欣然曰我固謂必有是也平時愛諸葛孔明靜以修身之語表所居曰靜修至元十九年詔徵入朝擢左贊善大夫以母老固辭俸給一無所受他日復詔之終隱不出蕭彝尊處士蕭彝尊先生𣂏奉元人也初出為府史語當道不合即引退力學三十年不干仕進鄉人有暮行遇盜者詭曰我蕭先生也盜驚愕釋去世祖時辟為陜西儒學提舉不赴後纍授集賢直學士攺集賢侍讀學士皆不赴無何復拜太子右諭德扶病至京師入覲東宮書酒誥為獻以朝廷時尚酒也尋又稱病請解職不許俄擢集賢學士國子祭酒依前太子右諭德俱引病力辭而歸其友張思亷聞而嘆曰淸高自守功名不足以動其心蕭子可謂尚志之士矣仇山村逸士仇山村先生遠錢塘人也遁跡江湖博通經史至元中薦為溧陽教諭轉寶慶路教授不赴又攺將仕郎杭州路總管府知事皆辭家錢塘西城下仰屋著書閉門索句或坐花間獨言獨飲嘗聞其閒居十詠真風流自賞之才也今録二首以見先生隱趣詩曰仰屋著書無筆力閉門索句費心機不如花下冥冥坐靜看蜻蜓蛺蝶飛又曰茶甌紗帽慣迎賓不是詩人即道人細雨斜風君莫出緑陰門外有紅塵裘元量達士裘元量先生萬頃淮海人也少存達道志意欲功成名遂然後退藏其身元貞初公卿薦為司直久之有厄閏之嘆遂絶意仕進歸維揚茅屋數椽栽松種竹陶然得幽人趣一日入深崖採藥得千歲黃精蒸而食之遂覺精神强健登高山如履平地云吳伯淸達士吳伯淸先生澄崇仁人也自幼濳心好學著書立言以宏吾道誠當代之大儒仕元為翰林學士泰定初引疾歸家杜門講道屢徵不起其恬退可嘉焉惜其為宋朝鄉貢頗不滿於人口也號草盧先生陳茂叔達士陳茂叔先生櫟休寧人也性剛正孝友致力聖賢之學延祐初中鄉式即不赴禮部教授於家不出戶庭數十年其斯為重道德而輕功名者歟杜伯原處士杜伯原先生本淸江人也博學善文武宗朝嘗被召至京師即求歸隱建寧武夷山中文宗聞其名徵之不起至正間丞相脫脫薦之召為翰林編修使者趣至杭州又稱疾固辭平居沈靜寡欲無疾言遽色與人交篤於道義學者稱淸碧先生戴汝翼處士戴汝翼先生羽九江德安人也隱居積學徵辟皆不就嘗云淡泊明志恬靜致遠此孔明一生學問也因作武侯通傳三卷武伯威處士武伯威先生恪宣德人也好讀周易每日危坐或問先生學以何為本曰以靜為本著水雲集行世張光弼達士張光弼先生昱盧陵人也元末行樞密院判官浙江員外郎竊據者辟之不赴日以詩酒自娛號一笑居士有春日句云一陳東風一陳寒芭蕉長過石欄杆只消幾度瞢騰醉看得春光到牡丹蓋料士誠之必敗也嘗云吾死後埋骨西湖題曰詩人張光弼墓足矣後竟如其言吳淵頴處士吳淵頴先生萊金華人也隱居不仕築室於深裊音嫋山中妍窮經史悠然自得善論文嘗云作文如用兵有正有竒正者法度如步武分明奇者不為法度所縛千變萬化坐作擊刺一時俱起及其欲止部武各還其隊原不曾亂聞者服之其同鄉黃縉卿柳道傳輩亦以文章鳴世咸深重焉許白雲處士許白雲先生謙金華人也自少力學受業於宋末金仁山之門居數年而盡得其奧屏跡入華山中濳心養志不求聞達朝野交薦力辭不起是誠安於義命而非僞隱沽名以為仕宦之捷徑者也其教人以開明心術變化氣質為先而獨不教人以科舉之文曰此義利所由分也王原吉達士王原吉先生逢江陰人也至正間屢徵不赴避亂於上海之烏涇築草堂以居自號最間園丁世所謂席帽山人者也陶宗儀逸士陶宗儀先生宗天台人也元統間避難於松江城南之吉林里雅好著述雖力耕畎畝恆以筆硯自隨置一甕樹下遇有所得即書以投其中久之成帙曰南村輟耕録至正間屢辭辟舉洪武六年舉人才至京力辭放歸蔡淸真逸士蔡淸真先生微瓊山人也通經史好泉石元末隱居不仕築室深山問學者咸斗酒豚肩以就之先生無不解說人謂海南儒者未能或之先也顧仲瑛逸士顧仲瑛名德輝崑山人也才情妙麗輕財結客築別業於茜涇之西造三十六亭館曰玉山佳處招致四方文學之士置酒賦詩其中以母喪歸綽溪張士誠辟之遂削髮廬墓自號金粟道人明初聞太祖嚴苛欲按江南富族乃托僧伽而遁所著有玉山璞稿並刻交游詩四十餘家曰草堂雅集俱傳於世李高岡逸士李高岡名鳴鳳吳人也輕財好客與顧仲瑛相等東南士大夫咸欽重之嘗助朱太祖軍糧二萬斛淡然無邀寵意入明初以國法嚴刻遂約嘉定富民方二郎同挈妻子家資泛舟江海而去楊廉夫達士楊廉夫先生維禎山陰人也前泰定進士署天台尹後徙居於松築元圃蓬臺於松江之上海內薦紳大夫與東南才俊之士無不承蓋扶輪造門納屨嘗吹鐵笛作梅花弄見者以為神仙中人世稱鐵崖先生著正統辨讀者皆以為公論云王山農逸士王山農先生冕元末會稽人也身長多髯少明經不偶即焚書讀古兵法戴高帽披緑蓑著長齒屐擊木劍行歌於市人以為狂士之負材氣者爭與之游平生嗜畫梅畫成必自賞也明太祖聞而訪之既至與糲飯蔬羹山農且談且食帝喜曰可與共大事授咨議參軍不受一夕夢羅浮仙人招之醒即捉筆狂呌寫大梅一株題以詩曰我家洗硯池頭樹箇箇花開淡墨痕不要人誇好顔色只留淸氣滿乾坤明日遂卒同時蒲菴和尚復見心見而稱之曰會稽王冕梅花仙也明天淵達士明天淵先生濬北人也世祖朝明安之後髯長過腹高雅不羣仕元為學士國亡削髮為僧而髯如故洪武初大祖聞其名召而問之曰汝不仕吾吾亦任汝但削髮留鬚亦有說乎對曰削髮除煩惱留鬚表丈夫帝笑而遣之所著有蒲菴集行世蓋忠於元而得道者也張伯雨逸士張伯雨先生天雨杭人也宋文忠公九成之裔風神凝峻詞翰兼長與楊載虞集為文字交後入茅山學道遇陳上陽傳以淸修冲然有得自號句曲外史虞伯生達士虞伯生先生集臨川人也生有神慧三歲即知讀書長負才名官奎章閣學士即引疾歸平時慕陶淵明邵堯夫因構書室二間左室書陶詩於壁曰陶菴右室書邵詩於壁曰邵菴恬然淡然謳吟自適時人稱二菴先生一曰邵菴趙子常達士趙子常先生汸休寧人也元末輔元帥汪同起兵保鄉井授江南行樞密院都事洪武二年詔修元史史成不願仕隱居東山與一二幽人卜築淸溪繫舟沙嶼蕭然無塵俗氣其經學甚傳於世號東山隱者汪德輔達士汪德輔先生克寬祁門人也元季隱居環谷洪武初召修元史書成固辭不仕隱居道人巖研窮經學其教授弟子一以靜心為本謝子蘭逸士謝子蘭先生應芳元末武進人也自號龜巢老人龜巢有二一在滆上一在橫山先後皆有記其略云千歲之龜巢於蓮葉以葉為巢初不費經營之力也暇與田夫野老涉桑苧之園過桃李之蹊瓦盆濁酒歌舞酬酢若曵尾泥塗者又云平生所至以龜巢名室蓋不以棟宇為巢而以天地為巢也峻宇雕牆莫知其光蓽門圭竇莫知其陋誦其文可以知其達也老人嘗士元元亡不仕其啓張雲門啓云鮎上竹竿往歲之功名可笑龜巢蓮葉近年之身世如浮以視豫山小園超然遠矣沈元吉逸士沈元吉先生貞長興人也元末隱居橫玉山自號茶山老人明初不仕與黃石為徒白雲為侣始終不出以比招之即來麾之即去者其人品相越何如矣徐仲由達士徐仲由先生畛淳安人也元末舉秀才明初不仕自號松巢居士倚聲度曲不讓古人嘗見其滿庭芳句云淸霜籬落紅葉林邱淵明彭澤辭官後不事王侯其高蹈之節直從笛孔中度出黃子運處士黃子運先生樞元末休寧人也洪武初被徵以躄足免鄉人呼妙拐先生同時有呂不用字則耕者新昌人也洪武二年舉本學教諭以聾病辭自號石鼓山聾二公皆傲世不羈得山林秀傑氣者張惟中處士張惟中先生庸慈溪人也元末兵亂竊據者署為上虞山長不就明初屢聘不出遁跡溪山浩歌白石閒與當代士大夫詩酒往還及勸以入官則婉辭謝之人謂其貞不絶俗隱不違親郭林宗一流人也王仲光逸士王仲光先生賓長洲人也與吳縣韓奕崑山王履稱吳中三高幽懷蕭散放櫂𤎆江嘗與公望聯吟有也知性僻難趨俗𨚫喜身間不屬人之句觀此可以想見其異苔同岑也陳克昌逸士陳克昌先生周閩縣人也元末布衣隱居石潭嘗倚竹作歌以寫其志歌曰修竹兮靑靑內虛兮外直素節兮貞姿寒暑兮一色冷冷兮朝夕豫舍之兮焉適一梁不移逸士梁不移先生蘭泰和人也自號畦樂先生鄒仲熙謂其隱居樂道王希範稱其養志邱園吾見其西畦自適悠然有陶濳之趣矌然有魏野之思程搏霄處士程搏霄先生翔元末新安人也明道之後世傳理學洪武初命旁求隱士或薦先生不起二年春又訪山林遺老共修元史或再以先生舉終不赴後詔儒臣修禮書宋濓曰非搏霄不能也奏之帝不欲强致命就其家咨訪有勸之仕者笑而不答但曰人爵不如天爵貴功名何似道名高自此深藏不出朝廷比之商山徐方舟逸士徐方舟先生舫元末桐廬人也性好詩詞築室於江臯之上水竹雲烟助其吟嘯時劉伯溫被徵邀之同行舫荷蓑笠相見酌酒賦詩而別韓公望處士韓公望先生奕吳人也生於元至順時及長嗜讀書無所不覽少有目眚筮卦得䝉知疾不可療遂扁其室曰䝉齊洪武間絶意仕進郡守姚善迫欲見之奕乃泛舟入太湖往來烟波自適姚嘆曰韓先生所謂名可聞身不可見者也明焦始謨達士焦始謨謀江陰人也與明太祖為舊交及帝都南京曰思其人屢詔不赴將命使臣索之謀忽荷雞豚村酒由御道入帝喜其來以物付光祿治具其飲甚歡席前出金銀角三帶命其自取以官之謀取其角者因授以千戶無何徑出高橋門挂冠帶於樹間而去孫太初逸士孫太初先生一元明初人也風神秀朗踪跡奇幻元巾白夾以鐵笛鶴瓢自隨高風所至士大夫皆為之傾動嘗棲太白之巔稱太白山人又嘗西入華南入衡東登泰北登醫吾南尋吳會恆棲遲不去與劉麟龍寬陸崑吳玹號苕溪五隱王廷圭逸士王廷圭先生珙明初常熟人也卜宅於虞山之北蕭溪之上植竹萬竿容與其中其逸興淸凉詩懷縹眇人謂如秋月春雲令人景仰王先生達士王先生者以忠節隱其名永樂初寓居金華府東陽縣之東山自號大呆子儀容俊偉趣識超羣惟披麻戴笠不服常服日盤桓於山南村落之間狂歌自適其與宴游者皆不識其姓氏惟與王姓俱則以宗兄稱之遂以王先生呼焉嘗與村中人曰他曰吾逝只祈斂吾尸懸於林杪足矣時又號玉華山樵張三丰聞而嘆曰此建文遺臣也徐延之逸士徐延之先生伯齡自號籜冠子錢塘人也天資敏妙書過目不忘特性情䟱蕩不拘小節對客每赤足科頭內衣無繫帶行輒委墮人多笑之士大夫慕名而來者一見後即倦與往還然其鴻才高致終不可沒也性甘肥遁尤善鼓琴所著有大音正譜醉桃佳趣香臺集蟫精雋舊雨堂稿非外野而內文者歟王原夫處士王原夫先生逢饒州樂平人也淹貫經史研精理學朝廷屢召不赴深居崖谷冲和淡然宣德初復以明經召見力辭歸家著言行志諸書學者稱松塢先生俞古章逸士俞古章先生杭之富陽人也肥遁邱園名聞湖海宦游於浙者皆欲得賭其眉宇為快正統間藩臬諸公先後封章薦舉不起親友間有勸之者則為聾病謝之閒游山澤或對木石而談如瘋顚狀人卒莫之信也一日吳和州又欲薦之先生乃以詩力辭焉詩云靑雲有路念綈袍迢遞和州薦剡勞下乘難隨千里馬虛名恐誤九方臯稽康自信隨時懶少室誰云索價高縱使陽和動鄒律秋風雙鬢已蕭騷徐勉仁處士徐勉仁先生恕寧波人也正統間以古文鳴世甬東好文者皆就其門而學焉先生居山澤間凡求名之士雖是舊友皆弗與流連少年中有慕隱者則獎許之曰緑鬢靑山正堪掩映顔閔伊周各行其是而己後屢有國召皆不應移家於杭竟著書以終其身許淡初居士許淡初先生魏溪叟也正統間叟年九十忽然棄家學道不知所之其同庚有石內含者桐城人居郭北石塘享年一百有三子衆孫繁百歲之曰賦詩憶淡初云庚申共守人何處甲午同生獨詠詩蓋亦明之籛鏗也沈啓南逸士沈啓南先生周長洲人也景泰中以賢良應詔力辭不赴號石田翁詩文之外益工畫石高古淸奇筆墨與人品相肖方元素逸士方元素先生太古蘭溪人也自號寒溪子淸矌夷猶超然出類或問先生何事答曰萬卷圖書銷日月一灣鷗鷺共朝昏程叔朋逸士程叔朋先生玄輔歙縣人也歌嘯林泉不求聞達同邑知李獻吉而不知有叔朋欣如也自號龍谷道人秦仲孚逸士秦仲孚先生奭無錫人也性至孝其父修敬公偶中心痛仲孚刺胸前血和酒飲之母氏殷偶有膝傷吮之即愈郡縣上其事詔旌其門曰孝子泰陵即阼賜以冠帶嘗作溪山淸興堂淸遠閣結亭於後曰滌煩溪橋散步詩可為仲孚行照其詩云掃閣觀書興未闌緑陰淸畫更多間杖藜扶我溪橋步看盡湖南十里山董蘿石蘿石董先生澐海寧人也以能詩聞江湖年六十遊會稽見陽明與之語連日夜乃請為弟子陽明不許澐歸織一縑為贄曰澐之誠積若此縷矣因納拜從遊其子弟招之曰何老而自苦若此曰吾從吾之所好耳因號從吾道人吳康齊處士吳康齊先生與弼崇仁人也游京師從楊溥學見伊洛淵源輒有尚友之志以聖賢為必可師收斂身心倡明理學天順二年詔徵至文華殿授左春坊左諭德不拜帝欲强職之凡三辭焉遂稱疾歸閉門講學從者千數百人號康齊居士婁克貞處士婁克貞先生諒上饒人也少與吳康齊游其學以收放心為居敬之門以何慮何思勿忘勿目力為居敬要旨王陽明嘗受業焉號一齊先生陳白沙達士陳白沙先生獻章廣東新會人也中鄉舉即屏居不出聞江西吳康齊講學臨川遂棄其學而學焉教人不立語言文字以主靜為先隨處體認天理緊要在勿忘勿助又曰學者以自然為宗以忘已為大以無欲為至布政使彭韶總督朱英聞其名交章薦剡乞以禮徵聘吏部尚書某謂獻章例應聽選非隱士比安用聘召至京令就試吏部獻章稱疾不赴乞歸奉母乃授檢討自後屢召不起薛敬軒達士薛敬軒先生瑄字德溫山西河津人也登進士第官禮部侍郎天順間在閣數月見石亨等用事嘆曰君子見幾而作不俟終曰遂致仕歸隱居龍門山中其學以復性為主充養邃密言動皆可法著讀書録二十卷學者宗之張海觀逸士張海觀先生錫錢塘人也天順壬午領鄉薦春闈不偶授山陰教諭旋即引退林泉家有竹數竿作亭其內名曰醫俗並自為記以贊之其略云余退間之志既不可醫乃挂冠神武門幾二十示翼既而作老圃於家種篔簹數百箇皆著鞭持節因作小亭於其間為柱六覆以茅取窮朴之意坐於是亭則淸聲戞玉醫耳之繁囂幽香細細醫鼻之銅臭桐葉如翠醫目之塵氛筍供茶饌醫口之貪叨虛心徑節又可以醫夫自滿而失守者因取披老詩名之曰醫俗亭噫世有高梁畫棟而主人則俗者何不一過此亭哉金元玉逸士金元玉先生琮上元人也嘗游浙之赤城山徊徘不忍去因自號赤城山農居嘗遐嘯淸視人莫能窺處己接物高簡粹白與史癡翁同稱金陸二隱癡翁名忠性豪爽不事權貴自號癡翁署所居樓曰卧癡唐伯虎達士唐伯虎先生寅吳人也舉南畿解元以𡨚錮遂放浪形跡然其出入天人間宸濠慕而聘之寅度濠有反志佯狂自免奇趣溢發或寄於詩或托於畫文采風流照耀江左圖其石曰江南第一風流才子晚皈依佛乘自號六如居士羅達夫達士羅達夫先生洪先吉水人也以進士第一官贊善疏請預定東宫廟儀忤旨落職歸屏居不出闢石洞隱居其中製半榻默坐三年事能前知嘗曰不可以虛見為得手須日日收斂不使後天習氣乘機濳發始不負一生耳趙淮獻逸士趙淮獻先生金烏程布衣也正德時徵詔不起造其門者如入深崖邃壑恆坐小脡出入江湖陶然自樂南垣箬溪二尚書結峴山會造盧請入社不許平生頤養淸靜安恬年九十自為祭挽無疾而逝沈子登逸士沈子登先生仕杭州人明刑部侍郎鋭之子也身居貴介志慕淸真野服山中劃然長嘯自號靑門山人舉此以勵世族之戀浮華者陳奇委逸士陳奇委先生體文江陰人也築耕舍於郊西有田數十畝力耕而食賓至必為治酒酒酣即賦詩詩有云得魚便沽酒有酒且留人如此即為樂何須復苦貧無魚亦無酒宜主不宜賓如此即高卧何愁不及晨可謂達人之言矣同時有五嶽十嶽諸山人者率皆以韋布效薦紳氣最為可鄙𤱶畝中有此庶幾率真顧英玉達士顧英玉先生瑮上元人也仕至副使即歸隱白下或謂其致仕太早何以退養淸廉曰若使宦囊有物正非所以養淸廉也坐卧一小樓匾曰寒松嘗訓䝉以自給霍渭崖宗伯欲以廢寺田百畝資之拒不納其固窮若此朱君佐達士朱君佐先生諫溫州樂淸人也仕至副使即謝政歸結廬雁蕩山翛然有塵外之致或有勸其出山者曰豈以五斗易我五珍五珍謂龍湫茶奇音竹金星草山藥官香魚也五者皆雁山所産徐先生達士徐先生昌閩之崇安人也濳心理學以明經訓導莆田親喪回籍服闋不起或勸之再仕昌泣曰吾為升斗祿冀養親也今親不逮養奚仕為遂築室武夷山中深藏不出來矣鮮達士來瞿塘先生知德字矣鮮蜀之梁山人也幼有至行嘉靖時舉於鄉歸養不出其學以致知為本敦倫為要有司疏薦授翰林院待詔不赴生平著述甚宏惟易注獨殫心力先讀易於釜山草堂六年不能窺其門徑乃遠客萬縣瞿塘深山之中沈濳反覆忘食忘寢久之豁然有悟積二十九年而後成書以後觀天地察造化與物無觸悠然自得而已羅𢿋菴處士羅𢿋菴先生名欽順字允升江西太和人朝廷屢詔不起嘉靖中復徵為吏部尚書亦固辭是時璁蕚用事𢿋菴岩居杜門濳心格致之學嘗云立身行以必先打破義利關頭否則擾擾到底所著有困知紀謝子佩達士謝子佩先生廷富順人也嘉靖進士官浙江簽事遂歸養不出萬厯初巡撫曾省吾奏廷隱居三十年著書樂道宜加京秩風勵山林詔即家贈太僕少卿時人稱為山中太僕陸子傳達士陸子傳先生師道長洲人也登嘉靖進士甫仕儀部即告歸養時年未三十也杜門郤掃三十餘年手抄典籍數千卷風流儒雅為世所宗而其淸高好道尤人不能李印南逸士李印南先生應箕字子騎黃岡麻城人也萬厯間世尚苛條遂為老圃不出時兩廣賦稅頻加南北之民多有如菜色者卯南作老圃吟曰吁嗟圃兮吾與爾猶存吁嗟蟲兮毋嚙我菜根肉麋肉麋此上人之所食而非野人之所宜聞者咸太息焉嘗於鋤下掘一龍神像朝夕䖍奉忽夢有金甲碧面者與語片時以後决未來事效應如響一日謂其弟與子曰今蜀三大冦己平矣賢者避世其次避地乃背其神往遁跡川中虞長儒達士虞長儒先生淳熙錢塘人也萬厯進士仕吏部主事解官歸得葛嶺栖霞之勝衝煙躡尸技終日陶然黃寓庸傳之曰以儒為行以玄為功以禪為歸以山水為寄托以詞翰為游戲誠足囊括平生矣安我素達士安我素先生希範無錫人也仕吏部主事以昌言罷官歸杜門不出出則乘一舫圖陶元亮張季鷹蘇端明米南宫諸名賢於倚窗為煙水伴恣其所之樂而忘返姚公綬達士姚公綬先生綬嘉善人也由御史出知永寧府解官歸作滄江虹月之舟往來吳越間望之者宛若神仙中人家設亭館名曰丹邱人稱為丹邱先生周叔大處士周叔大先生奕滇之金齒人也幼而奇嶷長益凝重其學問一以知止為歸力耕養母不攖勢利嘗遇一丹士欲以術授之奕曰多金何為內丹何如寡欲外丹何如節用子休矣我儒門道士其取精用宏也久矣陸嗣端達士陸嗣端先生澄原平湖人也天啓乙丑進士厯官員外郎以不附東林被察間住其封事略云臣甘寡援孤立為硜硜之小人决不依草附木為疑似之君子由是見嫉東林排之甚力一官罷去長嘯而歸蓋古狂狷之流也每見溪上人家小橋流水恆徘徊久之而不能去聞隱鱗逸士聞隱鱗先生龍鄞縣人也寄懷高遠托跡衡茅每當風來竹外雲冷松根輒遂其蕭野之趣或稱其詩如溪上人家曲几疏窗長與水雲弄色吾謂其性情亦然陳仲醇逸士陳仲醇先生繼儒號眉公華亭人也年甫壯即棄名習隱結廬於小崑山之陽買舟載書稱無名釣徒每當草蓑月冷鐵笛霜淸覺張志和陸天隨去人未達殷方叔逸士方叔殷先生仲春秀水人也躬耕永樂之南村怡然自樂陳仲醇所謂郤羡白頭殷處士鵓鴣聲裏獨耕田者也葭墻茅屋不蔽風雨慕王績為人亦自號東臯子農事之間以醫為業得錢入市買斷簡殘書讀之朱白民逸士朱白民先生鷺吳人也負奇氣嘗獨游黃山遠尋嵩華宗貞初騎驢入都欲上賦頌不果歸結廬於郡西之華山蓮子峯下躬親井臼不願見豪貴時與王芥菴趙凡夫稱吳下三高而白民為最李因仲達士李因仲先生天植平湖人也崇貞癸酉舉人晚更名確字濳夫隱居龍湫山中萬松臺畔茅屋一間人稱其高蹈遠引詩含淸江碧嶂之音謝彚先達士謝彚先先生遴宜興人也崇貞癸酉舉人晦跡衡門種菜一畦不入州府陳其年寄懷詩云半畝牛宫繞菜田鋤畦汲水獨悠然芒鞋一緉千金值不踏城中又十年陸茂璩居士陸茂璩先生連一作璉吳縣人也兩中武科甲申後削髮為僧居蓮子峯下藤蘿𥥆窕結榻崖中萬峯當戶一澗繞門自號了緣道人有楓江遺稿黎左岩達士黎左岩先生元寬南昌人也登崇貞進士厯浙江提學副使以忤溫體仁罷歸搆草廬於谷鹿洲與生徒講學淡然自守順治初有薦之者以母老固辭終身不出方密之達士方密之先生以智桐城人也登崇貞進士官檢討負海內名明亡削髮改名宏智字無可號藥地和尚遍游名山不返所著有周易圖烹雪録浮山全集劉念庭達士劉念庭先生伯淵慈溪人也由進士官至按察副使引疾致仕年百有餘歲先生自隆慶五年釋褐萬厯十六年歸家至崇貞十一年春秋已八十矣時危國變隱者猶存八秩自嘲詩足見其志詩云謂我歸田早假令不早有何好幾人欲歸不得歸黃犬東門添懊惱聞者高之厥後更名托空子遁入深山不見張昊東達士張昊東先生若羲華亭人也崇貞癸未進士甲申以後濳身村野躬自灌園故友訪之則荷鋤戴笠相揖於紫爪白莧之間破屋數椽淡如也或自稱為寒松子魏叔子逸士魏叔子禧江西寧都人也明末諸生與弟禮結廬於金華之翠微峯偕隱不出公卿聞其名皆願見之弗往禮字季子遍游海內名山與叔子同居翠微常有雙鶴來伴云劉欽爾達士劉欽爾先生永鍚大名魏縣人也舉崇貞孝廉授長洲教諭明亡隱於陽澄湖巡撫欲薦之以疾固辭家貧衣食或不給處之泰然常自操舟鼓枻出至中流作歌歌竟而返望夕陽在山獨婆娑於烟樹之下夏元貞達士夏元貞先生道大名人也舉崇貞孝亷即絶意仕進明亡率婦子入山耕績自食或操斤作紡車以鬻人愛其堅緻咸爭購之短衣行歌聲振林木間為詩文脫稿即棄去諸子讀書只令識字記數長則牧牛負薪溷其跡於烟霞焉林明俊達士林位㫋先生明俊平都人也慷慨有志少時即能為詩古文詞崇楨甲申蜀陷閣部王應熊承旨討賊膺薦舉第一人授兵部職方司主事明亡不出順治間題授副使稱病不仕後舉博學鴻詞亦不赴結廬皿心桐陰曠然自適隱居三十餘年嘗在平都請乩余偶臨其筆贈以鐵肝石膽四字所著有淡遠堂文集巴字園詩集梧桐居近集存世淸黃太冲處士黃太冲先生宗羲餘姚人也受業於明儒劉念臺之門研究先賢之學以是從游者日衆康熙十八年都御史徐元文特薦於朝太冲以疾辭齊心危坐力掃外緣其著述上下千古穿穴羣言自天官地志三教九流之書無不精研學者稱梨洲先生仇知幾達士仇知幾先生兆鰲字滄柱鄞人也少從黃宗羲講切性命之學為諸生有盛名官吏部右侍郎即引疾歸與會稽陶存存研窮修養祕旨久之松顔鶴貌照耀山林蓋浩然有得者也所著四書說約杜詩詳解及黃老參悟諸書行世陶存存遺士陶存存先生素耜元名式王會稽人也少遊越水吳山燕臺金闕其才華益盛登康熙進士即退處山陰往來霍僮洞天遇方外至人傳以修養祕法遂焚時藝之文作道言五種集注及丹家雜義以招後學仇知幾稱其笑傲林泉樂天達命洵知言也自號淸淨心居士又曰通微道人顔欽明達士顔先生欽明戎盧人也康熙丙午舉於鄉研窮經史之學吳三桂據蜀時士大夫多為迫脅欽明獨抗節不出蜀平結屋於玉蟾山下終身不跡城市沈越溪逸士沈越溪先生巨儒萬縣人也寄懷高尚肥遁山中自號西溪野人四川總制李培之知其夙學勸之仕不應闢堂數椽曰以冷笑為樂望眉宇者咸目為巢父許由程伍喬達士程伍喬先生夢星江都人也登康熙進士官編修以丁艱歸遂終身不出蓋淡於熒火大利者也築篠園並漪南别業謳吟偃仰於其中每當竹搖翠雨雲度湖陰便與幽人佳客烹茶啖餅即景言詩望之者不啻有孤雲野鶴之象張幻花達士張奕山先生梁婁縣人也登康熙進士即退隱西溪築葆間堂十景備水竹花藥之勝奕山善鼓琴遇山水深處及風月佳時安絃動操仙馭為之停空子姪皆顯貴或勸之出山淸要可立致笑不答也心空及第專務禪修自號幻花道人金夀門逸士金夀門先生農錢塘布衣也天懷冷峭不與時趨歲晚務門夕得人忙我暇之趣嘗於臘月杪出其家釀要諸鄰翁談笑泛論古今逸民真高士也中年作汗漫游遍走齊魯燕趙秦晉楚閩而歸嘗願如邋遢道人日行千里又願如玉溪生打鐘掃地作淸涼山行者乾隆間寄跡楊州隱於書畫之間李客山逸士李客山先生果長洲布衣也讀書味道隱於南岡忍饑誦經衡門兩板時或樵薪不繼怡然也嘗云富貴可樂不如神仙朝市可住不如林泉乾隆間巡撫雅公聞其名訪之避而不見真吳中高士也趙鷗白達士趙鷗白先生翼一號甌北字雲松陽湖人也乾隆二十六年探花及第官貴西道以母老乞養遂不復出鷗白休官既早游屐亦寬嘗游天台雁蕩武夷諸峯灑然有挾仙遨遊之想過貴州福泉山徘徊於禮斗亭中録打坐歌去晚年飯後行逍遙法遂得年登大耋管領林塘者凡數十年殷果園逸士殷果園先生如梅元和人也安貧樂道幽節自貞人或訪之則見曲水一灣衡門兩版在橫橋疏柳間簞瓢屢空自如也嘗題一聯云林卧真堪忘歲月心間應不愧神仙余神遊見之直評其為逸士吳竹橋達士吳竹橋先生蔚光昭文人也登乾隆進士官禮部主事初入詞館即改儀曹渴慕烟山復辭華膴向禽之志切箕頴之淸深矣嘯傲湖山覃研文史搜奇碑版跌宕琴樽人皆羡其風流吾獨重其高隱羅雨峯逸士羅雨峯先生聘歙縣布衣也後寄几於楊州嘗受業於夀門筆有奇情喜畫鬼物凡有所遇皆寫長卷記之成鬼趣圖余神遊雨峯之齊鬼皆起拜真奇事也既能畫更能詩喜遊山水更好禪宗嘗作起信録釋禪淨兩家之惑翁淡生逸士翁淡生先生春華亭布衣也性情淸曠詩筆蕭間許用晦羅昭諫猶不逮也其友人序其集云嗜恬淡甘寂寞菽水奉母耕讀教弟四十不娶亦不就有司試為詩如朱絃疏越一唱三嘆八句盡淡生矣翁游揚州題壁有二分月影關山夢一流濤聲今古愁之句余適化老道間遊礙愁夢二字非逸士所言為攺夢為共愁為流取共此一輪月滄江流不息之義翁重過見之𢙀然下拜曰吾詩者非仙筆不能也徐洄溪逸士徐洄溪先生大椿吳江布衣也性好湖山不慕榮利平時以淸淨為宗闢草堂於太湖之濱門前七十二峯靑入座間注陰符經解及道德句解燦然可觀自營藏脫居題一聯云滿山靈草仙人藥一徑松風處士墳余神遊見之
