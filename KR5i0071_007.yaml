body:
  text: 漢嘉長乙山人李西月重編張道淵子深氏書閬中朱道生晚成子校刊姪瑛春城朱瓚素園同校字男璜磻溪大道論上篇夫道者統生天生地生人生物而名含陰陽動靜之機具造化玄微之理統無極生太極無極為無名無名者天地之始太極為有名有名者萬物之母因無名而有名則天生地生人生物生矣今專以人生言之父母未生以前一片太虛托諸於穆此無極時也無極為陰靜陰靜陽亦靜也父母施生之始一片靈氣投入胎中此太極時也太極為陽動陽動陰亦動也自是而陰陽相推剛柔相摩八卦相蕩則乾道成男坤道成女矣故男女交媾之初男精女血混成一物此即是人身之本也嗣後而父精藏於腎母血藏於心心腎脈連隨母呼吸十月形全脫離母腹斯時也性渾於無識又以無極伏其神命資於有生復以太極育其氣氣脈靜而內藴元神則曰真性神思靜而中長元氣則曰真命渾渾淪淪孩子之體正所謂天性天命也人能率此天性以復其天命此即可謂之道又何修道之不可成道哉奈何靈明日著知覺日深血氣滋養歲漸長歲則七情六欲萬緒千端晝夜無休息矣心久動而神漸疲精多耗而氣益憊生老迫而病死之患成並且無所滋補則瘵病頻生而欲長有其身難矣觀此生死之道人以為常誠為可惜然其疾病臨身亦有求醫調治望起沉疴圖延歲月者此時即有求生之心又何益乎豫觀惡死之常情即覓長生之妙術辛苦數年得聞仙道仙道者長生之道也而世人多以異端目之夫黃老所傳亦正心修身治國平天下之理也而何詫為異端哉人能修正身心則真精真神聚其中大才大德出其中聖經曰安而后能慮富哉言乎吾嘗論之矣有如子房公之安居下邳而後能用漢報韓諸葛君之安臥南陽而後能輔蜀伐魏李鄴侯之安養衡山而後能興唐滅虜他若葛稚川之令勾漏趙淸源之剌嘉州許真君之治旌陽是皆道成住世出仕安民者彼其心不皆有君父仁義之心哉孔子鄙隱怪孟子拒楊墨隱也者乃讖緯說封禪書之類怪也者乃微生高陳仲子之類仙家不然也長春朝對皆仁民愛物之言希夷歸山懷耿介淸高之致何隱怪之有哉楊子為我墨子薄親仙家不爾也三千功行濟人利世為先資二十四孝吳猛丁蘭皆仙客又何楊墨之可同哉孔曰求志孟曰尚志問為何志曰仁義而已矣仁屬木木中藏火大抵是化育光明之用乃曰仁義屬金金中生水大抵是裁制流通之用乃曰義仙家汞鉛即仁義之種子也金木交併水火交養故嘗隱居求志高尚其志而后汞鉛生丹道凝志包仁義汞鉛而兼金木水火之四象求之尚之者誠意為之意土合而五行全大道之事備矣故孔孟當日只闢隱怪楊墨而未聞攘斥佛老唐宋以來乃有韓朱二賢力闢二氏諸大儒和之羣小儒拾其唾餘以求附尾究竟闢著何處反令世尊含笑太上長嘆小儒輩不過徒吹濫竽未必有韓朱之識見也何言之韓朱之闢二氏者闢其非佛非老之流非闢真學佛老者也不然昌黎詩集往來贈答又何以極多二氏之人如送張道士有詩送大顚有詩送惠師靈師皆有詩或以為借人發議故於惠師云吾疾遊惰者憐子愚且淳於靈師亦云方將斂之道且欲冠其顚似譏之矣然何以於張道士盡無貶詞於大顚師全無誚語蓋此二師者乃真仙真佛之徒張仙以尚書不用而歸真顚佛以聰明般若而通禪雖昌黎亦不能下手排之肆口毁之也且其家又生韓湘仙伯雪擁藍關蓋己知遠來者之非凡人也朱子少年亦嘗出入二氏蓋因不得其門而入為二氏之匪徒所迷故疑其虛無荒誕空寂渺茫回頭抵牾耳逮其晚年學博則又愛讀參同契並云參同之書本不為明易蓋借此以寓其進退行持之候耳更與人書云近者道間不挾他書始得熟玩參同是更津津然以仙道為有味也然則韓朱二賢特闢其非佛非老之流非闢真學佛老者也否則前後一身自相矛盾則二賢亦可笑也豫也不才竊嘗學覽百家理綜三教並知三教之同此一道也儒離此道不成儒佛離此道不成佛仙離此道不成仙而仙家特稱為道門是更以道自任也復何言哉平充論之曰儒也者行道濟時者也佛也者悟道覺世者也仙也者藏道度人者也各講各的妙處合講合的好處何必口舌是非哉夫道者無非窮理盡性以至於命而已矣孔子隱諸罕言仙家暢言之喻言之字樣多而道義微故人不知耳人由天地而育亦由父母而生順而用之則鼻祖耳孫嗣續而成逆而用之則真仙上聖亦接踵而出同其理也悟真篇云修身之事不拘男女此金丹大藥雖愚昧野人得之立登仙位不拘貴賤賢愚老衰少壯只要素行陰德仁慈悲憫忠孝信誠全於人道仙道自然不遠也又須洞曉陰陽深參造化察其真僞得陰陽之正氣覓鉛汞之真宗方能換骨長生居不夜之天玩長春之景與天地同久日月同明此正大丈夫分內事也至於旁門邪徑御女採陰服煉三黃燒餌八石是旁門無功也又有以按摩導引吐納呵噓修服藥草為養生之方者雖能暫去其疾難逃老衰命盡而被達人恥笑也伯端翁云閉息一法若能忘機絶念亦可入定出神奈何精氣神屬陰宅舍難固不免有遷徙之苦更有進氣補血名為抽添接命之術者亦能避疾延年保身健體若欲服食養就胎仙必不能也其他旁門邪徑乃實為吾道之異端也何足道或者謂人之生死皆有數定豈有違天數而逃死者獨不思福自我求命自我造陰騭可以延年學長生者只要以陰功為體金丹為用則天數亦可逃也伏維我太上道祖列聖高真施好生之心廣度人之願宏開玄教祕授仙方名曰金丹原始要終因此盡露天機大泄元奧其中行持妙用三候三關九琴九劍藥材法器火候符章悉己敷衍全備各宜詳究諸經以還其性命之本豫論雖俗義理最美所謂真實不虛也倘得者無所猜疑庶可以行持下手雖不遇明師好友得遇此書即如師友在前自能頓悟無上也較諸行世丹經悉合一理罔不洞徹實屬苦海之慈航指迷之智燭雖曰行之惟艱然勿畏難而苟安也再有進針者身抱金丹之後即宜高隱洞天深藏福地勿以黃白賣弄朝廷為方士之先導隱顯度世以待天符白日飛升不露圭角此方為無上上品真人厯萬劫而不壞者也後來同志玩之鑑之長篇巨觀首探大道之源而講生人之理與人生老病之故引彼回頭向道修正治平如古來英雄神仙身名兩樹忠孝兩全非同楊墨隱怪使人知此道亦儒道也養汞培鉛無異乎居仁由義韓朱闢二氏只闢二氏之假徒更為通論外掃旁門邪徑一歸於窮理盡性以至於命之道振聾發瞶之洪響經天緯地之大文中篇天地之間至靈至貴者人也最忙最速者時也可大可久者金丹也惜人多溺於功名富貴場中愛欲恩情之內狼貪不已蛾撲何休一朝大限臨身斯時悔之何及惟其甘分待終就死而已誰知有長生不老之方誰悟有金丹靈藥之妙誠可惜哉此金丹靈藥非世間之所無非天上之不可得者只在於同類中求之乃生身固有之物也簡而且易至近非遙余嘗有金丹賦記之詞極朗鬯今追憶其中段云夫造金丹者始則借乾坤為玄牝學造化於陰陽識二八之相當知坎離之互藏候金氣之滿足聽水潮之汪洋繼則看鉛花於癸後玩月夕於庚方製刀圭於片晌罷龍虎之戰場喚金公而歸舍配玉女而入房果能此道矣雖愚必明雖柔必强先儒曰聖人不言易以滋人之惑亦未嘗言難以阻人之進若人用意追求殷勤修煉自必入聖超凡長登夀域永享無窮之樂也豈小補哉且人為功名富貴亦有備極窮苦而後可成者若以勞苦之心易而為修煉之心將見九還到手萬劫存神以比功名富貴孰短孰長耶仲尼曰不義而富且貴於我如浮雲又曰其為仁矣不使不仁者加乎其身不仁不義莫甚於狂貪妄想胡氏曰志於道則外物不足以纍其身悟真曰若會殺機明反復始知害裏卻生恩是知欲求還丹必先絶欲勤於殺機者刻刻有靈劍在手外欲乍乘急須就起殺機勿容縱意久久純熟對境無心即可行反本歸根之道易翼曰終曰乾乾反復道也反復之道得長生之果證也人胡不勉而行之萬物如草木之彙猶能歸根反本以厯歲時人為萬物之靈動至死地是反不如草木也能不愧乎夫此反本歸根之道又非邪徑旁門之說也世人以德行為先陰功為本察陰陽造化之機求玄牝乾坤之妙辨二八坎離之物定金花水月之時施降龍伏虎之威明立命生身之處其間致虛守靜他主我賓日月交光戊己為用則丹成反掌矣易曰男女媾精萬物化生人有此身亦因父母而得倘無父母身何有乎故作金丹之道與生身事同但順則成人逆則成仙順逆之間天地懸隔祗要逆用陰陽自然成就並非邪徑旁門也茲余所論大泄真機皆列聖口傳心授之旨人能照此下手行持自能奪天地玄妙之功窮鬼神不測之奧誠金丹之口訣也除此之外再無別傳先賢云聖人未生道在天地聖人已往道著六經豫之末論雖不敢與聖經相比亦可為問道之正途如撥雲霧而見靑天似剪荆棘而尋大路坦然無礙豁然有門學者若能專心研究自然默契仙緣幸勿輕易視之也萬金難換百寶難求勿示非人尚其重之悟真篇云學仙須是學天仙惟有金丹最的端此篇專講金丹外藥而金液內藥亦次其中矣反反復復總勸人及時省悟煉已求鉛覺世婆心傳神簡上舊賦一段句句口訣有志者再求口訣中之口訣則還丹不難矣下篇一陰一陽之謂道修道者修此陰陽之道也一陰一陽一性一命而已矣中庸云修道之謂教三教聖人皆本此道以立其教也此道原於性本於命命猶令也天以命而賜人以令也性即理也人以性而由天之理也夫欲由其理則外盡倫常者其理內盡愼獨者其理忠孝友恭衷乎內也然著其光輝則在外也喜怒哀樂見於外也然守其未發則在內也明朗朗天活潑潑地盡其性而內丹成矣夫欲全其令則殷勤顧之者此令依法用之者此令存心養性此顧命之勤勞也集義生氣此用令之法度也煉氣化神煉神還天復其性兼復其命而外丹就矣吾願後之人修此正道故直言之修道以修身為大然修身必先正心誠意意誠心正則物欲皆除然後講立基之本氣為使焉神為主焉學者下手之初必須知一陽初動之候真鉛始生之時其氣迅速如電而不能久居於先天霎時而生癸水頃刻而變經流逮至生形化質已屬後天而不可用矣崑崙之上有玄門其竅甚小陰陽會合時不許動搖待其情性相感自然彼我相通凡有形質者不能升入竅內夫惟真氣槖籥乃能進於竅內也故聖人直指先天一氣冲開此竅又曰修行之徑路可以續命延年修真而全真無來無去不生不滅今之愚人聞說有用生陽之道者卻行御女巧詐之術正如披麻救火飛蛾撲燈貪其美色胡肆縱橫日則逞力多勞夜則恣情縱欲致使神昏氣敗髓竭精枯猶不醒悟甘分待終古之賢人不然忠孝兩全仁義博施暗行方便默積陰功但以死生為念不以名利關心日則少慮無思夜則淸心寡欲以此神全氣壯髓滿精盈每嘆凡軀如石中之火似水上之漚未聞道者急求師已聞道者急求藥又能廣參博採信受奉行求先天之大藥尋出世之丹方忙忙下手速修惟恐時不待人夫道者豈是旁門小技乃至人口傳心授金液還丹之妙道也非定息二乘之法乃最上一乘之道以有為入無為以外藥修內藥以己而求彼以陰而配陽以鉛而投汞以氣而合神無為者非防危守城之方溫養沐浴之事乃得丹之後脫胎神化之功也有為者非採戰提吸之術九一動搖之法乃安靜虛無之道守雌不雄寂然不動感而遂通此即未得丹之前煉已築基之事也有為無為體用之始終已見於此內藥外藥出處之法相又詳於彼外藥者在造化窟中而生內藥者在自已身中而産內藥是精外藥是氣內藥養性外藥立命性命雙修方合神仙之道大修行人欲求先天外藥必煉己以待陽生用神氣煉成慧劍採金水勻配柔剛古人採藥進火全憑此物除七情之患去五賊之害若無煉己以去賊之患害則不能常應常靜魂魄焉能受制情欲豈不相干若要入室施功臨爐下手則外火雖動而內符不應只因剛柔未配以此慧劍無鋒羣魔為害心神不寧欲念雜起故乃逐境飄流致使汞火飛揚聖胎不結如使煉己純熟則心無雜念體若太虛一塵不染萬慮皆空心死則神活體虛則氣運方許求一陽之道二候之功還丹容易煉已最難憑慧劍剖破鴻濛舒匠手鑿開混沌卻用陰陽顚倒之法水火既濟之道乃行地天交泰使陽居下火必照上令陰在上水能潤下只要苦行忍辱身心不動已之性若往彼之氣自回人能如此便得守雌不雄寂然不動感而遂通之效也太極將判之閒靜以極而未至於動陽初復而未離乎陰候此真先氣天降以法追攝送入黃庭之中日運已汞包固周密汞氣漸多鉛氣漸散合丹於鼎又須調停真息周流六虛至聲寂而意合乃氣勻而脈住丹始凝結只待聖胎氣足十月功圓脫胎神化降生嬰兒調之純熟出入縱橫往來無礙不被羣魔引誘只待九轉功成面壁之時煉精則化氣煉神則化虛形神俱妙與道合真此大丈夫功成名遂之時也是道古人不傳於世蓋緣愚人信之不篤行之不勤而且反生誹謗是以祕而不傳豫自得遇至人以來述此修身祕要以警覺後學同志者各加黽勉共陟仙都此篇窮性命之真發聖賢仙佛之理本本原原如疏如注有為無為之序內藥外藥之分養胎脫胎之妙盡著簡編觀止已蔑以加矣玄機直講此祖師删攺前人之作以示人者故附入全集煉丹火候說二篇夫功夫下手不可執於有為有為都是後天今之道門多流此斃故世罕全真亦不可著於無為無為便落頑空今之釋門多中此斃故天下少佛子此道之不行由於道之不明也初功在寂滅情緣掃除雜念除雜念是第一著築基煉已之功也人心既除則天心來復人欲既淨則天理常存每日先靜一時待身心都安定了氣息都和平了始將雙目微閉垂簾觀照心下腎上一寸三分之間不即不離勿忘勿助萬念俱泯一靈獨存謂之正念斯時也於此念中活活潑潑於彼氣中悠悠揚揚呼之至上上不衝心吸之至下下不衝腎一闔一闢一來一往行之一七二七自然漸漸兩腎火蒸丹田氣暖息不用調而自調氣不用煉而自煉氣息既和自然於上中下不出不入無來無去是為胎息是為神息是為真槖籥真鼎爐是為歸根復命是為玄牝之門天地之根氣到此時如花方蕊如胎方胞自然真氣薰蒸營衛由尾閭穿夾脊升上泥丸下鵲橋過重樓至絳宫而落於中丹田是為河車初動但氣至而神未全非真動也不可理他我只微微凝照守於中宫自有無盡生機所謂養鄞鄂者此也行之一月二月我神益靜靜久則氣益生此為神生氣氣生神之功也或百日或百餘日精神益長真氣漸充溫溫火候血水有餘自然坎離交媾乾坤會合神融氣暢一霎時間真氣混合自有一陳回風上衝百脈是為河車真動中間若有一點靈光覺在丹田是為水底玄珠土內黃芽爾時一陽來復恍如紅日初升照於滄海之內如霧如烟若隱若見則鉛火生焉方其乾坤坎離未交虛無寂滅神凝於中功無間斷打成一團是為五行配合至若水火相交二候採取河車逆轉四候得藥神居於內丹光不離謂之大周天謂之行九轉大還也此時一點至陽之精凝結於中隱藏於欲淨情寂之時而有家有形到此地位息住於胎內外溫養頃刻無差又謂之十月功夫也又夫靜功在一刻一刻之中亦有煉精化氣煉氣化神煉神還虛之功夫在內不獨十月然也即一時一日一月一年皆然坐下閉目存神使心靜息調即是煉精化氣之功也回光返照凝神丹穴使真息往來內中靜極而動動極而靜無限天機即是煉氣化神之功也如此真氣朝元陰陽反覆交媾一番自然風恬浪靜我於此時將正念止於丹田即是封固火候年月日時久久行此三部功夫不但入圜十月也故曰運之一刻有一刻之周天運之一時一日一月一年即有一時一日一月一年之周天也然一刻中上半刻為溫為進火為望為上弦為朝屯為春夏下半刻為凉為退符為晦為下弦為暮䝉為秋冬一時則有上四刻下四刻之分即一日一月一年皆同此之謂攢簇陰陽五行一刻之功夫奪一年之氣候也到此乃是真空真靜或一二年至十年百年打破虛空與太虛同體此為煉神還虛之功也前功十月既滿須時時照顧嬰兒十步百步千里萬里以漸而出倘或放縱不禁必致迷而不返仙經曰神入氣成胎氣歸神結丹所謂一點落黃庭是也但人雜念少者得丹早雜念多者得丹遲此法簡易奈人不肯勇猛耳若能恆久行持必然透金貫石入水蹈火通天達地再行積功纍行服煉神丹大藥必然形神俱妙白晝飛升全家拔宅此又在功德之淺深何如耳設或不服神丹只顧陽神冲舉回視舊骸一堆塵土夫亦白日羽翰萬劫長存可與宇宙同春者矣返還證驗說七返九還之法下手興功先將上竅陽裏真陰入內金鼎氣海之中與下竅真陽配合陽裏真陰即是自家元神屬三魂下竅真陽即是身中元氣屬七魄其先後二氣一合則坎離自交魂魄混合神氣凝結胎息自定每日如外夫婦交情美快切不可著他水火自然既濟發運四肢如外火之生熖熖相似只要水火均平此是小周天火候調和薰蒸喉息倒回元海則外陽自然入內真火自然上冲渾身蘇軟美快無窮腹內如活龍動轉升降一日有數十樣變化嬰兒姹女自然成合此是採陰補陽一節修煉玉液還丹即築基煉己積內法財終日逍遙晝夜常明乃長生久視之初階也世人常借五穀養命數日不食則氣饑死矣若人年老下元虧損骨髓俱空不能勝五穀之氣是五穀能養人亦能殺人若會內外交接水火既濟氣血逆流五臟氣合脾胃開暢食入腹中亦能化氣生精養神人果能得下手天機直候骨髓盈滿腹臍如孕婦人一般卻不是有胎形相不過是氣滿精盈神全而己如果三全則真火煅煉調神煉虛大丈夫功成名遂之時也奉勸學人參訪宗師若求至人抉破一身內外天機明白下手速修煉已待時候一陽至擇地入室煉此龍虎大丹必要僻靜雞犬不聞之處外邊又要知音道友不要一箇閒雜人來到恐防驚散元神先言和光同塵今言僻靜處何也煉己於塵俗養氣於山林是入室興功下手之時也要超凡入聖豈是小可的事必須要一塵不染萬慮俱忘絲毫無挂一刀兩斷永作他鄉之客終無退悔之心持空煉神守虛煉性渾身五臟筋骨氣血都化成靑氣專心致志演神純熟成形受使星回斗轉隨心所變直養得渾身無有皺紋如蜘蛛相似上七竅生光晝夜常明身如太虛才是正時候方可求仙道這應驗氣滿神全法財廣大方可煉大丹才呌做一箇丹客工夫既得時候自至七竅光明三陽開泰神劍成形趁水順風發火雷轟電閃方奪外天機下手擒拏採吾身外真鉛以龍嫁虎驅虎就龍若會攢簇不失時節湛然攝起海底之金即開夾脊上泥丸落入水晶宫之內與木汞配合不過半刻攢簇己定真火冲入四肢渾身骨肉火燒刀割相似最難禁受就是十分好漢到此無一分主張防危慮險沐浴身心水火既濟頃刻間渾身如炒豆子一般相似一齊爆開渾身氣血都會成形說話就在身上鬧成一堆舌根下又有兩穴左為丹井右為石泉此正是廉泉穴隨骨脈一齊開下腎水上湧到如外水泉一般咽納不完咨味甚異比糖蜜更不相同又其至妙者臨爐下手之初地將産其金蓮天亦垂乎寶露忽然一點真汞下降透心如冰凉即運一點神火隨之攢簇於交感宫內渾然湛然如千千戰鼓之鳴萬萬雷聲之吼又即是自己一身百脈氣血變化休要驚怕只要踏罡步斗執劍掌印這裏正是凶惡處三回九轉降帥召將如此防顧於虛空中或見龍虎相交天地交泰日月交宫見衆仙諸佛工夫到此諸境發現切不可認他恐著外邪既認元神汞鉛相投三日才生大藥三日裏最難過遍世界都是邪境四面神號鬼哭八方殺氣狼煙此正是大開關工夫到此十箇九箇都嚇殺了心不可有恐布蓋已雖化成神卻是陰神陰神最靈能千變萬化諸境為害他豈肯善善降伏前人說得好你會六通神方才脫生死你若不會六通神休想成道混沌又至三十時辰二日半氣氣相通氣滿至極忽然活潑潑地逆出太陽流珠脫殼入口百萬龍神盡皆失驚此是元陽真丹藥入口始知我命不由天也仙云這回大死今方活又云一戰而天下平即是此等地位這才是天地交泰日月交宫真陽之藥到口頃刻周天火發骨胎化作一堆肉泥陽神脫體撒手無礙專心致志持空養虛以空養神以虛養心隨心變神夫萬物皆天地生發吾萬神朝拜而賓服厭居塵世逍遙蓬島自有三千玉女奉侍終日蟠桃會上飲仙酒戴仙花四大醺醺渾身徹底玲瓏海底龜蛇出現萬神受使才是真鉛真汞顚倒渾身紫霧毫光瑞氣千條是五龍大蟄法也煉之百日玄關自開嬰兒顯相龜蛇出現自然蟠繞學者到此地位口中才乾得外汞煉之六箇月體似銀膏血化白漿渾身香氣襲人口中出氣成雲此是靈丹成熟一塊乾汞人服之永不死矣亦能治死人返活煉之十箇月陽神脫體一身能化千萬身只候十二月奪盡天地全數陽神已就渾身出入只萬四千陽神步日月無影入金石無礙入水不溺入火不焚刀兵不能傷鬼神不能測變化無窮已成真人也渾身氣候無不是真藥雞餐成鳳犬食成龍此理鬼神也難明若不見過這樣言語必不信大藥金丹也造化工夫三回九轉七返八還火候細微攢簇口訣只三五日閒把天地都顚倒過都是自然人身造化陰陽亦是自然卻要體天地造化方可成就事從做過見過從試應驗到自然處工夫雖是一年火候細微只在百日之內動靜凶惡只在幾日一時裏得內外攢簇頃刻湛然聖胎成就産黍米之珠吞入腹內周天火足脫胎換骨只是要持空養虛餘皆自然今人果得明師指示先煉已於塵俗積鉛於𢋨市攢年簇月攢日簇時大定之中只在一剎那間不出半箇時辰把天地都顚倒過運火十月之工體天地自然之法若不能死中求活焉能逃出三災八難哉服食大丹說三淸俸祿玉皇廩給非先聖賢哲焉能受得如許旌陽葛仙翁殷真君等八百餘家俱是成道之後方煉服食以度羣迷仙云內丹成外丹就此言人得正傳先積精纍氣收積內外法財養得氣滿神全金光出現晝夜常明如是則吾身內丹成而吾身外丹亦發相矣凡看書不可按圖索駿學者於晝夜常明之時藥苗已生方可採吾身外之藥配吾身中之雌雄以得金丹入口周天火候發現頃刻湛然撒手無礙才是金蟬脫殼默朝上帝中遇仙舉受其天祿萬神朝禮能折天補地摘星握月驅雷轉斗呼風喚雨舉意萬神使覻天地如手掌相似這福德勝三輩天子智慧勝七輩狀元到這般時候方可煉服食金丹此丹如黍米一粒落於地則金光燭天方名神丹若不通神敢說是外丹服食此理奧妙天機深遠金種金銀種銀外邊無有別靈神此黃白之術不是凡間金銀為母遏氣果得正傳能産先天大藥認得黃芽白雪此為黃白方可為母遏氣以煉神丹但是金銀水藥都屬後天且又不知真陰真陽同類萬萬無成慨世學者真假不辨不遇正人都是盲修瞎煉實修性命之士若未遇真師且濳心看書夫古聖丹書不空說一字妄言一句只是後人不識邪正又不知聖賢書中都是隱語譬喻遭遇庸師執認旁門毒藥入心又無通變似是而非自高自是聲音顏色拒人千里之外則高人望望然去之况仙聖乎學者未遇正人時當小心低意積功纍行遇魔莫退遭謗勿嗔重道輕財一遇正人篤志苦求快破一身內外兩箇真消息忽然醒悟諸書才不為人迷惑若是志人君子實心為命掃盡旁門重正心猿重立志氣低心下意經魔厯難苦求明師窮取生身受氣初初者是元始祖氣此氣含著一點真陽真陰夫真陽真陰産於天地之先混元之始這顆靈明黍米寶珠懸在虛空明明麗麗但未有明師指破的人如在醉夢相似離此一著都是旁門此靈明寶珠於虛空之中包含萬象濳藏萬有發生萬物都是這箇一粒黍米說此物在道門中喻真鉛真汞一得真得不可著於乾坤日月男女上只於己身內外安爐立鼎煉已持心明理見性之時攢簇發火不出半刻時辰立得黍米玄珠現於曲江之上刀圭入口頃刻一竅開百脈齊開渾身筋骨五臟血肉都化成氣與外水銀相似到此時候用百日火功方有靈妙一得永得無有返還住世留形煉神還虛與道為一矣此物在佛門中說是真空真妙覺性下手端的煉魔見性片晌工夫發起三昧真火返本還元一體同觀大地成寶霞光萬道五眼六通煉金剛不壞之身了鬼神不測之妙也此物在儒門中說是無極而太極依外天地而論無極是天地周圍日月未判之前四維上下混混沌沌如陰霧水氣直至時到氣滿相激才是太極是時也日月既生淸濁自分在上為天在下為地天之淸氣為純陽地之濁氣為純陰雨露從天降是陽能生陰萬物從地生是陰能生陽天地是箇虛無包藏無窮盡無邊際天之星宿神祗動靜轉輪各有方位地下萬物按四時八節自然發生總論只是虛空夫日月是天地之精上照三十三天下照九極萬泉東西運轉上下升降寒暑往來日是純陽之體內含一點真陰之精屬靑龍姹女甲木水銀金烏三魂即是外月是純陰之體內含著一點真陽之氣屬白虎嬰兒庚金朱砂玉免七魄即是內人身造化同天地故人身亦有真日月道在邇人何求之遠也三魂屬性性在天邊七魄屬命命在海底內外通來性命兩箇字了卻萬卷丹書性屬神是陰命屬氣是陽故曰一陰一陽之謂道千經萬卷皆是異名然真性命及幻法象若不得真傳則又不可知耳仙云四大一身皆屬陰未知何物是陽精又云涕唾精津氣血液七般靈物總屬陰乃後天渣質之濁陰非真陰也真陰與真陽相對真陰既不知焉能知真陽乎今之學者不惟不知真陽亦且不知真陰若知真陰亦必知真陽矣不遇明師焉能猜度學者窮取一身中天地人三才之妙窮一身內外真爐鼎之端的及一身內外陰陽之真消息如不得旨一見諸書異名心無定見執諸旁門無有辨理既不知窮理則心不明心既不明則不能見性既不見性焉能至命古人云只為金丹無口訣教君何處結靈胎登天指迷說道也者生天地育萬物放之則包羅虛空斂之則退藏於密兩儀日月五行都是道中之造化耳物物各具一太極即道也人人心上有先天亦道也五行順而生人生物五行逆而成仙成佛故云五行順則法界火坑五行逆則大地七寶這五行之精祕於四大形山不內不外之密處只是百姓日用而不知耳民可使由之順行也不可使知之逆行也夫魚在水中不知其為水也人居氣內不知其為氣也此譬喻當濳心究竟回光返照明心見性果證仙佛復何難哉今人學道箇箇自賣聰明自誇伶俐自稱會家終無了悟又有一等小根盲人見先聖所言外陰陽外爐鼎外藥物執迷子女為鼎器則又可哀巳也某見酷好爐火者百無一成又以軒轅鑄九鼎而成道以為必用鼎器九人謬之甚矣嘗見有進過五七鼎亦無成就者且人念頭一動先天淳朴即散先天既喪後天雖存究何益於身心不過聊存其四大而巳這樣下愚豈知天不言而四時行百物生之妙哉夫人身造化同乎天地但不知天何得一以淸地何得一以𡧾且又不知主張造化的是誰若能以淸靜為體鎮定為基天心為主元神為用巧使盜機返還天真歸根復命豈患不至天地聖位至用女鼎一節事萬無此理假使有緣之士得遇真師先行玉液還丹煉巳知光操持涵養回光返照此即見性明心之事也既見其性更求向上之事乃金液還丹情來歸性直到真空地位大用現前龍女獻一寶珠金光發現至此方為一得永得亥子之交剝復之間於太陽初動興功時手探月窟足躡天根回風混合從此有百日功靈之妙此金液還丹乃陰陽五行之大道也除此玉液金液性命雙修淸靜自然之道餘皆旁門小法某於一身內外安爐立鼎攢簇口訣藥物火候細微巳得虛空法度便去入室行外藥入腹大事發火行功到祕密處有虛空萬神朝禮仙音戲頂此事鬼神難明怎奈因自巳不能煉已於塵俗未得積鉛於市𢋨氣脤又未甚大定基址也未得三全理雖融而性未見故萬物發現凶險心神恍惚不能做主又因外邊無知音道侶護持看守觸其聲色驚散元神激鼎翻爐劣了心猿走了意馬神不守舍氣不歸元遭其陰魔何為陰魔我不細言後學不知皆因真陽一散陰氣用事晝夜身中神鬼為害不論睜眼合眼看見鬼神來往即耳中亦聽得鬼神吵鬧白日閒覺猶可到晚來最難過不敢靜定一時我身彼家海底命主兌金之戊土冲返五臟氣血皆隨上騰身提不著他殺身喪命真乃鬼家活計也某乃暫棄前功遵師訓指大市隱㕓積鉛塵俗攝情歸性殺機返覆自幼至老被天地人物盜去的天真今於虛無中塵色內卻要奪盜返還於我天性之中方得元精元氣元神之三全至是乃心明理融理融見性身心大定五行攢簇才去行上等事而了大道想前代賢哲多有中道而廢皆因未曾煉巳持心金來歸性以至二候得藥於四候進火之時不知虛空法度粗心大意是以白玉蟾有再砍秋筠節之嘆焉誰知虛空消息至微至凶至惡若是擒捉不住定不饒人若是學人知一身內外兩箇真消息了然無礙方去操持涵養克去巳私復還天理則還丹工夫至簡至易終日採吾身外之黃芽以候先天之瓊漿此正是飲酒戴花悟長生之妙也若混元一事則無意無必無固無我恁生恁死忘人忘物如遊手好間不務生理終日穿街過巷玩景怡情淫房酒肆兀坐忘言豈不動世人之驚疑哉攝境積鉛法財兩用豈不致俗子之笑謗哉是以必資通都大邑有力之家以為外護目擊道存韜光晦跡仙云要貪天上寶須用世間財夫天上寶非指靑天之上而言也乃吾身上九陽鼎之寶也故軒轅鑄九鼎而飛升世之迷徒一聞天上寶三字遂執天上日月為水火乃於月出庚方用兩目行度數以採之為真水真鉛於日出卯時亦運兩目採之為真火真汞夫天上地下乾坤坎離男女內外爐鼎喻吾一身之內外陰陽而言並無男女等相仙云凡有所相皆是虛妄還丹本無質至哉斯言盡矣世間學好的人必不為損人利己之事宇宙間男女所賴以生而不死者惟此一點陽精而已豈有學仙的人採女人之精而利已之身哉比與世之殺人者有何異焉又先聖言彼家男女兩家兩國及內外爐鼎等說若人不得正傳其不錯認者幾希矣某曾遇明師耳提面命抉破虛空內外兩箇真消息不敢私於一已冒禁相付把一身天地人之造化三教經書藥物火候日月交合盈滿度數盡都抉破不立文字但說真言使學者無錯認迷修之誤是書在處有神物護持若無緣下流見之亦不過瞽唱之文詞耳是金丹大道萬劫難遇正是踏破芒鞋無覓處得來全不費功夫學者果能涵養於造次顚沛流離之際保此方寸不失是天理復矣天理既復然後求向上外藥入腹事頃刻湛然脫胎換骨渾然化一道金光大地成寶身外生身陽神脫體持空養虛此是五龍大蟄法受諸逍遙超出風水火之三劫不在生老病死苦中矣今人不去修行有貪圖爐火外丹服食者此又迷之甚矣按此篇乃玄要下篇道情總說登天指迷即道情詞曲之總名也篇末云下流見之不過瞽唱文詞即此可知為道情總說注九皇丹經龍虎鉛汞論道君論龍虎鉛汞抽添正要後世有根有緣從此下手雖曰神仙還是神仙做吾卻偏曰凡人亦可做神仙只怕不明金丹理方入地獄為獸員此龍屬陽自陽一失卻是一陰此虎屬陰自陰有寶卻是一陽龍即我之玄關也虎即彼之玄牝也龍卻好淫我卻不泄一水添一點土偏要成一箇瑤字成為玉液至寶虎卻好吃我卻不泄真火加一柬字偏要成箇煉字收為金液至寶虎虎虎那怕你張口漏牙把人亡魂喪膽我卻有伏虎手段將你為空中色色中空用龍一戲把你為龍虎風雲會不怕你不為我把你虎穴中虎子得來入我三田之中龍龍龍縱任你是淫欲之物我卻有降龍手段那怕你變化無窮我用一那吒金剛圈降住你抽你斤做為一條養性接命的金帶時時繫著那怕你不去向太極真人前請一點真一不二法門來與我為混合之大道也鉛即兩弦之鉛汞即我身天地之汞有日月之光明天地才成地天泰不為天地否人身自父母生來原有一汞一鉛男女交媾之理故曰乾為父坤為母男女媾精萬物化醇易為先天之太極人不明此一理只把汞去投鉛生男生女不把鉛來投汞成佛成仙這箇鐵饅頭打得破何難為三丰中之三丰也注吕祖百字碑養氣忘言守凡修行者先須養氣養氣之法在乎忘言守一忘言則氣不散守一則神不出訣曰緘舌靜抱神定降心為不為凡人之心動蕩不已修行人心欲入靜貴乎制伏兩眼眼者心之門戶須要垂簾塞兌一切事體以心為劍想世事無益於我火烈頓除莫去貪著訣云以眼視鼻以鼻視臍上下相顧心息相依著意玄關便可降伏思慮動靜知宗祖動靜者一陰一陽也宗祖者生身之處也修行人當知父母未生之前即玄牝也一身上下乾坤八卦五行四象聚會之處乃天地未判之先一點靈光而成即太極也心之下腎之上倣佛之內念頭無息所起之處即是宗祖所謂動靜者調和真氣安理真元也蓋呼接天根吸接地根即闔戶之謂坤闢戶之謂乾呼則龍吟雲起吸則虎嘯風生一闔一闢一動一靜貴乎心意不動任其真息往來綿綿若存調息至無息之息打成一片斯神可凝丹可就矣無事更尋誰若能養氣忘言守降伏身心神歸氣穴意注規中混融一氣如雞抱卵如龍養珠念茲在茲須臾不離日久工深自然現出黍米之珠光耀如日默化元神靈明莫測即此是也真常須應物應物要不迷此道乃真常之道以應事易於昏迷故接物不可迷於塵事若不應接則空寂虛無須要來則應之事去不留光明正大乃是不迷真性淸靜元神凝結訣曰著意頭頭錯無為又落空不迷性自住性住氣自回凡人性烈如火喜怒哀樂愛惡欲增變態無常但有觸動便生妄想難以靜性必要有真懲忿則火降真寡欲則水升身不動名曰煉精煉精則虎嘯元神凝固心不動名曰煉氣煉氣則龍吟元氣存守意不動名曰煉神煉神則二氣交三元混元氣自回矣三元者精氣神也二氣者陰陽也修行人應物不迷則元神自歸本性自住矣性住則身中先天之氣自回復命歸根有何難哉訣曰回光返照一心中存內想不出外想不入氣回丹自結壺中配坎離修行人性不迷塵事則氣自回將見二氣升降於中宫陰陽配合於丹鼎忽覺腎中一縷熱氣上冲心府情來歸性如夫婦配合如癡如醉二氣絪緼結成丹質而氣穴中水火相交循環不已則神馭氣氣留形不必雜術自長生訣曰耳目口三寶閉塞勿發通真人濳深淵浮游守規中直至丹田氣滿結成刀圭也陰陽生反覆普化一聲雷功夫到此神不外馳氣不外泄神歸氣穴坎離已交愈加猛烈精進致虛之極守靜之篤身靜於杳冥之中心澄於無何有之鄉則真息自住百脈自停日月停景璇璣不行太極靜而生動陽産於西南之坤坤即腹也又名曲江忽然一點靈光如黍米之大即藥生消息也赫然光透兩腎如湯煎膀如火炙腹中如烈風之吼腹內如震雷之聲即復卦天根現也天根現即固心王以神助之則其氣如火逼金上行穿過尾閭輕輕運默默舉一團和氣如雷之震上升泥丸周身湧躍即天風姤卦也由月窟至印堂眉中漏出元光即太極動而生陰化成神水甘露內有黍米之珠落在黃庭之中點我離中靈汞結成聖相之體行周天火候一度烹之煉之丹自結矣白雲朝頂上甘露灑須彌到此地位藥即得矣二氣結刀圭關竅開通火降水升一氣周流從太極中動天根過玄谷關升二十四椎骨節至天谷關月窟陰生香甜美味降下重樓無休無息名曰甘露灑須彌訣曰甘露滿口以目送之以意迎之送下丹釜凝結元氣以養之自飲長生酒逍遙誰得知養氣到此骨節已開神水不住上下周流往來不息時時吞咽謂之長生酒訣曰流珠灌養靈根性修行之人知不知坐聽無弦曲明通造化機功夫到此耳聽仙樂之音又有鐘鼓之韻五氣朝元三花聚頂如晚鴉來棲之狀心田開朗智慧自生明通三教經書默悟前生根本豫知未來休咎大地山河如在掌中目視萬里已得六通之妙此乃實有也吾行實到此際若有虛言以誤後學天必誅之遇之不行罪遭天遣非與師遇此事難知都來二十句端的上天梯自養氣忘言至此二十句皆是吕祖真正口訣工夫無半點虛僞乃修行上天之階梯得悟此訣與注者可急行之勿妄漏泄勿示匪人以遭天遣珍重奉行克登天闕吕祖抱度人洪願而傳此百字碑張祖抱度人大願而注此百字碑張祖之心即吕祖之心也故曰純陽三丰乃神仙中耳目西月跋道言淺近說夫道者其層次須知三候三關大抵不外四言無為之後繼以有為有為之後復返無為而已內丹功夫亦有小三候積精纍氣為初候開關展竅為中候築基煉己為三候下手於初候求之大抵淸心寡欲先閉外三寶養其內三寶而已繫辭窮理盡性以至於命即是道家層次一步趕步工夫何謂窮理讀真函訪真訣觀造化參河洛趁淸閒而保氣守精神以築基一面窮理一面盡性乃有不壞之形軀以圖不死之妙藥性者內也命者外也以內接外合而為一則大道成矣以至於三字明明有將性立命後天返先天口訣在內特無誠心人再求訣中訣以了之也凝神調息調息凝神八個字就是下手工夫須一片做去分層次而不斷乃可凝神者收己淸之心而入其內也心未淸時眼勿亂閉先要自勸自勉勸得回來淸凉恬淡始行收入氣穴乃曰凝神凝起神了然後如坐高山而視衆山衆水如燃天燈而照九幽九昧所謂凝神於虛者此也調息不難心神一靜隨息自然我只守其自然加以神光下照即調息也調息者調度陰蹻之息與吾心中之氣相會於氣穴中也心止於臍下曰凝神氣歸於臍下曰調息神息相依守其淸淨自然曰勿忘順其淸淨自然曰勿助勿忘勿助以默以柔息活潑而心自在即用鑽字訣以虛空為藏心之所以昏默為息神之鄉三番兩次澄之又澄忽然神息相忘神氣融合不覺恍然陽生而人如醉矣真消息玄關發現時也凡丹旨中有先天字真字元字皆是陰陽鼎中生出來的皆是杳冥昏默後産出來的就如混沌初開諸聖真一般以後看丹經可類推矣學道甚難傳道亦不易傳道者甚勤學道者可懶乎傳道者耐煩學道者可不耐煩乎學不精功不勤心不淸神不真以此入道萬無一成孔子曰知幾其神乎不曰其念其意而曰其神可見微動之息非神不知也今為分之曰微動者幾大動者直欲知其幾使心使意使念終不得見也神乎神乎神要真神方算先天真神者真念是他真心是他真意是他如何辨得真訣曰玄關火發杳冥冲醒一靈獨覺者是也丹家云一念從規中起即真神即真念也又云微茫之中心光發現即真神即真心也又云定中生慧一意斡旋即真神即真意也真神從不神中煉出學者知之學道人原有常格宜破乃能引心入理熱心去則冷心來人心絶則道心見此吾所以撇功名勢利棄兒女家園也頂真學道要把道當為奇貨可居乃有效驗大道以修心煉性為首性在心內心包性外是性為定理之主人心為棲性之廬舍修心者存心也煉性者養性也存心者堅固城郭不使房屋倒坍即築基也養性者澆培鄞鄂務使內藥成全即煉己也心朗朗性安安情欲不干無思無慮心與性內外坦然不煩不惱此修心煉性之效即內丹也世有學道數月而不見其寸進者為無真心向道也人若有心於道自然無事於心人若心重於道自然心輕於事人若心濃於道自然心淡於事守其性兮不散亂存其神兮不昏沉又安有渴睡雜念之擾哉咄理勝欲則存欲勝理則亡濳心於淵神不外遊心牽於事火動於中火動於中必搖其精心靜則息自調靜久則心自定死心以養氣息機以純心精氣神為內三寶耳目口為外三寶常使內三寶不逐物而游外三寶不透中而擾呼吸綿綿深入丹田使呼吸為夫婦神氣為子母子母夫婦聚而不離故心不外馳意不外想神不外游精不妄動常薰蒸於四肢此金丹大道之正宗也大道從中字入門所謂中字者一在身中一不在身中功夫須兩層做第一尋身中之中朱子云守中制外夫守中者須要回光返照注意規中於臍下一寸三分處不即不離此尋身中之中也第二求不在身中之中中庸云喜怒哀樂之未發此未發時不聞不見戒愼幽獨自然性定神淸神淸氣慧到此方見本來面目此求不在身中之中也以在身中之中求不在身中之中然後人欲易淨天理復明千古聖賢仙佛皆以此為第一步功夫打坐之中最要凝神調息以暇以整勿助勿忘未有不逐日長工夫者凝神調息只要心平氣和心平則神凝氣和則息調心平平字最妙心不起波之謂平心執其中之謂平平即在此中也心在此中乃不起波此中即丹經之玄關一竅也修煉知不玄關無論其他只此便如入暗室一般從何下手玄關者氣穴也氣穴者神入氣中如在深穴之中也神氣相戀則玄關之已體立古仙云調息要調真息息煉神須煉不神神真息之息息乎其息者也不神之神神乎其神者也總要無人心有道心將此道心返人虛無昏昏默默存於規中乃能養真息之息得不神之神初學必從內呼吸下手此箇呼吸乃是離父母重立胞胎之地人能從此處立功便如母呼亦呼母吸亦吸之時好像重生之身一般大凡打坐須將神抱住氣意係住息在丹田中宛轉悠揚聚而不散則內藏之氣與外來之氣交結於丹田日充月盛達乎四肢流乎百脈撞開夾脊雙關而上游於泥丸旋復降下絳宫而下丹田神氣相守息息相依河車之路通矣功夫到此築基之效已得一半了總是要勤虛煉耳調息須以後天呼吸尋真人呼吸之處古云後天呼吸起微風引起真人呼吸功然調後天呼吸須任他自調方能調得起先天呼吸我惟致虛守靜而已真息一動玄關即不遠矣照此進功築基可翹足而至不必百日也道德經致虛極守靜篤二句可渾講亦可折講渾言之只是教人以入定之功耳折言之則虛是虛無極是中極靜是安靜篤是專篤猶言致吾神於虛無之間而凖其中極之地守其神於安靜之內必盡其專篤之功人心者二一真一妄故覔真心者不生妄念即是真心真心之性格最寬大最光明真心之所居最安然最自在以真心理事千條一貫以真心尋道萬殊一本然人要用他應事就要養得他壯大就要守得他安閒然後勞而不勞靜而能應丹訣云心走即收回收回又放下用後復求安求安即生悟也誰云鬧中不可取靜耶遊方枯坐固非道也然不遊行於城市雲山當以氣遊行於通身關竅內乃可不打坐於枯木寒堂須以神打坐於此身妙竅中乃可學道以丹基為本丹基既凝即可回家躬耕養親做幾年高士醇儒然後入山尋師了全大道彼拋家絶妻誦經焚香者不過混日之徒耳烏足道保身以安心養腎為主心能安則離火不外熒腎能養則坎水不外漰火不外熒則無神搖之病而心愈安水不外漰則無精涸之症而腎愈澄腎澄則命火不上冲心安則神火能下照神精交凝乃可以卻病乃可以言修矣凡人養神養氣之際神即為收氣主宰收得一分氣便得一分寶收得十分氣便得十分寶氣之貴重世上凡金凡玉雖百兩不換一分道人何必與世上爭利息乎利多生忿恚忿恚屬火氣亦火種忿恚一生氣隨之走欲留而不能留又其甚者連母帶子一齊飛散故養氣以戒忿恚為切欲戒忿恚仍以養心養神為切功名多出於意外不可存干祿之心孔子曰學也祿在其中矣修道亦然不可預貪效驗每逢打坐必要心靜神凝一毫不起忖度希冀之心只要抱住內呼吸做工夫煉心之法自小及大如今三伏大炎一盞飯可也再求飽不可也一片凉可也再求大凉不可也數點蚊不足畏也必求無蚊不能也自微及巨當前即煉心之境從苦中求甘死裏求生此修道之格論也金丹之道雖曰易知難行然不可不求其知以為行之地也知苟不正行於何往知苟不精行安所入知且未熟奚云口訣學道之士須要淸心淸意方得真淸之藥物也毋逞氣質之性毋運思慮之神毋使呼吸之氣毋用交感之精然真精動於何時真神生於何地真氣運於何方真性養於何所是不可不得明辨以皙者而細言之也氣慧者神自淸氣即人身之時神表也有何難知特患心不靜定耳進氣是修道第一步要緊工夫若不靜心細參則不能知終知始如何便得下手懵懂下手知此不知彼心中忙了又忙遂時時有瑣碎之心而不團聚故本一心分作數心何能一心做工夫凡學道總要誠一一槍下馬免得另來打戰凡下手打坐須要心神兩靜空空寂寂鬼神不得而知其功夫只宜自考自信以求自得所謂誠其意者毋自欺也誠於中自形於外是以君子必愼其獨附三丰先生輯說先生曰空靑洞天向多有仙真來游留下丹訣去者此亦度人覺世之心也山中人何必另尋瑤草別採仙花只此是救命符延年藥也今特節録存之以公好道之士白紫淸調息訣云夫調息有法度有器用有火候三者有參伍錯綜之妙用須知之熟思之稔下手自砉然而解調息火候有攝取之息心要能虛能謙精方入鼎所謂縮地法也有採取之息神要不動不搖藥自就範所謂拿雲手也有交媾之息須要六根大定片念不生有進火之息以意逼之所謂起巽風運坤火是也有退符之息以神斂之所謂歸其根復其命是也有卯酉沐浴之息乃柔字而已諸般調息與法度器用宜參看調之者調度得其宜也紫淸翁玄關訣云玄關者求玄之關道玄妙之機關也有體有用何謂體寂然不動何謂用感而遂通不動有時候神氣交媾之初絪絪緼緼渾渾淪淪是為一關所謂四大五行不著處是也神氣交媾之際昏昏默默杳杳冥冥是又一關所謂無聲無臭無內無外是也及至靜極生動而用乃出焉混混續續兀兀騰騰真氣從規中起是又一關所謂念頭起為處玄牝是也念頭起處醉而復蘇有一個靈覺當下覺悟是又一關所謂時至神知是也此時以靈覺為用如線抽傀儡機動氣流微微逼過尾閭是又一關所謂斡轉魁罡運斗杓正此時也沐浴卯門又一關飛上泥丸又一關歸根復命沐浴酉戶又一關大休歇大淸靜空空忘忘還於至靜又一關玄關之體用如此千經萬論皆在是也紫淸翁爐鼎訣云四百字宜熟玩此竅非凡竅一首道盡鼎器之妙此竅二字分內外兩個看非凡者贊詞也乾坤合之為外竅神氣藏於其中為內竅神氣交而坎離生坎離交而元精産此精不是尋常精乃是白虎首經至寶也得之者立登仙界此就還丹言若小丹所用則試與人言曰此竅非凡竅陰陽共合成名為二氣穴內有真陽生可曉然矣仙家有三祕火候藥物爐鼎此詩盡爐鼎之妙矣紫淸翁動幾論云孔子曰幾者動之微又曰夫乾其動也直孟子以直養是以微動之直養而至大塞乎天地之閒也直剛氣也即乾爻之一也即初九也即顏子得一之一也直與一一也動在人之竅中十二時皆有總要靜以存之方能動以察之耳無味之中尋有味無事之中尋有事其在斯乎陸潛虛者明嘉靖閒回翁度之其論調息法云如何是勿忘曰守自然如何是勿助曰順自然如何守曰依息如何順曰平息依息則息能通息矣平息則息能勻息矣問守與順是二乎是一乎曰知所以守則知順之矣知所以順則知守之矣是二是一原是不錯由博返約惟在凝神切勿用意如用意則非真意真意從靜中生鴻濛初判無有染著乃克用之故要死過來乃知生不知生亦不知死生死是動靜深機潛虛翁又論調息法云凡調息以引息者只要凝神入氣穴神在氣穴中默注陰蹻不交而自交不接而自接所謂隔體神交理最詳古仙已言之確矣所謂離形交氣別有口傳也所謂男不寬衣女不解帶敬如神明愛如父母皆此凝神聚氣而已故曰道歸自然參同曰自然之所為兮非有邪僞道此之謂也潛虛翁三論調息法云今夫水與水合火與火合風與風合雲與雲合常理也調息者以氣合氣何待强為只要凝神入氣穴神光下照陰蹻脈不期而會者一氣之感通自然而然也屯卦曰以貴下賤大得民也咸卦曰止而悅男下女是以亨易於交接之道蓋已言之的矣但調息之法有法功有器用丹道始終不離先生曰吾與涵虛子談七返七還金液大丹之道涵虛曰據先生言是皆刀圭妙用耳他日見涵虛作戊己二土篇深合元意爰録而傳之學人欲了長生舍此不能通神也涵虛曰悟真篇云離坎若還無戊己雖含四象不成丹只緣彼此懷真土遂使金丹有返還此四句詩極盡和合丹頭之妙蓋以火中生木汞水裏産金鉛木火金水含四象於坎離之閒此時離中有己坎中有戊二土為媒四象可合也或謂真意屬土土有戊己得非有二意乎曰似也然非也名為意則一號為土則二以一意分作兩意乃有二土之可名始有內外之可別然必知動知靜焉原夫戊土者外藥也陰裏真陽也以動為主故取坎之期惟偵其動知動者意也即以知動之時為一土已土者內藥也陽裏真陰也以靜為主故填離之後致養於靜知靜者意也即以知靜之時為一土此一意分為兩意而可名為二土者也又以兩意合為一意斯無二土之可拘並無內外之可執然必能動能靜焉原夫己土者內丹也亦可變為戊土以離曰而映坎月種鉛得鉛只見戊而不見己靜能入乎動也戊土者外丹也亦可化為己土以坎陽而補離陰種汞得汞只見己而不見戊動能并乎靜也此兩意合為一意而不拘為二土者也然則彼此懷真土亦各懷其一土乎亦共懷其一土乎聰明活潑人自了然也金丹返還之道非此真意不行匪惟和合四象並能驅使四象何也蓋以木中藏火投之水鄉而火發木載金升汞去復來火得金而為返也水裏生金烹以火功而水沸金隨木上鉛去復回金得火而為還也金火返還之術即是七返九還金液大丹人欲大丹成就舍此真意奚由哉紫陽曰赤龍黑虎各西東四象交加戊己中陶仙謂龍從火出靑龍變為赤龍虎向水生白虎更名黑虎只這龍虎赤黑四字已具四象交加者攢簇也愚按作丹之士欲使四象攢簇必令五行相輳其所謂戊已中者不是離中坎中乃是中宫中央也東西間隔刀圭合之二物變為四象四象團入一村一村聚會五行五行聚而丹乃結故下二句曰復姤自茲能應用金丹誰道不成功復姤應用十月火符也進火於復退符於姤運用抽添自然中度金丹乃可成矣丹家以戊己為刀二土為圭者結字肖形正示人以打合之意但二土為圭人所共知戊己為刀人所鮮知者濳虛云有一士人會意而解𠃌音揑己字丿音撇戊字前無所本似為得之涵虛云非無本也琴譜以數字攢一字一字取一畫合左右投彈之法備見於一字之中此即以琴譜為本者也𠃌者己之頭丿者戊之旁戊己二土以刀圭兩字合之蓋望人將離己坎戊之二土合為一處也仙家隱語往往如是
