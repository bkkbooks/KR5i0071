front:
  text: 張三丰先生全集序天台悟真發明內外二藥返還大事當時淺識無知或疑為爐火採戰之書葉文叔不明返還又復以淸淨浮言附驥行世翁葆光見而笑曰此不知金丹者也遂為注以匡正之陸子野陳上陽道加發揮悟真三注出而葉注遂湮遼陽張三丰先生天仙也在武當時曾作無根樹道情二十四首與紫陽悟真後先伯仲世亦認有為採戰爐火者涵虛喟然曰道之不行由於道之不明也每欲著解彰之恨無同心丹友棲雲劉悟元以宏通大辨之才作書數十種傳世其中有無根樹注解涵虛取而觀之詞源浩大理境圓通由是欣然大喜喜其先得我心之所同然也其中有未盡泄者涵為虛乃補之內外藥物返還火候先後爐鼎發泄無遺自是而無根二解宛然悟真三注也解成問序於豫豫不敏為記其用心如此
  hash: sha256:1e7ebeca77843a9b6b6012d50ebee8132a35563c044c486403da6c2b9e458292
