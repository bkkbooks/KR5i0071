front:
  text: 張三丰先生全集重刋道藏輯要文昌帝君開心咒注釋
  hash: sha256:c7e96c9fe8c5282cadffe54374fab439de6ba7b8a651eaabfae57fccb452ca00
  markers:
  - {type: page-break, offset: 7, content: '', id: CK-KZ_KR5i0071_16p001a}
body:
  text: 序內典以瞿曇氏為兩足尊兩足者言福慧具足也夫世尊之所謂福者乃人天欽仰七寶充塞非人世一切富貴華膴之福也貴世尊之所謂慧者乃洞徹十虛舌吐遺花非如人世一切塵識聰辨語言文字之慧也而原其所以得此者乃厯劫苦行多生參究六度萬行圓滿具足故其福慧如海聚之無量而原其始亦與衆生同其窮露同其眼盲故於雪山見明星悟道乃喟然曰一切衆生同具如來智慧但以妄想執著而自墮落然則福慧之不生皆妄想蔽之妄想生則真性隱真性隱則人欲恣而天理滅其不陷於披毛帶角者幾希梓潼文昌大帝者掌混元之輪回司士流之桂籙現九十七化厯億萬千劫世尊印以如來玉帝授以如意飛鸞降筆救度衆生憫諸愚頑孤露之輩既示陰隲文以使人求福復説開心咒以使人求慧蓋無慧衆生雖具耳目無異聾瞽其苦與飢渴貧窮等故發大慈悲宣揚神咒果能誦持不輟如蜾嬴之咒靑蟲則其聰明與文帝無異直一念勇猛精誠所致耳此咒舊無注釋今詳加疏通俾知三才一貫天地尚由吾發揮方信此慧人人本具非塵識聰辨之小智小慧也詞源浩浩筆陳風馳又其小者耳誦是咒者當參陰騭文以培其福積纍不已何渠不可臻兩足尊也哉夢蓮居士張世犖敬撰文昌帝君開心神咒符録心咒第一九天大帝身披白衣日月照耀乾坤斡隨有能敬者聰明如斯黃老丹鉛與念合宜五神衛守八聖護持誦之不輟萬神赴機我司大化光耀生輝心開茅塞去鈍除迷誦持萬遍文治瓊瑰詞源浩浩筆陳風馳九天開化梵章洞微玄皇上令勿稽勿違急急如元皇上帝律令敕總持咒第二艷陽之父孤虛之娘停停天符與我主張靈符掌中誰人敢當順吾者吉逆吾者亡囑爾書符萬瑞千祥與之赴闕姓顯名揚功名如意大顯帝鄉未來過去成敗興亡吉凶禍福與我參詳吾奉九天玄皇上仙急急如律令敕無極咒第三無極之極不神之神同同上宰無象無名出有入無無有中真先天混沌四象何分上窮九級下徹玄冥惺惺不昧昭昭靈靈玄皇正氣來合我庭萬化為一一化為淸淸澄湛寂玄元聖真以上三咒每晨夕念九遍心存想帝君像自然心通靈慧舉筆文詞如流水不論老少念之有感有靈其中妙境難以枚舉開心符安畫俱念開心咒大內書弟子某年庚心事畢加三聖諱用七抹雨下書文光速現斗牛乾罡三聖諱即霐雨澄雨明總持符念總持咒一三台二震三雨四田五丨六曲念離旨火天尊聖念斗勺權衡畢甫票七亦念斗勺權衡畢甫票八左小念輔右小念弻第九大內書弟子姓名年庚心事七抹之十辰十一現龍十二乾罡十三年支干十四雨十五三心𢗰寫心字要從中起十六降至宫文光十七畫從上起十八畫三聖諱同前霐雨澄雨明此三字寫于大內十九通仙二十敕令神光經識序神光之法其來尚矣嘗考索故典始於岐伯之傳初但驗有無為死生夀天之訣殆至有漢張子房受圯上之書始作行師之用驗五色以考勝負吉凶之機其法愈神而其説愈備高祖嘗欲攻胸奴驗神光得靑白子房以為不吉高祖不從遂有白登之圍是其明驗也及至後世賢人君子往往推演以備人事不過即其理通之誠亦不為誣妄也夫人之有神猶草木之生有精華盛衰而榮悴可以預知理之自然不可逃也人之神光正猶是焉其理至實而不誣其事至簡而不煩用之以守身用之以遠禍用之以出入起居事至物來無施而不可也豫居家數十年纍經憂感未嘗有非橫驀忽之禍者藉此法之良焉耳後之君子得此當寶而藏之勿示非人可也弟子吳海雲拜撰受正元機神光經張三丰先生遺集弟子吳海雲輯取驗要訣凡驗神光當先澄心靜慮默恭想存其所向之方所為之事及所欲接對之人存想既定然後以兩手中指緊按左右月窟緩而搖之其光自見靑者憂白者虛驚紅者黃者吉慶有喜事黑者大凶取之無光則不日而絶矣源流確論夫神光者一身之主宰五臟之精英根於靈台之中見於月窟之際不假人力取驗如神昔李光弻野宿取神光不吉而知高暉之有謀急移營避之乃得免禍蓋得此法也孔子十日不見神光而知死期將至遂有泰山梁水之嘆近世浮屠有預知死期者亦本此法焉史書不載豫授異人之傳君子得之可以師兵討罪可不促裹遠遊可以避患於未來可以祛疑於未決不假蓍龜無勞思慮然必正心誠意乃可得之若乃僭意非心以求僥幸者則神自不存胡吉凶之可憑乎循理君子得此宜寶而祕之非人勿傳也定神湯序凡居倉卒之際或事擾心怯神必不定神不定則光亦憑之而忒故須先服定神湯然後心定神安驗之自無不中矣定神湯方天門冬一兩去心人參一兩肥大滋潤者去蘆茯神三兩去皮石昌蒲五錢要九節者去毛甘草五錢炙去皮辰砂五錢要磊粒光明者麝香一錢要真者同辰砂另研極細右伴依法修制為細末將砂射和勻黃連燈心泡湯調服二錢如神氣自定無他事煩擾者不服事君篇事君以忠或上封事或面奏對少有差謬禍莫大焉必先午夜驗其神光若得紅光輝熖必主天顏有喜嘉納所言黃色而光圓大者必主賞勞或賜宴酒食進升官爵之喜靑者必主虛驚白者言無所納且有威罰之恐黑者大凶自宜警戒臨敵討罪篇凡臨敵討罪須驗神光色紅黃明且耀者必大勝縱彼千軍萬騎攻之我亦無虞如靑黑色或神光不見急宜徙營別所如白色則不宜進兵必有破軍折將之患野宿篇凡遇夜野宿或所處有疑須澄心靜慮速驗神光若靑色則有姦人至黑色貝戊兵來白色親近有謀紅黃色熖可高枕無虞矣凡處危地而眼瞤者一瞤則一里之遠二三瞤得二三里之遠十瞤則十里前面必有姦人賊黨至吾事先知則姦賊可談笑而擒也遠遊篇凡遠遊止宿村落去處必須驗其神光若不見而心動目瞤急宜遠避不可入也若居山谷石崖枯木壞墻之下神光不在必有山崩石墜樹倒墻傾之患山林幽寂去處出入徑過神光不見切不可妄動恐有虎狼蛇虺等害謹愼防之則無害也風雨雷電篇凡在外卒遇暴風驟雨速驗神光若不見者決有洪水泛漲地塌城崩之患不可於此久居須當更遷高阜乃可免也過渡篇凡渡江海或水惡波險去處預先一日驗其神光紅黃色者可渡靑色者有大風白色者大雨黑色者或無則有船翻折柁沉溺之禍喪身殞命在須臾矣可不謹哉飮食篇凡飮食酒會或客居遇人邀請慮有所傷必須先驗神光若紅熖光明黃圓且大必有歡欣之慶醉飽之樂且無所傷損若靑白之色必主爭端或酒食不佳不能暢意光若黑者或被酒食所傷或為骨鯁所害或誤食毒物患出百端矣交遊篇凡往來探望朋友亦驗神光其光黃赤者其人在家歡欣迎接酒食欵顧之喜靑白色者或在家怯迫或他事奔馳或死喪凶事無暇逢迎若黑光不去必有橫生他故諸事不吉也疾病生死篇凡人七夜神光不明或不見形迹大主危厄五夜中有一夜見不妨常於黃昏時候之或無再於半夜之時驗之若有則是元氣不和必無死亡之患驗之有紅黃色旦夕痊安靑白色但主沉滯黑色或無死期將至矣取驗法凡欲取驗須於靜夜獨處勿令人知暗而取之亦不須遍與他人談説務在精一專求萬取萬中設若輕舉妄動塵私百端而欲元神之淸徹取驗之得真氣亦難矣蓋神亦昏亂而欲試其功效匪術之弗靈乃驗者之罪也愼之神光占人身之神在心心之神在目故目中常有神光神光去則災厄至其光赤黃吉白防兵靑黑有憂隨光所在之方去之大吉左目光存則從左去右目光存則從右去二目俱有人不能害凡出行忽然心動鼻酸急察神光靑防姦人黑防盜賊臑音跳凡舌唇動臑神光不在妾婦為賊凡心掌動臑神光不在交友為賊準提心經繡谷弟子吳海雲輯準提印以兩手無名指併兩小指交乂於內二中指直豎相拄兩食指屈附於中指第一節二大拇指搯兩無名指中節金剛印以大拇指搯無名指根第一節餘四指握大指作拳左右手指謹號圖五曰小指四曰無名指三曰中指二曰食指一曰大指準提心經繡谷弟子吳海雲輯淨法界真言唵㘕右梵字二為淨法界真言按陀羅尼者經律等中最為第一能除諸罪令諸衆生解脫生死速證涅槃安樂法身依密圓修鍊亦分為二一持誦儀軌二驗成行相且初持誦儀軌者謂真言行者每日欲依法持誦時先須金剛正坐以右腳壓左腳䏶上或隨意亦得手結人三昧印二手仰掌展舒以右手在左手上二大拇指甲相著安臍輪下此印能滅一切狂亂妄念雜染思惟澄定身心方入淨法界三昧謂想自身頂上有一梵言㘕字此字遍有光明猶如明珠或如滿月想此字已復以左手結金剛拳印以大拇指捻無名指根第一節餘四節握大拇指作拳此印能除內外障染成就一切功德右手持數珠口誦淨法界真又能成辨一切勝事言二十一遍此淨法界㘕字若想若誦能令三業悉皆淸淨衣服不淨便成淨衣身不澡浴便當澡沐若用水作淨不名真淨若用此法界字㘕字淨之即名畢竟淸淨瓶如靈丹一粒點鐵成金真言一字變染令淨偈云喝字色鮮白空點以嚴之梵字囉字上安安點即成㘕字也如彼髻明珠置之於頂上真言同法界無量衆罪除一切觸穢處當加此字若實外緣不具無水洗浴闕新淨衣但用此㘕字淨之若外緣具者先用水了著新淨衣即內外具淸淨也廣如諸真言儀範經説護身真言唵齒𡄦二合嚂字去聲彈舌呼之右梵字二為護身真言按顯密圓通心要此咒能滅五逆十惡一切罪業能除一切種種病苦災障惡夢邪魅鬼神諸不祥事而能成辨一切勝事令一切所願皆得圓滿此咒是諸佛心若人專心誦一遍能守護自身一切鬼神天魔不敢侵近誦兩遍能守護同伴誦三遍能守一宅中人誦四遍能守護四城中人乃至七遍能守護四天下人廣如文殊根本一字咒經説上二咒各持一百八遍亦得太明真言唵麼抳鉢納銘二合吽二合右梵字六為六字太明真言按顯密圓通心要此咒隨所住處有無量諸佛菩薩天龍八部集會又具無量三昧法門誦持之人七代種族皆得解脫服中諸蟲當得菩薩之位是人日日得具六波羅密圓滿功德得無盡辨才淸淨智聚口中所出之氣觸他人身蒙所觸者離諸嗔毒當得菩薩之位假若四天下人皆得七地菩薩之位彼諸菩薩所有功德與誦六字咒一遍功德等無有異此咒是觀音菩薩微妙本心若大書寫此六字大明則同書寫八萬四千法藏所獲功德等無有異若以金寶造如來像數如微塵不如書寫此六字中字功德若人得此六字太明是人貪嗔病癡不能染著若戴持此咒在身者亦不染著貪嗔癡病此戴持人身手所觸眼目所睹一切有情迹得菩薩之位永不復受生老病死等苦説此六字太明竟有七十七俱𦚸佛一時現前同聲説淮提咒即知此六字太明與凖提真言次第相須也廣如大乘莊嚴寶王經記凖提真言南無颯哆喃三藐三菩馱俱柢喃怛你也二合他右梵字十六為凖提真言按顯密圓通心要此咒能滅十惡五逆一切罪障成就一切白法功德持此咒者不問在家出家飮酒食肉有妻子不揀淨穢但至心持誦能使短命衆生增夀無量迦摩羅疾尚得除差何况餘病若不消滅無有是禪宗傳燈録中引古人云俱柢只念三行咒無得名超一切人是也處若誦滿四十九日準提菩薩令二聖者常隨其人所有善惡心之所念皆於耳邊一一具報若有無福無相求官不遂貧苦所逼者常誦此咒能令現世得輪王福所求官位必得稱遂若求智慧得大智慧求男女者便得男女凡有所求無不稱遂似如意珠一切隨心又誦此咒能全國王大臣及諸四衆生愛敬心見即歡喜誦此咒人水不能溺火不能燒毒藥忽家軍陳強賊及惡龍獸諸鬼魅等皆不能害若欲請梵王帝釋四天王𨶒羅天子等但誦此咒隨誦必至不敢前次所有驅使隨心皆得此咒於南贍部洲有大勢力移須彌山竭大海水咒乾枯木能生花果何况手能依法持誦不轉肉身得大神足往兜率天若求長生及諸仙藥但依法誦咒即得見觀世音菩薩或金剛手菩薩授與神仙妙藥隨取食之即成仙道得延夀命齊於日月證菩薩位若依法誦滿一百萬遍便得往詣十方淨土厯事諸佛普聞妙法得證菩薩若欲成就壇法不同諸部廣修供養掘地香埿之所建立但以一新鏡未曾用者於佛像前隨月十五日夜半向東方置鏡坐前隨力莊嚴諸供養具燒安息香及淨水然後結印在於心上咒鏡一百八遍以囊盛鏡常將隨身每欲念誦但以鏡壇置於面前結印誦咒若不若不能結得準提印者但以左手作金剛拳印右手持數珠誦之能逐日對鏡念誦但於十齋日對鏡念誦除十齋日外不對鏡壇持誦亦得密之藏中令此鏡壇最為要妙總攝一切諸壇若無鏡者但想一鏡者於面前持誦淨諸惡趣經等多説想成壇法持誦為上或不能想得壇者但只專注持咒此準提咒一切諸佛菩薩等同説獨部別行總攝二十五部真言十齋日初一日初八日十四日十五日十八日二十三二十四二十八二十九三十日壇法準梵本有十萬偈説立龍樹菩薩以偈讚曰準提功德聚寂靜心常誦一切諸大難無能侵是人天上及人間受福如佛等遇此如意珠定獲無等等大輪咒唵折隸主隸凖提娑婆二合訶部林二合右梵字十為一字大輪咒按心要集云大輪一字咒即部林是也亦名未法中一字心咒此咒於未法時法欲滅時有大勢力能於勢間作大利益能護如來一切法藏能降伏一切八部之衆能推世間一切惡是一切諸佛之頂是文殊菩薩之心能施一切衆生無畏能與一切衆生快樂凡有修持隨意得果同如意珠能滿一切之願若誦此咒於四方面五百驛內諸惡鬼神皆自馳散諸惡星曜及天魔不敢侵近若持誦餘一切真言恐不成就即用此咒共餘真言一處同誦持之決定成就若不成就及無現驗其咒神等即當頭破七分是知此咒能助一切真言疾得成就或別持此咒亦得廣如文殊儀軌經於法中一字心咒經説上來次第持誦至準提咒若不能結得準提印者但以左手作金剛拳印右手持珠誦之或不能從前淨法界真言等次等持誦者只持準提神咒更或根鈍不能具受此準提者只唵字已下持之唵字已上是歸敬詞唵字等是正咒也每誦誦了却用右手作金剛拳印口誦吽字真言即前太閚真言吽字真言而印五處先印額上次印左肩次印右肩次印心上後印喉上二印竟頂上散之能除一切魔障成就一切勝或比至持誦先印五處亦得事又十隨所住處欲辟除鬼神結金剛印但誦凖提真言咒香水二十一遍八方上下灑之即成辟除結界又正持誦時準俱柢陀羅尼經金剛頂經五字陀羅尼頌等數本經教中説隨根所樂亦有多種一瑜伽持但想心月中布字謂想自心如一月輪湛然淸淨內外分明以梵書唵字安心月中一以折隸主隸準提娑婆訶字從前右旋次第同布輪緣去聲呼之終而復始二出入息持誦出入息中想九聖梵字者即唵折隸主隸準提娑婆訶有真言梵字息出字出息入字入字字朗然如貫明珠不得間斷或息出時想自心月輪中九聖梵字字字連環皆有五色光明從自口中流入準提菩薩口中右旋安布準提菩薩心月輪內若息入時想準提菩薩心月輪中字亦字字連環皆有五色光明從準提菩薩口出流入自口中右旋安布心月輪內如是終而復始想之甚妙三金剛持唇齒不動舌不至齶但口中微動四微聲持但令自耳聞之不緩不急字字須得分明稱之五高聲持他他聞之滅罪復有二種持誦一無數持誦謂不持珠定數常無間斷持之二有數持誦謂搯數珠每日須得限定其數不須闕少若搯數珠所獲功德諸經廣讚如數珠功德經説若有人手持數珠雖不念誦佛名及陀羅尼者此人亦獲福無量若用㘕字真言如持數珠七遍用持課時一遍或千遍者搯數珠至母珠卻回不得越過母珠每日依法持誦時須限定其時分若一時持謂早晨若二時持并黃昏若三時持加正午若忙務者不拘時分但有暇時持之若上根持謂須得三密相應一身密結印二語密誦咒三意密或想真言梵字或緣持誦之聲或想準提菩薩或想菩薩手中所執柞瓶華果等物故神變經疏云若用三密為門不須經厯劫數具修諸持只於此生滿足諸波羅密又正持誦未滿一百八遍不得共人語話若欲語話時於自舌上想一楚言㘕字縱語話不成間斷問曰為當只持一道真言功德成就為復廣持多本真言功德成就答有二門一者隨根所樂門謂根有多種好樂不同或有樂持三道五道十道乃至百道等中間隨根所樂不同皆得持誦二者疾得成就門謂欲求一切功德疾得成就宜專持誦一道真言成時一切真言功德皆悉成就問曰既專誦一咒疾得成就何以多示準提真言令人持誦答云一為準提總含一切諸真言故準提能含諸咒諸咒不含準提二為準提壇法人易成辦故但以一新鏡未曾用者便是壇法不同餘咒建辦壇法三為準提不揀染淨得持誦故不問在家出家飮酒食肉有妻子等皆持誦但須得揀選淨處香埿塗地廣造佛像多用供具方能成就有財物者廣造佛像多辦供具於佛像前安置鏡台對之持誦更妙又真言行者每日對鏡初欲持誦時或只依前先想自身頂上有一梵言㘕字猶如明珠然後持誦或想自身頂上㘕字變作三角火輪從頂至足燒盡自身遍周法界唯見淸淨縱有五罪用此字皆能除滅次想一梵言阿字生成自身謂阿字即體是無相法界從無相法界生成行者之身復想一暗字在自頂門十字縫中謂暗字即體是十方諸佛光明法水用灌佛子之頂此祕密灌頂法門然後持誦或想自心如一月輪圓滿淸淨於月輪中有一梵言唵字如來因位多年修道不得菩薩後習跎觀於初夜分便成正覺謂唵字具合無量法門是一切真言之母一切如來皆因觀想此字而得成佛或心月輪中想一阿字是毗盧佛身亦是菩薩心若人想念能生無量功德或心月輪中想一吽字謂吽字總攝金剛部一切真言是金剛部主身亦是三解脫門若常想念能除一切罪障成就一切功德或舌上想一㘕字或想吽字想竟然後持誦或想自身頂上出大蓮華上現出阿字復想阿字變成月輪又想月輪變成吽字吽字變成五股金剛杵又想此杵移於舌方得名為金剛舌然後持誦次於一手中亦想阿字阿字變成月輪月輪變成吽字吽字變為白色股五金剛杵方得名為金剛手然後結一切印或想準提九聖梵字每一一字有種種光明安自身分之中所謂想唵字安頭上折字安兩目隸字安項頸主字安於心隸字安兩肩準字安臍中提字安兩䏶娑婆二合安兩脛訶字安兩足以上乃是九聖梵字以上九聖字想安布已然後持誦凡有所求決定成就安布九字藏經數處説也凡諸經中説想真言字者皆是梵字非是北方文字故一字頂輪上儀軌云所言觀諸字惟瞻於梵字非是隨方又有人神用力或有不能想得梵字者但只專心持誦亦具一切三昧故大悲心經云陀羅尼是禪定藏百千三昧常現前故若人緊切持誦時逢種種魔障或忽然怕怖或舌難持誦或身心不安或多瞋多睡或見諸異相或於咒反生疑心不欲持誦等云云若對法者應觀梵書囉字或觀㘕字或觀阿字等但隨觀一字彼境界自然消滅若分別心多當觀灑字即成無分別若著有心多應觀含字即因緣法本空也甘露咒南無素嚕皤耶怛他揭多耶怛姪他唵素嚕素嚕皤囉素嚕皤囉素嚕莎呵右梵字二十九為甘露咒供佛利生儀心要欲施水取水一掬用甘露咒咒之七遍散於空中其水一滴即皆變成十斛甘露一切餓鬼並得飮之無可多少皆得飽足纍茶羅疏云夫為道者祈運為宗上若不供諸佛菩薩何處展智欲求菩提下若不濟活仙飢鬼何處行悲以度薩埵有信之流無遺斯業大灌頂光真言唵阿謨伽尼嚧左曩摩賀母捺囉二合麼抳鉢納麼二合入嚩二合攞鉢囉二合哆野吽引右梵字二十三為不空羂索毗盧遮那佛大灌頂光真言供佛利生儀心要若救一切亡靈者應誦不空羂索毗盧遮那佛大灌頂光真言謂若有衆生造具十惡五逆四重諸罪數如微塵滿斯世界身壞命終墮諸惡趣誦此真言加持土砂一百八遍散亡者尸上骨上或墓塜上彼所亡者若在地獄鬼傍生修羅等中以此真言神通威力加持土砂之力應時即得光明及身除諸罪報捨所苦身往於西方極樂國土蓮花化生不墮落直至成佛或用紙帛等書此諸真言置亡人尸上或骨上甚妙故偈云真言梵字觸尸骨亡者即生淨土中見佛聞法親授記速證無上大菩薩大寶廣博樓閣善住祕密陀羅尼咒曩謨薩嚩怛他引蘖多去聲南引一唵二尾補攞蘖陛三麼抳鉢囉二合陛四怛他多五你搽木示捨寧六麼抳麼抳七蘇上鉢囉二合陛八尾麼黎九婆引蘖囉十儼鼻口肄十一吽十二吽十三入嚩二合攞入嚩二合攞十四沒馱尾盧枳帝十五塵土共呬夜二合地瑟恥二合多上聲蘖陛十六娑嚩二合訶十七右梵字六十三為大寶廣博樓閣善住祕密陀羅尼供佛利生儀心要欲利樂一切四生等有情者應書大寶廣博樓閣善住祕密陀羅尼在於幢上堂殿上或素上或紙帛上或經卷上或墻壁牌版等上有諸衆生暫得眼見者或手觸者或身觸者或影中過者及餘人轉觸此人者又或書之戴在頂上者身上者衣中者或書在出聲物上有聞聲者或讀者或誦者或但聞此陀羅尼名者如是生等縱有一切諸罪等悉皆消滅決定當得阿耨多羅三藐三菩提能於現世獲無量百千功德常得國王王子宰官及諸四衆歡喜敬愛不受世間種種諸苦毒藥刀杖水火等難一切獅子虎狼蛇蟲諸惡禽獸不敢為害無一切諸盜賊難諸鬼神難諸邪魅難又現身不受一切諸病惡疾瘡毒內外等症悉不著身不為厭禱蟲毒咒詛者身無橫災既臥安覺安臨命終時心不散亂一切諸佛現前安慰又一死旁生鹿鳥蚊蟲飛蛾螻蟻乃至胎生卵生濕生化生諸有情等聞此陀羅尼名者或身觸或影中過者決定當得無上菩提等又若人於高山頂上誦此陀羅尼者盡眼所見處一切衆生皆得滅一切罪業得離一切地獄業得免一切傍生身上來諸咒藏中各有數本不同皆是前後三藏西天諸國語音有異但依一本誦持無得揀擇寡學之者多分受一非除呵斥聖賢寄語後人勿霑斯咎息災法妙言唵折隸主隸準提與某甲除災難娑婆二合訶右梵字十六息災法妙言也按心要經云若作息災法者行者面向北交腳堅膝而坐像面向南於準提像前安置鏡壇更想一白色圓壇於圓壇中遍想囀字或鑀字尊像供具并行者自身俱想在圓壇之中或於像前只塗拭一圓壇亦得觀準提作白色所獻花果飮食并自身衣服皆作白色塗香用白壇燒香用沉水然酥燈以慈心相應從月一日初夜時起首至八日日滿每日三時澡浴三時換衣至日滿時或斷食或食三白食三白食謂乳酪粳米欲或粥無力者尊像供具衣服但運心想之亦得下準此知之若念誦時前次第持誦至準提咒誦一百八遍已然後但從唵字誦之若為自已於娑字婆上稱自已名及所為事若為他人稱他人名及所為事增益法妙言唵折隸主隸準提與某甲所求如意娑婆二合訶右梵字十七增益法妙言也按心要經云若作增益法者行者面向東跏趺而坐像面向西於準提像前安置鏡壇更想一黃色方壇於方壇中遍想阿字或暗字尊像供具并行者自身俱想在方壇之中或於像前只塗拭一方壇亦得但準提作黃色所獻花果飮食并自身衣服等皆作黃色塗香用白檀加少鬱金燒白檀香然芝麻油燈以喜悅心相應從月九日日初出時起首至十五日滿每日準前三時澡浴換衣至日滿時準前斷食及三白食念誦如前敬愛法妙言哪折隸主隸準提令一切人敬愛某甲娑婆二合訶右梵字十七為敬愛法妙言也按心要經云若作愛法者行者面向西結賢坐像面向東於準提像前安置鏡壇更想一赤色半月形壇於半月壇中遍想一賀字或想舍字尊像供具并行者自身俱想在半月壇中或於像前只塗拭一半月形壇亦得觀準提作赤色身著緋衣所獻花果飮食并自身衣服盡皆赤色塗香用鬱金燒香以丁香蘇合香密和燒之然諸果油燈以喜怒心相應從十六日後夜時起首至二十三日滿每日澡浴斷食念誦法準前降伏法妙言吽折隸主隸準提吽發吒右梵字十一為降伏法妙言也心要經云若作降伏法者行者面向南蹲踞坐左腳押右腳像面向北於準提像前安置鏡壇更想一靑色三角壇於三角壇中遍想囉字或㘕字尊像供具并行者自身俱想在三角壇中或於像前只塗拭一三角壇亦得觀準提作靑色或黑色著黑衣自身衣服亦皆靑色獻靑色華臰花不香華曼陀羅華等飮食用石榴汁染作黑色或作靑色塗香用柏木閼加用牛尿以黑色花及茶子柏木塗香等各取少分置閼伽水燒安息香然芥子油燈以忿怒心相應從二十四日午時或夜半起首至月盡日滿每日澡浴斷食念誦法準前行若惡人等身心不安或得大病或命欲終即當勸彼令發善心若是悔過自責永斷惡心者即為彼人作息災法念誦彼人即免災難此上是四種成就之法若欲於此四種法中求成就者須得預前持誦準提真言五十萬遍或七十萬遍或百萬遍而為先行方於四種成就法中隨心所欲作一法時決定成就每見今時法或或儒為利為名終年親附竟日趨參用盡身心罕有稱懷無常來至又生下劣之處何如依諸佛之聖言誦祕密之神咒於上增益等法中頻頻作之所求之事決定遂心一切罪業悉得消滅無常來至又生勝處現在未來俱獲利樂豈不善哉有斯巨利故我佛或之出世間法妙言心要經云若作出世間法者行者在於山間深谷殊勝巖窟淸淨伽藍運大悲心常樂利樂無邊有情同準提王菩薩仗託無盡諸佛菩薩大悲願力助護限四月四日一期之內阻絶人客默斷語言三密相應心無間斷行者面向東餘方亦得就中向東最言全跏坐或半跏坐或隨意坐俱得像面向西於準提像前安置鏡壇三行者頂上想㘕字變成火輪燒盡自已有漏之身復想大蓮花上有阿字生成無漏智身更想暗字灌頂已又想㘕字變成大火燒此有為世界如同卻火燒盡無遺但有空寂復想建立無為之壇於取下方遍想人字雜色而為空輪於空輪上遍想含字黑色變成風輪風輪上遍想㘕字赤色變成火輪火輪上遍想鑁字白色變成水輪水輪上遍想阿字黃色變成金剛地於金剛地上遍想有大蓮花一一蓮花上皆有準提菩薩無量聖衆圍繞一一準提前皆有行者自身一一身各出無量華果飮食幢幡等諸供養具而為供養又皆對準提準提三密相應又行者若無準提像并華果飮食等供具但作此觀亦得吉祥成就一心諦想準提菩薩具無盡相好光明於菩薩心月輪中想有九聖字壇行者想自心月輪中亦有九字壇并自身分中想布九聖字所獻華果飮食香燭等以上息災增益敬愛三法之中所説物色皆得用之行者衣服但一切新淨者皆得作法就中黃衣最吉又行者不須苦節勞形恐心神散亂於行住坐臥四威儀中皆得三密修習於見聞覺知唯觀阿字依前次第軌儀持誦至準提真言從頭無記數專精念誦勤策身心不令懈怠欲近成就時必有種種障起應作降伏息災等法隨行者根行差別於其中間必獲三昧現前即於定中見無數佛會聞妙法音證得十地菩薩之位此一種法唯求出世間若欲於此法中求成就者須得預前持誦準提真言五百萬遍或百七萬遍或千萬遍而為先行方得此定有靈驗一驗成行相者謂準提陀羅尼經金剛頂經蘇悉地等共十餘本經皆得真言行者用功持誦或夢見諸佛菩薩聖僧天女或夢見本身騰空自在或渡大海或浮江河或上樓台高樹或登白山或乘獅子白馬白象或夢見好花果或夢見著黃衣白衣沙門或喫白物吐黑物或吞日月等即是無始罪滅之相或正持誦時見諸法光明或見空中遍地奇時之花或見諸佛菩薩聖僧天仙等或見諸佛淨土或自遊佛國親承供養或暫時聞經於多劫或見燈光高一二尺乃至一丈或無火爐中自有煙起或見佛像幡蓋自動或聞諸佛菩薩種種美聲或覺自身巍巍高大或齒落重生或髮白返黑或身潤白不生蚤虱或貪嗔癡心自然消滅或總持不忘一字能演多義或智慧頓生自然通曉一切經律論或一切三昧法開自然現前或佛德頓高四衆歸仰等若逢如上之事俱是福慧增長近成就相莫生疑惑之心勿起取捨之念應觀所逢境界皆是阿字或藍字或若得如是應驗更須榮發三業加功誦持不得宣説咒中境界衒賣與人唯同道者不為名利敬讚方得説之若成就時有九品下三品者若下品成就能攝伏一切四衆凡有所求舉意從心一切天龍而來問訉又能伏一切蟲獸及鬼魅等中品成就能驅使一切天龍八部能開一切伏藏或要入修羅宫便得入之去住隨心上品成就便得仙道乘空往來天上天下而得自在世出世事無不通達中三品者若下成品就便得諸咒仙中為王住夀無數歲福德智慧三界無比中品成就便得神通往餘世界為轉輪王住夀一劫上品成就現證初地已上菩薩之位上三品者若下品成就得至五地已上菩薩之位中品成就得至八地已上菩薩之位上品成就三密變成三身只於此生得證無上菩提之果此是持咒人九品成就若直求成佛不演求下三品等成就若淮神變疏有五品成就一現至信位二至初地三至四地四至八地五至成佛也仙當經今通依諸經故説有九品謂準提真言總含諸部神咒問曰云何得知準提總含諸部神咒答謂一藏經中神咒不出二十五部一佛部謂諸佛咒二蓮華部謂諸菩薩咒三金剛部謂金剛神咒四寶部謂諸天咒五羯磨部謂諸鬼神咒此五部每部復各有五即成二十五部今準提總攝二十五部故準提經云獨部别行總攝二十五部又云若欲召二十五部天魔等專誦此咒隨請必至又云五部金剛四天王共結總持三昧果又大教王經云七俱胝如來三身讚説準提菩薩真言能度一切賢聖若人持誦一切所求悉得成就不久證得大準提果是知準提真言寶藏之中最為第一是真言之母神咒之主斗姥大法語心經夫北斗為衆星之樞紐七元為羣宿之領袖左輔右弻共成九皇而經指出北斗為體以天應下之本命天尊為衆生説法原從北斗九皇無字經中先將存理遏欲明心見性元元説來以北斗配合人身不見真性則斗不降厄從何解生從何延必以心竅合斗以性靈生光厄即自解生即自延可見一之功用無窮為天地之樞機作人神之主宰人當猛省切勿輕視心乃萬竅之綱領七竅乃周身之宰輔左龍右虎配成九竅之真此是天尊叮嚀後學知心即是北斗周身孔竅即是衆星九竅即是九皇合並為一方好下手修煉以竅合斗斗即是竅斗應竅竅即是斗所謂天一大天人一小天天無心成化人有心成能皆以七配成九可見天人合應之理一曰貪狼貪狼是北斗第一元即人心第一竅此竅正心上第一個竅眼名為天元竅得北斗之靑氣應東方甲乙之木為肝氣相結人能通肝氣以開天元竅則上明天文之理自人初生以來此竅開明其後貪心一起狼心一縱更將此竅遮蔽我若不貪不狼謹守心相則靈元自舒貪狼在本命亦不使我貪狼也宜用柔以尅剛故曰陽明貪狼以柔制去貪狼則陽明大現便是本來陽明貪狼只分開蔽二字開則是北斗之貪狼蔽則成我之貪狼此竅屬陰故為子生人之本命子乃天一之水水生東方肝木木旺則生此竅之陽火使百竅通靈當用默朝功夫靜坐北室面向東方以噷欠噷欠唏咧四字口訣七七四十九遍須在子元宫用一唵字提起肝母家氣朝拜東方以陰煉陽不可以陽搏陰令肝氣入朝心家電徹通體合我本來元光致陽脈大長然後得本命第一星君降駕靑衣靑冠保護我本命也二曰巨門巨者大也門者戶也巨有長短門有閣闢形容第二心竅之象上應地元即名地元竅明地理之精微屬脾家中央戊已之土運動脾氣主持攝靈養得中宫精氣充足自然保得元神通靈利走橘黃而通竅也宜脾用氣上朝心竅之功夫用綱綱二字口訣七七四十九遍必先用一唵字于脾家妻宫提起水來濟火致丑土十數合乎中央亥水六數又祖合氣之八數道心精察人心自退本命朝真然道心精通以察理人心退位而聽命此竅屬陰耦數以亥丑屬乎陰命以十六居在雙數故曰陰精巨門降駕黃衣黃冠主照亥丑生人之本命也三曰真人祿存北斗第三真人祿存星君在命門三陽乾元萬物含生命門者腎水之門也有一點真火名為三陽乾元應乎北斗壬癸之氣有黑氣存乎其中萬物借此真一之水而滋潤發生人身賴此元之陽氣而流通百脈心腎交合心靈通無二其功在日月金輪處升降運行用擠擠二字口訣七七四十九遍必先用一唵字在本宫一寸三分靈明處運起寅戍本命得水生木木尅土徵其欲窒其忿方得心竅開通能行此功而運此氣也自得真人祿存司此丙丁煉魂必須用赤赤二字真氣配合剛剛二字口訣令液上升而使黑衣黑冠到命門中盤結而不已也四曰文曲北斗第四文曲玄冥此竅難言正北斗壬癸之候此竅乃坎精胞乃元不是坎精何為玄元不是胞元何為太冥此四句內係透徹功夫運用方如得此效驗何功也又為太玄太冥有感皆通鬼神擬靈不待握持大化為神內功運用得如此效驗其功用休休意意四字一氣運出使卯酉沐浴生人本命提運四十九過于任脈處攝起唵字元神上朝此竅大通光明然後實結娃娃之形現子黑衣黑冠之神中凝成一梵團氣便是月元象中外明而內暗也可以曉月殿嫦娥之形象也五曰丹元亷貞北斗第五丹元亷貞星君此星位君大矣至矣在天為北斗之中在竅為一心之靈凡人皆得此竅不閉只是難得真氣入竅欲真得氣入竅必須用針針森森源源晶晶健健健健光光光光十六字口訣方得此竅不在別處即在本心絳宫加一唵字四十九遍默朝心中絳靈宫罡令氣保體衛真故得此本宫真氣可以呼遣風雲雷雨招使萬神位列五斗竅居玄靈得申辰本命運南方丙丁真之氣降於我身中招玄靈宫亷真丹元星君降駕江元宫赤衣赤冠亷潔利貞自然魔鬼遁形此竅只在午列二字中真有妙用也六曰北極武曲北斗第六北極武曲高真居心竅第六應西方庚之辛氣為天乙北元之宫上應肺俞二穴左為金吒右為金鉢名曰白虎二眼實應真鉛虛盈亦是斗中難開之竅也經緯萬端縱橫羣星所居不動紐樞天心居元河宫為北辰之象為人身之極靈斬妖縛邪剛毅莫並內功在一唵字先從金生于子宫提起一口梵氣用滔滔滔滔四字口訣七七四十九遍從肺俞二穴金家吒鉢門戶運來降入此竅則四大擴充妖邪滅迹非剛毅不屈功夫焉能開通此竅得北斗第六北極武曲紀星君降于河元宫白衣白冠之中一團口亡然梵氣盤結不已凡已未生人當知火生土土生金係自已本命也故六竅符合懷抱乾坤乾乃我身之首坤乃我身之足上而泥丸下而湧泉再用一唵字默運六竅自然符合而懷抱乾坤矣七曰天關破軍北斗第七天關破軍此星有內垣外垣之分有天罡帝座之尊此竅有優鉢娑訶之妙有北元北液之阾大矣至矣難盡其妙竅開天關多有鬼門主宰一立大破三軍在北斗為天關在人心為守竅主宰立定內用紀紀紀紀四字先提唵字有聲後運紀字無音七七四十九遍方得西方庚辛金之氣主午命生人須知金浮肺家被午火尅化得乾元振振入於此竅合並為一作一心之主宰大破三軍制伏三百六十骨節之鬼爽降一萬三千大數之妖魂此竅本承天元地元日元月元江元河元海元諸元合並開此木命得白衣白冠三百六十種降於朱陵天宫之中竅能知默朝無不應驗無不通玄無不成真成聖成仙成佛豈不妙哉蓋七竅同度萬緣不侵精心默朝七元用七竅全部功夫先肝用氣腎導氣而上朝於心竅接肺運氣傳心液而下降于腎宫用戊已勾合即用吱口天噠哩㖿唵嚤唎唧口亡娑訶即運用魁𩲃𩵄䰢魓𩳐魒十九字罡氣來臨則七竅無不開通自與北斗七元同度能保命延年至哉妙道可見天尊之弘仁也又將左輔右弻二星以應肝肺二竅另有功夫開通左有天皇右有紫微二神大為輔為弻為擎羊陀螺二尊所稱一輔一弻為號也人能見道此氣長存住世長年聖胎結成與道合真此二竅非明師口訣不能開通然肝乃心之母母竅不開子竅焉通肺乃心之妻欲開夫竅必先開妻竅此是生尅之理其功用鈴鈴鈴鈴壯壯壯壯升升升升十二字在肝家盤旋七七四十九遍令龍雷之火一發通開肝竅薰蒸子府心竅同開又用里里里里寧寧寧寧平里平里寧里寧里十六字運於肺家肺竅一開則金液降下流滴於心上下齊開必先用一唵字作肝之母肺之子宫中提起一口真氣默運中宫自有妙處此係北斗姥大法語切勿輕視三台上有三台應我一身三光合之光照崑崙三台者虛精開德六淳司空曲生者映我玉枕宫此星雖居崑崙山上其實卻在華蓋肺愈二穴而來若要此穴開通只用一唵字長長提動合三宫一齊開通以此為聖為賢成仙成佛易如反掌天尊度人口口説本命元神令修行人向本命元神宫中參窮修煉性命係北斗七元星君宫中掌判本命生死權衡各認本命各守一元才有真把柄每逢三七庚申甲子每遇朔望三元五臘面朝北斗心法斗口焚香燃燈盡心懇願始終如一厯久不變自有妙用機關子時子時乃自已身中之活子時也子生人口誦志心朝禮北斗第一天元宫陽明貪狼太星君先將子生人録出其餘十二地支所屬本命皆倣此推口誦志心朝禮六字講明餘者倣此有志心二字便不徒口口唱誦有朝禮二字亦不徒心心謹志此乃默朝運用之功夫也口乃內氣所入之門戶口開神氣散欲要口中真誦字必須六門謹閉將一真團氣養定放我本命宫中然後才好用志心朝禮之功夫心字加一志字者神寓心字乃心之所之之謂也心神欲往本命宫去必隨心之所之而去若能將呼吸功夫欲出不出欲入不入舌胝上腭心注斗口以自來津液一口送下本命宫中便是朝禮也此一志字內有七十二口為玉池口中津液乃是玉液腎液也上升到心二氣相合而過重樓則津液滿玉池謂之玉唵字然運腎氣而起必須有一點心癢處才是本命星君所管但竅一開活活現出一個北斗來按四字行持先生後熟有無窮的妙處子命生人必朝北斗第一星君餘者各尋本命所屬的星君而朝其中有各妙用存焉夫心之為竅左三右四左三竅液若咽之自中田而入下田則曰還丹若升之自中田而入四肢則曰煉形其實一物而已之經絡各有所管右四竅之經絡各有所係其精其氣其神各有專注處但子命生庚乃是十二地支第一本命天一地六合為七數乃天一之真水正在坎宫一點真陽正屬命門一點真精處所謂兩腎中間一點靈明者是也命門居中乃有一點真火子宫屬水何以命門中有真精殊不知相火雖在命門乃是後天之火真精密在命門乃是先天之水若能知火裏尋水水裏尋金便是坎卦中間一陽發出真機造化知此修煉便成大羅天仙陽明貪狼此一位星君即是我心之左第一個竅中竅中一根通於肝之血海一竅肝之血海一竅卻與命門正相通連若是子命生人欲見此位星君降我本命須靜養心神靜伏腎氣靜存真精可用志心朝禮四字都向我一個唵字用舌抵在舌根下不覺一陳陳的正朝於此竅中去了七日來復後忽然靑衣靑冠現光於我本命斗口也丑亥時丑亥生人口誦志心朝禮北斗第二地元宫陰精巨門元星君此屬丑亥生人之本命但默朝口訣前已注明此位星君居心左第二竅中通于亥腎家坎宫之正位丑乃寄旺於脾土經絡俱通竅開能照前訣默朝自然見本命星光也寅戌時寅戌生人口誦志心朝禮北斗第三日元宫真人祿存真星君此位星君屬心左第三竅是寅戌生人用默朝本命之功夫感格更快寅乃肝家之正位在震宫戌乃脾土之寄位經絡互通靈竅默朝功夫注於前例應驗亦同卯酉時卯酉生人口誦志心朝禮北斗第四位月元宫文曲玄冥紐星君此位星君主卯酉生人本命心右一竅卯屬肝家輔位酉屬肺家弻位經絡各有相通功夫亦照前例光照應本命星君辰申時辰申生人口誦志心朝禮北斗第五江元宫丹元亷真罡星君此位星君正在心右第二竅其實居於心中第六竅在右竅略中則六竅略略開住凡夫不能開此竅一概應事雜情遮蔽大凡事應接物俱以此竅為主宰但竅中有一真種氣天罡應竅除非有真真的忠孝節義切烈丈夫方得一時流露即我先天一點真性是也辰申本命生人感格者辰乃天罡心竅之正位屬脾土正宫申乃白元正座屬肺家乃是大蓬經絡連貫默運亦照前例本命自現也已未時已未生人口誦志心朝禮北斗第六位河元宫北極武曲紀星君此位星君屬心右第三竅下正映六腑上正總五藏屬巳未生人之本命已為地二生火未為土十成土經絡度數相通依然默朝自現本命之光也午時午宫生人口誦志心朝禮北斗第七海元宫天關破軍關星君此位星君總握全星上督雷門此竅一開修煉金丹大道成功不難此竅星君便有南宫躍護衛主午宫本命生人屬之者以午宫為在天之真火在人身為三昧火在罡為步得七陽真數至剛莫敵依前默朝真訣行持不獨此一位星君降駕而衆星連拱七竅無不開通也此係斗宫妙法元始祕語斗宫雖曰在天實屬人身中七竅元始雖曰在天實屬人身中祖氣此以上七星默運朝禮總要七竅中一真點氣收攝移在祖氣之中方捉得本命生庚一點真元靈氣出來各依前例默運功夫真是至玄至妙法語學者愼之天罡祖氣天罡名曰螭魎兩爾此天罡乃在雷城十二門之前凡用志心朝禮者若不先運起天罡祖氣縱有前功的妙訣七竅卻難開通此訣即前功七十二個唵一字用一口罡氣到底門之前若觀雷經便知其內妙處在人身為十二經絡之總故名曰螭魎兩爾若夫螭魎兩爾者一氣至所之云爾自知者可為知其精微螭魎兩爾二字在祖氣中藏猶如十二時辰寓於臟腑各有所運主方是此螭魎兩爾二字之真名號也正夫氣充滿天地左右輔弼光如車輪精彩直貫斗口正氣充滿乃是天罡祖氣為七元護衛作七竅關頭其氣至大至剛不可思議白玉龜台白玉龜台者在中梵天氣之中蓋白玉龜台主於坎位上應七竅下應九衢即人之腎家也一個靈龜有七座寶台都是自森森裝成中天梵氣即人之心家也中天有生梵生氣即是赤赤結成為象此種真台真氣誰得知之我祖設法演教伸明精義普度衆生昔者斗姥元君在西竺彌羅之國圓明淸淨之天修持玄靈妙道勤奉三寶天尊斗姥元君是七星之姥實係人身七竅之主西竺彌羅者乃肺下心上中間有一梵點氣盤旋真真的的圓圓明明至極淸淨一國中天真真斗姥之處世人不得而知中有玄靈二字方得三寶天尊歸於人之精氣神故云修持玄靈妙道亦常體玩金丹大道勤奉三寶至玄至妙故謂怡神養頤凝精結氣怡神即名志心朝禮之功養頤乃是口誦運用之妙凝精結氣即是口誦志心朝禮之總功也充滿旋繞結一寶台金光繚亮輝煌覆一華蓋即口誦志心朝禮功夫做到無為無不為的田地方謂得到手不惟言斗姥有寶台華蓋即人身精中氣充滿遍體繚繞於臟腑金光出現則一團真靈結覆自然身內結寶台上座而我亦有華蓋遮我之神也身坐七曲華池之中光吐混元紫府之上自已身中一片真元陽毫無一點業障握定真魂如如不動身坐七曲華池如如自在勝如座斗姥之蓮花寶台也一切學者錯認華池豈知混元紫府即先一天氣之府得七曲華池而身座寶光自然光明透照光者神光也現出七真彩氣自然成文結為七元真君此是真君真光所現而結也前有天罡此天罡乃在雷城十二門之前若觀雷經便知妙處在人身為十二經絡之總凡用志心朝禮者若不先運起天罡之氣縱有前功妙訣七竅卻難開通此訣即前七十二個唵字用一口罡氣到底一氣至之夫正氣充滿天地左右輔弻光如車輪直貫斗口正氣充滿乃是天罡為七元護衛作七竅關頭若論擎羊蛇螺為七元內外之輝煌此二星把持婆羅帝座宫上尊宫二宫其光甚大通身內外無不貫徹十二雷城皆是洞洞灼灼人若能見之者便可長生其實在人身內肝腸真竅內通七竅之處外觀人之兩目圓如車輪通連真鉛發出真元必須修煉至極方得元光發現道高千古恩及萬物可以修身齊家成仙成佛為聖為賢俱不外乎七元本命星君主持開化而來或遭兵戈盜賊疾病妖邪牢獄枷鎖三災八難種種魔障默朝七元寶號皆得永淸此乃真元救苦之大法也此經至大至妙故稱中天大聖北斗紫微尊帝七元九皇豈不是救生濟死之一大功夫也人當時時謹記常常默念下手速修方得此經中玄之又玄妙中更妙之理大悲神咒繡谷弟子吳海雲書觀世音菩薩白佛言世尊若諸衆生誦持大悲神咒墮三惡道者我誓不成正覺誦持大悲神咒若不生諸佛國者我誓不成正覺誦持大悲神咒若不得無量三昧辨才者我誓不成正覺誦持大悲神咒於現在生中於一切所求若不果遂者不得為大悲神咒惟除不善除不至誠若諸女人厭賤女身欲成男子身誦持大悲陀羅尼章句若不轉女身成男子身者我誓不成正覺生少疑心者必不果遂也若諸衆生十惡五逆重罪惡孽不通懺悔縱懴亦不退滅今誦大悲神咒即得除滅惟在信心誦持不生疑惑若諸衆生誦持大悲神咒者得十五種善生不受十五種惡死也其惡死者一者不令其飢餓困苦死二者不為枷禁杖楚死三者不為𡨚家讎對死四者不為軍陳相殺死五者不為虎狼惡獸殘害死六者不為毒蛇蚖蛇所中死七者不為水火落漂死八者不為毒藥所中死九者不為蠱毒害死十者不為狂亂失念死十一者不為山樹崖岸墮落死十二者不為惡人厭魅死十三者不為邪神惡鬼得便死十四者不為惡病纒身死十五者不為非分自害死誦持大悲神咒者不被如是十五種惡死也得十五種善生者一者所生之處常逢善王二者常生善國三者常值好時四者常逢善友五者身根常得具足六者道心純熟七者不犯禁戒八者所有眷屬恩義和順九者資聚財食常得豐足十者恆得他人恭敬扶接十一者所有財寶無他劫奪十二者意欲有所求皆悉稱遂十三者所龍天善神恆常護衛十四者所生之處見佛聞法十五者所聞正法悟甚深義若有誦持大悲心陀羅尼者得如是等十五種善生也一切天人應常誦持勿生懈怠觀世音菩薩説是語已於衆會前合掌正住於諸衆生起大悲心開顏含笑即説如是廣大圓滿無礙大悲心大陀羅尼神妙章句陀羅尼大悲咒開經偈釋氏詩詞曰偈無上甚深微妙法佛法無邊高深而奧妙也百千萬劫難遭踽非不遭遇遭遇而不能奉行不倦厯億萬劫而難證果故云我今見聞得受持念經者自謂也言我今遵所聞得所見得受此經而持之甚久願解如來真實義如來乃佛之祖如來云者如如不動不失本來面目願解云者願參透佛經奧義也觀音菩薩大悲神咒南納無謨喝合囉納怛達那羅哆多囉夜㖿也此是觀音菩薩大慈大悲本身南無阿唎利㖿也此是如意輪菩薩本身到此須存心婆盧羯揭帝爍音鉢囉㖿此是持鉢觀世音本身誦此存想菩薩持鉢身菩提薩跢多婆㖿此是不空羅索菩薩押大兵摩訶薩跢多婆㖿此是菩薩種子自種咒之本身摩訶迦盧尼迦㖿此是馬鳴菩薩本身手把鈸羅唵此唵字是諸鬼神合掌聽誦咒薩皤鉢囉罰曳此是四大天王之本身降魔數怛那怛寫此是四大天王部落鬼神名字南無悉吉栗唾朵伊蒙阿唎㖿此是龍樹王菩薩本身須用心誦勿疏失婆盧吉諦室佛囉㘄波馱陀婆此是圓滿報身盧舍那佛南無那羅囉納謹墀此是淸淨法身毗盧遮羅佛本身大須用心誦醯酉帝巾台希唎摩訶皤鉢哆多沙咩迷此是羊頭神王共諸天魔為眷屬薩婆阿他拖豆朋此是甘露菩薩係觀世音部落眷屬阿逝誓孕此是飛騰夜乂天王巡察四方善惡薩婆薩哆那羅摩婆薩哆那羅摩婆伽茄此是婆伽帝神王其形黑大手持鐵乂摩罰特豆此是軍吒利菩薩本身持鐵輪並把鐵索面生三限怛達姪他拖唵阿婆盧醯希此是劍語盧迦加帝此是大梵天王神仙為部落迦加羅帝此是帝神長大黑色夷醯唎希利此是三十三天摩醯首羅天神統領天兵面靑色摩訶菩提薩埵朵此是實心更無雜亂心即名薩埵薩婆薩婆此是香菩積薩押五方鬼兵以為侍從不可思議摩囉納摩囉摩醯希摩醯唎馱孕此是菩薩相罰語即為齊也俱盧俱盧羯揭懞此是空心菩薩押天太將軍領二十萬億天兵度盧度盧罰闍蛇耶夜帝此是嚴峻王菩薩押孔雀王蠻兵摩訶罰闍蛇耶夜帝陀羅陀羅此是觀音菩薩大丈夫身地唎尼此是獅子王驗人誦咒室佛囉納㖿也此是霹𩆝菩薩降伏諸魔眷屬遮囉遮囉納此是摧碎菩薩手持金輪摩摩罰摩囉此是大降魔金剛手把金輪穆帝曬此是諸佛合掌聽誦真言伊醯希移醯希室那羅室那羅此是魔醯首羅天王阿囉納嘇衫佛囉納舍利罰沙罰嘇衫此是觀音菩薩把牌弩弓箭佛囉納舍耶夜此是阿彌陀佛觀世音菩薩師主呼嚧呼嚧摩囉呼嚧慮呼嚧醯希利此是八部鬼神王娑囉納娑囉納此是五濁惡世悉利悉利此是觀音菩薩利益一切衆生不可思議蘇嚧蘇嚧慮此是諸佛樹葉落聲菩提夜菩提夜此是觀世音菩薩結衆生緣菩馱夜菩馱夜此是阿難本身彌帝利夜此是大車菩薩手把金刀那羅囉納謹墀此是龍樹菩薩手把金刀地唎𢜈尼那羅此是寶幢菩薩手把鐵乂波夜摩那羅此是寶金光幢菩薩鍰折羅村娑婆訶悉陀夜此是達一切法門娑婆訶摩訶悉陀夜此是放光菩薩手把赤幡娑婆訶悉陀喻藝此是諸天菩薩盡悉以集手把金刀室皤鉢囉耶夜娑婆訶那羅囉納謹墀此是山海慧菩薩手把金劍娑婆訶摩囉納那羅囉納此是寶印王菩薩手把金斧娑婆訶悉囉僧阿穆佉枷耶夜此是藥王菩薩行療諸病娑婆訶娑婆摩訶阿悉陀夜此是藥王曾上一切菩薩本身行療諸病娑婆訶者吉囉阿悉陀夜娑婆訶波陀摩羯揭悉哆夜娑婆訶那羅囉納謹墀皤鉢伽囉㖿也娑婆訶摩婆利勝羯揭囉夜娑婆訶南無喝合囉怛那羅哆多囉納夜㖿也南無無謨阿唎㖿也婆嚧吉諦爍皤鉢囉夜娑婆訶唵悉殿都𠼦哆多囉納鉢馱㖿也娑婆訶右大悲神咒是觀音菩薩本大慈大悲心不忍見衆生受盡無量苦惱故説此大悲神咒普度衆生觀音菩薩發諸宏願有一願未遂誓不成正覺則慈悲度脫之苦衷可見而持誦者之感應如響亦可見知矣凡誦此咒惟在信心誦持不生疑惑能生十五種善心不受十五種惡死其飢困水火枷杖寃家讎對毒藥厭魅邪神惡鬼惡病種種怪異一切不能身有求則靈常得豐衣足食貴人扶持意欲所求悉皆稱遂一切求謀感應如響隨心所欲真如意珠也如意珠卷終
