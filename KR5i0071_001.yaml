body:
  text: 撰序有明之初仙人輩出南昌周顚仙臨川張景華協律郎冷啓敬是皆默觀景運翊贊奇勳者然其嬉笑神奇震動天子方士卽沿此欺人也張三丰先生跨遼東鶴籋薊北雲以文學才識受知廉平章奏補縣令旋復致仕歸家從赤松子遊至正間先生已浩然有得矣道光初余歸自浙於今秉鐸嘉陽每當課士之暇輒愛養生之書常於李子齋頭得故劍南觀察汪夢九先生所藏三丰全集然後知文章出處淸矯不羣是亦嫏嬛中祕典也李生以其書厯年旣久腐不堪披亟欲梓而存之並搜名山碑版道院抄存者以補其闕由是郁郁然成一家言也昔宋太宗謂諸臣曰華山陳摶獨善其身不干勢利可謂方外士矣三丰其能紹希夷之風者歟賜進士出身翰林院庶吉士知浙江靑田縣事嘉定府教授董承熙譔敘嘗讀呂祖全書自全唐詩律及厯朝遺蹟釐然備載所以振元風而詔後學也張三丰先生道德崇高元微莫測文章浩瀚利濟無方與呂祖無異者也其書曾刋於前明永樂時久而版壞然其散見於他書者亦不少矣夫呂祖之書成於涵三豈先生之書竟聽其散佚乎或者時之未至也國初汪公夢九觀察劍南時先生顯化於署中其輯兵愛民諸善政得之先生者爲多夢九藏舊本拾遺文將付梓并欲與巡撫奏請立祠均未果葢其時亦將至矣長乙山人遯園居士忘名利者也得先生書於夢九六世孫名曇者之家十存七八因採諸書以補之夀諸梨棗以成夢九欲遂之志焉雖齋居絃誦未徧厯武當寶雞諸名勝搜羅眞蹟纖悉弗遺然觀集中本末終始郁郁大成實與呂祖全書相伯仲卽有遺佚無妨續補也前明之訪先生也側席旁求十餘年而不得先生獨以隱世濟世維氣運於人所不知之地纖塵不染高不可攀高眞上聖莫過於此明君且以通微顯化封之明史竟以方伎末流例之誤矣讀此集者見先生於文字中復見先生於文字外已飄飄乎欲仙也會心人自領之耳賜進士出身内閣中書改保甯府教授致仕西來李迦秀謹敘敘程子謂卻病延年則有白日飛昇則無歐陽公謂養生之術則有神仙之事則無余以爲卻病養生卽仙道也黃庭經云仙人道士非有神積精累氣以成眞誠平允之論哉今夫谷虛境也神靈覺也虛靈不昧則成儒谷神不死則成道仙何異焉三丰先生在元明鼎革間獨全性命於亂世不求聞達於諸侯深造以道欲其自得默念州縣勞人幣書招我皆所以蔽虛靈而損谷神也屏之棄之避之藏之眞所謂世有神仙彼必深濳崖壑惟畏人知者先生之節貞矣風雪可眠非徒卻病鬚眉不老何但養生光之有日月之明大之有滄海之水又安知不有脫殻生翰白日飛昇成仙於靑霄之外者哉雍正初汪公夢九觀察劍南先生以法身顯化其署卽謂五百年猶在人間可也公知神仙之道信而有徵於是以先生文章出處輯爲成書蓋欲與卻病延年者大其觀也卓菴劉君得汪書而補紀之刋版傳世後之頌其詩讀其書者應知仙道之不虛也夫道光甲辰七夕長乙山人涵虛生敘
