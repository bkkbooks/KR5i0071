front:
  text: 張三丰先生全集三丰祖師全集序古來一隱一見而不失其正道者其惟至人乎能隱而不能見則閒冷之意深於世無益也能見而不能隱則消磨之日甚於已無成也雖然出而霖雨入而煙霞豈遂枯寂無爲乎抑非也上眞隱世復度世見人不附人是又隱見之神奇者耳我三丰祖師具知幾之明存正誼之理其爲儒道也身可進亦可退其爲仙道也身能飛亦能濳進退飛濳之間卽猶龍之大道也錫齡風塵俗吏未省根源幼讀儒書只期用世今倦矣將長往雲山與安期羨門遊矣曩者官劍南擢永北宦潮㬪起塵海憂勞幸遇我祖師名言提警招齡至前而語之曰方今聖人在上下有賢宰輔名公卿相與佐治子無忘蓬山共處時也退而思之始大覺焉夫當此昌期詎甘瓠落但念九州馳驅如齡等輩者得之不多失之不少何苦長罹世網也因將我祖師丹經二卷詩文若干篇夙夜尋求以圖解脫暇則夢寐間山水間鸞鶴間復蒙祖師面示謂其道始於太上而祖於希夷隱則隱見則見有隱中之見有見中之隱斯無隱之非見無見之非隱總不趨謁君公高談金石而爲方術者流也齡乃記祖師顯蹟三十餘則藏之其伭機妙旨有所親得者存其文而略存口訣恐其卽於漏洩也他日齡淩風萬里跨鶴三山此書又付何人哉雍正元年小陽之月誥授通議大夫河南全省河道副使夢九汪錫齡稽首薰沐謹
