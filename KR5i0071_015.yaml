body:
  text: 上卷文昌開心咒總持符咒無極咒開心符總持符受正元機神光經序神光經取驗要訣源流確論定神湯序定神湯方事君篇臨敵討罪篇野宿篇遠遊篇風雨雷電篇過渡篇飮食篇交遊篇疾病生死篇取驗法神光占佛母準提心經準提印金剛印指掌圖淨法界真言護身真言太明真言準提真言大輪咒甘露咒大灌頂光真言大寶廣博樓閣陀羅尼咒息災法妙言增益法妙言敬愛法妙言降伏法妙言出世間法妙言如意寶珠目録下卷斗姥大法語心經一曰貪狼星二曰巨門星三曰真人祿存星四曰文曲星五曰丹元亷貞星六曰北極武曲星七曰天關破軍星三台星十二時辰口訣天罡祖氣白玉龜台大悲神咒分句提詞
